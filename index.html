<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION COMMAND: LAUNCH S66 v17</title>
    <style>
        :root { --nasa-blue: #0b3d91; --artemis-red: #fc3d39; --lunar-grey: #f4f4f4; --text-dark: #212121; }
        body { background: var(--lunar-grey); color: var(--text-dark); font-family: 'Helvetica Neue', Arial, sans-serif; padding: 10px; overflow-x: hidden; }
        .hud { border: 3px solid var(--nasa-blue); max-width: 800px; margin: auto; padding: 20px; background: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; border-radius: 8px; }
        
        .launch-pad { height: 120px; border-bottom: 2px solid #ddd; position: relative; margin: 15px 0; background: linear-gradient(to bottom, #e0e0e0, #ffffff); overflow: hidden; border-radius: 5px; }
        
        /* Centered and Rotated -45deg to make the emoji point straight UP */
        #rocket { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%) rotate(-45deg); font-size: 40px; transition: bottom 0.5s ease-in, transform 0.3s; z-index: 10; }
        
        .fuel-bar { width: 100%; background: #eee; border: 1px solid #ccc; height: 30px; margin-top: 5px; position: relative; border-radius: 15px; overflow: hidden; }
        #fuel-fill { background: var(--nasa-blue); width: 0%; height: 100%; transition: width 0.5s; }
        #total-text { position: absolute; width: 100%; text-align: center; color: #fff; font-size: 12px; line-height: 30px; font-weight: bold; top: 0; left: 0; z-index: 5; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        .mode-toggle { display: flex; background: #eee; border-radius: 25px; margin: 15px 0; padding: 5px; border: 1px solid #ccc; }
        .mode-btn { flex: 1; border: none; background: none; padding: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.3s; color: #666; }
        .mode-btn.active { background: var(--nasa-blue); color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .p-btn { background: #ffffff; border: 2px solid var(--nasa-blue); color: var(--nasa-blue); padding: 15px; cursor: pointer; font-weight: bold; text-align: center; border-radius: 6px; font-size: 0.95em; }
        .p-btn:hover { background: var(--nasa-blue); color: #fff; }
        .q-text { font-size: 1.15em; color: var(--text-dark); margin-bottom: 20px; border-left: 5px solid var(--artemis-red); padding-left: 15px; line-height: 1.5; font-weight: 600; }
        .ans-btn { display: block; width: 100%; padding: 16px; margin: 8px 0; background: #f9f9f9; border: 1px solid #ddd; color: var(--text-dark); cursor: pointer; text-align: left; border-radius: 8px; font-size: 1em; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 8px; font-weight: bold; background: #fdfdfd; border: 1px solid #eee; display: none; }
        .nav-btn { background: var(--nasa-blue); color: #fff; font-weight: bold; padding: 18px; border: none; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; border-radius: 8px; display: none; }
        .correct-ans { border-color: #2e7d32 !important; background: #e8f5e9 !important; color: #1b5e20 !important; font-weight: bold; }
        .wrong-ans { border-color: #c62828 !important; background: #ffebee !important; color: #b71c1c !important; }
        
        .review-item { border-bottom: 1px solid #ddd; padding: 15px 0; text-align: left; }
        .review-logic { font-size: 0.9em; background: #f0f4ff; padding: 10px; border-radius: 5px; margin-top: 5px; color: var(--nasa-blue); border-left: 3px solid var(--nasa-blue); }
        
        /* Animation: takeoff stays straight-up */
        .takeoff { bottom: 1000px !important; transform: translateX(-50%) rotate(-45deg) !important; transition: bottom 3s ease-in !important; }
        .shake { animation: shakeAnim 0.5s infinite; }
        @keyframes shakeAnim { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 50% { transform: translate(-1px, 2px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        #countdown-overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: var(--artemis-red); z-index: 200; display: none; font-weight: bold; text-align: center; width: 100%; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="hud" id="main-hud">
        <div id="countdown-overlay">IGNITION</div>
        <h1 style="text-align:center; margin-bottom: 5px; color: var(--nasa-blue);">S66: MISSION COMMAND</h1>
        <div style="text-align: center; font-size: 12px; color: var(--artemis-red); margin-bottom: 10px; font-weight: bold; letter-spacing: 2px;">V16.5 SECURE OPS</div>
        
        <div class="launch-pad"><div id="rocket">🚀</div></div>
        
        <div class="fuel-bar">
            <div id="total-text">FLIGHT READINESS: 0%</div>
            <div id="fuel-fill"></div>
        </div>

        <div id="menu">
            <div class="mode-toggle">
                <button id="mode-sprint" class="mode-btn active" onclick="setMode('sprint')">TRAINING SPRINTS</button>
                <button id="mode-sim" class="mode-btn" onclick="setMode('sim')">MISSION SIMULATION</button>
            </div>
            <div class="grid">
                <button class="p-btn" onclick="start(0)">01. ECONOMICS <span id="s0" style="display:block; font-size:10px;">PENDING</span></button>
                <button class="p-btn" onclick="start(1)">02. VEHICLES <span id="s1" style="display:block; font-size:10px;">PENDING</span></button>
                <button class="p-btn" onclick="start(2)">03. STRATEGY <span id="s2" style="display:block; font-size:10px;">PENDING</span></button>
                <button class="p-btn" onclick="start(3)">04. REGULATIONS <span id="s3" style="display:block; font-size:10px;">PENDING</span></button>
            </div>
            <button onclick="resetScores()" style="width:100%; margin-top:30px; background:none; border:none; color:var(--artemis-red); cursor:pointer; font-size:11px;">⚠️ RESET MISSION LOG</button>
        </div>

        <div id="game" style="display:none;">
            <div id="status-line" style="font-size:11px; color:#666; margin-bottom:10px; font-weight:bold;"></div>
            <div id="q-area"></div>
            <div id="feedback"></div>
            <button id="next" class="nav-btn" onclick="next()">NEXT GATE ></button>
        </div>

        <div id="report" style="display:none; text-align:center;">
            <h2 id="report-title" style="color:var(--nasa-blue);">SECTOR COMPLETE</h2>
            <div id="rep-msg"></div>
            <button id="review-btn" class="nav-btn" style="display:block; background:var(--artemis-red); margin-bottom:10px;" onclick="showReview()">🔍 REVIEW MISSION LOG</button>
            <button id="return-btn" class="nav-btn" style="display:block;" onclick="returnToMenu()">RETURN TO COMMAND</button>
        </div>
    </div> 

<script>
    // --- 1. DATA BANKS ---
    // TRAINING SPRINTS: Replace with your actual questions
   
const sprintLib = [
        [ // 01. ECONOMICS (100)
            {q: "Which return calculation is specifically designed to remove the distortions caused by a client's timing of deposits and withdrawals?", c: ["Time-weighted return", "Dollar-weighted return", "Arithmetic mean", "Internal Rate of Return"], a: 0, f: "Logic: Time-weighted return measures the manager's performance by ignoring the timing of the investor's cash flow. Dollar-weighted return reflects the actual return the investor achieved, including their timing."},
{q: "A client wishes to fund a scholarship that pays out $5,000 in perpetuity. If the anticipated annual rate of return is 4%, how much must the client deposit today?", c: ["$125,000", "$200,000", "$100,000", "$50,000"], a: 0, f: "Logic: To find the principal for a perpetuity, divide the payment by the rate. $5,000 / 0.04 = $125,000."},
            {q: "How is a corporation permitted to borrow from a bank?", c: ["Through a revolving credit facility", "By issuing commercial paper directly to the bank", "Through the issuance of subordinated debentures", "By executing a private placement of equity"], a: 0, f: "Logic: Revolving credit acts like a corporate credit card."},
            {q: "A client invests $18,122 today for a mortgage payoff in 15 years at 7%. The $18,122 is referred to as:", c: ["Present value", "Future value", "Internal rate of return (IRR)", "Net present value (NPV)"], a: 0, f: "Logic: The amount you need to invest today to reach a future goal is the Present Value."},
            {q: "A company's current assets are $10M (including $3M cash) and liabilities are $15M. The company's liquidity is:", c: ["Insufficient to meet its short-term obligations", "Sufficiently capitalized for long-term growth", "Highly liquid due to the $3M in cash reserves", "Operating with a positive working capital margin"], a: 0, f: "Logic: They owe $15M soon but only have $10M in current assets (Assets < Liabilities = Bad)."},
            {q: "What's the future value (FV) of a 3-year investment at 5% if $0 is invested in yr 1, $2,000 in yr 2, and $1,000 in yr 3?", c: ["$3,255", "$3,150", "$3,100", "$3,307"], a: 0, f: "Logic: Year 2's $2k grows for one year ($2100). Add the final $1k ($3100) and 5% interest on the total."},
            {q: "Which of the following BEST describes discounted cash flow (DCF)?", c: ["The total value of an investment's anticipated cash flows in today's dollars", "The future value of a bond's coupon payments at maturity", "The rate of return that makes the NPV equal to zero", "The nominal return of a portfolio adjusted for historical inflation"], a: 0, f: "Logic: DCF calculates what a bond's future cash flows are worth right now (Present Value)."},
            {q: "A client bought 100 shares for $30, sold at $26, and collected $200 in dividends. What is the total return?", c: ["-6.67%", "-13.33%", "+6.67%", "-20.00%"], a: 0, f: "Logic: You lost $400 on price but gained $200 in cash. Net loss is $200. $200 / $3000 investment = -6.67%."},
            {q: "What equates an investment's cash inflows with its cash outflows?", c: ["Internal rate of return (IRR)", "Net Present Value (NPV)", "Expected Return", "Holding Period Return (HPR)"], a: 0, f: "Logic: IRR is the exact discount rate that makes the NPV zero (the break-even rate)."},
            {q: "25% Bull (20% return), 50% Flat (5% return), 25% Bear (-10% return). What is the Expected Return?", c: ["5.0%", "7.5%", "15.0%", "2.5%"], a: 0, f: "Logic: (.25 * 20) + (.50 * 5) + (.25 * -10) = 5 + 2.5 - 2.5 = 5%."},
            {q: "Which is TRUE regarding holding period return (HPR) and annualized return?", c: ["The HPR will equal the annualized return for investments held exactly one year.", "Annualized return is always mathematically lower than HPR.", "HPR is always higher than annualized return regardless of time held.", "They are only equal if the investment pays zero dividends."], a: 0, f: "Logic: If the timeframe is exactly 12 months, the two numbers are mathematically identical."},
            {q: "Which TWO are TRUE regarding time-weighted and dollar-weighted returns?", c: ["Time-weighted = Manager skill; Dollar-weighted = Investor return", "Time-weighted = Investor return; Dollar-weighted = Manager skill", "Both measure manager skill, but dollar-weighted includes inflation", "Both measure investor return, but time-weighted includes tax consequences"], a: 0, f: "Logic: Time-weighted ignores your deposits (measures manager skill). Dollar-weighted accounts for client deposit timing."},
            {q: "The rate of return a mortgage company earns over the life of a loan is the:", c: ["Holding period rate of return", "Yield to Maturity", "Internal Rate of Return", "Current Yield"], a: 0, f: "Logic: 'Over the life' of any asset (loan or stock) is always the Holding Period Return."},
            {q: "Required return is 5%. Inventory cost in 2 years is $1,000. If you buy now for $940, which is TRUE?", c: ["The inventory is priced at a $33 premium.", "The inventory is priced at a discount.", "The NPV of the purchase is exactly zero.", "The transaction provides an arbitrage opportunity."], a: 0, f: "Logic: The PV of $1000 at 5% is $907. If you pay $940, you are overpaying by $33 (a premium)."},
            {q: "If the Federal Reserve buys securities in the open market, what is the intended effect?", c: ["Increase the money supply and lower interest rates", "Decrease the money supply and raise interest rates", "Increase the money supply and raise interest rates", "Decrease the money supply and lower interest rates"], a: 0, f: "Logic: Buying securities injects cash into the banking system, expanding the money supply and driving down rates."},
            {q: "The 'Risk Premium' of a stock is defined as:", c: ["The Expected Return minus the Risk-Free Rate", "The Expected Return multiplied by Beta", "The Total Return minus the inflation rate", "The Risk-Free Rate plus the market return"], a: 0, f: "Logic: The risk premium is the excess return an investor demands for taking on risk above the risk-free (T-Bill) rate."},
            {q: "Under the Capital Asset Pricing Model (CAPM), what is the expected return of a stock with a Beta of 1.2, a risk-free rate of 3%, and a market return of 10%?", c: ["11.4%", "15.0%", "12.0%", "8.4%"], a: 0, f: "Logic: CAPM = 3% + 1.2(10% - 3%) = 3% + 1.2(7%) = 3% + 8.4% = 11.4%."},
            {q: "Which form of the Efficient Market Hypothesis (EMH) asserts that fundamental analysis is of no use to an investor?", c: ["Semi-Strong Form", "Weak Form", "Strong Form", "Random Walk Theory"], a: 0, f: "Logic: Semi-Strong EMH states that all public information is already priced in, rendering fundamental analysis useless."},
            {q: "A stock's Alpha is calculated by taking the actual return and subtracting:", c: ["The Expected Return calculated by CAPM", "The Risk-Free Rate", "The market benchmark return", "The inflation-adjusted Real Return"], a: 0, f: "Logic: Alpha is the difference between what a stock actually earned and what it was mathematically expected to earn based on its risk."},
            {q: "Which ratio is considered the most stringent measure of corporate liquidity?", c: ["Quick Ratio (Acid-Test)", "Current Ratio", "Debt-to-Equity Ratio", "Price-to-Earnings Ratio"], a: 0, f: "Logic: The Quick Ratio excludes inventory, which is considered the least liquid of current assets."},
            {q: "An inverted yield curve is generally viewed as an indicator of:", c: ["An impending economic recession", "Rising inflation and economic expansion", "A steep drop in short-term interest rates", "A sudden increase in corporate defaults"], a: 0, f: "Logic: When short-term rates are higher than long-term rates, it signals that investors expect rates (and the economy) to drop in the future."},
            {q: "The rate that banks charge each other for overnight loans to meet reserve requirements is the:", c: ["Federal Funds Rate", "Discount Rate", "Prime Rate", "Call Loan Rate"], a: 0, f: "Logic: The Fed Funds Rate is bank-to-bank. The Discount Rate is the Fed directly charging the banks."},
            {q: "Standard Deviation measures which type of risk?", c: ["Total Risk (Systematic and Unsystematic)", "Systematic Risk only", "Unsystematic Risk only", "Interest Rate Risk only"], a: 0, f: "Logic: Standard deviation measures the total volatility of an investment, encompassing all forms of risk."},
            {q: "If an investment has a correlation of 0.0 with the broader market, it means:", c: ["Its price movements are completely independent of the market", "It moves in exactly the opposite direction of the market", "It moves perfectly in tandem with the market", "It offers zero diversification benefit to the portfolio"], a: 0, f: "Logic: A correlation of 0.0 means there is no statistical relationship. -1.0 would mean exactly opposite."},
            {q: "The Dividend Discount Model (DDM) is used primarily to determine a stock's:", c: ["Intrinsic value", "Future dividend yield", "Expected Return under CAPM", "Price-to-Earnings ratio"], a: 0, f: "Logic: The DDM discounts the present value of all expected future dividends to find what the stock is fairly worth today."},
            {q: "If the IRR of a proposed project is higher than the company's required rate of return, the Net Present Value (NPV) will be:", c: ["Positive", "Negative", "Exactly Zero", "Equal to the Hurdle Rate"], a: 0, f: "Logic: If the investment beats the hurdle rate, it is adding value, resulting in a positive NPV."},
            {q: "A value investor would most likely seek out a company with which characteristics?", c: ["Low Price-to-Book ratio and high dividend yield", "High P/E ratio and low dividend yield", "High Beta and strong earnings momentum", "Zero dividends and high capital expenditures"], a: 0, f: "Logic: Value investors look for 'cheap' stocks trading below their perceived intrinsic value, often accompanied by high dividends."},
            {q: "Fiscal policy is controlled by the:", c: ["President and Congress", "Federal Reserve", "Securities and Exchange Commission (SEC)", "Department of the Treasury"], a: 0, f: "Logic: Fiscal policy involves taxation and government spending (Congress/President). Monetary policy involves the money supply and interest rates (The Fed)."},
            {q: "A 'Top-Down' approach to fundamental analysis begins with:", c: ["The overall macroeconomic environment", "The specific company's balance sheet", "The regulatory environment of the specific sector", "The performance of the CEO and management team"], a: 0, f: "Logic: Top-Down starts with the global economy, then narrows down to sectors, and finally selects individual companies."},
            {q: "The Rule of 72 states that an investment earning 8% annually will double in value in approximately:", c: ["9 years", "7.2 years", "8 years", "12 years"], a: 0, f: "Logic: 72 divided by the interest rate (8) equals 9 years."},
            {q: "Which is a 'Source of Cash' on a corporate cash flow statement?", c: ["Issuing long-term bonds", "Paying a cash dividend", "Purchasing new manufacturing equipment", "Paying down an existing bank loan"], a: 0, f: "Logic: Borrowing money (issuing bonds) brings cash INTO the corporation."},
            {q: "If the U.S. Dollar strengthens against the Euro, U.S. exports to Europe will likely:", c: ["Decrease, because U.S. goods are more expensive for Europeans", "Increase, because U.S. goods are cheaper for Europeans", "Remain unaffected due to international trade agreements", "Increase, because the Euro has higher purchasing power"], a: 0, f: "Logic: A strong dollar buys more foreign currency, but it makes American products cost more for foreign buyers."},
            {q: "The Sharpe Ratio is calculated by dividing the Risk Premium by the:", c: ["Standard Deviation", "Beta", "Risk-Free Rate", "Correlation Coefficient"], a: 0, f: "Logic: Sharpe Ratio uses Total Risk (Standard Deviation). The Treynor ratio uses Systematic Risk (Beta)."},
            {q: "Working Capital is defined mathematically as:", c: ["Current Assets minus Current Liabilities", "Total Assets minus Total Liabilities", "Current Assets divided by Current Liabilities", "Net Income divided by Outstanding Shares"], a: 0, f: "Logic: Working capital measures short-term liquidity. Total Assets minus Total Liabilities equals Net Worth."},
            {q: "Which of the following describes 'Disinflation'?", c: ["A slowing in the rate at which prices are increasing", "A widespread decline in the prices of goods across the economy", "A rapid, uncontrolled increase in prices", "An economic contraction paired with rising prices"], a: 0, f: "Logic: Deflation is falling prices. Disinflation is when prices are still rising, but at a slower pace than before (e.g., inflation drops from 5% to 3%)."},
            {q: "Geometric mean is generally preferred over arithmetic mean for evaluating historical investment returns because it:", c: ["Accounts for the compounding of returns over time", "Ignores the effects of market volatility", "Consistently produces a higher, more attractive return figure", "Only measures the manager's stock-picking ability"], a: 0, f: "Logic: The geometric mean reflects the actual 'drag' of negative returns and compounding, providing a more accurate real-world return."},
            {q: "Which of the following is considered a 'Lagging' economic indicator?", c: ["Average duration of unemployment", "Building permits for new housing", "The S&P 500 Index", "Manufacturers' new orders for consumer goods"], a: 0, f: "Logic: Unemployment duration confirms a trend that has already happened, making it a lagging indicator."},
            {q: "Real Interest Rate is calculated formulaically as:", c: ["Nominal Rate minus Inflation", "Nominal Rate plus Inflation", "Inflation minus Nominal Rate", "Yield to Maturity plus Inflation"], a: 0, f: "Logic: Real Return equals the Nominal (stated) Rate minus the 'inflation tax.'"},
            {q: "A Beta of 1.4 indicates that a stock is mathematically expected to be:", c: ["40% more volatile than the overall market", "40% less volatile than the overall market", "Expected to return 1.4% more than the risk-free rate", "Negatively correlated to the market benchmark"], a: 0, f: "Logic: A Beta of 1.0 represents the market. 1.4 means it will move 40% faster in either direction."},
            {q: "Which index is considered the most accurate proxy for the performance of 'Large Cap' U.S. stocks?", c: ["S&P 500 Index", "Russell 2000 Index", "Dow Jones Transportation Average", "Wilshire 5000 Index"], a: 0, f: "Logic: The S&P 500 represents the 500 largest U.S. companies. The Russell 2000 represents small-cap stocks."},
            {q: "If an investor is 'Risk Averse', they want the highest possible return for:", c: ["The least amount of risk", "The most amount of risk possible", "An average amount of systematic risk", "Zero market exposure"], a: 0, f: "Logic: Risk Aversion means avoiding unnecessary volatility while still seeking a return."},
            {q: "Which phase of the business cycle is characterized by the highest level of capacity utilization?", c: ["Peak", "Trough", "Expansion", "Contraction"], a: 0, f: "Logic: The Peak represents maximum economic output and full employment right before a slowdown occurs."},
            {q: "Which measurement isolates how much of a single stock's return is purely due to the movement of the broader market?", c: ["R-Squared", "Alpha", "Standard Deviation", "Sharpe Ratio"], a: 0, f: "Logic: R-Squared (from 0 to 100) measures the 'fit' or correlation between a stock's movement and the index's movement."},
            {q: "Which economic indicator is most likely to move FIRST before the broader economy changes direction?", c: ["The S&P 500 Index", "Gross Domestic Product (GDP)", "Corporate Profits", "Average duration of unemployment"], a: 0, f: "Logic: The stock market is a leading indicator, looking 6-9 months into the future. The others are coincident or lagging."},
            {q: "A cyclical stock would most likely be found in which of the following industries?", c: ["Automotive manufacturing", "Food and grocery", "Pharmaceuticals", "Public utilities"], a: 0, f: "Logic: People delay large purchases like cars during bad economic times, making the auto industry highly cyclical."},
            {q: "Which yield calculation is mathematically the lowest for a bond purchased at a premium?", c: ["Yield to Call (YTC)", "Yield to Maturity (YTM)", "Current Yield", "Coupon Rate"], a: 0, f: "Logic: YTC is the worst-case scenario for a premium bond. It assumes the investor loses the premium over the shortest possible time period."},
            {q: "The 'Efficient Frontier' is a graphical line representing portfolios that offer:", c: ["The highest possible return for a given level of risk", "The absolute lowest amount of systematic risk", "A guaranteed return above the risk-free rate", "The lowest correlation to the S&P 500"], a: 0, f: "Logic: Portfolios that fall exactly on the Efficient Frontier line are considered optimally diversified under Modern Portfolio Theory."},
            {q: "Which specific risk is reduced by adding non-correlated assets to a portfolio?", c: ["Selection / Unsystematic Risk", "Market / Systematic Risk", "Interest Rate Risk", "Purchasing Power Risk"], a: 0, f: "Logic: Diversification eliminates specific (unsystematic) risk. Systemic market risk cannot be diversified away."},
            {q: "If interest rates in the broad economy rise, the Present Value of a bond's future cash flows will:", c: ["Fall", "Rise", "Remain unchanged", "Increase proportionally to the inflation rate"], a: 0, f: "Logic: A higher discount rate mathematically makes fixed future cash flows worth less today, driving the bond's price down."},
            {q: "Gross Domestic Product (GDP) is typically measured by economists in:", c: ["Constant dollars (Real GDP)", "Current unadjusted dollars", "Euros or foreign currency equivalents", "Nominal, tax-adjusted dollars"], a: 0, f: "Logic: Real GDP (adjusted for inflation using constant dollars) is the standard for measuring true economic growth."},
            {q: "Which of the following occurrences would be considered a 'Leading' economic indicator that predicts a future rise in retail consumer inflation?", c: ["Rising commodity prices and an increasing PPI", "An increase in overall consumer spending habits", "A drop in the Federal Funds Rate", "A rise in the unemployment rate"], a: 0, f: "Logic: Increased costs at the wholesale/producer level (PPI) eventually get passed down to the consumer (CPI)."},
            {q: "The 'Risk-Free' rate of return is virtually always based on the yield of:", c: ["91-day U.S. Treasury Bills", "AAA-rated Corporate Bonds", "10-year U.S. Treasury Notes", "The Federal Funds Rate"], a: 0, f: "Logic: T-Bills have zero default risk and, because of their extremely short duration, virtually zero interest rate risk."},
            {q: "If an Investment Adviser recommends a 'Buy and Hold' strategy, they are executing a form of:", c: ["Strategic Asset Allocation", "Tactical Asset Allocation", "Sector Rotation", "Momentum Investing"], a: 0, f: "Logic: Strategic allocation is a long-term, passive mix that is periodically rebalanced, ignoring short-term market noise."},
            {q: "Which of the following items is classified on a corporate balance sheet as a 'Current Liability'?", c: ["Accounts Payable", "A 30-year Mortgage on a factory", "Common Stock", "Retained Earnings"], a: 0, f: "Logic: Accounts Payable is a short-term bill due to suppliers within one year, making it a current liability."},
            {q: "If the Federal Reserve SELLS Treasury securities in the open market, the U.S. money supply will:", c: ["Contract", "Expand", "Remain unchanged", "Expand immediately, then contract"], a: 0, f: "Logic: The Fed takes cash out of the banks and replaces it with paper securities, tightening the supply of money available to lend."},
            {q: "A company's 'Net Income' (total profit) is found on which of the following corporate financial statements?", c: ["Income Statement", "Balance Sheet", "Statement of Cash Flows", "Statement of Retained Earnings"], a: 0, f: "Logic: Net Income is the 'Bottom Line' of the Profit & Loss (Income) Statement."},
            {q: "Which of the following interest rates is considered the most volatile and subject to daily fluctuations?", c: ["Federal Funds Rate", "Prime Rate", "Discount Rate", "Broker Call Loan Rate"], a: 0, f: "Logic: The Fed Funds Rate changes daily based on the immediate, overnight lending needs between commercial banks."},
            {q: "A 'Growth' investor is primarily focused on seeking out a company that exhibits:", c: ["Earnings momentum and future acceleration", "A high dividend yield", "A low Price-to-Earnings (P/E) ratio", "A low Price-to-Book (P/B) ratio"], a: 0, f: "Logic: Growth investors don't care about current dividends or paying a high premium; they are buying the belief that the company will grow exponentially."},
            {q: "Which of the following risks is most deeply associated with a 10-year U.S. Treasury Note?", c: ["Interest Rate Risk", "Credit Risk", "Liquidity Risk", "Financial Risk"], a: 0, f: "Logic: U.S. Treasuries have no default (credit) risk, but their prices will drop significantly if broad interest rates rise."},
            {q: "When determining a corporation's ability to pay debts maturing within the next 30 to 90 days, an analyst should look at the:", c: ["Quick ratio (Acid-test ratio)", "Current ratio", "Debt-to-equity ratio", "Inventory turnover ratio"], a: 0, f: "Logic: The Quick ratio excludes inventory (which can take months to sell), making it the best test for immediate liquidity."},
            {q: "To accurately find an investment's Internal Rate of Return (IRR), an analyst must explicitly know the:", c: ["Timing and amount of positive and negative cash flows", "Current risk-free rate of return", "Market Risk Premium", "Beta of the investment"], a: 0, f: "Logic: IRR purely evaluates the mathematical timing of money entering and exiting the investment to find the break-even discount rate."},
            {q: "The S&P 500 Index utilizes which type of weighting methodology?", c: ["Capitalization-weighted", "Price-weighted", "Equal-weighted", "Revenue-weighted"], a: 0, f: "Logic: The S&P 500 is market-cap weighted (Total Shares x Price). The Dow Jones Industrial Average is purely price-weighted."},
            {q: "Which form of the Efficient Market Hypothesis (EMH) asserts that technical analysis (charting) is of absolutely no benefit to an investor?", c: ["Weak-form efficiency", "Strong-form efficiency", "Semi-strong efficiency", "All forms of the EMH assert this"], a: 0, f: "Logic: Weak-form EMH explicitly targets technical analysis, arguing that past prices and volume are already fully baked into today's price."},
            {q: "Under the Capital Asset Pricing Model (CAPM), investment risk is mathematically defined as:", c: ["Deviation in returns (Variance or Volatility)", "The potential for a total loss of principal", "The likelihood of corporate bankruptcy", "The impact of inflation over time"], a: 0, f: "Logic: CAPM and MPT treat 'risk' strictly as volatility—how much the returns bounce around the expected average."},
            {q: "The term 'Working Capital' is an indicator of a company's short-term financial health. How is it calculated?", c: ["Current Assets minus Current Liabilities", "Total Assets minus Total Liabilities", "Current Assets divided by Current Liabilities", "Net Income divided by Total Equity"], a: 0, f: "Logic: Working capital is a raw dollar figure representing the cash left over if the company paid all its short-term bills today."},
            {q: "Which of the following best describes 'Systematic Risk'?", c: ["The risk that a market crash will drag down all investments in a specific asset class", "The risk that a company's CEO will be indicted for fraud", "The risk that a bond issuer will default on its interest payments", "The risk that an investor cannot sell their shares quickly"], a: 0, f: "Logic: Systematic (Market) risk impacts the entire system and cannot be diversified away."},
            {q: "A 'Defensive' stock is generally characterized by its ability to:", c: ["Remain stable and maintain demand during economic recessions", "Outperform the market during periods of rapid economic expansion", "Provide massive capital gains during a bull market", "Move with a Beta significantly higher than 1.0"], a: 0, f: "Logic: Defensive stocks (Utilities, Groceries, Basic Medicine) have inelastic demand. People have to buy them regardless of how bad the economy gets."},
            {q: "If an investor is executing an 'Arbitrage' strategy, they are attempting to:", c: ["Simultaneously buy and sell the same asset in different markets to capture a riskless profit from a price discrepancy", "Hedge a long stock position against a market crash by buying puts", "Actively time the market by shifting between sectors", "Buy undervalued companies and hold them for long-term gains"], a: 0, f: "Logic: Arbitrage exploits momentary pricing errors, buying low on Exchange A and instantly selling high on Exchange B."},
            {q: "Which of the following actions by the Federal Reserve would be considered a 'Tightening' of monetary policy?", c: ["Raising the Discount Rate", "Lowering the Reserve Requirement", "Buying U.S. Treasury securities", "Lowering the Federal Funds Target Rate"], a: 0, f: "Logic: Raising rates makes borrowing more expensive, tightening the money supply to combat inflation."},
            {q: "A stock's P/E ratio is currently 20. If the company's Earnings Per Share (EPS) is $2.00, what is the current market price of the stock?", c: ["$40.00", "$10.00", "$20.00", "$42.00"], a: 0, f: "Logic: Price = P/E Ratio multiplied by the EPS. ($20 x 2) = $40."},
            {q: "The Producer Price Index (PPI) is an important economic gauge because it measures inflation at the:", c: ["Wholesale and manufacturer level", "Retail and consumer level", "Federal government spending level", "International import and export level"], a: 0, f: "Logic: PPI tracks the costs producers face before the goods hit the retail market. It is a leading indicator for the CPI."},
            {q: "An investor calculates the 'Current Yield' of a bond by dividing the annual coupon payment by the:", c: ["Current Market Price", "Par Value of the bond", "Yield to Maturity", "Original purchase price"], a: 0, f: "Logic: Current yield tells you what the bond is paying you right now based on what it would cost to buy it today."},
            {q: "Which of the following investments is virtually immune to 'Purchasing Power Risk' (Inflation Risk)?", c: ["Treasury Inflation-Protected Securities (TIPS)", "A 30-year U.S. Treasury Bond", "A Fixed Annuity", "A high-yield corporate bond"], a: 0, f: "Logic: TIPS directly adjust their principal upward to match the Consumer Price Index (CPI), completely neutralizing the threat of inflation."},
            {q: "When an analyst utilizes a 'Bottom-Up' approach to fundamental analysis, they begin their research by examining:", c: ["The specific company's balance sheet and management team", "The overall global macroeconomic environment", "The regulatory environment of the specific sector", "The direction of the Federal Funds Rate"], a: 0, f: "Logic: Bottom-Up ignores the broad economy and focuses strictly on finding fundamentally sound companies one by one."},
            {q: "A 'Sector Rotation' strategy is a form of active management that attempts to:", c: ["Shift investments between different industries to stay ahead of the business cycle", "Maintain a strict 60/40 mix of stocks and bonds regardless of the economy", "Buy and hold utility stocks for maximum dividend income", "Eliminate all systematic risk from a portfolio"], a: 0, f: "Logic: Sector rotation anticipates the next phase of the economy (e.g., buying consumer staples right before a recession hits)."},
            {q: "If an investor sells a security for a capital gain, the 'Total Return' on that investment includes the capital gain plus:", c: ["All dividends or interest received during the holding period", "The inflation rate during the holding period", "The tax savings generated by the sale", "The risk premium of the asset"], a: 0, f: "Logic: Total return must encompass both the yield (cash flow) and the price appreciation over the entire time it was held."},
            {q: "A company's 'Net Worth' is found on its Balance Sheet and is calculated by:", c: ["Subtracting Total Liabilities from Total Assets", "Subtracting Current Liabilities from Current Assets", "Adding Long-Term Debt to Shareholders' Equity", "Dividing Net Income by Outstanding Shares"], a: 0, f: "Logic: Net Worth represents the total equity remaining in the business if it paid off absolutely all of its debts today."},
            {q: "Which of the following indicators is considered a 'Leading' economic indicator that anticipates where the economy is headed?", c: ["Building permits for new private housing", "Average duration of unemployment", "Industrial Production", "The Consumer Price Index (CPI)"], a: 0, f: "Logic: Builders pull permits months before they actually start building or hiring, signaling future economic activity."},
            {q: "The 'Hurdle Rate' used in corporate finance is another term for the company's:", c: ["Required Rate of Return", "Internal Rate of Return (IRR)", "Current Yield", "Expected Return under CAPM"], a: 0, f: "Logic: The Hurdle Rate is the absolute minimum return a project must generate to justify the investment of capital."},
            {q: "A high 'Inventory-to-Sales' ratio is generally viewed by economists as a:", c: ["Leading negative indicator", "Leading positive indicator", "Lagging positive indicator", "Coincident neutral indicator"], a: 0, f: "Logic: If inventory is stacking up in warehouses while sales are dropping, it signals that consumer demand is slowing down and a contraction may follow."},
            {q: "Which of the following describes the psychological bias where an investor irrationally overvalues an asset simply because they own it?", c: ["Endowment effect", "Anchoring bias", "Confirmation bias", "Hindsight bias"], a: 0, f: "Logic: The endowment effect makes people demand much more money to sell an object than they would actually be willing to pay to buy it."},
            {q: "A stock with a Beta of 0.8 is expected to be:", c: ["20% less volatile than the overall market", "20% more volatile than the overall market", "Negatively correlated to the market", "Expected to return 8% annually"], a: 0, f: "Logic: A Beta of 1.0 represents the market baseline. A Beta of 0.8 means the stock is historically 20% less 'bouncy' than the S&P 500."},
            {q: "Which of the following is considered an 'Unsystematic' risk factor?", c: ["A massive accounting scandal at a specific corporation", "A sudden spike in the Federal Funds Rate", "A nationwide recession", "A declaration of war"], a: 0, f: "Logic: Unsystematic risk is localized to a single entity and can be diversified away. Systemic risk (interest rates, war, inflation) hits everything."},
            {q: "To calculate the 'Real' rate of return on an investment, an analyst must take the nominal return and subtract:", c: ["The inflation rate (CPI)", "The risk-free rate", "The Beta of the asset", "The corporate tax rate"], a: 0, f: "Logic: 'Real' always means adjusted for inflation. It measures your true, functional increase in purchasing power."},
            {q: "The 'Rule of 72' is a mathematical shortcut used to determine:", c: ["How many years it will take an investment to double in value at a given compound interest rate", "The maximum allowable withdrawal rate for a retirement portfolio", "The exact yield to maturity of a discounted bond", "The expected return of a stock under the Capital Asset Pricing Model"], a: 0, f: "Logic: Divide 72 by the annual interest rate to find the exact number of years it takes to double your money."},
            {q: "Which of the following occurrences would cause a company's 'Working Capital' to DECREASE?", c: ["Paying a cash dividend to shareholders", "Selling long-term corporate bonds for cash", "Converting short-term debt into long-term debt", "Selling inventory at a massive profit"], a: 0, f: "Logic: Working Capital = Current Assets - Current Liabilities. Paying a dividend drains cash (a current asset), which mathematically shrinks the working capital."},
            {q: "In an ERISA 'Defined Benefit' plan (a traditional pension), who bears the primary investment risk of the portfolio?", c: ["The Employer", "The Employee", "The Plan Administrator", "The Pension Benefit Guaranty Corporation (PBGC)"], a: 0, f: "Logic: The employer guarantees a specific monthly payout for life. If the stock market crashes, the employer is legally forced to make up the shortfall."},
            {q: "An investor with a deeply negative correlation (-0.85) between two assets in their portfolio has successfully executed a strategy to:", c: ["Maximize diversification and smooth out overall volatility", "Amplify their exposure to systemic market risk", "Guarantee a return higher than the risk-free rate", "Eliminate all taxation on capital gains"], a: 0, f: "Logic: Highly negative correlation means the assets zig when the other zags, which is the ultimate goal of diversification to reduce risk."},
            {q: "Which of the following provides the most accurate definition of the 'Gross Domestic Product' (GDP)?", c: ["The total market value of all final goods and services produced within a country's borders in a given year", "The total value of all goods produced by a country's citizens, regardless of where they live", "The total sum of all retail sales in the domestic economy", "The net value of all exports minus all imports"], a: 0, f: "Logic: GDP is strictly geographic (within the borders). GNP (Gross National Product) tracks the citizens worldwide."},
            {q: "When comparing the arithmetic mean to the geometric mean of an investment's historical returns, the geometric mean will generally be:", c: ["Lower, because it accounts for the compounding drag of negative returns", "Higher, because it ignores volatility", "Identical, assuming the investment paid no dividends", "Higher, because it adjusts for the inflation rate"], a: 0, f: "Logic: The geometric mean uses multiplication (compounding) to show the true, real-world return of a dollar invested, which is almost always lower than the simple arithmetic average."},
            {q: "If an investor is executing an 'Arbitrage' strategy, they are attempting to:", c: ["Simultaneously buy and sell the same asset in different markets to capture a riskless profit from a price discrepancy", "Hedge a long stock position against a market crash", "Actively time the market by shifting between sectors", "Buy undervalued companies and hold them for long-term gains"], a: 0, f: "Logic: Arbitrage exploits momentary pricing errors, buying low on Exchange A and instantly selling high on Exchange B."},
            {q: "A 'Venture Capital' firm generally seeks to invest its pooled capital in:", c: ["Early-stage, unproven start-ups with massive growth potential", "Mature, blue-chip corporations paying high dividends", "Municipal infrastructure projects", "Distressed, bankrupt corporations facing liquidation"], a: 0, f: "Logic: VC funds provide 'seed' money to brand new companies in exchange for a large equity stake, accepting incredibly high risk for massive potential reward."},
            {q: "Under the USA, a 'Solicitor' who receives cash compensation for referring clients to an Investment Adviser must generally:", c: ["Have a written agreement with the IA", "Register as a Broker-Dealer Agent", "Waive their right to act as a fiduciary", "Be an accredited investor"], a: 0, f: "Logic: There must be a clear paper trail and written disclosure to the client acknowledging the referral fee arrangement."},
            {q: "Which of the following is NOT required to be detailed in a written Investment Advisory Contract under the USA?", c: ["A guarantee that the client's principal will not decrease in value", "The specific formula used to compute the advisory fee", "A clause stating the contract cannot be assigned without consent", "Notification of whether the adviser has discretionary power"], a: 0, f: "Logic: Contracts must show the fee formula, confirm there are no performance fees, and state that the contract won't be assigned. They can NEVER contain a guarantee against loss."},
            {q: "An agent executing a trade for a client believes the stock is about to surge. The agent purchases 100 shares for their own personal account at 10:00 AM, and then executes the client's 10,000-share buy order at 10:05 AM. This violates the prohibition against:", c: ["Front running", "Matched orders", "Painting the tape", "Churning"], a: 0, f: "Logic: The agent knew the massive client order would drive the price up. Buying personal shares immediately beforehand to capture that guaranteed profit is textbook front running."},
            {q: "If a Broker-Dealer wishes to charge a client a 'markup' instead of a 'commission', the Broker-Dealer must execute the trade:", c: ["Out of its own inventory, acting as a Principal", "By routing the trade to a third-party exchange, acting as an Agent", "Through a dark pool without public disclosure", "Only with institutional clients"], a: 0, f: "Logic: Markups and Markdowns are the profit margin when a firm acts as a Dealer/Principal (buying and selling from their own shelves). Commissions are charged when acting as a Broker/Agent."},
            {q: "Under the Uniform Securities Act, an individual who represents an issuer in the sale of a security is an 'Agent' EXCEPT when selling:", c: ["Exempt securities, executing exempt transactions, or selling to existing employees without commission", "Mutual funds to retail clients", "Corporate bonds to wealthy accredited investors", "Initial Public Offerings (IPOs)"], a: 0, f: "Logic: Representing a company to sell its own safe (exempt) bonds, executing private (exempt) trades, or giving stock options to employees for free doesn't make you a stockbroker."},
            {q: "A financial planner charges a flat fee of $2,500 to create a comprehensive financial plan that includes specific mutual fund recommendations. Under the USA, this planner:", c: ["Must register as an Investment Adviser because they provide advice on securities for compensation", "Is exempt from registration if they do not execute the actual trades", "Must register as a Broker-Dealer Agent", "Is excluded from registration under the L.A.T.E. exemption"], a: 0, f: "Logic: The ABC test: Advice, Business, Compensation. If you charge a fee for a plan that tells someone which securities to buy, you are an Investment Adviser, regardless of who executes the trade."},
            {q: "Which of the following actions by an Investment Adviser Representative (IAR) constitutes an illegal 'Breach of Fiduciary Duty'?", c: ["Recommending an affiliated broker-dealer to execute trades without disclosing the conflict of interest", "Refusing to accept a client who requests an aggressive day-trading strategy", "Charging a 1.5% AUM fee instead of an hourly rate", "Delegating the execution of trades to a registered assistant"], a: 0, f: "Logic: Fiduciaries must have undivided loyalty. Steering clients to a sister company where the firm makes double the money without telling the client is a massive breach of trust."},
            {q: "Under the USA, if a client is declared legally incompetent by a judge, the client's agent must:", c: ["Cancel all pending open orders and wait for instructions from a court-appointed conservator or guardian", "Continue trading the account using their best judgment", "Immediately liquidate the account and mail the check to the client's address", "Transfer the account to the client's nearest living relative"], a: 0, f: "Logic: Legal incompetence instantly freezes the account. The agent cannot take instructions from the client or trade the account until a legally appointed guardian takes over."},
            {q: "According to the USA, an Administrator may deny an applicant's registration if, within the past 10 years, the applicant was convicted of:", c: ["Any felony, or any misdemeanor involving securities, finance, or fraud", "Any misdemeanor, including a minor traffic violation", "A civil lawsuit involving a breach of contract", "A felony conviction 15 years ago"], a: 0, f: "Logic: The 'Statutory Disqualification' rule looks back exactly 10 years. It flags ALL felonies, but only flags misdemeanors if they specifically involve money, fraud, or securities."},
            {q: "Congratulations. You have completed the final calibration sequence for the Series 66 exam. The primary function of the Uniform Securities Act is to:", c: ["Protect the investing public from fraud and ensure financial professionals operate with complete integrity", "Guarantee that all registered securities will be profitable", "Ensure that broker-dealers maximize their corporate profits", "Eliminate all systematic risk from the financial markets"], a: 0, f: "Logic: MISSION ACCOMPLISHED. The regulators exist to protect the public. By mastering these 400 questions, you have proven you are ready. Go pass the Series 66 on April 19th."}
        ],
        [ // 02. VEHICLES (106)
            {q: "Which of the following mutual fund share classes is most likely to feature a front-end sales load and a lower-than-average 12b-1 fee?", c: ["Class A shares", "Class B shares", "Class C shares", "Institutional shares"], a: 0, f: "Logic: Class A shares are known for upfront loads and low internal expenses. Class C shares have no upfront load but high 12b-1 fees (level loads)."},
{q: "Under Modern Portfolio Theory (MPT), what is the core assumption regarding investor behavior?", c: ["Investors will always seek to minimize risk for a given level of return", "Investors will prioritize capital appreciation over income in all stages of life", "The market will always increase over a long-term horizon", "Technical analysis is the most efficient way to pick individual stocks"], a: 0, f: "Logic: MPT assumes investors are risk-averse and seek to maximize return for a specific level of risk, or minimize risk for a specific level of return."},
            {q: "While both are highly speculative, what is a key regulatory difference between a Special Purpose Acquisition Company (SPAC) and a Blind Pool Direct Participation Program?", c: ["SPAC funds are held in escrow with a deadline to find a target company or return the funds, whereas blind pools have no escrow requirement or refund guarantee", "SPACs are exempt from SEC registration while blind pools must execute an IPO", "Blind pools are strictly limited to institutional investors, while SPACs are open to retail investors", "SPACs invest exclusively in real estate, while blind pools invest in tech startups"], a: 0, f: "Logic: SPACs are shell companies that raise IPO money into an escrow account; if they don't buy a company within a set timeframe (usually 2 years), investors get their money back."},
            {q: "When comparing Hedge Funds to Venture Capital (VC) funds, which of the following statements is most accurate?", c: ["Hedge funds actively trade to generate absolute returns in any market, while VCs passively incubate early-stage private startups for long-term growth", "Hedge funds are highly liquid and trade on exchanges, while VCs are structured as illiquid partnerships", "VCs utilize heavy leverage and short-selling, while Hedge Funds primarily buy and hold", "Hedge funds are open to retail investors, while VCs are restricted to accredited investors"], a: 0, f: "Logic: Hedge funds are aggressive traders looking for 'absolute returns'. VCs are patient investors looking to hold and grow private startups for years."},
            {q: "The primary investment objective of most Hedge Funds is to:", c: ["Generate absolute returns regardless of whether the broader market is moving up, down, or sideways", "Exactly mirror the performance of a major benchmark index like the S&P 500", "Provide a steady, guaranteed stream of tax-free municipal income", "Preserve capital by investing strictly in short-term U.S. Treasury securities"], a: 0, f: "Logic: 'Absolute returns' is the key phrase for Hedge Funds."},
            {q: "Under current regulatory guidelines, a digital asset is most likely to be classified as a 'security' if it fulfills the criteria of the:", c: ["Howey Test", "Acid-Test", "Efficiency Test", "Prudent Man Rule"], a: 0, f: "Logic: The SEC uses the Howey Test (Investment of money, common enterprise, expectation of profit, efforts of others) to determine if a digital asset is an investment contract (security)."},
            {q: "Which of the following investment vehicles exposes the investor to the credit risk of the issuing financial institution?", c: ["Exchange-Traded Note (ETN)", "Exchange-Traded Fund (ETF)", "Real Estate Investment Trust (REIT)", "Unit Investment Trust (UIT)"], a: 0, f: "Logic: ETNs are unsecured debt instruments (notes) issued by a bank."},
            {q: "A Real Estate Investment Trust (REIT) is structurally designed to pass through:", c: ["Income only", "Both income and losses", "Losses only", "Neither income nor losses"], a: 0, f: "Logic: REITs pass through income to avoid taxation but cannot pass through losses like DPPs."},
            {q: "A Letter of Intent (LOI) allows a mutual fund investor to receive a breakpoint discount by committing to a total investment amount over a maximum period of:", c: ["13 months", "24 months", "12 months", "36 months"], a: 0, f: "Logic: An LOI is valid for 13 months and can typically be backdated 90 days."},
            {q: "Unlike open-end mutual funds, the market price of a closed-end fund is determined by:", c: ["Supply and demand on the exchange", "The daily calculation of Net Asset Value (NAV)", "The fund's board of directors", "The underwriter's fixed offering price"], a: 0, f: "Logic: Closed-end funds trade on an exchange, so they can trade at a premium or discount to NAV."},
            {q: "During the accumulation phase of a variable annuity, the number of accumulation units owned by the investor:", c: ["Increases with each additional premium contribution", "Remains fixed, while the value fluctuates", "Decreases as mortality charges are deducted", "Converts to annuity units annually"], a: 0, f: "Logic: You buy more units as you contribute. They convert to a fixed number of annuity units at the payout stage."},
            {q: "An investor heavily concentrated in a single large-cap stock wants to protect against a near-term drop in price. The best option strategy is to:", c: ["Buy a Put", "Sell a Call", "Buy a Call", "Sell a Put"], a: 0, f: "Logic: Buying a put acts as an insurance policy (a 'protective put')."},
            {q: "A viatical settlement involves the sale of a life insurance policy by a policyholder who is:", c: ["Terminally ill", "Entering retirement and needs liquidity", "Experiencing a temporary financial hardship", "Seeking a tax-free 1035 exchange"], a: 0, f: "Logic: Viatical settlements are specifically for terminally ill policyholders."},
            {q: "The annual imputed interest on a zero-coupon corporate bond that an investor must report for tax purposes is known as:", c: ["Phantom income", "Capital gains", "Tax-free yield", "Deferred compensation"], a: 0, f: "Logic: Accreted value is taxed annually as ordinary income, even though no cash is received."},
            {q: "The principal value of a Treasury Inflation-Protected Security (TIPS) is adjusted semi-annually based on the:", c: ["Consumer Price Index (CPI)", "Federal Funds Rate", "Producer Price Index (PPI)", "Gross Domestic Product (GDP)"], a: 0, f: "Logic: TIPS principal adjusts upward with the CPI to protect purchasing power."},
            {q: "Mutual fund Class C shares are generally characterized by having:", c: ["A level load (ongoing 12b-1 fees) and no front-end load", "A front-end sales load and low 12b-1 fees", "A Contingent Deferred Sales Charge (CDSC) that drops to zero over 7 years", "No 12b-1 fees and no front-end load"], a: 0, f: "Logic: Class C shares have higher ongoing fees but no upfront cost."},
            {q: "An options investor expects extreme volatility in a stock following an upcoming earnings announcement, but is unsure of the direction. The best strategy is a:", c: ["Straddle", "Covered Call", "Credit Spread", "Protective Put"], a: 0, f: "Logic: A straddle (buying a call and a put) profits if the stock makes a massive move either way."},
            {q: "Which of the following derivatives gives the holder a long-term right to purchase common stock at a fixed price?", c: ["Warrant", "Preemptive Right", "Call Option", "Convertible Bond"], a: 0, f: "Logic: Warrants are long-term sweeteners; rights are very short-term."},
            {q: "While American Depositary Receipts (ADRs) allow U.S. investors to buy foreign stocks in U.S. dollars, the investor is still subject to:", c: ["Currency Risk", "Interest Rate Risk", "Liquidity Risk", "Registration Risk"], a: 0, f: "Logic: The foreign company pays in its currency; if that currency weakens, the USD value drops."},
            {q: "Preferred stock behaves most similarly to which of the following securities?", c: ["Corporate Bonds", "Common Stock", "Warrants", "Mutual Funds"], a: 0, f: "Logic: Both pay a fixed rate, making them sensitive to interest rate changes."},
            {q: "Convertible corporate bonds typically offer:", c: ["A lower coupon rate than non-convertible bonds", "A higher coupon rate than non-convertible bonds", "A variable interest rate tied to the stock price", "Shorter maturities than non-convertible bonds"], a: 0, f: "Logic: Investors accept lower interest for the potential to convert to common stock."},
            {q: "Municipal Revenue Bonds are backed by:", c: ["The user fees generated by a specific facility or project", "The full faith, credit, and taxing power of the municipality", "Ad valorem (property) taxes", "The federal government"], a: 0, f: "Logic: Revenue bonds rely on income from the project they funded (e.g., toll roads)."},
            {q: "Hedge funds are typically structured as:", c: ["Limited Partnerships", "Open-End Management Companies", "Unit Investment Trusts", "Real Estate Investment Trusts"], a: 0, f: "Logic: Limited partnerships allow them to avoid certain registrations while limiting to accredited investors."},
            {q: "Unlike Whole Life insurance, Universal Life insurance provides the policyholder with:", c: ["Flexible premiums and an adjustable death benefit", "A guaranteed minimum cash value and fixed premiums", "The ability to direct funds into separate market subaccounts", "A guaranteed flat dividend each year"], a: 0, f: "Logic: Universal Life is known for premium flexibility."},
            {q: "In a Variable Life insurance policy, the cash value is tied to the performance of a:", c: ["Separate Account", "General Account", "Trust Account", "Guaranteed Minimum Income Account"], a: 0, f: "Logic: Variable products use separate accounts consisting of market-based subaccounts."},
            {q: "To avoid registration with the SEC under the Securities Act of 1933, Commercial Paper must have a maximum maturity of:", c: ["270 days", "365 days", "90 days", "180 days"], a: 0, f: "Logic: Commercial paper is exempt if it matures in 270 days or less."},
            {q: "Which of the following mortgage-backed securities is directly backed by the full faith and credit of the U.S. Government?", c: ["GNMA (Ginnie Mae)", "FNMA (Fannie Mae)", "FHLMC (Freddie Mac)", "SLMA (Sallie Mae)"], a: 0, f: "Logic: Ginnie Mae is a wholly owned government corporation."},
            {q: "The primary investment objective of a Money Market Mutual Fund is:", c: ["Preservation of capital and high liquidity", "Capital appreciation", "Tax-free income", "Aggressive growth"], a: 0, f: "Logic: Money market funds seek to maintain a stable $1.00 NAV."},
            {q: "Which type of investment company issues redeemable securities but has no board of directors and an unmanaged portfolio?", c: ["Unit Investment Trust (UIT)", "Exchange-Traded Fund (ETF)", "Closed-End Fund", "Face-Amount Certificate Company"], a: 0, f: "Logic: UITs have fixed, static portfolios and no board."},
            {q: "An investor who writes a Covered Call generates income but gives up the:", c: ["Upside appreciation potential of the stock above the strike price", "Downside protection on the stock", "Voting rights associated with the stock", "Ability to collect dividends from the stock"], a: 0, f: "Logic: Selling the call caps your profit if the stock skyrockets."},
            {q: "Equity-Indexed Annuities typically feature a minimum guaranteed return and potential upside tied to an index, but that upside is often limited by a:", c: ["Participation rate or cap", "Surrender charge", "Mortality and expense (M&E) fee", "Stepped-up basis"], a: 0, f: "Logic: Caps or participation rates limit the gain relative to the index performance."},
            {q: "Mutual fund 12b-1 fees are legally permitted to be used for:", c: ["Marketing, advertising, and distribution expenses", "Portfolio manager salaries and trading commissions", "Legal and accounting fees", "Creating new share classes"], a: 0, f: "Logic: 12b-1 fees pay for attracting new shareholders."},
            {q: "A corporate issuer is most likely to exercise the 'call' provision on its outstanding bonds when interest rates:", c: ["Fall", "Rise", "Remain highly volatile", "Are perfectly stable"], a: 0, f: "Logic: If rates drop, the company will call old high-interest debt and re-issue at lower rates."},
            {q: "An Equity-Linked Note (ELN) is a debt instrument whose return is tied to a stock index. Because it is issued by a financial institution, it carries:", c: ["Credit risk", "No risk to principal", "Reinvestment risk", "Systematic risk only"], a: 0, f: "Logic: ELNs are unsecured debt; if the bank fails, you are a creditor."},
            {q: "The Net Asset Value (NAV) of an open-end mutual fund is calculated:", c: ["Once per day, typically at the close of the NYSE", "Continuously throughout the trading day", "Weekly on Friday afternoons", "Only when a shareholder requests a redemption"], a: 0, f: "Logic: NAV is computed daily at 4:00 PM Eastern."},
            {q: "Which alternative investment is most commonly utilized as a hedge against inflation and currency devaluation?", c: ["Precious metals (Gold)", "Long-term Treasury Bonds", "Preferred Stock", "Corporate Debentures"], a: 0, f: "Logic: Hard assets like gold historically retain value against inflation."},
            {q: "To close out a short put position, an options investor must execute a:", c: ["Closing purchase", "Closing sale", "Opening sale", "Exercise notice"], a: 0, f: "Logic: If you sold (wrote) to open, you must buy back to close."},
            {q: "Which options strategy provides an investor with the maximum downside protection for a long stock position?", c: ["Buying a Protective Put", "Selling a Covered Call", "Buying a Call", "Selling a Naked Put"], a: 0, f: "Logic: A put gives you an absolute floor price for your stock."},
            {q: "A corporate bond is callable at 102. The 102 represents a call price of:", c: ["$1,020", "$102", "$1,002", "$10.20"], a: 0, f: "Logic: Prices are % of par ($1000). 102% = $1020."},
            {q: "Treasury Bills (T-Bills) are issued at a discount to par and mature at:", c: ["Par value", "Their current market value", "A premium to par", "Their inflation-adjusted value"], a: 0, f: "Logic: Your return is the gap between the discount price and the $1000 par at maturity."},
            {q: "What pricing mechanism do open-end investment companies (mutual funds) utilize?", c: ["Forward pricing", "Continuous intraday pricing", "Historical average pricing", "Auction market pricing"], a: 0, f: "Logic: Orders are filled at the NEXT calculated NAV."},
            {q: "Hedge funds often charge a performance fee. The 'high-water mark' provision ensures that:", c: ["The manager is not paid a performance fee twice for recovering the same losses", "The fund always outperforms the S&P 500", "The general partner guarantees the principal investment", "Investors receive a minimum guaranteed return before fees are deducted"], a: 0, f: "Logic: The fund must exceed its previous peak before the manager takes a cut again."},
            {q: "In a fixed annuity, the investment risk is strictly borne by the:", c: ["Insurance company", "Annuitant", "State Guaranty Association", "Separate Account manager"], a: 0, f: "Logic: The insurer guarantees the return, so they take the market risk."},
            {q: "During the payout (annuitization) phase of a variable annuity, the amount of the monthly check:", c: ["Fluctuates based on the performance of the separate account", "Remains constant", "Increases automatically with inflation", "Is solely determined by the annuitant's age and health"], a: 0, f: "Logic: You own a fixed number of units, but their dollar value changes daily."},
            {q: "An Equity REIT primarily generates its revenue from:", c: ["Property rents and capital gains from property sales", "Mortgage interest", "Originating commercial loans", "Derivatives trading"], a: 0, f: "Logic: Equity REITs own the property; Mortgage REITs own the debt."},
            {q: "Which of the following is a primary advantage of a Limited Partnership (DPP)?", c: ["Limited liability for the limited partners", "High liquidity", "Guaranteed dividend payouts", "Exemption from all federal and state laws"], a: 0, f: "Logic: LPs only risk their capital; they are not liable for business debts."},
            {q: "A company announces a 2-for-1 stock split. How does this affect the total value of an investor's position immediately after the split?", c: ["It remains entirely unchanged", "It doubles the value", "It halves the value", "It increases the value by the dividend yield"], a: 0, f: "Logic: More shares, but each is worth less. Total math stays same."},
            {q: "Which of the following corporate securities has a stated maturity date?", c: ["Corporate Debenture", "Preferred Stock", "Common Stock", "American Depositary Receipt (ADR)"], a: 0, f: "Logic: A debenture is debt and must be repaid by a certain date."},
            {q: "The intrinsic value of a Call option is calculated as:", c: ["Current Market Price - Strike Price", "Strike Price - Current Market Price", "Premium - Time Value", "Strike Price + Premium"], a: 0, f: "Logic: A call is 'in the money' if the stock is higher than the strike."},
            {q: "A 'Naked' (Uncovered) Call writer is exposed to:", c: ["Unlimited risk", "Limited risk", "Risk equal only to the premium received", "Zero risk if the option expires worthless"], a: 0, f: "Logic: If you don't own the stock, you could have to buy it at an infinite price."},
            {q: "A municipality issues a General Obligation (GO) bond. This debt is primarily backed by:", c: ["The taxing power of the municipality", "The revenue of a specific local project", "Federal block grants", "A portfolio of U.S. Treasury securities"], a: 0, f: "Logic: GO bonds rely on 'full faith and credit' (taxes)."},
            {q: "Which of the following debt instruments typically carries the highest credit risk?", c: ["High-Yield (Junk) Bond", "Investment Grade Corporate Bond", "Municipal Revenue Bond", "Treasury Inflation-Protected Security (TIPS)"], a: 0, f: "Logic: Junk bonds offer high interest to compensate for high default risk."},
            {q: "Which mutual fund share class typically carries a Contingent Deferred Sales Charge (back-end load)?", c: ["Class B Shares", "Class A Shares", "Class C Shares", "Institutional Shares"], a: 0, f: "Logic: Class B loads drop over time until they hit zero."},
            {q: "A mutual fund's expense ratio is calculated by dividing the fund's operating expenses by its:", c: ["Average net assets", "Total sales charges", "Gross investment income", "Net asset value per share"], a: 0, f: "Logic: The ratio shows what % of assets goes to running the fund."},
            {q: "A primary advantage of an Exchange-Traded Fund (ETF) over a traditional mutual fund is:", c: ["Intraday tradability", "Guaranteed principal protection", "Higher dividend payouts", "Elimination of all management fees"], a: 0, f: "Logic: ETFs trade on exchanges like stocks throughout the day."},
            {q: "Term life insurance builds cash value at what rate?", c: ["Term life does not build cash value", "A fixed, guaranteed rate", "A variable rate based on market subaccounts", "A rate tied to the Consumer Price Index"], a: 0, f: "Logic: Term is pure temporary protection; only permanent policies build cash."},
            {q: "Policy loans taken from the cash value of a permanent life insurance policy are generally:", c: ["Tax-free", "Taxable as ordinary income", "Taxable as long-term capital gains", "Subject to a 10% early withdrawal penalty"], a: 0, f: "Logic: Loans against cash value are not considered taxable income by the IRS."},
            {q: "A 'Blind Pool' Direct Participation Program is characterized by the fact that:", c: ["The specific assets to be purchased are not yet identified", "The general partner is unknown", "The limited partners have full voting rights", "The program is exempt from SEC registration"], a: 0, f: "Logic: You trust the sponsor to find assets later."},
            {q: "Private equity funds generally restrict their investors to:", c: ["Accredited and institutional investors", "Retail investors only", "Employees of the issuing corporation", "Non-U.S. citizens"], a: 0, f: "Logic: High risk and low liquidity require sophisticated investors."},
            {q: "If an investor is 'Bearish' on the broader market, which options strategy makes the most mathematical sense?", c: ["Buy a Put", "Buy a Call", "Sell a Put", "Write a Covered Call"], a: 0, f: "Logic: Puts profit when prices drop."},
            {q: "Commercial paper is typically issued by:", c: ["Large, creditworthy corporations", "Small municipalities", "The Federal Reserve", "Commercial banks only"], a: 0, f: "Logic: It is unsecured short-term debt for blue-chip companies."},
            {q: "An American Depositary Receipt (ADR) represents ownership of:", c: ["A foreign security trading in U.S. markets", "A U.S. security trading in foreign markets", "A portfolio of domestic municipal bonds", "A physical deposit of precious metals"], a: 0, f: "Logic: ADRs let Americans buy foreign shares locally."},
            {q: "The primary purpose of preemptive rights is to allow existing shareholders to:", c: ["Maintain their proportionate ownership in the company", "Receive guaranteed annual dividends", "Vote on the election of the Board of Directors", "Force the company into liquidation"], a: 0, f: "Logic: Rights prevent dilution by letting current owners buy new shares first."},
            {q: "Which of the following is NOT legally classified as an investment company under the 1940 Act?", c: ["Real Estate Investment Trust (REIT)", "Unit Investment Trust (UIT)", "Open-End Management Company", "Face-Amount Certificate Company"], a: 0, f: "Logic: REITs are not investment companies under the 1940 Act definition."},
            {q: "The standard death benefit of a variable annuity guarantees that if the annuitant dies during the accumulation phase, the beneficiary receives:", c: ["At least the total amount invested", "The fixed monthly payout amount", "Only the current market value of the account", "A refund of all mortality and expense charges"], a: 0, f: "Logic: Public protection rule; usually higher of current value or principal."},
            {q: "A corporate bond quote of 98 1/8 indicates a dollar price of:", c: ["$981.25", "$98.18", "$981.80", "$980.12"], a: 0, f: "Logic: 1/8 = 0.125. 98.125% of $1000 = $981.25."},
            {q: "According to the Investment Company Act of 1940, an open-end mutual fund is strictly prohibited from:", c: ["Issuing preferred stock or bonds", "Borrowing money from a bank", "Investing in foreign securities", "Charging a 12b-1 fee"], a: 0, f: "Logic: Mutual funds can only issue common stock."},
            {q: "Which of the following investment companies routinely trades at a discount or premium to its Net Asset Value (NAV)?", c: ["Closed-End Fund", "Open-End Fund", "Unit Investment Trust (UIT)", "Face-Amount Certificate Company"], a: 0, f: "Logic: Closed-end funds trade on supply/demand, not strict NAV."},
            {q: "To qualify as a 'Regulated Investment Company' under Subchapter M and avoid triple taxation, a mutual fund must distribute at least:", c: ["90% of its Net Investment Income", "98% of its capital gains", "75% of its gross revenue", "100% of its total return"], a: 0, f: "Logic: The 90% pass-through rule avoids corporate-level tax."},
            {q: "Mutual fund Class A shares are generally the most appropriate choice for an investor with a:", c: ["Long time horizon and large capital amount", "Short time horizon and small capital amount", "Need for immediate tax-free income", "Desire for active day trading"], a: 0, f: "Logic: Front-end loads are cheaper long-term due to lower annual fees."},
            {q: "The primary risk associated with holding Mortgage-Backed Securities (MBS) in a falling interest rate environment is:", c: ["Prepayment Risk", "Default Risk", "Liquidity Risk", "Legislative Risk"], a: 0, f: "Logic: Homeowners refinance when rates fall, returning your cash too early."},
            {q: "Treasury STRIPS are created by separating the principal and interest payments of U.S. Treasuries. As zero-coupon securities, they are highly sensitive to:", c: ["Interest rate risk", "Credit risk", "Default risk", "Liquidity risk"], a: 0, f: "Logic: Zero-coupon bonds have the highest price volatility."},
            {q: "The 'Time Value' portion of an option's premium is generally at its greatest when the option is:", c: ["At-the-money", "Deep in-the-money", "Deep out-of-the-money", "One day from expiration"], a: 0, f: "Logic: Uncertainty is highest when the stock is at the strike price."},
            {q: "An options trader notes that a call option has a 'Delta' of 0.50. This means that if the underlying stock rises by $1.00, the option's premium is expected to rise by:", c: ["$0.50", "$1.00", "$0.05", "$5.00"], a: 0, f: "Logic: Delta measures the ratio of option movement to stock movement."},
            {q: "Unlike Whole Life insurance, Universal Life insurance allows the policyholder to adjust:", c: ["Both the premium payments and the death benefit", "The underlying investment subaccounts", "The surrender charge period", "The assumed interest rate (AIR)"], a: 0, f: "Logic: Universal is 'adjustable' life insurance."},
            {q: "Under securities regulations, the cash value of a Variable Life insurance policy must be calculated at least:", c: ["Monthly", "Daily", "Weekly", "Annually"], a: 0, f: "Logic: Cash value is monthly; unit value is daily; death benefit is annual."},
            {q: "The maximum potential loss for a buyer of a put option is:", c: ["The premium paid", "Unlimited", "The strike price minus the premium", "The current market price of the stock"], a: 0, f: "Logic: Buyers can only lose the premium they paid."},
            {q: "Which pooled vehicle typically guarantees a fixed rate of return for life but is NOT classified as a security?", c: ["Fixed Annuity", "Variable Annuity", "Equity-Indexed Annuity", "Real Estate Investment Trust"], a: 0, f: "Logic: Fixed annuities are insurance products because the insurer takes the risk."},
            {q: "A variable annuity's 'L-shares' are specifically designed for investors who desire:", c: ["Shorter surrender charge periods", "The lowest possible M&E expenses", "A guaranteed 5% step-up death benefit", "No front-end sales loads"], a: 0, f: "Logic: L-shares allow earlier exits but have higher ongoing fees."},
            {q: "An investor in the highest federal tax bracket is seeking steady income. The most appropriate fixed-income vehicle is likely a:", c: ["Municipal Bond", "Corporate Bond", "High-Yield Junk Bond", "Treasury Bill"], a: 0, f: "Logic: Tax-free interest is most valuable to high-earners."},
            {q: "The tax-equivalent yield of a 4% municipal bond for an investor in the 32% tax bracket is:", c: ["5.88%", "4.00%", "2.72%", "12.50%"], a: 0, f: "Logic: 0.04 / (1 - 0.32) = 5.88%."},
            {q: "Because they are backed by taxes, General Obligation (GO) municipal bonds typically require which of the following before issuance?", c: ["Voter approval", "A feasibility study", "A revenue covenant", "A letter of credit from a commercial bank"], a: 0, f: "Logic: Taxpayers must approve debt they are liable to repay."},
            {q: "A 'Special Tax Bond' is a type of municipal revenue bond backed by:", c: ["Excise taxes on specific items like gasoline or tobacco", "Ad valorem (property) taxes", "Corporate income taxes", "Federal government subsidies"], a: 0, f: "Logic: Revenue comes from specific taxes, not general property taxes."},
            {q: "Under the Uniform Securities Act, Section 529 College Savings Plans are legally structured and regulated as:", c: ["Municipal fund securities", "Open-end management companies", "Direct Participation Programs", "Federal Covered Securities"], a: 0, f: "Logic: 529s are state-sponsored municipal fund securities."},
            {q: "A major benefit of a 529 Plan over a UGMA/UTMA custodial account is that in a 529 Plan:", c: ["The donor retains control over the assets and can change the beneficiary", "The assets automatically transfer to the child at age 18", "Contributions are federally tax-deductible", "There are no contribution limits"], a: 0, f: "Logic: 529s give the owner control even after the child is 18."},
            {q: "Which of the following fixed-income securities is issued at a steep discount to par and pays no semi-annual interest?", c: ["Zero-Coupon Bond", "Treasury Inflation-Protected Security (TIPS)", "Convertible Debenture", "Income Bond"], a: 0, f: "Logic: Zeroes grow via the discount rather than coupons."},
            {q: "The primary structural difference between an open-end mutual fund and a Unit Investment Trust (UIT) is that a UIT:", c: ["Has a fixed, unmanaged portfolio", "Trades on an exchange", "Calculates NAV only once a week", "Can issue preferred stock"], a: 0, f: "Logic: UITs are unmanaged 'buy and hold' portfolios."},
            {q: "'Dark Pools' are private trading networks utilized primarily to:", c: ["Allow institutions to trade large blocks of stock anonymously without moving the market", "Avoid paying taxes on capital gains", "Execute illegal insider trading anonymously", "Trade exclusively in foreign currencies"], a: 0, f: "Logic: Anonymity prevents massive orders from causing panic spikes/drops."},
            {q: "Because of the unique way they are structured and traded, Exchange-Traded Funds (ETFs) typically experience:", c: ["Fewer taxable capital gains distributions than actively managed mutual funds", "Higher 12b-1 fees than mutual funds", "Massive tracking error compared to their benchmark", "Zero commission costs when traded on an exchange"], a: 0, f: "Logic: In-kind redemptions minimize forced stock sales and taxes."},
            {q: "The intrinsic value of a Put option is calculated mathematically as:", c: ["Strike Price - Current Market Price", "Current Market Price - Strike Price", "Premium + Strike Price", "Premium - Time Value"], a: 0, f: "Logic: A put profits if you can sell (strike) higher than current price."},
