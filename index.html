<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
function playSnd(t){
        // Mobile browsers need this context resumed inside a user-triggered event
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                console.log("Audio Context Resumed on Mobile");
            });
        }
        
        const time = audioCtx.currentTime;
        if(t==='ok'){
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(523.25, time); o.frequency.setValueAtTime(659.25, time + 0.05); o.frequency.setValueAtTime(783.99, time + 0.1); o.frequency.setValueAtTime(1046.50, time + 0.15); 
            g.gain.setValueAtTime(0.08, time); g.gain.linearRampToValueAtTime(0.08, time + 0.2); g.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
            o.start(time); o.stop(time + 0.4);
        } else if (t==='no') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth'; o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(300, time); o.frequency.exponentialRampToValueAtTime(80, time + 0.3);
            g.gain.setValueAtTime(0.1, time); g.gain.linearRampToValueAtTime(0.001, time + 0.3);
            o.start(time); o.stop(time + 0.3);
        }
    }

    function playCountdown(){
        if(audioCtx.state==='suspended') audioCtx.resume();
        let time = audioCtx.currentTime;
        for(let i=0; i<3; i++) {
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.setValueAtTime(440, time + i);
            g.gain.setValueAtTime(0.1, time + i); g.gain.exponentialRampToValueAtTime(0.001, time + i + 0.2);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(time + i); o.stop(time + i + 0.2);
        }
        let rumble = audioCtx.createOscillator(), rGain = audioCtx.createGain();
        rumble.type = 'sawtooth'; rumble.frequency.setValueAtTime(50, time + 3); rumble.frequency.linearRampToValueAtTime(20, time + 6);
        rGain.gain.setValueAtTime(0, time + 3); rGain.gain.linearRampToValueAtTime(0.4, time + 3.1);
        rGain.gain.exponentialRampToValueAtTime(0.01, time + 7);
        rumble.connect(rGain); rGain.connect(audioCtx.destination);
        rumble.start(time + 3); rumble.stop(time + 7);
    }
    
    function playSiren(){
        if(audioCtx.state==='suspended') audioCtx.resume();
        let time = audioCtx.currentTime;
        for(let i=0; i<4; i++) {
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth'; o.frequency.setValueAtTime(600, time + (i*0.5)); o.frequency.linearRampToValueAtTime(400, time + (i*0.5) + 0.4);
            g.gain.setValueAtTime(0.2, time + (i*0.5)); g.gain.linearRampToValueAtTime(0.001, time + (i*0.5) + 0.4);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(time + (i*0.5)); o.stop(time + (i*0.5) + 0.4);
        }
    }

    const lib = [
        [ // PILLAR 1: ECONOMICS

            {q: "The 'Risk Premium' of a stock is defined as:", c: ["The Total Return minus the Risk-Free Rate", "The Expected Return multiplied by Beta"], a: 0, f: "Logic: The risk premium is the excess return an investor demands for taking on risk above the risk-free (T-Bill) rate."},
            {q: "Under the Capital Asset Pricing Model (CAPM), what is the expected return of a stock with a Beta of 1.2, a risk-free rate of 3%, and a market return of 10%?", c: ["11.4%", "15.0%"], a: 0, f: "Logic: CAPM = 3% + 1.2(10% - 3%) = 3% + 1.2(7%) = 3% + 8.4% = 11.4%."},

            {q: "Which of the following describes 'Disinflation'?", c: ["A widespread decline in the prices of goods", "A slowing in the rate at which prices are increasing"], a: 1, f: "Logic: Deflation is falling prices. Disinflation is when prices are still rising, but at a slower pace than before (e.g., inflation drops from 5% to 3%)."},

            {q: "Net Present Value (NPV) is the difference between the present value of cash inflows and the:", c: ["Future value of cash inflows", "Present value of cash outflows"], a: 1, f: "Logic: NPV is simply 'Money In (discounted)' minus 'Money Out (discounted)'."},
            {q: "Two assets have a correlation coefficient of +1.0. This means:", c: ["They move in completely opposite directions", "They move in perfect tandem"], a: 1, f: "Logic: +1.0 is perfect positive correlation; they move exactly together, offering no diversification benefit."},
            {q: "The numerator of the Sharpe Ratio is the portfolio's actual return minus the:", c: ["Expected return", "Risk-free rate"], a: 1, f: "Logic: Return minus Risk-Free Rate equals the 'Risk Premium' (the extra return earned for taking risk)."},
            {q: "Future Value is the concept of calculating:", c: ["What a future sum of money is worth today", "What a current sum of money will grow to at a specific interest rate"], a: 1, f: "Logic: Compounding forward is Future Value. Discounting backward is Present Value."},
            {q: "The difference between a company's Current Assets and its Current Liabilities is known as:", c: ["Net Worth", "Working Capital"], a: 1, f: "Logic: Working Capital is the absolute dollar amount of short-term liquidity available to run the business."},
            {q: "An investor believes that by analyzing public financial statements, they can consistently beat the market. This investor does NOT believe in the:", c: ["Weak-Form EMH", "Semi-Strong Form EMH"], a: 1, f: "Logic: Semi-Strong EMH says public data is already priced in, making fundamental analysis useless."},
            {q: "Which SEC filing is required when an investor acquires more than 5% of the voting stock of a publicly traded company?", c: ["Schedule 13D", "Form 144"], a: 0, f: "Logic: Schedule 13D must be filed within 10 days of acquiring more than a 5% beneficial interest in a company."},
            {q: "Publicly traded companies must file their audited annual financial reports on which SEC form?", c: ["Form 10-Q", "Form 10-K"], a: 1, f: "Logic: The 10-K is the comprehensive, audited annual report. The 10-Q is the unaudited quarterly report."},
            {q: "An investor purchases a 5% coupon bond at $1,100. If held to maturity, the Internal Rate of Return (IRR) of this bond will be equal to its:", c: ["Yield to Maturity (YTM)", "Current Yield"], a: 0, f: "Logic: For a bond held to maturity, the IRR is mathematically identical to the Yield to Maturity, as both calculate the exact discount rate that equates the bond's cash flows to its current price."},
            {q: "A technical analyst utilizing the 'Odd-Lot Theory' believes that small retail investors:", c: ["Are usually right at market turning points", "Are usually wrong at market turning points"], a: 1, f: "Logic: The Odd-Lot Theory is a contrarian indicator. It assumes small investors (trading in less than 100-share blocks) buy at the absolute top and sell at the absolute bottom."},
            {q: "In technical analysis, a 'Head and Shoulders Top' pattern indicates:", c: ["The reversal of an upward trend", "The continuation of a bullish trend"], a: 0, f: "Logic: A head and shoulders top signals that a stock's upward momentum is exhausted and a downward reversal is imminent."},
            {q: "Which technical indicator represents a stock's support or resistance level based on historical average prices over a specific period?", c: ["Moving Average", "Short Interest"], a: 0, f: "Logic: Moving averages smooth out daily price action to identify the underlying trend and potential support/resistance lines."},
            {q: "According to the 'Expectations Theory' of interest rates, a normal upward-sloping yield curve indicates that investors expect:", c: ["Future short-term rates to fall", "Future short-term rates to rise"], a: 1, f: "Logic: The theory states that long-term rates reflect the market's expectation of future short-term rates. An upward slope means they expect rates to go up."},
            {q: "Which phase of the business cycle is characterized by declining GDP, rising unemployment, and falling inventory levels?", c: ["Contraction", "Trough"], a: 0, f: "Logic: Contraction (recession) is the active decline phase. The trough is the absolute bottom before recovery begins."},
            {q: "A U.S. company that heavily exports its products to Europe will benefit most from a:", c: ["Strong U.S. Dollar", "Weak U.S. Dollar"], a: 1, f: "Logic: A weak dollar makes American goods cheaper and more attractive to foreign buyers holding stronger currencies like the Euro."},
            {q: "Which tool of the Federal Reserve has the most immediate and drastic impact on the money supply, and is therefore used least frequently?", c: ["Open Market Operations", "Changing the Reserve Requirement"], a: 1, f: "Logic: Changing the reserve requirement affects the multiplier effect of every dollar in the banking system, making it too blunt an instrument for daily use."},
            {q: "If the Federal Reserve wants to stimulate the economy, it will likely:", c: ["Buy Treasury securities", "Increase the discount rate"], a: 0, f: "Logic: Buying Treasuries injects cash into the banking system, expanding the money supply and lowering interest rates to stimulate borrowing."},
            {q: "The 'Current Ratio' is a measure of a company's:", c: ["Long-term solvency", "Short-term liquidity"], a: 1, f: "Logic: Current Assets divided by Current Liabilities measures the ability to pay debts coming due within the next 12 months."},
            {q: "Which of the following is considered an Intangible Asset on a corporate balance sheet?", c: ["Accounts Receivable", "Goodwill"], a: 1, f: "Logic: Goodwill represents the premium paid over the fair value of assets during an acquisition. It is an intangible asset."},
            {q: "If a corporation declares a cash dividend, which two balance sheet items are immediately affected?", c: ["Current Assets and Retained Earnings", "Current Liabilities and Retained Earnings"], a: 1, f: "Logic: On the declaration date, Retained Earnings drops (money is earmarked to be paid) and Dividends Payable (a Current Liability) increases."},
            {q: "A portfolio consists of 50% Stock A (Expected Return: 10%) and 50% Stock B (Expected Return: 14%). The expected return of the portfolio is:", c: ["12%", "24%"], a: 0, f: "Logic: The expected return of a portfolio is the weighted average of the expected returns of its individual assets. (0.50 * 10) + (0.50 * 14) = 5 + 7 = 12%."},
            {q: "In Modern Portfolio Theory, the 'Efficient Frontier' represents portfolios that offer the:", c: ["Highest return for a given level of risk", "Lowest risk regardless of return"], a: 0, f: "Logic: The Efficient Frontier is the graphical curve showing optimal portfolios that maximize return for every specific level of standard deviation (risk)."},
            {q: "A stock has a Beta of 1.5. If the overall market declines by 10%, this stock is expected to:", c: ["Decline by 10%", "Decline by 15%"], a: 1, f: "Logic: Beta measures relative volatility. A 1.5 Beta means the stock moves 1.5 times as much as the market (10% * 1.5 = 15%)."},
            {q: "Which risk metric measures the extent to which a portfolio's actual returns deviate from its expected returns based on its Beta?", c: ["Alpha", "Standard Deviation"], a: 0, f: "Logic: Alpha measures the 'value added' or 'excess return' above what CAPM (using Beta) predicted the return should be."},
            {q: "A highly risk-averse investor would prefer a portfolio with:", c: ["High Beta and low Alpha", "Low Standard Deviation"], a: 1, f: "Logic: Risk-averse investors primarily seek to minimize total volatility, which is measured by Standard Deviation."},
            {q: "The 'Time-Weighted Return' method is primarily used to evaluate:", c: ["The performance of the individual investor", "The performance of the portfolio manager"], a: 1, f: "Logic: Time-weighted return isolates the manager's investment choices by eliminating the effects of the client's cash deposits and withdrawals."},
            {q: "An investor buys a bond with a 6% coupon for $900. The Current Yield is:", c: ["6.00%", "6.67%"], a: 1, f: "Logic: Current Yield = Annual Interest ($60) / Current Market Price ($900) = 6.67%."},
            {q: "Which economic theory suggests that the economy is best controlled through taxation and government spending?", c: ["Keynesian Economic Theory", "Supply-Side Economic Theory"], a: 0, f: "Logic: Keynesian theory advocates for active government intervention through fiscal policy (taxes and spending) to manage demand."},
            {q: "Supply-Side economics suggests that the best way to stimulate economic growth is to:", c: ["Increase government spending programs", "Lower taxes and decrease regulation"], a: 1, f: "Logic: Supply-side (often associated with Reaganomics) focuses on creating a favorable environment for businesses to produce goods, primarily through tax cuts."},
            {q: "A company's 'Market Capitalization' is calculated by multiplying its current stock price by its:", c: ["Authorized shares", "Outstanding shares"], a: 1, f: "Logic: Market Cap is the total dollar value of the company based only on the shares currently held by the public (outstanding)."},
            {q: "If an investor is seeking a stock with a high margin of safety and a low price relative to its liquidation value, they are utilizing:", c: ["Growth investing", "Value investing"], a: 1, f: "Logic: Value investors seek bargains—companies trading below their intrinsic or book value due to temporary market pessimism."},
            {q: "If the Federal Reserve increases the discount rate, bond prices will generally:", c: ["Rise", "Fall"], a: 1, f: "Logic: Increasing the discount rate raises interest rates across the economy. As rates rise, the prices of existing bonds fall."},
            {q: "Which of the following is considered a Leading economic indicator?", c: ["Building permits", "Corporate profits"], a: 0, f: "Logic: Building permits indicate future construction activity and capital commitment, making it a leading indicator."},
            {q: "An investor with a perfectly diversified equity portfolio has eliminated all:", c: ["Systematic risk", "Unsystematic risk"], a: 1, f: "Logic: Diversification eliminates unsystematic (company-specific) risk. Systematic (market) risk cannot be diversified away."},
            {q: "The 'Present Value' of a future sum of money will DECREASE if the discount rate:", c: ["Increases", "Decreases"], a: 0, f: "Logic: A higher discount rate means future money is worth less today, because you could theoretically earn a higher return on it right now."},
            {q: "In the context of the business cycle, two consecutive quarters of declining GDP officially defines a:", c: ["Depression", "Recession"], a: 1, f: "Logic: Two consecutive quarters (6 months) of negative GDP growth is the standard economic definition of a recession."},
            {q: "If the yield spread between corporate bonds and U.S. Treasury bonds is widening, it generally indicates that:", c: ["The economy is expanding", "Economic conditions are worsening"], a: 1, f: "Logic: A widening spread means investors are demanding a higher premium for corporate risk, usually because they fear an economic slowdown or recession."},
            {q: "Which SEC form must be filed within 4 business days of a major, unscheduled corporate event?", c: ["Form 10-Q", "Form 8-K"], a: 1, f: "Logic: Form 8-K is the 'current report' used to notify investors of material events like a merger, bankruptcy, or change in executive leadership."},
            {q: "The 'Core' Consumer Price Index (CPI) excludes which two volatile components?", c: ["Housing and Transportation", "Food and Energy"], a: 1, f: "Logic: Food and energy prices fluctuate wildly due to weather and geopolitical events, so economists exclude them to see the underlying 'core' inflation trend."},
            {q: "An expansionary fiscal policy would most likely involve:", c: ["Lowering taxes and increasing government spending", "Raising taxes and decreasing government spending"], a: 0, f: "Logic: To expand the economy, the government (Congress/President) leaves more money in consumers' pockets (lower taxes) and injects money directly (spending)."},
            {q: "In late stages of an economic expansion, a sector rotation strategy would typically shift toward:", c: ["Basic materials and energy", "Financials and technology"], a: 0, f: "Logic: Late in the cycle, inflation usually picks up and industrial demand peaks, benefiting basic materials and energy sectors."},
            {q: "In technical analysis, a 'Resistance Level' is a price point where a stock:", c: ["Historically struggles to fall below", "Historically struggles to rise above"], a: 1, f: "Logic: Resistance is the 'ceiling' where selling pressure tends to overwhelm buying pressure."},
            {q: "If a stock's price crosses above its 200-day moving average, a technical analyst would view this as a:", c: ["Bullish signal", "Bearish signal"], a: 0, f: "Logic: Breaking upward through a long-term moving average signals a potential new uptrend."},
            {q: "The Dividend Yield of a stock is calculated by dividing the annual dividend by the:", c: ["Earnings Per Share (EPS)", "Current Market Price"], a: 1, f: "Logic: Dividend Yield tells you the percentage return you are getting in cash based on what you have to pay for the stock today."},
            {q: "Return on Assets (ROA) is calculated by dividing Net Income by:", c: ["Total Assets", "Shareholders' Equity"], a: 0, f: "Logic: ROA measures how efficiently a company's management uses all of its assets (both debt and equity funded) to generate profit."},
            {q: "An investment has a positive Alpha of +2.0. This means the investment:", c: ["Outperformed its risk-adjusted expected return", "Underperformed its risk-adjusted expected return"], a: 0, f: "Logic: A positive Alpha means the manager or asset added value beyond what was mathematically expected by CAPM."},
            {q: "The R-squared (R²) of a mutual fund measures:", c: ["The fund's total volatility", "The percentage of the fund's movement explained by its benchmark index"], a: 1, f: "Logic: R-squared (0 to 100) tells you how closely the fund correlates to its benchmark. An R-squared of 95 means 95% of the fund's movement is due to the market."},
            {q: "Because of the benefits of diversification, the standard deviation of a portfolio containing multiple non-perfectly correlated assets will be:", c: ["Higher than the weighted average of the individual standard deviations", "Lower than the weighted average of the individual standard deviations"], a: 1, f: "Logic: As long as correlation is less than +1.0, combining assets smooths out the ride, resulting in lower total volatility."},
            {q: "Which of the following investments is most vulnerable to Purchasing Power Risk?", c: ["Common Stock", "Long-term Fixed Income (Bonds)"], a: 1, f: "Logic: Purchasing power risk is inflation. Fixed payments over a long period lose their real value as prices rise."},
            {q: "Reinvestment Rate Risk is the concern that interest payments will have to be reinvested at lower rates. This risk is highest for:", c: ["Zero-coupon bonds", "High-coupon bonds"], a: 1, f: "Logic: Zero-coupon bonds have NO reinvestment risk because they pay no coupons. High-coupon bonds force you to constantly find new places to invest large cash payouts."},
            {q: "The risk that an investor will not be able to sell an asset quickly at a fair market price is known as:", c: ["Market Risk", "Liquidity Risk"], a: 1, f: "Logic: Liquidity risk is high for assets like real estate, limited partnerships, and thinly traded micro-cap stocks."},
            {q: "A U.S. investor buys a Japanese stock (ADR). The investor will LOSE money on the currency translation if:", c: ["The Japanese Yen strengthens against the U.S. Dollar", "The Japanese Yen weakens against the U.S. Dollar"], a: 1, f: "Logic: If the Yen weakens, the Japanese dividends translate into fewer U.S. Dollars when brought back home."},
            {q: "To calculate the Present Value of a future goal, an investor needs the future value, the time period, and the:", c: ["Inflation rate", "Discount rate (interest rate)"], a: 1, f: "Logic: Present Value discounts a future sum backwards using an assumed rate of return."},
            {q: "Using the Rule of 72, if an investor wants their money to double in 8 years, what interest rate must they earn?", c: ["8.0%", "9.0%"], a: 1, f: "Logic: 72 divided by 8 years = 9%."},
            {q: "For a bond trading at a premium, rank the yields from highest to lowest:", c: ["Coupon Rate, Current Yield, Yield to Maturity", "Yield to Maturity, Current Yield, Coupon Rate"], a: 0, f: "Logic: Premium bonds pay high coupons, but because you lose the premium at maturity, the YTM is always the lowest yield."},
            {q: "The 'Parity Price' of a convertible bond is the exact mathematical point where:", c: ["The bond's yield equals its coupon rate", "The value of the bond equals the market value of the converted shares"], a: 1, f: "Logic: Parity means equality. It is the break-even point between holding the debt or converting to equity."},
            {q: "Which return measurement completely eliminates the distortion caused by a client's cash deposits and withdrawals?", c: ["Dollar-Weighted Return", "Time-Weighted Return"], a: 1, f: "Logic: Time-weighted return measures the manager's compound growth rate, independent of when the client added or removed money."},
            {q: "Dollar-Weighted Return is the most appropriate metric for evaluating:", c: ["An individual investor's actual performance", "A mutual fund manager's stock selection skill"], a: 0, f: "Logic: Dollar-weighted return (which is basically IRR) accounts for the specific timing and size of the investor's cash flows."},
            {q: "On a Modern Portfolio Theory (MPT) graph, any portfolio plotted below the Efficient Frontier is considered:", c: ["Optimal", "Suboptimal"], a: 1, f: "Logic: Portfolios below the line are taking on too much risk for the return they are generating. They are inefficient."},
            {q: "A passive investment strategy that involves periodically restoring a portfolio to its original target asset allocation is called:", c: ["Tactical rebalancing", "Strategic rebalancing"], a: 1, f: "Logic: Strategic allocation sets a long-term target and rebalances (buys low, sells high) to maintain that target, regardless of market conditions."},
            {q: "If an analyst is measuring how much a stock's price responds to a change in the broader market, they are measuring:", c: ["Standard Deviation", "Beta"], a: 1, f: "Logic: Beta is the measure of systematic risk—how closely a stock's volatility is tied to the market's volatility."},
            {q: "If a corporation issues new shares of common stock, how does this affect the balance sheet?", c: ["Increases Assets and increases Shareholders' Equity", "Increases Liabilities and decreases Shareholders' Equity"], a: 0, f: "Logic: The company receives cash (increasing Assets) and records the new ownership capital (increasing Equity)."},
            {q: "Elasticity of demand refers to how sensitive the quantity demanded of a good is to a change in:", c: ["Price", "Supply"], a: 0, f: "Logic: Highly elastic goods (like luxury items) see massive drops in demand if the price goes up. Inelastic goods (like medicine) are bought regardless of price."},
            {q: "Which of the following is NOT a component of the Capital Asset Pricing Model (CAPM)?", c: ["Risk-Free Rate", "Dividend Yield"], a: 1, f: "Logic: CAPM uses the Risk-Free Rate, Beta, and the Market Return. It does not look at specific dividends."},
            {q: "Top-Down fundamental analysis begins by examining:", c: ["The overall macroeconomic environment", "The specific financial health of a single company"], a: 0, f: "Logic: Top-Down starts with the global economy, narrows to specific sectors, and finally picks individual companies within those sectors."},
            {q: "When comparing two identical bonds, the bond with the lower coupon rate will have:", c: ["Lower duration and lower price volatility", "Higher duration and higher price volatility"], a: 1, f: "Logic: Lower coupons mean it takes longer to recoup your investment, increasing the duration and making the bond more sensitive to interest rate swings."},
            {q: "The 'Random Walk' theory is most closely associated with which form of the Efficient Market Hypothesis?", c: ["Semi-Strong Form", "Weak Form"], a: 1, f: "Logic: The Weak Form asserts that past price movements cannot predict future movements, echoing the Random Walk idea that daily price changes are independent and unpredictable."},
            {q: "Discounted Cash Flow (DCF) analysis relies heavily on predicting future cash flows and determining an appropriate:", c: ["Discount rate", "Inflation rate"], a: 0, f: "Logic: DCF calculates intrinsic value by taking estimated future cash flows and discounting them back to their present value using a specific discount (or required return) rate."},
            {q: "A high Debt-to-Equity ratio indicates that a corporate issuer is:", c: ["Highly leveraged", "Highly liquid"], a: 0, f: "Logic: Leverage refers to the use of borrowed money. High debt relative to equity means the company is heavily leveraged."},
            {q: "The primary dual mandate of the Federal Reserve is to maintain price stability and:", c: ["Balance the federal budget", "Maximum employment"], a: 1, f: "Logic: The Fed manages monetary policy to keep inflation in check (price stability) while maximizing sustainable employment."},
            {q: "If the yield curve 'steepens', the spread between short-term and long-term interest rates is:", c: ["Narrowing", "Widening"], a: 1, f: "Logic: A steepening curve means long-term rates are rising faster than short-term rates, increasing (widening) the gap between them."},
            {q: "Publicly traded companies must file a Form 8-K with the SEC to report:", c: ["Unscheduled material events", "Quarterly earnings results"], a: 0, f: "Logic: Form 10-Q is for quarterly earnings. Form 8-K is the 'current report' used to announce major, unexpected events like a merger or CEO resignation."},
            {q: "In fixed-income analysis, 'Duration' is a measurement of a bond's:", c: ["Time until maturity", "Sensitivity to interest rate changes"], a: 1, f: "Logic: While measured in years, duration tells you exactly how much a bond's price will fluctuate for every 1% change in interest rates."},
            {q: "Using the Rule of 72, if an investor starts with $10,000 and earns a 6% annual return, how much will they have in 24 years?", c: ["$20,000", "$40,000"], a: 1, f: "Logic: 72 / 6 = 12 years to double. In 24 years, the money doubles twice. $10k -> $20k -> $40k."},
            {q: "In the Capital Asset Pricing Model (CAPM), the 'Market Risk Premium' is calculated as:", c: ["The expected return of the market minus the risk-free rate", "The risk-free rate multiplied by Beta"], a: 0, f: "Logic: The premium is the 'extra' return the market pays out strictly for taking on risk above a safe T-Bill."},
            {q: "If the economy is entering a contraction (recession) phase, a sector rotation strategy would favor:", c: ["Consumer Staples and Healthcare", "Technology and Industrials"], a: 0, f: "Logic: Staples and healthcare are defensive sectors; people must buy groceries and medicine regardless of the economic climate."},
            {q: "Which of the following line items is found on a corporate Balance Sheet?", c: ["Cost of Goods Sold", "Retained Earnings"], a: 1, f: "Logic: Cost of Goods Sold is on the Income Statement. Retained Earnings is a component of Shareholders' Equity on the Balance Sheet."},
            {q: "Nominal yield is another term for a bond's:", c: ["Coupon rate", "Current yield"], a: 0, f: "Logic: Nominal simply means 'in name only'—it is the stated, fixed percentage printed on the face of the bond."},
            {q: "In a normal distribution of returns, approximately what percentage of occurrences fall within one standard deviation of the mean?", c: ["68%", "95%"], a: 0, f: "Logic: The rule of normal distribution is 68% (one standard deviation), 95% (two), and 99.7% (three)."},
            {q: "Tracking error is the mathematical difference between a portfolio's return and the return of its:", c: ["Benchmark index", "Risk-free alternative"], a: 0, f: "Logic: Tracking error measures how closely an index fund or passive portfolio mimics its target benchmark."},
            {q: "A high Price-to-Earnings (P/E) ratio typically indicates that a stock is considered a:", c: ["Value stock", "Growth stock"], a: 1, f: "Logic: Investors pay a high multiple for growth stocks because they anticipate rapid future earnings expansion."},
            {q: "The Dividend Payout Ratio is calculated by dividing annual dividends per share by:", c: ["Earnings Per Share (EPS)", "Stock Price"], a: 0, f: "Logic: Dividend / Price is the Dividend Yield. Dividend / EPS is the Payout Ratio (how much of its profit the company hands back to shareholders)."},
            {q: "A 'Bottom-Up' fundamental analyst focuses primarily on:", c: ["Macroeconomic trends and interest rates", "The specific financial conditions of individual companies"], a: 1, f: "Logic: Bottom-Up stock pickers look for great companies first, regardless of the broader economic or sector environment."},
            {q: "Which of the following is a tool of Monetary Policy?", c: ["Adjusting income tax rates", "Open Market Operations"], a: 1, f: "Logic: The Fed controls Monetary Policy (buying/selling bonds, discount rate, reserve requirements). Congress controls Fiscal Policy (taxes and spending)."},
            {q: "Gross Domestic Product (GDP) measures the total value of all goods and services produced:", c: ["By a country's citizens, regardless of location", "Within a country's physical borders"], a: 1, f: "Logic: GDP is strictly geographic. GNP (Gross National Product) measures output by a country's citizens globally."},
            {q: "A strong U.S. dollar generally makes foreign-imported goods:", c: ["Cheaper for U.S. consumers", "More expensive for U.S. consumers"], a: 0, f: "Logic: If the dollar is strong, it possesses more purchasing power, making imports cheaper for Americans (but hurting U.S. exporters)."},
            {q: "Book Value is calculated as Total Assets minus Intangible Assets and:", c: ["Total Liabilities", "Current Liabilities"], a: 0, f: "Logic: Book Value is the theoretical liquidation value of the company: everything it owns minus everything it owes, excluding non-physical assets like goodwill."},
            {q: "Which of the following is an example of Systematic Risk?", c: ["Purchasing power (inflation) risk", "Regulatory risk affecting the banking sector"], a: 0, f: "Logic: Systematic risk affects the entire system/market (inflation, interest rates, war). It cannot be diversified away."},
            {q: "Which of the following is an example of Unsystematic Risk?", c: ["Interest rate risk", "A labor strike at a specific manufacturing plant"], a: 1, f: "Logic: Unsystematic risk is specific to a single company or industry and CAN be mitigated through diversification."},
            {q: "Adding an asset with a correlation of -0.5 to an existing portfolio will most likely:", c: ["Increase overall portfolio volatility", "Reduce overall portfolio volatility"], a: 1, f: "Logic: Any correlation coefficient less than +1.0 provides some diversification benefit. Negative correlation means the assets tend to move in opposite directions, smoothing the ride."},
            {q: "Return on Equity (ROE) measures how efficiently a company generates profits from:", c: ["Total corporate assets", "Shareholders' invested capital"], a: 1, f: "Logic: ROE = Net Income / Shareholders' Equity. It shows how much profit management squeezes out of the investors' money."},
            {q: "While the Sharpe Ratio evaluates return relative to Standard Deviation, the Treynor Ratio evaluates return relative to:", c: ["Alpha", "Beta (Systematic risk)"], a: 1, f: "Logic: Treynor uses Beta in the denominator, making it useful for evaluating a single portfolio that is part of a broader, fully diversified asset allocation."},
            {q: "According to the NPV rule, an investment should be accepted if its Net Present Value is:", c: ["Greater than zero", "Equal to the Internal Rate of Return"], a: 0, f: "Logic: A positive NPV (greater than zero) means the project will generate more cash than the required hurdle rate, adding value to the firm."},
            {q: "The Internal Rate of Return (IRR) is best defined as the exact discount rate that makes the Net Present Value (NPV) equal to:", c: ["Zero", "The Risk-Free Rate"], a: 0, f: "Logic: IRR is the mathematical break-even point where the present value of inflows perfectly matches the present value of outflows."},
            {q: "Which analytical method evaluates the broader economy before looking at individual companies?", c: ["Top-Down Analysis", "Bottom-Up Analysis"], a: 0, f: "Logic: Top-down starts with the macro picture and filters down to the micro level."},
            {q: "If the Federal Reserve increases the Reserve Requirement, the money supply will:", c: ["Expand", "Contract"], a: 1, f: "Logic: Banks are forced to hold more cash in their vaults, leaving less money available to lend out."},
            {q: "Which financial statement provides a snapshot of a company's financial position at a specific point in time?", c: ["Income Statement", "Balance Sheet"], a: 1, f: "Logic: The balance sheet is a snapshot on a specific date. The income statement covers a period of time (like a quarter or year)."},
            {q: "In an inflationary environment, which inventory accounting method will result in the lowest reported net income?", c: ["FIFO (First In, First Out)", "LIFO (Last In, First Out)"], a: 1, f: "Logic: Under LIFO, the most recently acquired (and thus most expensive) inventory is sold first, increasing Cost of Goods Sold and lowering net income."},
            {q: "The Treynor Ratio measures a portfolio's excess return per unit of:", c: ["Total Risk (Standard Deviation)", "Systematic Risk (Beta)"], a: 1, f: "Logic: Treynor uses Beta in its denominator, focusing only on the risk that cannot be diversified away."},
            {q: "Which of the following is NOT a fundamental component of a discounted cash flow (DCF) model?", c: ["The current market price of the security", "The estimated future cash flows"], a: 0, f: "Logic: DCF is used to CALCULATE what the current price *should* be (intrinsic value). It does not use the current market price as an input."},
            {q: "If an analyst is looking for undervalued companies with low price-to-earnings multiples and high dividend yields, they are using a:", c: ["Value investing style", "Growth investing style"], a: 0, f: "Logic: Value investors seek out stocks that appear cheap relative to their fundamentals, often paying higher dividends."},
            {q: "A client invests $10,000 and receives exactly $10,000 back five years later. The 'real' return on this investment is:", c: ["Zero", "Negative"], a: 1, f: "Logic: While the nominal return is zero, inflation over the five years guarantees the purchasing power of that $10,000 has declined, making the 'real' return negative."},
            {q: "Which yield curve is considered the most reliable predictor of an impending economic recession?", c: ["Steep yield curve", "Inverted yield curve"], a: 1, f: "Logic: An inverted curve (short-term rates higher than long-term rates) signals that investors expect rates to fall due to a slowing economy."},
            {q: "The 'Rule of 72' states that if an investment grows at 9% annually, it will double in approximately:", c: ["8 years", "9 years"], a: 0, f: "Logic: 72 divided by 9 equals 8 years."},
            {q: "Which of the following business entities pays taxes on its income at the corporate level before distributing dividends to owners?", c: ["S-Corporation", "C-Corporation"], a: 1, f: "Logic: C-Corporations face 'double taxation' (taxed at the entity level, and again at the shareholder level). S-Corps are pass-through entities."},
            {q: "If a central bank wants to slow down an overheating economy, it will most likely:", c: ["Lower the discount rate", "Sell government securities in the open market"], a: 1, f: "Logic: Selling securities pulls cash out of the banking system, reducing the money supply and raising interest rates to cool down inflation."},
            {q: "A stock's Beta is 1.2 and the market drops by 5%. The stock's expected price movement is a:", c: ["Drop of 5%", "Drop of 6%"], a: 1, f: "Logic: Beta measures volatility relative to the market. 5% multiplied by 1.2 equals a 6% expected drop."},
            {q: "Which of the following measures the total volatility of an investment, including both systematic and unsystematic risk?", c: ["Standard Deviation", "Alpha"], a: 0, f: "Logic: Standard Deviation is the grand total of all variance around the average return."},
            {q: "To determine the 'Quick Ratio', an analyst must subtract which item from Current Assets before dividing by Current Liabilities?", c: ["Accounts Receivable", "Inventory"], a: 1, f: "Logic: The Quick (Acid-Test) Ratio removes inventory because it is the least liquid of all current assets."},
            {q: "An investor who buys an S&P 500 index fund is primarily exposed to which type of risk?", c: ["Systematic risk", "Unsystematic risk"], a: 0, f: "Logic: A broad index fund is fully diversified, eliminating unsystematic risk. Only market (systematic) risk remains."},
            {q: "According to the Efficient Market Hypothesis (EMH), if the market is 'Semi-Strong' efficient, an investor cannot achieve excess returns using:", c: ["Inside information", "Fundamental analysis based on public data"], a: 1, f: "Logic: Semi-strong EMH states that all public info is already priced in, making fundamental analysis useless. Only inside info works."},
            {q: "Which of the following economic indicators is considered a 'Leading' indicator?", c: ["Average duration of unemployment", "Building permits for new private housing"], a: 1, f: "Logic: Building permits indicate future economic activity and capital commitment, leading the economy."},
            {q: "If the U.S. dollar depreciates relative to the Euro, U.S. exports to Europe will become:", c: ["More expensive and less competitive", "Cheaper and more competitive"], a: 1, f: "Logic: A weaker dollar means Europeans can buy more U.S. goods with their stronger Euros, boosting U.S. exports."},
            {q: "The 'Present Value' of a future dollar amount will be higher if the discount rate applied is:", c: ["Lower", "Higher"], a: 0, f: "Logic: A lower discount rate means future money is penalized less today. The less you discount it, the higher the present value remains."},
            {q: "Which analytical approach starts with analyzing the global economy, then narrows to sectors, and finally to individual stocks?", c: ["Bottom-Up Analysis", "Top-Down Analysis"], a: 1, f: "Logic: Top-Down starts with the macro (economy) and works its way down to the micro (specific stock)."},
            {q: "A bond's 'Duration' is a measure of its:", c: ["Time to maturity in exact calendar days", "Price sensitivity to a 1% change in interest rates"], a: 1, f: "Logic: Duration is the primary metric used to calculate how much a bond's price will swing when interest rates move."},
            {q: "If the IRR (Internal Rate of Return) of a project equals the required hurdle rate, the Net Present Value (NPV) will be:", c: ["Zero", "Positive"], a: 0, f: "Logic: IRR is defined as the exact discount rate that makes the present value of inflows perfectly equal the present value of outflows, resulting in an NPV of zero."},
            {q: "An investor with a heavy allocation to long-term bonds is most exposed to which of the following risks if inflation spikes?", c: ["Purchasing Power Risk", "Liquidity Risk"], a: 0, f: "Logic: Inflation destroys the real value of fixed, long-term interest payments. This is purchasing power risk."},
            {q: "When a corporation declares a cash dividend, the company's Working Capital:", c: ["Decreases", "Remains unchanged"], a: 0, f: "Logic: Declaring a dividend creates a Current Liability (Dividends Payable) without changing Current Assets yet, so Working Capital (CA - CL) immediately drops."},
            {q: "The Capital Asset Pricing Model (CAPM) is used to calculate an investment's:", c: ["Expected return based on its risk", "Historical compound growth rate"], a: 0, f: "Logic: CAPM uses the risk-free rate, beta, and market return to determine what an asset *should* return given its systematic risk."},
            {q: "If two investments have a correlation coefficient of 0.0, their price movements are:", c: ["Perfectly positively correlated", "Statistically independent of each other"], a: 1, f: "Logic: A correlation of 0 means there is no relationship at all between the price movements of the two assets."},
            {q: "Which type of risk is most associated with a company's heavy reliance on debt financing?", c: ["Market Risk", "Financial (Credit/Default) Risk"], a: 1, f: "Logic: High leverage increases financial risk—the danger that the company cannot meet its debt obligations."},
            {q: "The 'Dividend Payout Ratio' shows the percentage of:", c: ["Net income paid out to shareholders as dividends", "The stock's current price represented by the annual dividend"], a: 0, f: "Logic: Dividend / EPS = Payout Ratio. It shows how much of the profit management gives back versus retains."},
            {q: "A portfolio's 'Tracking Error' measures how closely its performance matches:", c: ["The risk-free rate", "A designated benchmark index"], a: 1, f: "Logic: Tracking error is used to see if an index fund or passive ETF is properly mimicking its target index."},
            {q: "Which of the following is considered a 'Lagging' economic indicator?", c: ["Stock market prices", "Corporate profits"], a: 1, f: "Logic: Corporate profits confirm a trend after it has already happened, making them a lagging indicator."},
            {q: "In an expanding economy, which phase immediately follows the 'Trough'?", c: ["Peak", "Expansion (Recovery)"], a: 1, f: "Logic: The trough is the bottom. After the bottom comes the recovery/expansion phase leading up to the next peak."},
            {q: "According to Monetarist economic theory, the most important factor in driving economic growth is:", c: ["Government spending and taxation", "The money supply"], a: 1, f: "Logic: Monetarists (like Milton Friedman) believe that controlling the money supply through the Federal Reserve is the key to managing the economy."},
            {q: "If a corporation pays a previously declared cash dividend, the company's Working Capital:", c: ["Decreases", "Remains unchanged"], a: 1, f: "Logic: When paid, cash (a Current Asset) drops, but Dividends Payable (a Current Liability) drops by the exact same amount. The net effect on Working Capital is zero."},
            {q: "An investor is looking at a 10-year bond with a 4% coupon. If inflation is currently running at 3%, the 'Real' interest rate is:", c: ["1.0%", "7.0%"], a: 0, f: "Logic: Real Return = Nominal Return - Inflation Rate (4% - 3% = 1%)."},
            {q: "Which type of stock behaves most like a fixed-income debt security when interest rates change?", c: ["Preferred Stock", "Common Growth Stock"], a: 0, f: "Logic: Preferred stock pays a fixed dividend, meaning its price fluctuates inversely with interest rates, exactly like a bond."},
            {q: "Which of the following is considered part of Shareholders' Equity on a corporate balance sheet?", c: ["Accounts Payable", "Paid-In Capital"], a: 1, f: "Logic: Accounts payable is a liability. Paid-in capital (and retained earnings) represent the money actually owned by the shareholders."},
            {q: "An index that bases a company's weighting strictly on the total market value of its outstanding shares is:", c: ["Price-weighted", "Capitalization-weighted"], a: 1, f: "Logic: The S&P 500 is cap-weighted (price x shares). The Dow Jones is price-weighted."},
            {q: "In Modern Portfolio Theory, an 'Optimal Portfolio' is one that plots:", c: ["Directly on the Efficient Frontier", "Below the Efficient Frontier"], a: 0, f: "Logic: The Efficient Frontier represents the highest possible return for every specific level of risk. Anything on that line is optimal."},
            {q: "Which of the following risks cannot be reduced through portfolio diversification?", c: ["Business Risk", "Market Risk"], a: 1, f: "Logic: Market risk is systematic. When the whole system crashes, diversification cannot completely protect you."},
            {q: "A bond with a high duration will experience:", c: ["Greater price volatility when interest rates change", "Lower price volatility when interest rates change"], a: 0, f: "Logic: Duration measures sensitivity. High duration means the bond's price will swing wildly if rates move."},
            {q: "Earnings Per Share (EPS) focuses solely on the profits available to:", c: ["Preferred shareholders", "Common shareholders"], a: 1, f: "Logic: EPS subtracts preferred dividends first, leaving only the earnings attributable to the common stock."},
            {q: "Discounted Cash Flow (DCF) analysis is used by fundamental analysts to determine an asset's:", c: ["Current market price", "Intrinsic value"], a: 1, f: "Logic: DCF mathematically calculates what a stock *should* be worth today based on its future cash generation."},
            {q: "A decline in Gross Domestic Product (GDP) for two consecutive quarters officially defines a:", c: ["Recession", "Depression"], a: 0, f: "Logic: Two quarters (six months) of economic contraction is the textbook definition of a recession."},
            {q: "Which economic indicator moves in the same direction and at the exact same time as the broader economy?", c: ["Lagging indicator", "Coincident indicator"], a: 1, f: "Logic: Coincident indicators (like GDP or industrial production) mirror the current state of the economy."},
            {q: "For a bond trading at a discount, which of the following is TRUE?", c: ["Yield to Maturity is higher than the Coupon Rate", "Current Yield is lower than the Coupon Rate"], a: 0, f: "Logic: Discount = mathematical gain at maturity. Therefore, YTM > Current Yield > Coupon Rate."},
            {q: "An investor expects to receive $50,000 in exactly ten years. To find out what that future sum is worth today, the investor must calculate the:", c: ["Future Value", "Present Value"], a: 1, f: "Logic: You are taking a future number and discounting it backwards to find its value in the present."},
            {q: "Which metric is the most accurate representation of a mutual fund manager's actual investment selection skill?", c: ["Time-Weighted Return", "Dollar-Weighted Return"], a: 0, f: "Logic: Time-weighted return eliminates the uncontrollable factor of when retail clients deposit or withdraw cash."},
            {q: "According to the Efficient Market Hypothesis, 'Weak-Form' efficiency implies that:", c: ["Fundamental analysis is useless", "Technical analysis is useless"], a: 1, f: "Logic: Weak-form states that all historical price data is already priced in, making charting (technical analysis) a waste of time."},
            {q: "If a company's Total Assets are $50 million and its Total Liabilities are $30 million, its Net Worth is:", c: ["$20 million", "$80 million"], a: 0, f: "Logic: Assets - Liabilities = Net Worth (Shareholders' Equity)."},
            {q: "A stock with a Beta of 1.0 is expected to:", c: ["Outperform the market by 10%", "Move in perfect tandem with the broader market"], a: 1, f: "Logic: The market benchmark always has a Beta of exactly 1.0."},
            {q: "An expansionary monetary policy is designed to:", c: ["Increase interest rates to fight inflation", "Lower interest rates to stimulate borrowing and growth"], a: 1, f: "Logic: Expansionary = growing the money supply. Cheaper money encourages businesses and consumers to borrow and spend."}
        ], [ // PILLAR 2: VEHICLES
            {q: "Which of the following investment vehicles exposes the investor to the credit risk of the issuing financial institution?", c: ["Exchange-Traded Fund (ETF)", "Exchange-Traded Note (ETN)"], a: 1, f: "Logic: ETNs are unsecured debt instruments (notes) issued by a bank. If the bank defaults, the investor could lose their money, regardless of the underlying index's performance."},
            {q: "A Real Estate Investment Trust (REIT) is structurally designed to pass through:", c: ["Both income and losses", "Income only"], a: 1, f: "Logic: REITs avoid taxation at the corporate level by passing at least 90% of their income to shareholders, but unlike Direct Participation Programs (DPPs), they cannot pass through losses."},
            {q: "A Letter of Intent (LOI) allows a mutual fund investor to receive a breakpoint discount by committing to a total investment amount over a maximum period of:", c: ["13 months", "24 months"], a: 0, f: "Logic: An LOI is valid for 13 months and can typically be backdated up to 90 days to include past purchases."},
            {q: "Unlike open-end mutual funds, the market price of a closed-end fund is determined by:", c: ["Supply and demand on the exchange", "The daily calculation of Net Asset Value (NAV)"], a: 0, f: "Logic: Closed-end funds issue a fixed number of shares that trade on an exchange. Therefore, they can trade at a premium or discount to their actual NAV based on market demand."},
            {q: "During the accumulation phase of a variable annuity, the number of accumulation units owned by the investor:", c: ["Remains fixed, while the value fluctuates", "Increases with each additional premium contribution"], a: 1, f: "Logic: When you put more money into a variable annuity during the accumulation phase, you are buying more accumulation units. When you annuitize, those become a fixed number of annuity units."},
            {q: "An investor heavily concentrated in a single large-cap stock wants to protect against a near-term drop in price. The best option strategy is to:", c: ["Buy a Put", "Sell a Call"], a: 0, f: "Logic: Buying a put acts as an insurance policy (a 'protective put'), giving the investor the right to sell the stock at a set strike price if the market crashes."},
            {q: "A viatical settlement involves the sale of a life insurance policy by a policyholder who is:", c: ["Entering retirement and needs liquidity", "Terminally ill"], a: 1, f: "Logic: Viatical settlements are specifically for terminally ill policyholders (typically with less than 24 months to live) who sell their policy to a third party for an immediate lump sum."},
            {q: "The annual imputed interest on a zero-coupon corporate bond that an investor must report for tax purposes is known as:", c: ["Phantom income", "Capital gains"], a: 0, f: "Logic: Even though the investor receives no actual cash until maturity, the IRS taxes the annual accreted value of the discount as 'phantom' ordinary income each year."},
            {q: "The principal value of a Treasury Inflation-Protected Security (TIPS) is adjusted semi-annually based on the:", c: ["Consumer Price Index (CPI)", "Federal Funds Rate"], a: 0, f: "Logic: TIPS protect purchasing power by adjusting the underlying principal upward with the CPI. The fixed interest rate is then paid on that higher principal amount."},
            {q: "Mutual fund Class C shares are generally characterized by having:", c: ["A front-end sales load and low 12b-1 fees", "A level load (ongoing 12b-1 fees) and no front-end load"], a: 1, f: "Logic: Class C shares do not charge an upfront fee but have significantly higher annual expense ratios (12b-1 fees), making them better for short-term holds."},
            {q: "An options investor expects extreme volatility in a stock following an upcoming earnings announcement, but is unsure of the direction. The best strategy is a:", c: ["Covered Call", "Straddle"], a: 1, f: "Logic: A straddle involves buying both a Call and a Put at the same strike price and expiration. The investor profits if the stock makes a massive move in *either* direction."},
            {q: "Which of the following derivatives gives the holder a long-term right to purchase common stock at a fixed price?", c: ["Warrant", "Preemptive Right"], a: 0, f: "Logic: Warrants are long-term 'sweeteners' often attached to bond offerings. Rights are very short-term privileges given to existing shareholders to maintain proportionate ownership."},
            {q: "While American Depositary Receipts (ADRs) allow U.S. investors to buy foreign stocks in U.S. dollars, the investor is still subject to:", c: ["Currency Risk", "Interest Rate Risk"], a: 0, f: "Logic: The foreign company pays dividends in its native currency, which the custodian bank then converts to USD. If the foreign currency weakens against the dollar, the dividend shrinks."},
            {q: "Preferred stock behaves most similarly to which of the following securities?", c: ["Common Stock", "Corporate Bonds"], a: 1, f: "Logic: Preferred stock pays a fixed, stated dividend, meaning its market price is highly sensitive to interest rate changes, just like a fixed-income bond."},
            {q: "Convertible corporate bonds typically offer:", c: ["A lower coupon rate than non-convertible bonds", "A higher coupon rate than non-convertible bonds"], a: 0, f: "Logic: Investors accept a lower interest rate on convertible bonds because they receive the added benefit of potentially converting the debt into profitable common stock."},
            {q: "Municipal Revenue Bonds are backed by:", c: ["The full faith, credit, and taxing power of the municipality", "The user fees generated by a specific facility or project"], a: 1, f: "Logic: Revenue bonds rely on the income from the project they funded (like a toll road or hospital). General Obligation (GO) bonds rely on taxes."},
            {q: "Hedge funds are typically structured as:", c: ["Open-End Management Companies", "Limited Partnerships"], a: 1, f: "Logic: Hedge funds use the limited partnership structure to avoid registration under the Investment Company Act of 1940, limiting participation to accredited investors."},
            {q: "Unlike Whole Life insurance, Universal Life insurance provides the policyholder with:", c: ["Flexible premiums and an adjustable death benefit", "A guaranteed minimum cash value and fixed premiums"], a: 0, f: "Logic: Universal Life unbundles the insurance from the savings component, allowing the policyholder to adjust how much they pay in premiums year to year."},
            {q: "In a Variable Life insurance policy, the cash value is tied to the performance of a:", c: ["General Account", "Separate Account"], a: 1, f: "Logic: Variable products shift the investment risk to the policyholder by placing funds in a 'Separate Account' consisting of market-based subaccounts (similar to mutual funds)."},
            {q: "To avoid registration with the SEC under the Securities Act of 1933, Commercial Paper must have a maximum maturity of:", c: ["270 days", "365 days"], a: 0, f: "Logic: Commercial paper is short-term, unsecured corporate debt. If it matures in 270 days (9 months) or less, it is an exempt security."},
            {q: "Which of the following mortgage-backed securities is directly backed by the full faith and credit of the U.S. Government?", c: ["FNMA (Fannie Mae)", "GNMA (Ginnie Mae)"], a: 1, f: "Logic: Ginnie Mae is a wholly owned government corporation. Fannie Mae and Freddie Mac are publicly traded, government-sponsored enterprises (GSEs) with only an 'implied' backing."},
            {q: "The primary investment objective of a Money Market Mutual Fund is:", c: ["Capital appreciation", "Preservation of capital and high liquidity"], a: 1, f: "Logic: Money market funds invest in ultra-safe, short-term debt to maintain a stable Net Asset Value (NAV) of exactly $1.00 per share."},
            {q: "Which type of investment company issues redeemable securities but has no board of directors and an unmanaged portfolio?", c: ["Unit Investment Trust (UIT)", "Exchange-Traded Fund (ETF)"], a: 0, f: "Logic: UITs lock in a fixed portfolio of securities at inception and hold them until the trust terminates. There is no active management or trading."},
            {q: "An investor who writes a Covered Call generates income but gives up the:", c: ["Downside protection on the stock", "Upside appreciation potential of the stock above the strike price"], a: 1, f: "Logic: By selling the call, the investor collects a premium but is obligated to sell their shares at the strike price, capping their maximum possible profit if the stock skyrockets."},
            {q: "Equity-Indexed Annuities typically feature a minimum guaranteed return and potential upside tied to an index, but that upside is often limited by a:", c: ["Surrender charge", "Participation rate or cap"], a: 1, f: "Logic: If the market goes up 10%, an 80% participation rate means the annuity only credits 8%. A cap might restrict maximum gains to 5% regardless of market performance."},
            {q: "Mutual fund 12b-1 fees are legally permitted to be used for:", c: ["Portfolio manager salaries and trading commissions", "Marketing, advertising, and distribution expenses"], a: 1, f: "Logic: 12b-1 fees are effectively the fund charging existing shareholders to market the fund to new potential shareholders."},
            {q: "A corporate issuer is most likely to exercise the 'call' provision on its outstanding bonds when interest rates:", c: ["Fall", "Rise"], a: 0, f: "Logic: If interest rates drop, the company will call (retire) its old, high-interest bonds and issue new bonds at the lower current rates to save money."},
            {q: "An Equity-Linked Note (ELN) is a debt instrument whose return is tied to a stock index. Because it is issued by a financial institution, it carries:", c: ["No risk to principal", "Credit risk"], a: 1, f: "Logic: Despite the word 'equity', an ELN is a promissory note. If the issuing bank goes bankrupt, the investor is an unsecured creditor."},
            {q: "The Net Asset Value (NAV) of an open-end mutual fund is calculated:", c: ["Continuously throughout the trading day", "Once per day, typically at the close of the NYSE"], a: 1, f: "Logic: Mutual funds use 'forward pricing.' All orders placed during the day are executed at the closing NAV computed at 4:00 PM Eastern."},
            {q: "Which alternative investment is most commonly utilized as a hedge against inflation and currency devaluation?", c: ["Precious metals (Gold)", "Long-term Treasury Bonds"], a: 0, f: "Logic: Hard assets like gold tend to retain their value or appreciate when fiat currencies lose their purchasing power due to inflation."},
            {q: "To close out a short put position, an options investor must execute a:", c: ["Closing purchase", "Closing sale"], a: 0, f: "Logic: If you sold (wrote) an option to open the position, you must buy that exact same option back to close it out."},
            {q: "Which options strategy provides an investor with the maximum downside protection for a long stock position?", c: ["Selling a Covered Call", "Buying a Protective Put"], a: 1, f: "Logic: A long put gives the investor the right to sell their stock at a guaranteed strike price, locking in an absolute floor against market crashes."},
            {q: "A corporate bond is callable at 102. The 102 represents a call price of:", c: ["$102", "$1,020"], a: 1, f: "Logic: Bond pricing is quoted as a percentage of par ($1,000). 102% of $1,000 equals $1,020."},
            {q: "Treasury Bills (T-Bills) are issued at a discount to par and mature at:", c: ["Their current market value", "Par value"], a: 1, f: "Logic: T-Bills do not pay regular interest coupons. The investor's return is the difference between the discounted purchase price and the full $1,000 par value at maturity."},
            {q: "What pricing mechanism do open-end investment companies (mutual funds) utilize?", c: ["Forward pricing", "Continuous intraday pricing"], a: 0, f: "Logic: Mutual funds execute all trades based on the next calculated Net Asset Value (NAV), which is typically computed at 4:00 PM Eastern."},
            {q: "Hedge funds often charge a performance fee. The 'high-water mark' provision ensures that:", c: ["The fund always outperforms the S&P 500", "The manager is not paid a performance fee twice for recovering the same losses"], a: 1, f: "Logic: A high-water mark means the fund must exceed its previous highest historical value before the manager can take a cut of the new profits."},
            {q: "In a fixed annuity, the investment risk is strictly borne by the:", c: ["Annuitant", "Insurance company"], a: 1, f: "Logic: Because the insurance company guarantees a fixed rate of return, they take on the market risk within their own general account."},
            {q: "During the payout (annuitization) phase of a variable annuity, the amount of the monthly check:", c: ["Remains constant", "Fluctuates based on the performance of the separate account"], a: 1, f: "Logic: The annuitant owns a fixed number of annuity units, but the underlying monetary value of those units changes based on market performance."},
            {q: "An Equity REIT primarily generates its revenue from:", c: ["Property rents and capital gains from property sales", "Mortgage interest"], a: 0, f: "Logic: Equity REITs own the physical real estate. Mortgage REITs provide the financing and collect the interest."},
            {q: "Which of the following is a primary advantage of a Limited Partnership (DPP)?", c: ["High liquidity", "Limited liability for the limited partners"], a: 1, f: "Logic: Limited partners cannot lose more than their invested capital, but DPPs are notoriously illiquid and hard to sell."},
            {q: "A company announces a 2-for-1 stock split. How does this affect the total value of an investor's position immediately after the split?", c: ["It doubles the value", "It remains entirely unchanged"], a: 1, f: "Logic: The investor has twice as many shares, but each share is mathematically worth exactly half as much. The total pie remains the same size."},
            {q: "Which of the following corporate securities has a stated maturity date?", c: ["Preferred Stock", "Corporate Debenture"], a: 1, f: "Logic: A debenture is an unsecured corporate bond (debt) and has an expiration/maturity date. Equity is perpetual."},
            {q: "The intrinsic value of a Call option is calculated as:", c: ["Current Market Price - Strike Price", "Strike Price - Current Market Price"], a: 0, f: "Logic: A call is 'in the money' (has intrinsic value) if the stock price is higher than the strike price."},
            {q: "A 'Naked' (Uncovered) Call writer is exposed to:", c: ["Limited risk", "Unlimited risk"], a: 1, f: "Logic: Selling a call without actually owning the underlying stock means the investor might have to buy it in the open market at an infinitely high price to fulfill the contract."},
            {q: "A municipality issues a General Obligation (GO) bond. This debt is primarily backed by:", c: ["The revenue of a specific local project", "The taxing power of the municipality"], a: 1, f: "Logic: GO bonds are backed by the 'full faith and credit' (taxes) of the issuer. Revenue bonds are backed by project user fees."},
            {q: "Which of the following debt instruments typically carries the highest credit risk?", c: ["Investment Grade Corporate Bond", "High-Yield (Junk) Bond"], a: 1, f: "Logic: High-yield bonds (rated BB or lower) offer higher interest rates specifically to compensate investors for the elevated risk of default."},
            {q: "Which mutual fund share class typically carries a Contingent Deferred Sales Charge (back-end load)?", c: ["Class A Shares", "Class B Shares"], a: 1, f: "Logic: Class B shares charge a fee when the investor sells the fund, which gradually declines to zero the longer the fund is held."},
            {q: "A mutual fund's expense ratio is calculated by dividing the fund's operating expenses by its:", c: ["Total sales charges", "Average net assets"], a: 1, f: "Logic: The expense ratio reflects the percentage of total fund assets actively used to cover management and administrative costs each year."},
            {q: "A primary advantage of an Exchange-Traded Fund (ETF) over a traditional mutual fund is:", c: ["Guaranteed principal protection", "Intraday tradability"], a: 1, f: "Logic: ETFs trade on an exchange like a stock, allowing investors to buy or sell them continuously throughout the trading day at market prices."},
            {q: "Term life insurance builds cash value at what rate?", c: ["A fixed, guaranteed rate", "Term life does not build cash value"], a: 1, f: "Logic: Term insurance provides pure death benefit protection for a specific period of time. Permanent policies (Whole, Universal, Variable) build cash value."},
            {q: "Policy loans taken from the cash value of a permanent life insurance policy are generally:", c: ["Tax-free", "Taxable as ordinary income"], a: 0, f: "Logic: Because it is a loan (which must be repaid or will be deducted from the death benefit), the IRS does not consider the cash to be taxable income."},
            {q: "A 'Blind Pool' Direct Participation Program is characterized by the fact that:", c: ["The specific assets to be purchased are not yet identified", "The general partner is unknown"], a: 0, f: "Logic: Investors contribute capital 'blindly', trusting the sponsor to find and buy suitable properties or projects later."},
            {q: "Private equity funds generally restrict their investors to:", c: ["Retail investors only", "Accredited and institutional investors"], a: 1, f: "Logic: Due to high risk, lack of liquidity, and lack of SEC registration, PE funds require investors to meet strict wealth and income thresholds."},
            {q: "If an investor is 'Bearish' on the broader market, which options strategy makes the most mathematical sense?", c: ["Buy a Call", "Buy a Put"], a: 1, f: "Logic: A put option gives the investor the right to sell at a set price, allowing them to profit when the underlying stock drops in value."},
            {q: "Commercial paper is typically issued by:", c: ["Large, creditworthy corporations", "Small municipalities"], a: 0, f: "Logic: Commercial paper consists of short-term, unsecured promissory notes used by major corporations to finance immediate, short-term cash needs."},
            {q: "An American Depositary Receipt (ADR) represents ownership of:", c: ["A foreign security trading in U.S. markets", "A U.S. security trading in foreign markets"], a: 0, f: "Logic: ADRs are issued by U.S. custodian banks and represent shares of a foreign company, making it easy for Americans to trade them locally."},
            {q: "The primary purpose of preemptive rights is to allow existing shareholders to:", c: ["Receive guaranteed annual dividends", "Maintain their proportionate ownership in the company"], a: 1, f: "Logic: If a company issues new shares, preemptive rights give current owners the first chance to buy them, preventing their ownership stake from being diluted."},
            {q: "Which of the following is NOT legally classified as an investment company under the 1940 Act?", c: ["Real Estate Investment Trust (REIT)", "Unit Investment Trust (UIT)"], a: 0, f: "Logic: The 1940 Act explicitly defines three types of investment companies: Face-Amount Certificates, UITs, and Management Companies (Open/Closed End). REITs are excluded."},
            {q: "The standard death benefit of a variable annuity guarantees that if the annuitant dies during the accumulation phase, the beneficiary receives:", c: ["The fixed monthly payout amount", "At least the total amount invested"], a: 1, f: "Logic: The standard VA death benefit promises the beneficiary will get back the greater of the current account value or the original principal invested."},
            {q: "A corporate bond quote of 98 1/8 indicates a dollar price of:", c: ["$98.18", "$981.25"], a: 1, f: "Logic: Corporate bonds are quoted in eighths of a point. 1/8 = 0.125. Therefore, 98.125% of $1,000 par equals $981.25."},
            {q: "According to the Investment Company Act of 1940, an open-end mutual fund is strictly prohibited from:", c: ["Borrowing money from a bank", "Issuing preferred stock or bonds"], a: 1, f: "Logic: Open-end funds (mutual funds) can only issue one class of security: common stock. Closed-end funds can issue preferred stock and bonds."},
            {q: "Which of the following investment companies routinely trades at a discount or premium to its Net Asset Value (NAV)?", c: ["Closed-End Fund", "Open-End Fund"], a: 0, f: "Logic: Closed-end funds trade on the secondary market. Their price is driven by investor supply and demand, not the exact mathematical NAV."},
            {q: "To qualify as a 'Regulated Investment Company' under Subchapter M and avoid triple taxation, a mutual fund must distribute at least:", c: ["90% of its Net Investment Income", "98% of its capital gains"], a: 0, f: "Logic: The 90% pass-through rule allows the fund to avoid paying corporate taxes on the income it distributes to shareholders."},
            {q: "Mutual fund Class A shares are generally the most appropriate choice for an investor with a:", c: ["Short time horizon and small capital amount", "Long time horizon and large capital amount"], a: 1, f: "Logic: Class A shares charge an upfront load but have lower annual fees. Large investments qualify for breakpoint discounts, making them ideal for long-term holds."},
            {q: "The primary risk associated with holding Mortgage-Backed Securities (MBS) in a falling interest rate environment is:", c: ["Default Risk", "Prepayment Risk"], a: 1, f: "Logic: When rates drop, homeowners refinance their mortgages. The MBS investor gets their principal back early and must reinvest it at the new, lower interest rates."},
            {q: "Treasury STRIPS are created by separating the principal and interest payments of U.S. Treasuries. As zero-coupon securities, they are highly sensitive to:", c: ["Credit risk", "Interest rate risk"], a: 1, f: "Logic: Zero-coupon bonds have the longest duration, making their market prices extremely volatile when interest rates change."},
            {q: "The 'Time Value' portion of an option's premium is generally at its greatest when the option is:", c: ["Deep in-the-money", "At-the-money"], a: 1, f: "Logic: When an option is exactly at the strike price (at-the-money), the uncertainty of which way the stock will break is highest, maximizing the time premium."},
            {q: "An options trader notes that a call option has a 'Delta' of 0.50. This means that if the underlying stock rises by $1.00, the option's premium is expected to rise by:", c: ["$0.50", "$1.00"], a: 0, f: "Logic: Delta measures how much the option price will move for every $1 change in the underlying stock."},
            {q: "Unlike Whole Life insurance, Universal Life insurance allows the policyholder to adjust:", c: ["The underlying investment subaccounts", "Both the premium payments and the death benefit"], a: 1, f: "Logic: Universal Life is 'flexible'. Variable Life allows adjustment of the subaccounts."},
            {q: "Under securities regulations, the cash value of a Variable Life insurance policy must be calculated at least:", c: ["Daily", "Monthly"], a: 1, f: "Logic: Cash value must be calculated monthly. The separate account unit values are calculated daily, and the death benefit is calculated annually."},
            {q: "The maximum potential loss for a buyer of a put option is:", c: ["The premium paid", "Unlimited"], a: 0, f: "Logic: Option buyers (long positions) can never lose more than what they paid to purchase the contract (the premium)."},
            {q: "Which pooled vehicle typically guarantees a fixed rate of return for life but is NOT classified as a security?", c: ["Fixed Annuity", "Variable Annuity"], a: 0, f: "Logic: Fixed annuities are strictly insurance products because the insurance company bears all the investment risk."},
            {q: "A variable annuity's 'L-shares' are specifically designed for investors who desire:", c: ["The lowest possible M&E expenses", "Shorter surrender charge periods"], a: 1, f: "Logic: L-shares have short surrender periods (e.g., 3-4 years) but compensate the insurer by charging higher ongoing administrative fees."},
            {q: "An investor in the highest federal tax bracket is seeking steady income. The most appropriate fixed-income vehicle is likely a:", c: ["Corporate Bond", "Municipal Bond"], a: 1, f: "Logic: Municipal bond interest is federally tax-free, making it highly valuable for investors in top tax brackets."},
            {q: "The tax-equivalent yield of a 4% municipal bond for an investor in the 32% tax bracket is:", c: ["4.00%", "5.88%"], a: 1, f: "Logic: Tax-Equivalent Yield = Municipal Rate / (100% - Tax Bracket). 4% / (1 - 0.32) = 4% / 0.68 = 5.88%."},
            {q: "Because they are backed by taxes, General Obligation (GO) municipal bonds typically require which of the following before issuance?", c: ["A feasibility study", "Voter approval"], a: 1, f: "Logic: Since the taxpayers will be on the hook for repaying the debt, they generally have to vote to approve the bond issue."},
            {q: "A 'Special Tax Bond' is a type of municipal revenue bond backed by:", c: ["Ad valorem (property) taxes", "Excise taxes on specific items like gasoline or tobacco"], a: 1, f: "Logic: Special tax bonds target specific user taxes rather than general property taxes."},
            {q: "Under the Uniform Securities Act, Section 529 College Savings Plans are legally structured and regulated as:", c: ["Municipal fund securities", "Open-end management companies"], a: 0, f: "Logic: 529 plans are sponsored by individual states, classifying them as municipal securities under the MSRB."},
            {q: "A major benefit of a 529 Plan over a UGMA/UTMA custodial account is that in a 529 Plan:", c: ["The donor retains control over the assets and can change the beneficiary", "The assets automatically transfer to the child at age 18"], a: 0, f: "Logic: UGMA/UTMA accounts become the irrevocable property of the child at the age of majority. 529 donors keep control forever."},
            {q: "Which of the following fixed-income securities is issued at a steep discount to par and pays no semi-annual interest?", c: ["Zero-Coupon Bond", "Treasury Inflation-Protected Security (TIPS)"], a: 0, f: "Logic: Zero-coupon bonds lock in a fixed return based on the discount, eliminating reinvestment risk but maximizing price volatility."},
            {q: "The primary structural difference between an official open-end mutual fund and a Unit Investment Trust (UIT) is that a UIT:", c: ["Trades on an exchange", "Has a fixed, unmanaged portfolio"], a: 1, f: "Logic: UITs buy a static basket of bonds or stocks and hold them until the trust matures. There is no active manager."},
            {q: "'Dark Pools' are private trading networks utilized primarily to:", c: ["Avoid paying taxes on capital gains", "Allow institutions to trade large blocks of stock anonymously without moving the market"], a: 1, f: "Logic: Institutions use dark pools so their massive buy/sell orders don't immediately spike or crash the public exchange prices."},
            {q: "Because of the unique way they are structured and traded, Exchange-Traded Funds (ETFs) typically experience:", c: ["Higher 12b-1 fees than mutual funds", "Fewer taxable capital gains distributions than actively managed mutual funds"], a: 1, f: "Logic: The 'in-kind' creation and redemption process of ETFs prevents them from having to sell stocks for cash to meet redemptions, minimizing forced capital gains."},
            {q: "The intrinsic value of a Put option is calculated mathematically as:", c: ["Strike Price - Current Market Price", "Current Market Price - Strike Price"], a: 0, f: "Logic: A put gives the right to sell. It has intrinsic value (is in-the-money) if the strike price you can sell at is higher than the current market price."},
            {q: "An institutional investor seeking to protect a large, diversified stock portfolio from a systemic market crash should execute which strategy?", c: ["Sell Covered Calls", "Buy S&P 500 Index Puts"], a: 1, f: "Logic: Buying broad index puts acts as a portfolio-wide insurance policy against systemic risk (market crashes)."},
            {q: "Which type of life insurance policy provides a minimum guaranteed death benefit but does NOT provide a guaranteed minimum cash value?", c: ["Variable Life", "Variable Universal Life"], a: 0, f: "Logic: Variable Life guarantees a base death benefit (from the general account) but cash value fluctuates. VUL guarantees absolutely nothing."},
            {q: "A client with a very short-term time horizon of 18 months wants to invest cash for a home down payment. The most appropriate vehicle is a:", c: ["Short-term Corporate Bond Fund", "Money Market Fund"], a: 1, f: "Logic: Any money needed within 1-2 years must prioritize capital preservation over yield. Money market funds maintain a stable $1 NAV."},
            {q: "Bankers' Acceptances (BAs) are short-term credit instruments primarily used by corporations to finance:", c: ["Domestic real estate development", "International trade (imports and exports)"], a: 1, f: "Logic: BAs act like post-dated checks guaranteed by a bank, facilitating trust in cross-border shipping transactions."},
            {q: "A 'Collateral Trust Bond' is a corporate bond secured by:", c: ["Real estate owned by the corporation", "A portfolio of stocks and bonds owned by the issuer"], a: 1, f: "Logic: Mortgage bonds use real estate. Collateral trust bonds use other financial securities held in a trust as backing."},
            {q: "A mutual fund's 'Breakpoint Schedule' is designed to:", c: ["Provide reduced sales charges for larger dollar investments", "Penalize investors for early withdrawals"], a: 0, f: "Logic: Breakpoints are quantity discounts on the front-end load (Class A shares) to incentivize larger deposits."},
            {q: "An investor owns 100 shares of XYZ stock and sells 1 XYZ Call option. This position is known as a:", c: ["Naked Call", "Covered Call"], a: 1, f: "Logic: Because the investor already owns the underlying shares, they are 'covered' and can deliver the stock if the buyer exercises the call."},
