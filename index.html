        c: ["$35,000", "$10,000", "$50,000", "$100,000"],
        a: 0,
        f: "Logic: Financial Requirements. USA rules: Custody = $35k Net Worth. Discretion only = $10k Net Worth."
    },
    {
        q: "An IAR is granted 'Verbal Discretion' over a client's account. According to the North American Securities Administrators Association (NASAA) rules, this verbal authority is valid for:",
        c: [
            "10 business days following the first discretionary trade",
            "48 hours",
            "Until the end of the calendar year",
            "Verbal discretion is never permitted; it must be in writing prior to any trade"
        ],
        a: 0,
        f: "Logic: Verbal Discretion Nuance. Unlike Broker-Dealers (who need it in writing *before* trading), IARs can use verbal discretion for up to 10 business days, after which it must be in writing."
    },
    {
        q: "If an Investment Adviser's 'Net Worth' falls below the state-required minimum, when must the firm notify the Administrator?",
        c: ["By the close of business on the next business day", "Immediately (within 2 hours)", "Within 15 days", "At the time of the annual renewal"],
        a: 0,
        f: "Logic: Notification. This is a 'fiscal emergency'—the Admin must be told by the end of the next business day."
    },
    {
        q: "Which of the following 'Soft Dollar' arrangements between an Investment Adviser and a Broker-Dealer is PERMITTED under Section 28(e) of the Securities Exchange Act of 1934?",
        c: [
            "The BD provides the IA with specialized research reports and analytical software",
            "The BD pays the rent for the IA's office space in exchange for trade flow",
            "The BD provides the IA with new office furniture and computer hardware",
            "The BD pays for the IA's travel and hotel expenses for a conference"],
        a: 0,
        f: "Logic: Soft Dollars. Soft dollars must benefit the CLIENT (research/software helps the IA pick better stocks). Paying for rent, furniture, or travel only benefits the IA and is prohibited."
    },
    {
        q: "An IAR is also a licensed insurance agent. They recommend that a client liquidate a high-quality mutual fund to purchase a high-commission universal life insurance policy. This may be a violation of the 'Fiduciary Duty' unless:",
        c: [
            "The conflict of interest and the commission are fully disclosed to the client in writing",
            "The insurance policy provides a higher death benefit than the mutual fund's value",
            "The client has a net worth of at least $1 million",
            "The IAR waives the investment advisory fee for that quarter"
        ],
        a: 0,
        f: "Logic: Disclosure of Conflict. As a Fiduciary, an IAR can have conflicts, but they MUST be disclosed. If the client knows you're making a commission and still wants the policy, it is permitted."
    },
    {
        q: "A Broker-Dealer executes a series of trades between its own accounts to give the appearance of high trading volume in a specific stock. This prohibited practice is known as:",
        c: ["Painting the Tape", "Front-running", "Shadowing", "Back-dating"],
        a: 0,
        f: "Logic: Market Manipulation. Creating a false appearance of activity (to trick others into buying) is called 'Painting the Tape.' Matching orders between accounts is 'Wash Trading.'"
    },
    {
        q: "An Administrator wishes to conduct an investigation into an IAR suspected of fraud. To gather evidence, the Administrator has the power to:",
        c: [

            "Permanently bar the IAR without providing an opportunity for a hearing",

        c: [
            "3 years from the violation or 2 years from discovery, whichever comes first",

            "10 years regardless of when the violation was discovered",

    {
        q: "If an IAR is found guilty in a criminal court of a 'willful violation' of the Uniform Securities Act, they can face maximum penalties of:",
        c: [
            "A $5,000 fine and 3 years in prison",

            "The Administrator does not have the power to seek criminal penalties"

// --- 2. ENGINE ---
let audioCtx;
let activeSet = [], idx = 0, currentPillar = 0, sessionScore = 0;
let appMode = 'sprint';
let currentScores = [0,0,0,0];

function setMode(m) {
    appMode = m;
    document.getElementById('mode-sprint').className = m === 'sprint' ? 'mode-btn active' : 'mode-btn';
    document.getElementById('mode-sim').className = m === 'sim' ? 'mode-btn active' : 'mode-btn';
}

function start(i) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    currentPillar = i;
    let source = (appMode === 'sim') ? simLib : sprintLib;

    // --- ENSURE THESE NUMBERS ARE IN THIS EXACT ORDER ---
    // i=0 (Econ) -> 8
    // i=1 (Vehicles) -> 17
    // i=2 (Strategy) -> 30
    // i=3 (Regs) -> 45
    let count = (appMode === 'sim') ? [8, 17, 30, 45][i] : 25;
    
    // Safety check to prevent the "10 question" bug
    if (appMode === 'sim' && i === 2) {
        console.log("Simulating Strategy: Pulling 30 questions.");
    }

    // ... rest of your shuffle and slice logic
    activeSet = [...source[i]].sort(() => 0.5 - Math.random()).slice(0, count);
    idx = 0; sessionScore = 0;
    
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    show();
}
function show() {
    const q = activeSet[idx];
    
    // Scramble the button positions (Choice Scrambler)
    let scrambledChoices = q.c.map((text, i) => ({ text, originalIndex: i }));
    scrambledChoices.sort(() => 0.5 - Math.random());

    let h = `<div class="q-text">${q.q}</div>`;
    scrambledChoices.forEach(choice => {
        h += `<button class="ans-btn" onclick="check(${choice.originalIndex}, this)">${choice.text}</button>`;
    });

    document.getElementById('q-area').innerHTML = h;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next').style.display = 'none';
    document.getElementById('status-line').innerText = `${appMode.toUpperCase()} PHASE: GATE ${idx + 1} OF ${activeSet.length}`;
}

function check(selectedIdx, btn) {
    const q = activeSet[idx];
    const isCorrect = (selectedIdx === q.a);
    const btns = document.getElementsByClassName('ans-btn');
    
    if (isCorrect) {
        btn.style.background = "#e8f5e9";
        btn.style.borderColor = "#2e7d32";
        sessionScore++;
        playTone(600, 0.1);
    } else {
        btn.style.background = "#ffebee";
        btn.style.borderColor = "#c62828";
        playTone(200, 0.2);
    }

    document.getElementById('feedback').innerHTML = `<strong>${isCorrect ? '✅ GO' : '❌ ERROR'}</strong>: ${q.f}`;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next').style.display = 'block';
    for (let b of btns) b.disabled = true;
}

function next() {
    idx++;
    if (idx < activeSet.length) show(); else endSession();
}

function endSession() {
    const pct = Math.round((sessionScore / activeSet.length) * 100);
    // Keep the highest score achieved in this session
    currentScores[currentPillar] = Math.max(pct, currentScores[currentPillar]);
    document.getElementById('game').style.display = 'none';
    document.getElementById('menu').style.display = 'block';
    updateFuel();
}

function updateFuel() {
    const avg = Math.round(currentScores.reduce((a,b)=>a+b, 0) / 4);
    document.getElementById('fuel-fill').style.width = avg + '%';
    document.getElementById('total-text').innerText = `FLIGHT READINESS: ${avg}% (GOAL: 73%)`;
    
    currentScores.forEach((s, i) => {
        const el = document.getElementById(`s${i}`);
        // This ensures it says "Ready: 85%" instead of just a raw number like "1"
        el.innerText = s > 0 ? `Ready: ${s}%` : "PENDING";
        el.style.color = s >= 73 ? "#2e7d32" : "#666";
    });

    if (avg >= 73 && currentScores.every(s => s >= 50)) {
        document.getElementById('rocket').classList.add('takeoff');
    }
}
function playTone(freq, dur) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

window.onload = updateFuel;
</script>
