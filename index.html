<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSnd(t){
        if(audioCtx.state==='suspended') audioCtx.resume();
        const time = audioCtx.currentTime;
        if(t==='ok'){
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(523.25, time); o.frequency.setValueAtTime(659.25, time + 0.05); o.frequency.setValueAtTime(783.99, time + 0.1); o.frequency.setValueAtTime(1046.50, time + 0.15); 
            g.gain.setValueAtTime(0.08, time); g.gain.linearRampToValueAtTime(0.08, time + 0.2); g.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
            o.start(time); o.stop(time + 0.4);
        } else if (t==='no') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth'; o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(300, time); o.frequency.exponentialRampToValueAtTime(80, time + 0.3);
            g.gain.setValueAtTime(0.1, time); g.gain.linearRampToValueAtTime(0.001, time + 0.3);
            o.start(time); o.stop(time + 0.3);
        }
    }

    function playCountdown(){
        if(audioCtx.state==='suspended') audioCtx.resume();
        let time = audioCtx.currentTime;
        for(let i=0; i<3; i++) {
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.setValueAtTime(440, time + i);
            g.gain.setValueAtTime(0.1, time + i); g.gain.exponentialRampToValueAtTime(0.001, time + i + 0.2);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(time + i); o.stop(time + i + 0.2);
        }
        let rumble = audioCtx.createOscillator(), rGain = audioCtx.createGain();
        rumble.type = 'sawtooth'; rumble.frequency.setValueAtTime(50, time + 3); rumble.frequency.linearRampToValueAtTime(20, time + 6);
        rGain.gain.setValueAtTime(0, time + 3); rGain.gain.linearRampToValueAtTime(0.4, time + 3.1); rGain.gain.exponentialRampToValueAtTime(0.01, time + 7);
        rumble.connect(rGain); rGain.connect(audioCtx.destination);
        rumble.start(time + 3); rumble.stop(time + 7);
    }
    
    function playSiren(){
        if(audioCtx.state==='suspended') audioCtx.resume();
        let time = audioCtx.currentTime;
        for(let i=0; i<4; i++) {
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth'; o.frequency.setValueAtTime(600, time + (i*0.5)); o.frequency.linearRampToValueAtTime(400, time + (i*0.5) + 0.4);
            g.gain.setValueAtTime(0.2, time + (i*0.5)); g.gain.linearRampToValueAtTime(0.001, time + (i*0.5) + 0.4);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(time + (i*0.5)); o.stop(time + (i*0.5) + 0.4);
        }
    }

            {q: "Which yield calculation is mathematically the lowest for a bond purchased at a premium?", c: ["Yield to Call (YTC)", "Yield to Maturity (YTM)", "Current Yield", "Coupon Rate"], a: 0, f: "Logic: YTC is the worst-case scenario for a premium bond. It assumes the investor loses the premium over the shortest possible time period."},
            {q: "The 'Efficient Frontier' is a graphical line representing portfolios that offer:", c: ["The highest possible return for a given level of risk", "The absolute lowest amount of systematic risk", "A guaranteed return above the risk-free rate", "The lowest correlation to the S&P 500"], a: 0, f: "Logic: Portfolios that fall exactly on the Efficient Frontier line are considered optimally diversified under Modern Portfolio Theory."},
            {q: "Which specific risk is reduced by adding non-correlated assets to a portfolio?", c: ["Selection / Unsystematic Risk", "Market / Systematic Risk", "Interest Rate Risk", "Purchasing Power Risk"], a: 0, f: "Logic: Diversification eliminates specific (unsystematic) risk. Systemic market risk cannot be diversified away."},
            {q: "If interest rates in the broad economy rise, the Present Value of a bond's future cash flows will:", c: ["Fall", "Rise", "Remain unchanged", "Increase proportionally to the inflation rate"], a: 0, f: "Logic: A higher discount rate mathematically makes fixed future cash flows worth less today, driving the bond's price down."},
            {q: "Gross Domestic Product (GDP) is typically measured by economists in:", c: ["Constant dollars (Real GDP)", "Current unadjusted dollars", "Euros or foreign currency equivalents", "Nominal, tax-adjusted dollars"], a: 0, f: "Logic: Real GDP (adjusted for inflation using constant dollars) is the standard for measuring true economic growth."},
            {q: "Which of the following occurrences would be considered a 'Leading' economic indicator that predicts a future rise in retail consumer inflation?", c: ["Rising commodity prices and an increasing PPI", "An increase in overall consumer spending habits", "A drop in the Federal Funds Rate", "A rise in the unemployment rate"], a: 0, f: "Logic: Increased costs at the wholesale/producer level (PPI) eventually get passed down to the consumer (CPI)."},
            {q: "The 'Risk-Free' rate of return is virtually always based on the yield of:", c: ["91-day U.S. Treasury Bills", "AAA-rated Corporate Bonds", "10-year U.S. Treasury Notes", "The Federal Funds Rate"], a: 0, f: "Logic: T-Bills have zero default risk and, because of their extremely short duration, virtually zero interest rate risk."},
            {q: "If an Investment Adviser recommends a 'Buy and Hold' strategy, they are executing a form of:", c: ["Strategic Asset Allocation", "Tactical Asset Allocation", "Sector Rotation", "Momentum Investing"], a: 0, f: "Logic: Strategic allocation is a long-term, passive mix that is periodically rebalanced, ignoring short-term market noise."},
            {q: "Which of the following items is classified on a corporate balance sheet as a 'Current Liability'?", c: ["Accounts Payable", "A 30-year Mortgage on a factory", "Common Stock", "Retained Earnings"], a: 0, f: "Logic: Accounts Payable is a short-term bill due to suppliers within one year, making it a current liability."},
            {q: "If the Federal Reserve SELLS Treasury securities in the open market, the U.S. money supply will:", c: ["Contract", "Expand", "Remain unchanged", "Expand immediately, then contract"], a: 0, f: "Logic: The Fed takes cash out of the banks and replaces it with paper securities, tightening the supply of money available to lend."},
            {q: "A company's 'Net Income' (total profit) is found on which of the following corporate financial statements?", c: ["Income Statement", "Balance Sheet", "Statement of Cash Flows", "Statement of Retained Earnings"], a: 0, f: "Logic: Net Income is the 'Bottom Line' of the Profit & Loss (Income) Statement."},
            {q: "Which of the following interest rates is considered the most volatile and subject to daily fluctuations?", c: ["Federal Funds Rate", "Prime Rate", "Discount Rate", "Broker Call Loan Rate"], a: 0, f: "Logic: The Fed Funds Rate changes daily based on the immediate, overnight lending needs between commercial banks."},
            {q: "A 'Growth' investor is primarily focused on seeking out a company that exhibits:", c: ["Earnings momentum and future acceleration", "A high dividend yield", "A low Price-to-Earnings (P/E) ratio", "A low Price-to-Book (P/B) ratio"], a: 0, f: "Logic: Growth investors don't care about current dividends or paying a high premium; they are buying the belief that the company will grow exponentially."},
            {q: "Which of the following risks is most deeply associated with a 10-year U.S. Treasury Note?", c: ["Interest Rate Risk", "Credit Risk", "Liquidity Risk", "Financial Risk"], a: 0, f: "Logic: U.S. Treasuries have no default (credit) risk, but their prices will drop significantly if broad interest rates rise."},
            {q: "When determining a corporation's ability to pay debts maturing within the next 30 to 90 days, an analyst should look at the:", c: ["Quick ratio (Acid-test ratio)", "Current ratio", "Debt-to-equity ratio", "Inventory turnover ratio"], a: 0, f: "Logic: The Quick ratio excludes inventory (which can take months to sell), making it the best test for immediate liquidity."},
            {q: "To accurately find an investment's Internal Rate of Return (IRR), an analyst must explicitly know the:", c: ["Timing and amount of positive and negative cash flows", "Current risk-free rate of return", "Market Risk Premium", "Beta of the investment"], a: 0, f: "Logic: IRR purely evaluates the mathematical timing of money entering and exiting the investment to find the break-even discount rate."},
            {q: "The S&P 500 Index utilizes which type of weighting methodology?", c: ["Capitalization-weighted", "Price-weighted", "Equal-weighted", "Revenue-weighted"], a: 0, f: "Logic: The S&P 500 is market-cap weighted (Total Shares x Price). The Dow Jones Industrial Average is purely price-weighted."},
            {q: "Which form of the Efficient Market Hypothesis (EMH) asserts that technical analysis (charting) is of absolutely no benefit to an investor?", c: ["Weak-form efficiency", "Strong-form efficiency", "Semi-strong efficiency", "All forms of the EMH assert this"], a: 0, f: "Logic: Weak-form EMH explicitly targets technical analysis, arguing that past prices and volume are already fully baked into today's price."},
            {q: "Under the Capital Asset Pricing Model (CAPM), investment risk is mathematically defined as:", c: ["Deviation in returns (Variance or Volatility)", "The potential for a total loss of principal", "The likelihood of corporate bankruptcy", "The impact of inflation over time"], a: 0, f: "Logic: CAPM and MPT treat 'risk' strictly as volatility—how much the returns bounce around the expected average."},
            {q: "The term 'Working Capital' is an indicator of a company's short-term financial health. How is it calculated?", c: ["Current Assets minus Current Liabilities", "Total Assets minus Total Liabilities", "Current Assets divided by Current Liabilities", "Net Income divided by Total Equity"], a: 0, f: "Logic: Working capital is a raw dollar figure representing the cash left over if the company paid all its short-term bills today."},
            {q: "Which of the following best describes 'Systematic Risk'?", c: ["The risk that a market crash will drag down all investments in a specific asset class", "The risk that a company's CEO will be indicted for fraud", "The risk that a bond issuer will default on its interest payments", "The risk that an investor cannot sell their shares quickly"], a: 0, f: "Logic: Systematic (Market) risk impacts the entire system and cannot be diversified away."},
            {q: "A 'Defensive' stock is generally characterized by its ability to:", c: ["Remain stable and maintain demand during economic recessions", "Outperform the market during periods of rapid economic expansion", "Provide massive capital gains during a bull market", "Move with a Beta significantly higher than 1.0"], a: 0, f: "Logic: Defensive stocks (Utilities, Groceries, Basic Medicine) have inelastic demand. People must buy them regardless of how bad the economy gets."},
            {q: "If an investor is executing an 'Arbitrage' strategy, they are attempting to:", c: ["Simultaneously buy and sell the same asset in different markets to capture a riskless profit from a price discrepancy", "Hedge a long stock position against a market crash by buying puts", "Actively time the market by shifting between sectors", "Buy undervalued companies and hold them for long-term gains"], a: 0, f: "Logic: Arbitrage exploits momentary pricing errors, buying low on Exchange A and instantly selling high on Exchange B."},
            {q: "Which of the following actions by the Federal Reserve would be considered a 'Tightening' of monetary policy?", c: ["Raising the Discount Rate", "Lowering the Reserve Requirement", "Buying U.S. Treasury securities", "Lowering the Federal Funds Target Rate"], a: 0, f: "Logic: Raising rates makes borrowing more expensive, tightening the money supply to combat inflation."},
            {q: "A stock's P/E ratio is currently 20. If the company's Earnings Per Share (EPS) is $2.00, what is the current market price of the stock?", c: ["$40.00", "$10.00", "$20.00", "$42.00"], a: 0, f: "Logic: Price = P/E Ratio multiplied by the EPS. ($20 x 2) = $40."},
            {q: "The Producer Price Index (PPI) is an important economic gauge because it measures inflation at the:", c: ["Wholesale and manufacturer level", "Retail and consumer level", "Federal government spending level", "International import and export level"], a: 0, f: "Logic: PPI tracks the costs producers face before the goods hit the retail market. It is a leading indicator for the CPI."},
            {q: "An investor calculates the 'Current Yield' of a bond by dividing the annual coupon payment by the:", c: ["Current Market Price", "Par Value of the bond", "Yield to Maturity", "Original purchase price"], a: 0, f: "Logic: Current yield tells you what the bond is paying you right now based on what it would cost to buy it today."},
            {q: "Which of the following investments is virtually immune to 'Purchasing Power Risk' (Inflation Risk)?", c: ["Treasury Inflation-Protected Securities (TIPS)", "A 30-year U.S. Treasury Bond", "A Fixed Annuity", "A high-yield corporate bond"], a: 0, f: "Logic: TIPS directly adjust their principal upward to match the Consumer Price Index (CPI), completely neutralizing the threat of inflation."},
            {q: "When an analyst utilizes a 'Bottom-Up' approach to fundamental analysis, they begin their research by examining:", c: ["The specific company's balance sheet and management team", "The overall global macroeconomic environment", "The regulatory environment of the specific sector", "The direction of the Federal Funds Rate"], a: 0, f: "Logic: Bottom-Up ignores the broad economy and focuses strictly on finding fundamentally sound companies one by one."},
            {q: "A 'Sector Rotation' strategy is a form of active management that attempts to:", c: ["Shift investments between different industries to stay ahead of the business cycle", "Maintain a strict 60/40 mix of stocks and bonds regardless of the economy", "Buy and hold utility stocks for maximum dividend income", "Eliminate all systematic risk from a portfolio"], a: 0, f: "Logic: Sector rotation anticipates the next phase of the economy (e.g., buying consumer staples right before a recession hits)."},
            {q: "If an investor sells a security for a capital gain, the 'Total Return' on that investment includes the capital gain plus:", c: ["All dividends or interest received during the holding period", "The inflation rate during the holding period", "The tax savings generated by the sale", "The risk premium of the asset"], a: 0, f: "Logic: Total return must encompass both the yield (cash flow) and the price appreciation over the entire time it was held."},
            {q: "A company's 'Net Worth' is found on its Balance Sheet and is calculated by:", c: ["Subtracting Total Liabilities from Total Assets", "Subtracting Current Liabilities from Current Assets", "Adding Long-Term Debt to Shareholders' Equity", "Dividing Net Income by Outstanding Shares"], a: 0, f: "Logic: Net Worth represents the total equity remaining in the business if it paid off absolutely all of its debts today."},
            {q: "Which of the following indicators is considered a 'Leading' economic indicator that anticipates where the economy is headed?", c: ["Building permits for new private housing", "Average duration of unemployment", "Industrial Production", "The Consumer Price Index (CPI)"], a: 0, f: "Logic: Builders pull permits months before they actually start building or hiring, signaling future economic activity."},
            {q: "The 'Hurdle Rate' used in corporate finance is another term for the company's:", c: ["Required Rate of Return", "Internal Rate of Return (IRR)", "Current Yield", "Expected Return under CAPM"], a: 0, f: "Logic: The Hurdle Rate is the absolute minimum return a project must generate to justify the investment of capital."},
            {q: "A high 'Inventory-to-Sales' ratio is generally viewed by economists as a:", c: ["Leading negative indicator", "Leading positive indicator", "Lagging positive indicator", "Coincident neutral indicator"], a: 0, f: "Logic: If inventory is stacking up in warehouses while sales are dropping, it signals that consumer demand is slowing down and a contraction may follow."},
            {q: "Which of the following describes the psychological bias where an investor irrationally overvalues an asset simply because they own it?", c: ["Endowment effect", "Anchoring bias", "Confirmation bias", "Hindsight bias"], a: 0, f: "Logic: The endowment effect makes people demand much more money to sell an object than they would actually be willing to pay to buy it."},
            {q: "A stock with a Beta of 0.8 is expected to be:", c: ["20% less volatile than the overall market", "20% more volatile than the overall market", "Negatively correlated to the market", "Expected to return 8% annually"], a: 0, f: "Logic: A Beta of 1.0 represents the market baseline. A Beta of 0.8 means the stock is historically 20% less 'bouncy' than the S&P 500."},
            {q: "Which of the following is considered an 'Unsystematic' risk factor?", c: ["A massive accounting scandal at a specific corporation", "A sudden spike in the Federal Funds Rate", "A nationwide recession", "A declaration of war"], a: 0, f: "Logic: Unsystematic risk is localized to a single entity and can be diversified away. Systemic risk (interest rates, war, inflation) hits everything."},
            {q: "To calculate the 'Real' rate of return on an investment, an analyst must take the nominal return and subtract:", c: ["The inflation rate (CPI)", "The risk-free rate", "The Beta of the asset", "The corporate tax rate"], a: 0, f: "Logic: 'Real' always means adjusted for inflation. It measures your true, functional increase in purchasing power."},
            {q: "The 'Rule of 72' is a mathematical shortcut used to determine:", c: ["How many years it will take an investment to double in value at a given compound interest rate", "The maximum allowable withdrawal rate for a retirement portfolio", "The exact yield to maturity of a discounted bond", "The expected return of a stock under the Capital Asset Pricing Model"], a: 0, f: "Logic: Divide 72 by the annual interest rate to find the exact number of years it takes to double your money."},
            {q: "Which of the following occurrences would cause a company's 'Working Capital' to DECREASE?", c: ["Paying a cash dividend to shareholders", "Selling long-term corporate bonds for cash", "Converting short-term debt into long-term debt", "Selling inventory at a massive profit"], a: 0, f: "Logic: Working Capital = Current Assets - Current Liabilities. Paying a dividend drains cash (a current asset), which mathematically shrinks the working capital."},
            {q: "In an ERISA 'Defined Benefit' plan (a traditional pension), who bears the primary investment risk of the portfolio?", c: ["The Employer", "The Employee", "The Plan Administrator", "The Pension Benefit Guaranty Corporation (PBGC)"], a: 0, f: "Logic: The employer guarantees a specific monthly payout for life. If the stock market crashes, the employer is legally forced to make up the shortfall."},
            {q: "An investor with a deeply negative correlation (-0.85) between two assets in their portfolio has successfully executed a strategy to:", c: ["Maximize diversification and smooth out overall volatility", "Amplify their exposure to systemic market risk", "Guarantee a return higher than the risk-free rate", "Eliminate all taxation on capital gains"], a: 0, f: "Logic: Highly negative correlation means the assets zig when the other zags, which is the ultimate goal of diversification to reduce risk."},
            {q: "Which of the following provides the most accurate definition of the 'Gross Domestic Product' (GDP)?", c: ["The total market value of all final goods and services produced within a country's borders in a given year", "The total value of all goods produced by a country's citizens, regardless of where they live", "The total sum of all retail sales in the domestic economy", "The net value of all exports minus all imports"], a: 0, f: "Logic: GDP is strictly geographic (within the borders). GNP (Gross National Product) tracks the citizens worldwide."},
            {q: "When comparing the arithmetic mean to the geometric mean of an investment's historical returns, the geometric mean will generally be:", c: ["Lower, because it accounts for the compounding drag of negative returns", "Higher, because it ignores volatility", "Identical, assuming the investment paid no dividends", "Higher, because it adjusts for the inflation rate"], a: 0, f: "Logic: The geometric mean uses multiplication (compounding) to show the true, real-world return of a dollar invested, which is almost always lower than the simple arithmetic average."},
            {q: "If an investor is executing an 'Arbitrage' strategy, they are attempting to:", c: ["Simultaneously buy and sell the same asset in different markets to capture a riskless profit from a price discrepancy", "Hedge a long stock position against a market crash", "Actively time the market by shifting between sectors", "Buy undervalued companies and hold them for long-term gains"], a: 0, f: "Logic: Arbitrage exploits momentary pricing errors, buying low on Exchange A and instantly selling high on Exchange B."},
            {q: "A 'Venture Capital' firm generally seeks to invest its pooled capital in:", c: ["Early-stage, unproven start-ups with massive growth potential", "Mature, blue-chip corporations paying high dividends", "Municipal infrastructure projects", "Distressed, bankrupt corporations facing liquidation"], a: 0, f: "Logic: VC funds provide 'seed' money to brand new companies in exchange for a large equity stake, accepting incredibly high risk for massive potential reward."},
            {q: "Under the USA, a 'Solicitor' who receives cash compensation for referring clients to an Investment Adviser must generally:", c: ["Have a written agreement with the IA", "Register as a Broker-Dealer Agent", "Waive their right to act as a fiduciary", "Be an accredited investor"], a: 0, f: "Logic: There must be a clear paper trail and written disclosure to the client acknowledging the referral fee arrangement."},
            {q: "Which of the following is NOT required to be detailed in a written Investment Advisory Contract under the USA?", c: ["A guarantee that the client's principal will not decrease in value", "The specific formula used to compute the advisory fee", "A clause stating the contract cannot be assigned without consent", "Notification of whether the adviser has discretionary power"], a: 0, f: "Logic: Contracts must show the fee formula, confirm there are no performance fees, and state that the contract won't be assigned. They can NEVER contain a guarantee against loss."},
            {q: "An agent executing a trade for a client believes the stock is about to surge. The agent purchases 100 shares for their own personal account at 10:00 AM, and then executes the client's 10,000-share buy order at 10:05 AM. This violates the prohibition against:", c: ["Front running", "Matched orders", "Painting the tape", "Churning"], a: 0, f: "Logic: The agent knew the massive client order would drive the price up. Buying personal shares immediately beforehand to capture that guaranteed profit is textbook front running."},
            {q: "If a Broker-Dealer wishes to charge a client a 'markup' instead of a 'commission', the Broker-Dealer must execute the trade:", c: ["Out of its own inventory, acting as a Principal", "By routing the trade to a third-party exchange, acting as an Agent", "Through a dark pool without public disclosure", "Only with institutional clients"], a: 0, f: "Logic: Markups and Markdowns are the profit margin when a firm acts as a Dealer/Principal (buying and selling from their own shelves). Commissions are charged when acting as a Broker/Agent."},
            {q: "Under the Uniform Securities Act, an individual who represents an issuer in the sale of a security is an 'Agent' EXCEPT when selling:", c: ["Exempt securities, executing exempt transactions, or selling to existing employees without commission", "Mutual funds to retail clients", "Corporate bonds to wealthy accredited investors", "Initial Public Offerings (IPOs)"], a: 0, f: "Logic: Representing a company to sell its own safe (exempt) bonds, executing private (exempt) trades, or giving stock options to employees for free doesn't make you a stockbroker."},
            {q: "A financial planner charges a flat fee of $2,500 to create a comprehensive financial plan that includes specific mutual fund recommendations. Under the USA, this planner:", c: ["Must register as an Investment Adviser because they provide advice on securities for compensation", "Is exempt from registration if they do not execute the actual trades", "Must register as a Broker-Dealer Agent", "Is excluded from registration under the L.A.T.E. exemption"], a: 0, f: "Logic: The ABC test: Advice, Business, Compensation. If you charge a fee for a plan that tells someone which securities to buy, you are an Investment Adviser, regardless of who executes the trade."},
            {q: "Which of the following actions by an Investment Adviser Representative (IAR) constitutes an illegal 'Breach of Fiduciary Duty'?", c: ["Recommending an affiliated broker-dealer to execute trades without disclosing the conflict of interest", "Refusing to accept a client who requests an aggressive day-trading strategy", "Charging a 1.5% AUM fee instead of an hourly rate", "Delegating the execution of trades to a registered assistant"], a: 0, f: "Logic: Fiduciaries must have undivided loyalty. Steering clients to a sister company where the firm makes double the money without telling the client is a massive breach of trust."},
            {q: "Under the USA, if a client is declared legally incompetent by a judge, the client's agent must:", c: ["Cancel all pending open orders and wait for instructions from a court-appointed conservator or guardian", "Continue trading the account using their best judgment", "Immediately liquidate the account and mail the check to the client's address", "Transfer the account to the client's nearest living relative"], a: 0, f: "Logic: Legal incompetence instantly freezes the account. The agent cannot take instructions from the client or trade the account until a legally appointed guardian takes over."},
            {q: "According to the USA, an Administrator may deny an applicant's registration if, within the past 10 years, the applicant was convicted of:", c: ["Any felony, or any misdemeanor involving securities, finance, or fraud", "Any misdemeanor, including a minor traffic violation", "A civil lawsuit involving a breach of contract", "A felony conviction 15 years ago"], a: 0, f: "Logic: The 'Statutory Disqualification' rule looks back exactly 10 years. It flags ALL felonies, but only flags misdemeanors if they specifically involve money, fraud, or securities."},
            {q: "Congratulations. You have completed the final calibration sequence for the Series 66 exam. The primary function of the Uniform Securities Act is to:", c: ["Protect the investing public from fraud and ensure financial professionals operate with complete integrity", "Guarantee that all registered securities will be profitable", "Ensure that broker-dealers maximize their corporate profits", "Eliminate all systematic risk from the financial markets"], a: 0, f: "Logic: MISSION ACCOMPLISHED. The regulators exist to protect the public. By mastering these 400 questions, you have proven you are ready. Go pass the Series 66 on April 19th."}
        ],
[ // PILLAR 2: VEHICLES (HARDCODED DISTRACTORS)
            {q: "Which of the following investment vehicles exposes the investor to the credit risk of the issuing financial institution?", c: ["Exchange-Traded Note (ETN)", "Exchange-Traded Fund (ETF)", "Real Estate Investment Trust (REIT)", "Unit Investment Trust (UIT)"], a: 0, f: "Logic: ETNs are unsecured debt instruments (notes) issued by a bank. If the bank defaults, the investor could lose their money, regardless of the underlying index's performance."},
            {q: "A Real Estate Investment Trust (REIT) is structurally designed to pass through:", c: ["Income only", "Both income and losses", "Losses only", "Neither income nor losses"], a: 0, f: "Logic: REITs avoid taxation at the corporate level by passing at least 90% of their income to shareholders, but unlike Direct Participation Programs (DPPs), they cannot pass through losses."},
            {q: "A Letter of Intent (LOI) allows a mutual fund investor to receive a breakpoint discount by committing to a total investment amount over a maximum period of:", c: ["13 months", "24 months", "12 months", "36 months"], a: 0, f: "Logic: An LOI is valid for 13 months and can typically be backdated up to 90 days to include past purchases."},
            {q: "Unlike open-end mutual funds, the market price of a closed-end fund is determined by:", c: ["Supply and demand on the exchange", "The daily calculation of Net Asset Value (NAV)", "The fund's board of directors", "The underwriter's fixed offering price"], a: 0, f: "Logic: Closed-end funds issue a fixed number of shares that trade on an exchange. Therefore, they can trade at a premium or discount to their actual NAV based on market demand."},
            {q: "During the accumulation phase of a variable annuity, the number of accumulation units owned by the investor:", c: ["Increases with each additional premium contribution", "Remains fixed, while the value fluctuates", "Decreases as mortality charges are deducted", "Converts to annuity units annually"], a: 0, f: "Logic: When you put more money into a variable annuity during the accumulation phase, you are buying more accumulation units. When you annuitize, those become a fixed number of annuity units."},
            {q: "An investor heavily concentrated in a single large-cap stock wants to protect against a near-term drop in price. The best option strategy is to:", c: ["Buy a Put", "Sell a Call", "Buy a Call", "Sell a Put"], a: 0, f: "Logic: Buying a put acts as an insurance policy (a 'protective put'), giving the investor the right to sell the stock at a set strike price if the market crashes."},
            {q: "A viatical settlement involves the sale of a life insurance policy by a policyholder who is:", c: ["Terminally ill", "Entering retirement and needs liquidity", "Experiencing a temporary financial hardship", "Seeking a tax-free 1035 exchange"], a: 0, f: "Logic: Viatical settlements are specifically for terminally ill policyholders (typically with less than 24 months to live) who sell their policy to a third party for an immediate lump sum."},
            {q: "The annual imputed interest on a zero-coupon corporate bond that an investor must report for tax purposes is known as:", c: ["Phantom income", "Capital gains", "Tax-free yield", "Deferred compensation"], a: 0, f: "Logic: Even though the investor receives no actual cash until maturity, the IRS taxes the annual accreted value of the discount as 'phantom' ordinary income each year."},
            {q: "The principal value of a Treasury Inflation-Protected Security (TIPS) is adjusted semi-annually based on the:", c: ["Consumer Price Index (CPI)", "Federal Funds Rate", "Producer Price Index (PPI)", "Gross Domestic Product (GDP)"], a: 0, f: "Logic: TIPS protect purchasing power by adjusting the underlying principal upward with the CPI. The fixed interest rate is then paid on that higher principal amount."},
            {q: "Mutual fund Class C shares are generally characterized by having:", c: ["A level load (ongoing 12b-1 fees) and no front-end load", "A front-end sales load and low 12b-1 fees", "A Contingent Deferred Sales Charge (CDSC) that drops to zero over 7 years", "No 12b-1 fees and no front-end load"], a: 0, f: "Logic: Class C shares do not charge an upfront fee but have significantly higher annual expense ratios (12b-1 fees), making them better for short-term holds."},
            {q: "An options investor expects extreme volatility in a stock following an upcoming earnings announcement, but is unsure of the direction. The best strategy is a:", c: ["Straddle", "Covered Call", "Credit Spread", "Protective Put"], a: 0, f: "Logic: A straddle involves buying both a Call and a Put at the same strike price and expiration. The investor profits if the stock makes a massive move in *either* direction."},
            {q: "Which of the following derivatives gives the holder a long-term right to purchase common stock at a fixed price?", c: ["Warrant", "Preemptive Right", "Call Option", "Convertible Bond"], a: 0, f: "Logic: Warrants are long-term 'sweeteners' often attached to bond offerings. Rights are very short-term privileges given to existing shareholders to maintain proportionate ownership."},
            {q: "While American Depositary Receipts (ADRs) allow U.S. investors to buy foreign stocks in U.S. dollars, the investor is still subject to:", c: ["Currency Risk", "Interest Rate Risk", "Liquidity Risk", "Registration Risk"], a: 0, f: "Logic: The foreign company pays dividends in its native currency, which the custodian bank then converts to USD. If the foreign currency weakens against the dollar, the dividend shrinks."},
            {q: "Preferred stock behaves most similarly to which of the following securities?", c: ["Corporate Bonds", "Common Stock", "Warrants", "Mutual Funds"], a: 0, f: "Logic: Preferred stock pays a fixed, stated dividend, meaning its market price is highly sensitive to interest rate changes, just like a fixed-income bond."},
            {q: "Convertible corporate bonds typically offer:", c: ["A lower coupon rate than non-convertible bonds", "A higher coupon rate than non-convertible bonds", "A variable interest rate tied to the stock price", "Shorter maturities than non-convertible bonds"], a: 0, f: "Logic: Investors accept a lower interest rate on convertible bonds because they receive the added benefit of potentially converting the debt into profitable common stock."},
            {q: "Municipal Revenue Bonds are backed by:", c: ["The user fees generated by a specific facility or project", "The full faith, credit, and taxing power of the municipality", "Ad valorem (property) taxes", "The federal government"], a: 0, f: "Logic: Revenue bonds rely on the income from the project they funded (like a toll road or hospital). General Obligation (GO) bonds rely on taxes."},
            {q: "Hedge funds are typically structured as:", c: ["Limited Partnerships", "Open-End Management Companies", "Unit Investment Trusts", "Real Estate Investment Trusts"], a: 0, f: "Logic: Hedge funds use the limited partnership structure to avoid registration under the Investment Company Act of 1940, limiting participation to accredited investors."},
            {q: "Unlike Whole Life insurance, Universal Life insurance provides the policyholder with:", c: ["Flexible premiums and an adjustable death benefit", "A guaranteed minimum cash value and fixed premiums", "The ability to direct funds into separate market subaccounts", "A guaranteed flat dividend each year"], a: 0, f: "Logic: Universal Life unbundles the insurance from the savings component, allowing the policyholder to adjust how much they pay in premiums year to year."},
            {q: "In a Variable Life insurance policy, the cash value is tied to the performance of a:", c: ["Separate Account", "General Account", "Trust Account", "Guaranteed Minimum Income Account"], a: 0, f: "Logic: Variable products shift the investment risk to the policyholder by placing funds in a 'Separate Account' consisting of market-based subaccounts (similar to mutual funds)."},
            {q: "To avoid registration with the SEC under the Securities Act of 1933, Commercial Paper must have a maximum maturity of:", c: ["270 days", "365 days", "90 days", "180 days"], a: 0, f: "Logic: Commercial paper is short-term, unsecured corporate debt. If it matures in 270 days (9 months) or less, it is an exempt security."},
            {q: "Which of the following mortgage-backed securities is directly backed by the full faith and credit of the U.S. Government?", c: ["GNMA (Ginnie Mae)", "FNMA (Fannie Mae)", "FHLMC (Freddie Mac)", "SLMA (Sallie Mae)"], a: 0, f: "Logic: Ginnie Mae is a wholly owned government corporation. Fannie Mae and Freddie Mac are publicly traded, government-sponsored enterprises (GSEs) with only an 'implied' backing."},
            {q: "The primary investment objective of a Money Market Mutual Fund is:", c: ["Preservation of capital and high liquidity", "Capital appreciation", "Tax-free income", "Aggressive growth"], a: 0, f: "Logic: Money market funds invest in ultra-safe, short-term debt to maintain a stable Net Asset Value (NAV) of exactly $1.00 per share."},
            {q: "Which type of investment company issues redeemable securities but has no board of directors and an unmanaged portfolio?", c: ["Unit Investment Trust (UIT)", "Exchange-Traded Fund (ETF)", "Closed-End Fund", "Face-Amount Certificate Company"], a: 0, f: "Logic: UITs lock in a fixed portfolio of securities at inception and hold them until the trust terminates. There is no active management or trading."},
            {q: "An investor who writes a Covered Call generates income but gives up the:", c: ["Upside appreciation potential of the stock above the strike price", "Downside protection on the stock", "Voting rights associated with the stock", "Ability to collect dividends from the stock"], a: 0, f: "Logic: By selling the call, the investor collects a premium but is obligated to sell their shares at the strike price, capping their maximum possible profit if the stock skyrockets."},
            {q: "Equity-Indexed Annuities typically feature a minimum guaranteed return and potential upside tied to an index, but that upside is often limited by a:", c: ["Participation rate or cap", "Surrender charge", "Mortality and expense (M&E) fee", "Stepped-up basis"], a: 0, f: "Logic: If the market goes up 10%, an 80% participation rate means the annuity only credits 8%. A cap might restrict maximum gains to 5% regardless of market performance."},
            {q: "Mutual fund 12b-1 fees are legally permitted to be used for:", c: ["Marketing, advertising, and distribution expenses", "Portfolio manager salaries and trading commissions", "Legal and accounting fees", "Creating new share classes"], a: 0, f: "Logic: 12b-1 fees are effectively the fund charging existing shareholders to market the fund to new potential shareholders."},
            {q: "A corporate issuer is most likely to exercise the 'call' provision on its outstanding bonds when interest rates:", c: ["Fall", "Rise", "Remain highly volatile", "Are perfectly stable"], a: 0, f: "Logic: If interest rates drop, the company will call (retire) its old, high-interest bonds and issue new bonds at the lower current rates to save money."},
            {q: "An Equity-Linked Note (ELN) is a debt instrument whose return is tied to a stock index. Because it is issued by a financial institution, it carries:", c: ["Credit risk", "No risk to principal", "Reinvestment risk", "Systematic risk only"], a: 0, f: "Logic: Despite the word 'equity', an ELN is a promissory note. If the issuing bank goes bankrupt, the investor is an unsecured creditor."},
            {q: "The Net Asset Value (NAV) of an open-end mutual fund is calculated:", c: ["Once per day, typically at the close of the NYSE", "Continuously throughout the trading day", "Weekly on Friday afternoons", "Only when a shareholder requests a redemption"], a: 0, f: "Logic: Mutual funds use 'forward pricing.' All orders placed during the day are executed at the closing NAV computed at 4:00 PM Eastern."},
            {q: "Which alternative investment is most commonly utilized as a hedge against inflation and currency devaluation?", c: ["Precious metals (Gold)", "Long-term Treasury Bonds", "Preferred Stock", "Corporate Debentures"], a: 0, f: "Logic: Hard assets like gold tend to retain their value or appreciate when fiat currencies lose their purchasing power due to inflation."},
            {q: "To close out a short put position, an options investor must execute a:", c: ["Closing purchase", "Closing sale", "Opening sale", "Exercise notice"], a: 0, f: "Logic: If you sold (wrote) an option to open the position, you must buy that exact same option back to close it out."},
            {q: "Which options strategy provides an investor with the maximum downside protection for a long stock position?", c: ["Buying a Protective Put", "Selling a Covered Call", "Buying a Call", "Selling a Naked Put"], a: 0, f: "Logic: A long put gives the investor the right to sell their stock at a guaranteed strike price, locking in an absolute floor against market crashes."},
            {q: "A corporate bond is callable at 102. The 102 represents a call price of:", c: ["$1,020", "$102", "$1,002", "$10.20"], a: 0, f: "Logic: Bond pricing is quoted as a percentage of par ($1,000). 102% of $1,000 equals $1,020."},
            {q: "Treasury Bills (T-Bills) are issued at a discount to par and mature at:", c: ["Par value", "Their current market value", "A premium to par", "Their inflation-adjusted value"], a: 0, f: "Logic: T-Bills do not pay regular interest coupons. The investor's return is the difference between the discounted purchase price and the full $1,000 par value at maturity."},
            {q: "What pricing mechanism do open-end investment companies (mutual funds) utilize?", c: ["Forward pricing", "Continuous intraday pricing", "Historical average pricing", "Auction market pricing"], a: 0, f: "Logic: Mutual funds execute all trades based on the next calculated Net Asset Value (NAV), which is typically computed at 4:00 PM Eastern."},
            {q: "Hedge funds often charge a performance fee. The 'high-water mark' provision ensures that:", c: ["The manager is not paid a performance fee twice for recovering the same losses", "The fund always outperforms the S&P 500", "The general partner guarantees the principal investment", "Investors receive a minimum guaranteed return before fees are deducted"], a: 0, f: "Logic: A high-water mark means the fund must exceed its previous highest historical value before the manager can take a cut of the new profits."},
            {q: "In a fixed annuity, the investment risk is strictly borne by the:", c: ["Insurance company", "Annuitant", "State Guaranty Association", "Separate Account manager"], a: 0, f: "Logic: Because the insurance company guarantees a fixed rate of return, they take on the market risk within their own general account."},
            {q: "During the payout (annuitization) phase of a variable annuity, the amount of the monthly check:", c: ["Fluctuates based on the performance of the separate account", "Remains constant", "Increases automatically with inflation", "Is solely determined by the annuitant's age and health"], a: 0, f: "Logic: The annuitant owns a fixed number of annuity units, but the underlying monetary value of those units changes based on market performance."},
            {q: "An Equity REIT primarily generates its revenue from:", c: ["Property rents and capital gains from property sales", "Mortgage interest", "Originating commercial loans", "Derivatives trading"], a: 0, f: "Logic: Equity REITs own the physical real estate. Mortgage REITs provide the financing and collect the interest."},
            {q: "Which of the following is a primary advantage of a Limited Partnership (DPP)?", c: ["Limited liability for the limited partners", "High liquidity", "Guaranteed dividend payouts", "Exemption from all federal and state laws"], a: 0, f: "Logic: Limited partners cannot lose more than their invested capital, but DPPs are notoriously illiquid and hard to sell."},
            {q: "A company announces a 2-for-1 stock split. How does this affect the total value of an investor's position immediately after the split?", c: ["It remains entirely unchanged", "It doubles the value", "It halves the value", "It increases the value by the dividend yield"], a: 0, f: "Logic: The investor has twice as many shares, but each share is mathematically worth exactly half as much. The total pie remains the same size."},
            {q: "Which of the following corporate securities has a stated maturity date?", c: ["Corporate Debenture", "Preferred Stock", "Common Stock", "American Depositary Receipt (ADR)"], a: 0, f: "Logic: A debenture is an unsecured corporate bond (debt) and has an expiration/maturity date. Equity is perpetual."},
            {q: "The intrinsic value of a Call option is calculated as:", c: ["Current Market Price - Strike Price", "Strike Price - Current Market Price", "Premium - Time Value", "Strike Price + Premium"], a: 0, f: "Logic: A call is 'in the money' (has intrinsic value) if the stock price is higher than the strike price."},
            {q: "A 'Naked' (Uncovered) Call writer is exposed to:", c: ["Unlimited risk", "Limited risk", "Risk equal only to the premium received", "Zero risk if the option expires worthless"], a: 0, f: "Logic: Selling a call without actually owning the underlying stock means the investor might have to buy it in the open market at an infinitely high price to fulfill the contract."},
            {q: "A municipality issues a General Obligation (GO) bond. This debt is primarily backed by:", c: ["The taxing power of the municipality", "The revenue of a specific local project", "Federal block grants", "A portfolio of U.S. Treasury securities"], a: 0, f: "Logic: GO bonds are backed by the 'full faith and credit' (taxes) of the issuer. Revenue bonds are backed by project user fees."},
            {q: "Which of the following debt instruments typically carries the highest credit risk?", c: ["High-Yield (Junk) Bond", "Investment Grade Corporate Bond", "Municipal Revenue Bond", "Treasury Inflation-Protected Security (TIPS)"], a: 0, f: "Logic: High-yield bonds (rated BB or lower) offer higher interest rates specifically to compensate investors for the elevated risk of default."},
            {q: "Which mutual fund share class typically carries a Contingent Deferred Sales Charge (back-end load)?", c: ["Class B Shares", "Class A Shares", "Class C Shares", "Institutional Shares"], a: 0, f: "Logic: Class B shares charge a fee when the investor sells the fund, which gradually declines to zero the longer the fund is held."},
            {q: "A mutual fund's expense ratio is calculated by dividing the fund's operating expenses by its:", c: ["Average net assets", "Total sales charges", "Gross investment income", "Net asset value per share"], a: 0, f: "Logic: The expense ratio reflects the percentage of total fund assets actively used to cover management and administrative costs each year."},
            {q: "A primary advantage of an Exchange-Traded Fund (ETF) over a traditional mutual fund is:", c: ["Intraday tradability", "Guaranteed principal protection", "Higher dividend payouts", "Elimination of all management fees"], a: 0, f: "Logic: ETFs trade on an exchange like a stock, allowing investors to buy or sell them continuously throughout the trading day at market prices."},
            {q: "Term life insurance builds cash value at what rate?", c: ["Term life does not build cash value", "A fixed, guaranteed rate", "A variable rate based on market subaccounts", "A rate tied to the Consumer Price Index"], a: 0, f: "Logic: Term insurance provides pure death benefit protection for a specific period of time. Permanent policies (Whole, Universal, Variable) build cash value."},
            {q: "Policy loans taken from the cash value of a permanent life insurance policy are generally:", c: ["Tax-free", "Taxable as ordinary income", "Taxable as long-term capital gains", "Subject to a 10% early withdrawal penalty"], a: 0, f: "Logic: Because it is a loan (which must be repaid or will be deducted from the death benefit), the IRS does not consider the cash to be taxable income."},
            {q: "A 'Blind Pool' Direct Participation Program is characterized by the fact that:", c: ["The specific assets to be purchased are not yet identified", "The general partner is unknown", "The limited partners have full voting rights", "The program is exempt from SEC registration"], a: 0, f: "Logic: Investors contribute capital 'blindly', trusting the sponsor to find and buy suitable properties or projects later."},
            {q: "Private equity funds generally restrict their investors to:", c: ["Accredited and institutional investors", "Retail investors only", "Employees of the issuing corporation", "Non-U.S. citizens"], a: 0, f: "Logic: Due to high risk, lack of liquidity, and lack of SEC registration, PE funds require investors to meet strict wealth and income thresholds."},
            {q: "If an investor is 'Bearish' on the broader market, which options strategy makes the most mathematical sense?", c: ["Buy a Put", "Buy a Call", "Sell a Put", "Write a Covered Call"], a: 0, f: "Logic: A put option gives the investor the right to sell at a set price, allowing them to profit when the underlying stock drops in value."},
            {q: "Commercial paper is typically issued by:", c: ["Large, creditworthy corporations", "Small municipalities", "The Federal Reserve", "Commercial banks only"], a: 0, f: "Logic: Commercial paper consists of short-term, unsecured promissory notes used by major corporations to finance immediate, short-term cash needs."},
            {q: "An American Depositary Receipt (ADR) represents ownership of:", c: ["A foreign security trading in U.S. markets", "A U.S. security trading in foreign markets", "A portfolio of domestic municipal bonds", "A physical deposit of precious metals"], a: 0, f: "Logic: ADRs are issued by U.S. custodian banks and represent shares of a foreign company, making it easy for Americans to trade them locally."},
            {q: "The primary purpose of preemptive rights is to allow existing shareholders to:", c: ["Maintain their proportionate ownership in the company", "Receive guaranteed annual dividends", "Vote on the election of the Board of Directors", "Force the company into liquidation"], a: 0, f: "Logic: If a company issues new shares, preemptive rights give current owners the first chance to buy them, preventing their ownership stake from being diluted."},
            {q: "Which of the following is NOT legally classified as an investment company under the 1940 Act?", c: ["Real Estate Investment Trust (REIT)", "Unit Investment Trust (UIT)", "Open-End Management Company", "Face-Amount Certificate Company"], a: 0, f: "Logic: The 1940 Act explicitly defines three types of investment companies: Face-Amount Certificates, UITs, and Management Companies (Open/Closed End). REITs are excluded."},
            {q: "The standard death benefit of a variable annuity guarantees that if the annuitant dies during the accumulation phase, the beneficiary receives:", c: ["At least the total amount invested", "The fixed monthly payout amount", "Only the current market value of the account", "A refund of all mortality and expense charges"], a: 0, f: "Logic: The standard VA death benefit promises the beneficiary will get back the greater of the current account value or the original principal invested."},
            {q: "A corporate bond quote of 98 1/8 indicates a dollar price of:", c: ["$981.25", "$98.18", "$981.80", "$980.12"], a: 0, f: "Logic: Corporate bonds are quoted in eighths of a point. 1/8 = 0.125. Therefore, 98.125% of $1,000 par equals $981.25."},
            {q: "According to the Investment Company Act of 1940, an open-end mutual fund is strictly prohibited from:", c: ["Issuing preferred stock or bonds", "Borrowing money from a bank", "Investing in foreign securities", "Charging a 12b-1 fee"], a: 0, f: "Logic: Open-end funds (mutual funds) can only issue one class of security: common stock. Closed-end funds can issue preferred stock and bonds."},
            {q: "Which of the following investment companies routinely trades at a discount or premium to its Net Asset Value (NAV)?", c: ["Closed-End Fund", "Open-End Fund", "Unit Investment Trust (UIT)", "Face-Amount Certificate Company"], a: 0, f: "Logic: Closed-end funds trade on the secondary market. Their price is driven by investor supply and demand, not the exact mathematical NAV."},
            {q: "To qualify as a 'Regulated Investment Company' under Subchapter M and avoid triple taxation, a mutual fund must distribute at least:", c: ["90% of its Net Investment Income", "98% of its capital gains", "75% of its gross revenue", "100% of its total return"], a: 0, f: "Logic: The 90% pass-through rule allows the fund to avoid paying corporate taxes on the income it distributes to shareholders."},
            {q: "Mutual fund Class A shares are generally the most appropriate choice for an investor with a:", c: ["Long time horizon and large capital amount", "Short time horizon and small capital amount", "Need for immediate tax-free income", "Desire for active day trading"], a: 0, f: "Logic: Class A shares charge an upfront load but have lower annual fees. Large investments qualify for breakpoint discounts, making them ideal for long-term holds."},
            {q: "The primary risk associated with holding Mortgage-Backed Securities (MBS) in a falling interest rate environment is:", c: ["Prepayment Risk", "Default Risk", "Liquidity Risk", "Legislative Risk"], a: 0, f: "Logic: When rates drop, homeowners refinance their mortgages. The MBS investor gets their principal back early and must reinvest it at the new, lower interest rates."},
            {q: "Treasury STRIPS are created by separating the principal and interest payments of U.S. Treasuries. As zero-coupon securities, they are highly sensitive to:", c: ["Interest rate risk", "Credit risk", "Default risk", "Liquidity risk"], a: 0, f: "Logic: Zero-coupon bonds have the longest duration, making their market prices extremely volatile when interest rates change."},
            {q: "The 'Time Value' portion of an option's premium is generally at its greatest when the option is:", c: ["At-the-money", "Deep in-the-money", "Deep out-of-the-money", "One day from expiration"], a: 0, f: "Logic: When an option is exactly at the strike price (at-the-money), the uncertainty of which way the stock will break is highest, maximizing the time premium."},
            {q: "An options trader notes that a call option has a 'Delta' of 0.50. This means that if the underlying stock rises by $1.00, the option's premium is expected to rise by:", c: ["$0.50", "$1.00", "$0.05", "$5.00"], a: 0, f: "Logic: Delta measures how much the option price will move for every $1 change in the underlying stock."},
            {q: "Unlike Whole Life insurance, Universal Life insurance allows the policyholder to adjust:", c: ["Both the premium payments and the death benefit", "The underlying investment subaccounts", "The surrender charge period", "The assumed interest rate (AIR)"], a: 0, f: "Logic: Universal Life is 'flexible'. Variable Life allows adjustment of the subaccounts."},
            {q: "Under securities regulations, the cash value of a Variable Life insurance policy must be calculated at least:", c: ["Monthly", "Daily", "Weekly", "Annually"], a: 0, f: "Logic: Cash value must be calculated monthly. The separate account unit values are calculated daily, and the death benefit is calculated annually."},
            {q: "The maximum potential loss for a buyer of a put option is:", c: ["The premium paid", "Unlimited", "The strike price minus the premium", "The current market price of the stock"], a: 0, f: "Logic: Option buyers (long positions) can never lose more than what they paid to purchase the contract (the premium)."},
            {q: "Which pooled vehicle typically guarantees a fixed rate of return for life but is NOT classified as a security?", c: ["Fixed Annuity", "Variable Annuity", "Equity-Indexed Annuity", "Real Estate Investment Trust"], a: 0, f: "Logic: Fixed annuities are strictly insurance products because the insurance company bears all the investment risk."},
            {q: "A variable annuity's 'L-shares' are specifically designed for investors who desire:", c: ["Shorter surrender charge periods", "The lowest possible M&E expenses", "A guaranteed 5% step-up death benefit", "No front-end sales loads"], a: 0, f: "Logic: L-shares have short surrender periods (e.g., 3-4 years) but compensate the insurer by charging higher ongoing administrative fees."},
            {q: "An investor in the highest federal tax bracket is seeking steady income. The most appropriate fixed-income vehicle is likely a:", c: ["Municipal Bond", "Corporate Bond", "High-Yield Junk Bond", "Treasury Bill"], a: 0, f: "Logic: Municipal bond interest is federally tax-free, making it highly valuable for investors in top tax brackets."},
            {q: "The tax-equivalent yield of a 4% municipal bond for an investor in the 32% tax bracket is:", c: ["5.88%", "4.00%", "2.72%", "12.50%"], a: 0, f: "Logic: Tax-Equivalent Yield = Municipal Rate / (100% - Tax Bracket). 4% / (1 - 0.32) = 4% / 0.68 = 5.88%."},
            {q: "Because they are backed by taxes, General Obligation (GO) municipal bonds typically require which of the following before issuance?", c: ["Voter approval", "A feasibility study", "A revenue covenant", "A letter of credit from a commercial bank"], a: 0, f: "Logic: Since the taxpayers will be on the hook for repaying the debt, they generally have to vote to approve the bond issue."},
            {q: "A 'Special Tax Bond' is a type of municipal revenue bond backed by:", c: ["Excise taxes on specific items like gasoline or tobacco", "Ad valorem (property) taxes", "Corporate income taxes", "Federal government subsidies"], a: 0, f: "Logic: Special tax bonds target specific user taxes rather than general property taxes."},
            {q: "Under the Uniform Securities Act, Section 529 College Savings Plans are legally structured and regulated as:", c: ["Municipal fund securities", "Open-end management companies", "Direct Participation Programs", "Federal Covered Securities"], a: 0, f: "Logic: 529 plans are sponsored by individual states, classifying them as municipal securities under the MSRB."},
            {q: "A major benefit of a 529 Plan over a UGMA/UTMA custodial account is that in a 529 Plan:", c: ["The donor retains control over the assets and can change the beneficiary", "The assets automatically transfer to the child at age 18", "Contributions are federally tax-deductible", "There are no contribution limits"], a: 0, f: "Logic: UGMA/UTMA accounts become the irrevocable property of the child at the age of majority. 529 donors keep control forever."},
            {q: "Which of the following fixed-income securities is issued at a steep discount to par and pays no semi-annual interest?", c: ["Zero-Coupon Bond", "Treasury Inflation-Protected Security (TIPS)", "Convertible Debenture", "Income Bond"], a: 0, f: "Logic: Zero-coupon bonds lock in a fixed return based on the discount, eliminating reinvestment risk but maximizing price volatility."},
            {q: "The primary structural difference between an open-end mutual fund and a Unit Investment Trust (UIT) is that a UIT:", c: ["Has a fixed, unmanaged portfolio", "Trades on an exchange", "Calculates NAV only once a week", "Can issue preferred stock"], a: 0, f: "Logic: UITs buy a static basket of bonds or stocks and hold them until the trust matures. There is no active manager."},
            {q: "'Dark Pools' are private trading networks utilized primarily to:", c: ["Allow institutions to trade large blocks of stock anonymously without moving the market", "Avoid paying taxes on capital gains", "Execute illegal insider trading anonymously", "Trade exclusively in foreign currencies"], a: 0, f: "Logic: Institutions use dark pools so their massive buy/sell orders don't immediately spike or crash the public exchange prices."},
            {q: "Because of the unique way they are structured and traded, Exchange-Traded Funds (ETFs) typically experience:", c: ["Fewer taxable capital gains distributions than actively managed mutual funds", "Higher 12b-1 fees than mutual funds", "Massive tracking error compared to their benchmark", "Zero commission costs when traded on an exchange"], a: 0, f: "Logic: The 'in-kind' creation and redemption process of ETFs prevents them from having to sell stocks for cash to meet redemptions, minimizing forced capital gains."},
            {q: "The intrinsic value of a Put option is calculated mathematically as:", c: ["Strike Price - Current Market Price", "Current Market Price - Strike Price", "Premium + Strike Price", "Premium - Time Value"], a: 0, f: "Logic: A put gives the right to sell. It has intrinsic value (is in-the-money) if the strike price you can sell at is higher than the current market price."},
            {q: "An institutional investor seeking to protect a large, diversified stock portfolio from a systemic market crash should execute which strategy?", c: ["Buy S&P 500 Index Puts", "Sell Covered Calls", "Buy S&P 500 Index Calls", "Write Naked Puts"], a: 0, f: "Logic: Buying broad index puts acts as a portfolio-wide insurance policy against systemic risk (market crashes)."},
            {q: "Which type of life insurance policy provides a minimum guaranteed death benefit but does NOT provide a guaranteed minimum cash value?", c: ["Variable Life", "Variable Universal Life", "Whole Life", "Term Life"], a: 0, f: "Logic: Variable Life guarantees a base death benefit (from the general account) but cash value fluctuates. VUL guarantees absolutely nothing."},
            {q: "A client with a very short-term time horizon of 18 months wants to invest cash for a home down payment. The most appropriate vehicle is a:", c: ["Money Market Fund", "Short-term Corporate Bond Fund", "S&P 500 Index Fund", "Treasury Bond Fund"], a: 0, f: "Logic: Any money needed within 1-2 years must prioritize capital preservation over yield. Money market funds maintain a stable $1 NAV."},
            {q: "Bankers' Acceptances (BAs) are short-term credit instruments primarily used by corporations to finance:", c: ["International trade (imports and exports)", "Domestic real estate development", "Corporate mergers and acquisitions", "Share repurchases"], a: 0, f: "Logic: BAs act like post-dated checks guaranteed by a bank, facilitating trust in cross-border shipping transactions."},
            {q: "A 'Collateral Trust Bond' is a corporate bond secured by:", c: ["A portfolio of stocks and bonds owned by the issuer", "Real estate owned by the corporation", "The rolling stock (equipment) of a railroad or airline", "The full faith and credit of the U.S. government"], a: 0, f: "Logic: Mortgage bonds use real estate. Collateral trust bonds use other financial securities held in a trust as backing."},
            {q: "A mutual fund's 'Breakpoint Schedule' is designed to:", c: ["Provide reduced sales charges for larger dollar investments", "Penalize investors for early withdrawals", "Limit the amount an investor can contribute annually", "Trigger automatic capital gains distributions"], a: 0, f: "Logic: Breakpoints are quantity discounts on the front-end load (Class A shares) to incentivize larger deposits."},
            {q: "An investor owns 100 shares of XYZ stock and sells 1 XYZ Call option. This position is known as a:", c: ["Covered Call", "Naked Call", "Straddle", "Protective Put"], a: 0, f: "Logic: Because the investor already owns the underlying shares, they are 'covered' and can deliver the stock if the buyer exercises the call."},
            {q: "For a bond purchased at a premium, which of the following yield calculations will mathematically result in the lowest percentage?", c: ["Yield to Call (YTC)", "Yield to Maturity (YTM)", "Current Yield", "Coupon Rate"], a: 0, f: "Logic: YTC is the worst-case scenario. It assumes the investor loses the premium over the shortest possible time period."},
            {q: "A mutual fund's Net Investment Income (NII) is calculated by taking the fund's dividends and interest and subtracting its:", c: ["Operating expenses", "Capital gains", "Front-end loads", "Redemption fees"], a: 0, f: "Logic: NII represents the actual cash flow the portfolio generates (dividends + interest) minus what it costs to run the fund (expenses)."},
            {q: "A key tax advantage of a non-qualified variable annuity compared to a standard mutual fund is that the annuity offers:", c: ["Tax-deferred growth", "Tax-free withdrawals", "Tax-deductible contributions", "Capital gains treatment on all payouts"], a: 0, f: "Logic: Unlike mutual funds which issue taxable 1099s for dividends each year, non-qualified annuities allow all growth to compound tax-deferred until withdrawal."},
            {q: "In a Direct Participation Program (Limited Partnership), which party possesses unlimited liability for the debts of the business?", c: ["The General Partner", "The Limited Partner", "The Managing Director", "The Custodian Bank"], a: 0, f: "Logic: Limited partners are passive investors risking only their capital. The General Partner makes the decisions and assumes all legal and financial liability."},
            {q: "An options trader simultaneously buys a Call and sells a Call on the same underlying stock, but with different strike prices. This is known as a:", c: ["Spread", "Straddle", "Combination", "Collar"], a: 0, f: "Logic: A spread involves buying and selling the same type of option (two calls or two puts) to limit both maximum risk and maximum reward."},
            {q: "If a convertible bond's parity price is significantly higher than its current market price, an agile investor could profit by executing an:", c: ["Arbitrage", "Hedge", "Short Squeeze", "Wash Sale"], a: 0, f: "Logic: Arbitrage is the simultaneous buying and selling of related securities to lock in a riskless profit due to a pricing inefficiency."},
            {q: "Class B mutual fund shares are most notable for having which type of fee structure?", c: ["A Contingent Deferred Sales Charge (CDSC)", "A front-end load", "No 12b-1 fees", "A level load that never expires"], a: 0, f: "Logic: Class B shares charge a back-end load that gradually decreases to zero the longer the investor holds the fund."},
            {q: "Which of the following life insurance policies provides pure death benefit protection but accumulates zero cash value?", c: ["Term Life", "Whole Life", "Universal Life", "Variable Life"], a: 0, f: "Logic: Term life is temporary, pure insurance. Permanent policies (Whole, Universal) contain a savings/investment component."},
            {q: "Venture capital funds are a type of private equity that primarily invests in:", c: ["Start-up companies with high growth potential", "Distressed, bankrupt corporations", "Municipal infrastructure projects", "Real estate developments"], a: 0, f: "Logic: Venture capital provides seed money to new, unproven companies in exchange for an equity stake."},
            {q: "A bond has a low coupon relative to others with the same maturity and rating. Which of the following statements about its price is TRUE?", c: ["The bond's price will be more volatile than higher coupon bonds", "The bond's price will be more stable", "The bond will trade at a massive premium to par", "The bond is completely immune to interest rate risk"], a: 0, f: "Logic: Lower coupon = higher duration. Higher duration = higher price volatility when interest rates change."},
            {q: "Special purpose acquisition companies (SPACs) are considered suitable for which type of investor?", c: ["Risk tolerant investors searching for large gains", "Conservative investors looking for income", "Retirees seeking capital preservation", "Investors needing high immediate liquidity"], a: 0, f: "Logic: SPACs are 'blank check' speculative investments. They have no operations and are extremely high risk."}
        ],
[ // PILLAR 3: STRATEGY (HARDCODED DISTRACTORS)
            {q: "What's the primary justification for an employer offering an ESOP?", c: ["To retain top talent", "To avoid corporate income taxes", "To shift investment risk entirely to the employee", "To bypass ERISA non-discrimination testing"], a: 0, f: "Logic: Employee Stock Ownership Plans give workers 'skin in the game' to motivate and retain them."},
            {q: "Which statement about barbell bond strategies is NOT TRUE?", c: ["Gains from the short-term maturities will perfectly offset losses in the long-term maturities", "It holds short-term and long-term bonds, but no intermediate bonds", "It is an active strategy requiring frequent rebalancing", "It is designed to capture high yields while maintaining some liquidity"], a: 0, f: "Logic: There is no mathematical guarantee of a perfect offset. The barbell just attempts to balance interest rate risk."},
            {q: "An individual inherits a life insurance policy. What is the tax liability on the death benefit?", c: ["Zero, since the death benefit is only taxable to the deceased's estate.", "Taxed as ordinary income to the beneficiary.", "Taxed as long-term capital gains to the beneficiary.", "Subject to the Generation-Skipping Transfer Tax."], a: 0, f: "Logic: Life insurance payouts to beneficiaries are generally completely income tax-free."},
            {q: "What are two examples of qualified retirement plans that provide tax benefits for both employer and employee?", c: ["Defined benefit plans and defined contribution plans", "Deferred compensation plans and payroll deduction plans", "Executive bonus plans and split-dollar life insurance", "Section 457 plans and Roth IRAs"], a: 0, f: "Logic: DB and DC plans provide tax deductions for the employer and tax-deferred growth for the employee."},
            {q: "Melissa anticipates a market peak and downturn while the rest of the market is bullish. She is utilizing:", c: ["Contrarian investing", "Momentum investing", "Value investing", "Growth investing"], a: 0, f: "Logic: Doing the exact opposite of the prevailing market crowd is contrarian."},
            {q: "What ERISA rule requires a qualified plan to offer at least 3 different investment options with different risk levels?", c: ["Section 404(c)", "Section 457(b)", "Section 403(b)", "Section 1031"], a: 0, f: "Logic: 404(c) provides a safe harbor protecting the employer from liability if they offer at least 3 distinct options."},
            {q: "A self-employed consultant earns $300k and wants to maximize retirement contributions. Best plan?", c: ["Individual 401(k) plan", "Traditional IRA", "Roth IRA", "SIMPLE IRA"], a: 0, f: "Logic: Solo-401(k)s allow for the highest combined contribution limits (employee + employer profit-sharing) for a one-person business."},
            {q: "Two spouses work full time. Total household income is $60k; neither has a workplace plan. How much can they jointly put into IRAs in 2024/2025?", c: ["$14,000 to $16,000 depending on catch-up limits", "$7,000 to $8,000 depending on catch-up limits", "$23,000", "$69,000"], a: 0, f: "Logic: Both spouses can max out their own individual IRA. Two accounts = double the standard limit."},
            {q: "Which of the following statements is TRUE about indexing?", c: ["It may result in a portfolio that does not accurately track the index.", "It mathematically guarantees perfect correlation to the market.", "It relies heavily on fundamental analysis to beat the benchmark.", "It eliminates all systematic market risk."], a: 0, f: "Logic: Due to management fees and trading costs, index funds experience 'Tracking Error' and never track perfectly."},
            {q: "Which of the following accounts allow for tax-deductible contributions?", c: ["Traditional IRAs", "Roth IRAs", "529 College Savings Plans", "Coverdell ESAs"], a: 0, f: "Logic: Roth and Education contributions are never deductible. Traditional IRA contributions are deductible depending on income."},
            {q: "A manager moves from 70% stocks/30% bonds to 30% stocks/70% bonds based on economic conditions. This is a(n):", c: ["Asset allocation fund (Tactical)", "Balanced fund (Strategic)", "Index fund (Passive)", "Target-date fund (Lifecycle)"], a: 0, f: "Logic: Actively shifting the entire asset mix based on market timing is Tactical asset allocation."},
            {q: "Which of the following accounts do NOT ease the probate process?", c: ["Joint Tenants in Common (TIC)", "Joint Tenants with Rights of Survivorship (JTWROS)", "Transfer on Death (TOD) accounts", "Revocable Living Trusts"], a: 0, f: "Logic: In a TIC, your share goes to your Estate, which means it must go through the slow, public probate courts."},
            {q: "Buy and hold with systematic rebalancing is an approach based on the theory known as:", c: ["Efficient Market Hypothesis", "Technical Analysis", "Behavioral Finance", "Arbit Pricing Theory"], a: 0, f: "Logic: EMH states you can't beat the market, so the logical move is passive: buy, hold, and rebalance."},
            {q: "An IAR wants to help reduce a client's systematic risk. The IAR should recommend:", c: ["Securities with negative correlation, such as certain debt instruments.", "High-Beta growth stocks.", "A concentrated position in a single sector.", "Selling covered calls on the entire portfolio."], a: 0, f: "Logic: Negative correlation acts as a hedge; if the stock market crashes, the negatively correlated asset stays steady or rises."},
            {q: "Which of the following is generally considered a highly inappropriate investment to place inside a tax-advantaged retirement account like an IRA?", c: ["Tax-exempt municipal bonds", "High-yield corporate bonds", "Broad-market equity ETFs", "Real Estate Investment Trusts (REITs)"], a: 0, f: "Logic: Municipal bonds offer lower yields because their interest is tax-free. Placing them inside an IRA wastes their primary benefit and subjects the eventual withdrawals to ordinary income taxes."},
            {q: "An investor who claims they 'knew all along' that a specific stock was going to crash, even though they had no evidence beforehand, is exhibiting:", c: ["Hindsight bias", "Confirmation bias", "Anchoring bias", "Regret avoidance"], a: 0, f: "Logic: Hindsight bias is the psychological illusion that past events were perfectly predictable after they have already occurred."},
            {q: "Under the 'Kiddie Tax' rules, unearned investment income in a UGMA/UTMA account that exceeds the annual threshold is taxed at the:", c: ["Parents' marginal tax rate", "Minor child's tax rate", "Flat federal rate of 15%", "Trust and Estate tax rate"], a: 0, f: "Logic: To prevent wealthy parents from shifting massive tax burdens to their kids, the IRS taxes the child's excess unearned income at the parents' much higher tax rate."},
            {q: "Which of the following distributions from a 401(k) plan is exempt from the 10% early withdrawal penalty for an employee under age 59 1/2?", c: ["A distribution made to a beneficiary following the death of the employee", "A withdrawal to pay for a child's higher education tuition", "A withdrawal to purchase a first home", "A withdrawal to pay off unsecured credit card debt"], a: 0, f: "Logic: Death and disability always waive the 10% penalty. Higher education and first-home exceptions apply to IRAs, but NOT to employer plans like a 401(k)."},
            {q: "When applying Modern Portfolio Theory (MPT), adding an asset class with a correlation of +0.10 to an existing portfolio will:", c: ["Provide a significant diversification benefit and reduce total risk", "Increase the portfolio's overall volatility", "Have absolutely no effect on the portfolio's risk profile", "Guarantee an increase in the portfolio's Alpha"], a: 0, f: "Logic: Any correlation coefficient less than +1.0 provides diversification. At +0.10, the assets have almost no relationship, which heavily smooths out the portfolio's overall ride."},
            {q: "If a wealthy client gifts an asset to their grandchild, skipping their own living child, the transfer may be subject to a flat, maximum-rate tax known as the:", c: ["Generation-Skipping Transfer (GST) Tax", "Alternative Minimum Tax (AMT)", "Kiddie Tax", "Estate Recovery Tax"], a: 0, f: "Logic: The GST tax is designed to stop families from avoiding a generation of estate taxes by passing wealth directly to grandchildren."},
            {q: "A fiduciary managing a trust under the Uniform Prudent Investor Act (UPIA) must ensure that the trust's assets are:", c: ["Diversified, unless it is reasonably determined that it is in the best interest of the beneficiaries not to do so", "Exclusively invested in risk-free U.S. government securities", "Allocated equally between equities and fixed income", "Invested solely to maximize current income"], a: 0, f: "Logic: The UPIA mandates diversification as a core tenet of risk management, absent a very specific and compelling reason to concentrate the assets."},
            {q: "In a 'Joint Tenants with Right of Survivorship' (JTWROS) account owned by a married couple, what happens to the cost basis of the assets when one spouse dies?", c: ["Only the deceased spouse's 50% share receives a step-up in basis", "The entire account receives a full step-up in basis", "The original cost basis carries over completely unchanged", "The basis is stepped down to the lowest historical value"], a: 0, f: "Logic: In standard JTWROS (outside of Community Property states), only the half owned by the deceased gets stepped up to the fair market value on the date of death."},
            {q: "An investor who firmly believes in the 'Semi-Strong' Efficient Market Hypothesis would logically choose to invest their money in:", c: ["Broad-market index ETFs", "Actively managed mutual funds", "Individual small-cap growth stocks", "High-frequency day trading accounts"], a: 0, f: "Logic: Semi-strong EMH believes fundamental analysis is useless because all public data is already priced in. Therefore, the only logical move is to passively index and keep fees low."},
            {q: "Which of the following strategies automatically forces an investor to buy more shares when prices are low and fewer shares when prices are high?", c: ["Dollar-Cost Averaging", "Tactical Asset Allocation", "Value Averaging", "Momentum Trading"], a: 0, f: "Logic: By investing a fixed dollar amount on a strict schedule, the math naturally dictates that your money buys more shares during a market dip."},
