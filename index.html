            {q: "If an agent discovers they have material inside information about a company, the agent should immediately:", c: ["Notify their supervisor or the firm's compliance department", "Sell their personal holdings of the stock, but not the clients'", "Short the stock in a nominee account", "Call the SEC enforcement division directly"], a: 0, f: "Logic: Trading on MNPI (even to save your own portfolio) is highly illegal. You must freeze and report the information to compliance so they can place the stock on the firm's restricted list."},
            {q: "According to NASAA rules regarding cybersecurity, a registered investment adviser must:", c: ["Establish and maintain a written Information Security Policy", "Guarantee that a cyber breach will never occur", "Purchase a minimum of $1,000,000 in cyber liability insurance", "Outsource all IT functions to a third-party vendor"], a: 0, f: "Logic: Regulators know hacks happen. They don't expect perfection, but they legally require a comprehensive, written policy outlining how the firm protects data and responds to breaches."},
            {q: "An agent intentionally delays the execution of a client's large block trade until after the agent buys shares of the same stock for their own personal account. This illegal practice is called:", c: ["Front running", "Matched orders", "Painting the tape", "Arbitrage"], a: 0, f: "Logic: Stepping in front of a client's massive trade to profit from the price movement that their trade will cause is classic front running."},
            {q: "Under the USA, what is the maximum length of time an Administrator can suspend an agent's registration summarily (without a prior hearing) while an investigation is pending?", c: ["Until the final determination of the proceeding is made", "30 days", "15 days", "60 days"], a: 0, f: "Logic: A summary suspension can last indefinitely while the investigation is ongoing. However, the agent has the right to request a hearing, which must be held within 15 days of the request."},
            {q: "An Investment Adviser structures their fee schedule to charge 1% for accounts up to $1M, and 0.5% for accounts over $1M. This fee structure is:", c: ["Perfectly acceptable, provided it is fully disclosed in the brochure", "An illegal performance-based fee", "A violation of fiduciary duty", "Allowed only for institutional clients"], a: 0, f: "Logic: Tiered or discounted fees based on total Assets Under Management (AUM) are standard industry practice and completely legal as long as they are disclosed."},
            {q: "If a registered broker-dealer is acting in the capacity of an 'Underwriter' for a new initial public offering (IPO), they are operating in the:", c: ["Primary market", "Secondary market", "Third market", "Fourth market"], a: 0, f: "Logic: The primary market is where new securities are created and sold to the public for the very first time (IPOs). The secondary market is where investors trade existing shares among themselves."},
            {q: "Under the Investment Advisers Act of 1940, 'Access Persons' (employees with access to non-public client trade info) must report their personal securities transactions to the Chief Compliance Officer:", c: ["Quarterly", "Annually", "Monthly", "Daily"], a: 0, f: "Logic: To prevent front-running and insider trading, access persons must report their personal holdings within 10 days of being hired, and report all personal transactions quarterly."},
            {q: "An Investment Adviser Representative (IAR) works for a Federal Covered Adviser. Under the Uniform Securities Act, the IAR must register in:", c: ["Only the states where the IAR maintains a physical place of business", "Every state where they have at least one retail client", "Only the state where the firm is headquartered", "No states, because they are federally covered"], a: 0, f: "Logic: Because their firm is regulated by the SEC, the state has very limited power over the IAR. The state can only force the IAR to register if they actually have a desk/office in that state."},
            {q: "Unlike an IAR for a Federal Covered Adviser, an Agent for a Broker-Dealer must register in:", c: ["Every single state where they solicit or conduct business with clients", "Only the state where their primary office is located", "Only the state where they reside", "No states, if the firm is SEC-registered"], a: 0, f: "Logic: Broker-dealer agents do not get the 'place of business' loophole. If an agent calls a client in State B, the agent MUST be registered in State B, regardless of where the agent's desk is."},
            {q: "An Investment Adviser takes custody of client funds and is subject to an annual surprise audit. Who is legally responsible for filing the Form ADV-E with the SEC?", c: ["The independent public accountant conducting the exam", "The Chief Compliance Officer (CCO) of the IA", "The Chief Executive Officer (CEO) of the IA", "The State Administrator"], a: 0, f: "Logic: The 'E' stands for Exam. To prevent the adviser from forging the results, the independent CPA must submit the Form ADV-E directly to the regulators."},
            {q: "Under SEC Regulation D, Rule 506(c) differs from Rule 506(b) because Rule 506(c):", c: ["Permits general solicitation and advertising, but absolutely all purchasers must be verified accredited investors", "Prohibits general advertising but allows up to 35 unaccredited investors", "Caps the total offering amount at $5 million", "Allows unlimited unaccredited investors"], a: 0, f: "Logic: Rule 506(c) allows issuers to advertise their private placement on TV or the internet, but the trade-off is they cannot accept a single dime from non-accredited investors."},
            {q: "To qualify as an 'Accredited Investor' based on net worth under Regulation D, an individual must have a net worth exceeding $1,000,000:", c: ["Excluding the value of their primary residence", "Including the equity in their primary residence", "Excluding the value of their retirement accounts", "Including expected future inheritances"], a: 0, f: "Logic: Congress changed the rule following the 2008 housing crash. Your house no longer counts toward your $1M net worth requirement to be deemed an accredited investor."},
            {q: "If a client wins a civil lawsuit against a broker-dealer for the illegal sale of a security under the USA, the client is entitled to recover:", c: ["The original purchase price, plus interest, plus attorney fees, minus any income received", "Treble damages (three times the original investment)", "A flat statutory penalty of $1,000,000", "The return of the original principal only"], a: 0, f: "Logic: Civil liability under the USA is designed to make the client 'whole' again, not to make them rich. Treble damages only apply to SEC insider trading cases."},
            {q: "A broker-dealer realizes they sold an unregistered security and offers the client a 'Letter of Rescission' to buy it back. If the client fails to accept or reject the offer within 30 days:", c: ["The client permanently loses their right to sue the broker-dealer for that specific trade", "The client automatically wins a default judgment in court", "The SEC intervenes and mandates a 100% refund", "The firm's registration is immediately revoked"], a: 0, f: "Logic: The 30-day window is strict. If the client ignores the letter, the broker-dealer is legally off the hook and the client forfeits their right to file a civil lawsuit."},
            {q: "Under the Uniform Securities Act, the definition of a 'Person' includes corporations, partnerships, and trusts, but explicitly EXCLUDES:", c: ["Minors, deceased individuals, and the mentally incompetent", "Non-profit organizations", "Municipalities and government entities", "Joint stock companies"], a: 0, f: "Logic: A 'person' must be a legally competent entity capable of signing a binding contract. Minors, dead people, and legally incompetent individuals cannot."},
            {q: "A top-tier mutual fund registered under the Investment Company Act of 1940 is considered a 'Federal Covered Security'. To sell this fund in a specific state, the issuer must:", c: ["Submit a Notice Filing and pay a filing fee to the State Administrator", "Complete a full Registration by Coordination with the state", "Complete a full Registration by Qualification with the state", "Do nothing, as it is completely exempt from all state oversight"], a: 0, f: "Logic: The state cannot force a Federal Covered Security to go through a rigorous registration review, but they absolutely demand a 'Notice Filing' to collect their state filing fees."},
            {q: "Under the Bank Secrecy Act, if a financial institution detects suspicious activity related to money laundering or terrorism financing, they must file a Suspicious Activity Report (SAR) within:", c: ["30 days of the discovery", "15 days of the discovery", "5 days of the discovery", "24 hours of the discovery"], a: 0, f: "Logic: SARs must be filed with FinCEN within 30 days. (Currency Transaction Reports for $10k+ cash deposits must be filed within 15 days)."},
            {q: "In an Insider Trading case, who can be held legally liable?", c: ["Both the 'Tipper' who shared the info and the 'Tippee' who traded on it", "Only the 'Tippee' who actually executed the trade", "Only the 'Tipper' who leaked the information", "Only the corporation that issued the stock"], a: 0, f: "Logic: Both parties are liable. The tipper breached their fiduciary duty to keep the information secret, and the tippee traded knowing the information was illegally obtained."},
            {q: "A registered investment company (mutual fund) charges a 'Fulcrum Fee' (a type of performance fee). By law, this fee must:", c: ["Increase and decrease symmetrically against a designated benchmark", "Be structured to only capture upside gains without penalizing the manager for downside losses", "Be flat regardless of market performance", "Only apply to institutional share classes"], a: 0, f: "Logic: Performance fees for mutual funds must be a two-way street. If the manager gets a bonus for beating the S&P 500, they must take a mathematically equal pay cut if they underperform it."},
            {q: "An Investment Adviser must officially update their Form ADV with the SEC or State Administrator:", c: ["Within 90 days of the end of the adviser's fiscal year", "Within 30 days of the end of the calendar year", "Every two years on their anniversary date", "Only when a material change occurs"], a: 0, f: "Logic: The mandatory annual updating amendment must be filed within 90 days of the firm's fiscal year-end to keep their registration active."},
            {q: "If an Investment Adviser makes material changes to their Form ADV Part 2A (Brochure), they must deliver the updated brochure (or a summary of material changes) to existing clients:", c: ["Within 120 days of the end of the adviser's fiscal year", "Promptly, within 5 business days", "Within 30 days of the end of the calendar year", "At the time of the client's next trade"], a: 0, f: "Logic: The IA has 90 days to file the update with the regulators, and an additional 30 days (120 days total from the end of the fiscal year) to get it to the clients."},
            {q: "An Investment Adviser is deemed to have 'Custody' solely because they directly deduct their advisory fees from the client's account. Under NASAA rules, the adviser must:", c: ["Send an itemized invoice to the client simultaneously when sending the deduction request to the custodian", "Maintain a minimum net worth of $35,000", "Submit to an unannounced annual surprise audit by a CPA", "Post a $50,000 surety bond"], a: 0, f: "Logic: If an IA's *only* form of custody is direct fee deduction, NASAA waives the $35k net worth and surprise audit rules, provided the IA sends concurrent invoices so the client can verify the math."},
            {q: "Which of the following individuals MUST register as an Agent under the Uniform Securities Act?", c: ["An individual representing a BROKER-DEALER selling U.S. Treasury Bonds", "An individual representing an ISSUER selling U.S. Treasury Bonds", "An individual executing an isolated non-issuer transaction", "An individual representing an issuer selling stock to existing employees without a commission"], a: 0, f: "Logic: If you represent an ISSUER selling exempt securities (like the government or a municipality), you do NOT register. If you work for a BROKER-DEALER, you MUST register regardless of what you are selling."},
            {q: "Under the Dodd-Frank Act, the 'Private Fund Adviser Exemption' relieves an adviser from SEC registration if they solely advise private funds and have total Assets Under Management (AUM) in the U.S. of less than:", c: ["$150 million", "$100 million", "$110 million", "$50 million"], a: 0, f: "Logic: Advisers to private funds (like hedge funds) get a higher threshold before mandatory SEC registration kicks in: $150M compared to the standard $110M for regular retail advisers."},
            {q: "Under the SEC's modernized Marketing Rule, an Investment Adviser's advertisement may feature a rating from an independent third-party site (like Morningstar) ONLY IF:", c: ["The advertisement clearly discloses the date of the rating and if any compensation was paid to obtain or use it", "The adviser ensures the rating is highly favorable", "The rating agency is registered with the SEC", "The advertisement is only sent to accredited investors"], a: 0, f: "Logic: Third-party ratings are allowed, but they require strict disclosures to ensure the client knows the context of the rating and whether the IA paid to be featured."},
            {q: "Under the SEC Pay-to-Play rule, the standard 'look-back' period for a newly hired Covered Associate who solicits clients for the firm is:", c: ["2 years", "6 months", "1 year", "5 years"], a: 0, f: "Logic: If you hire an executive to solicit government business, the SEC looks back at their political donations for the last 2 years. If they made a large donation to the mayor 18 months ago, the firm is banned from getting that city's business today."},
            {q: "In an 'Agency Cross Transaction', an Investment Adviser acts as the broker for both the buyer and the seller. The IA is strictly prohibited from:", c: ["Recommending the trade to both the buyer and the seller", "Charging a commission on the transaction", "Executing the trade for retail clients", "Providing a trade confirmation to both parties"], a: 0, f: "Logic: You cannot tell Client A to sell a stock and simultaneously tell Client B to buy it just to generate double commissions. One side of the trade must be completely unsolicited."},
            {q: "A Broker-Dealer has no office in State B. The firm is EXCLUDED from the definition of a Broker-Dealer in State B (and therefore does not need to register) if their only clients in State B are:", c: ["Issuers, other Broker-Dealers, and institutional investors (e.g., banks and mutual funds)", "Fewer than 5 retail investors", "Fewer than 10 retail investors", "Accredited individuals"], a: 0, f: "Logic: The 'De Minimis' rule (5 or fewer retail clients) applies to Investment Advisers, NOT Broker-Dealers. A BD with even ONE retail client in a state must register. However, if a BD only deals with massive institutions, they are fully excluded."},
            {q: "To qualify for the Promissory Note (Commercial Paper) exemption under the Securities Act of 1933, the paper must mature in no more than:", c: ["270 days", "365 days", "180 days", "90 days"], a: 0, f: "Logic: The magic number for commercial paper exemption at both the state (USA) and federal (1933 Act) levels is a maximum maturity of 270 days (9 months)."},
            {q: "An Investment Adviser is granted 'Power of Attorney' to write checks out of a client's checkbook to pay the client's bills. Under USA rules, this adviser:", c: ["Has full legal Custody of the client's funds", "Has limited discretionary authority", "Must register as a Broker-Dealer", "Is violating the anti-fraud provisions of the USA"], a: 0, f: "Logic: Custody is defined as the ability to possess or appropriate client funds. Having the legal authority to sign checks on the client's behalf is the ultimate form of custody."},
            {q: "An Investment Adviser creates an advertisement showcasing their past stock recommendations. To comply with SEC rules, the advertisement MUST include:", c: ["All recommendations made by the adviser over at least the preceding 1-year period", "Only the recommendations that resulted in a net profit", "Only the recommendations that were executed by a specific broker-dealer", "A guarantee that future performance will match past results"], a: 0, f: "Logic: You cannot 'cherry-pick' only your winning trades. If you show past recommendations, you must show ALL of them (the good, the bad, and the ugly) for at least the last year."},
            {q: "If an Investment Adviser pays a prominent financial influencer to endorse their firm on a podcast, the endorsement MUST disclose:", c: ["That it is a paid advertisement, even if the compensation was a flat fee of $100", "Compensation details only if the payment exceeded $1,000", "Nothing, as social media influencers are exempt from the Marketing Rule", "The influencer's personal net worth"], a: 0, f: "Logic: Any compensation (cash or non-cash) given for a testimonial or endorsement must be explicitly disclosed so the public knows the influencer was bought and paid for."},
            {q: "Under the Securities Exchange Act of 1934, Broker-Dealers are legally required to maintain most of their books and records (including trade blotters and ledgers) for a period of:", c: ["3 years", "5 years", "7 years", "10 years"], a: 0, f: "Logic: Broker-Dealers follow the 3-year rule. Investment Advisers follow the 5-year rule. (Note: For both, the records must be kept easily accessible for the first 2 years)."},
            {q: "A financial institution must file a Currency Transaction Report (CTR) with FinCEN when a client executes a physical cash transaction (or multiple linked cash transactions in a single day) exceeding:", c: ["$10,000", "$5,000", "$25,000", "$50,000"], a: 0, f: "Logic: The $10,000 threshold strictly applies to physical currency (cash, coins). Wire transfers and personal checks do not trigger a CTR."},
            {q: "The Securities Investor Protection Corporation (SIPC) provides coverage to investors in the event of:", c: ["The financial failure and bankruptcy of a broker-dealer", "A catastrophic drop in the stock market", "An investment adviser committing fraud", "The default of a municipal bond issuer"], a: 0, f: "Logic: SIPC is like FDIC insurance for brokerage accounts. It does not protect against bad investments or market crashes; it solely protects your assets if the firm holding them goes out of business."},
            {q: "SIPC coverage provides protection up to a maximum of:", c: ["$500,000 total per separate capacity, of which no more than $250,000 can be for cash", "$250,000 total per separate capacity", "$1,000,000 total per separate capacity", "$500,000 strictly for securities, with zero coverage for cash"], a: 0, f: "Logic: SIPC covers up to $500k in securities and cash, but the cash portion is strictly capped at $250k. (FDIC insurance for banks covers $250k in cash)."},
            {q: "Under the Uniform Securities Act, an Administrator may require the filing of advertising and sales literature EXCEPT when:", c: ["The security is an exempt security or the transaction is an exempt transaction", "The materials are distributed exclusively to fewer than 10 retail clients", "The broker-dealer has been registered for more than 5 years", "The literature only promotes mutual funds"], a: 0, f: "Logic: The Administrator cannot force you to file advertising for securities that are already exempt from state registration (like municipal bonds) or trades that are exempt (like an unsolicited order)."},
            {q: "According to NASAA rules, an Investment Adviser must deliver a brochure (Form ADV Part 2A) to a client:", c: ["At least 48 hours prior to signing the contract, or at the time of signing with a 5-day right to cancel without penalty", "Within 7 days of signing the advisory contract", "Annually on December 31st", "Prior to the execution of the very first trade"], a: 0, f: "Logic: The brochure rule ensures the client has time to review the adviser's fees, background, and conflicts of interest before being legally locked into paying them."},
            {q: "Under the USA, a newspaper published in State A has 80% of its total circulation in State B. An advertisement for a security in this newspaper is considered an offer in:", c: ["Neither State A nor State B", "Both State A and State B", "Only State B", "Only State A"], a: 0, f: "Logic: If a publication has more than two-thirds (66.6%) of its circulation outside the state where it is published, the USA declares it is not an offer in ANY state, removing the jurisdiction headache."},
            {q: "The Investment Advisers Act of 1940 defines an Investment Adviser using a three-prong test. Which of the following is NOT one of the prongs?", c: ["Must have a minimum of $25 million in assets under management", "Must provide advice about securities as a regular part of their business", "Must receive compensation for the advice provided", "Must hold themselves out as being in the business of providing advice"], a: 0, f: "Logic: The ABC Test defines an IA: Advice about securities, as a Business, for Compensation. The amount of AUM only dictates *where* they register (State vs. SEC), not *if* they are an IA."},
            {q: "Under the Securities Exchange Act of 1934, an institutional investment manager exercising discretion over $100 million or more in qualifying equity securities must file:", c: ["Form 13F", "Schedule 13D", "Form 8-K", "Form ADV-E"], a: 0, f: "Logic: Form 13F is filed quarterly by massive institutional managers (like hedge funds or mutual funds) with $100M+ in assets so the SEC can track large block holdings."},
            {q: "Under the USA, a new agent's registration becomes legally effective:", c: ["30 days after filing, unless the Administrator accelerates the date", "Exactly 45 days after the applicant passes their Series 66 exam", "Immediately upon receipt of the filing fee", "On December 31st of the current year"], a: 0, f: "Logic: Assuming no disciplinary red flags or missing paperwork, state registrations automatically become effective at noon on the 30th day after filing."},
            {q: "A client instructs an agent to 'Buy 500 shares of tech stock whenever you think the price is right today.' This order:", c: ["Does not require written discretion because the agent is only deciding the time and price for that specific day", "Requires written discretionary authority on file", "Can only be executed by an Investment Adviser Representative", "Must be marked as an unsolicited, exempt transaction"], a: 0, f: "Logic: If the client specifies the exact Asset (tech stock), Action (Buy), and Amount (500 shares), the agent does not need formal discretion just to pick the Time or Price."},
            {q: "Under the USA, the definition of a 'Sale' explicitly EXCLUDES:", c: ["A bona fide pledge or loan of a security", "A contract to sell a security for value", "A disposition of an assessable stock", "A stock dividend that requires a cash payment"], a: 0, f: "Logic: Pledging stock as collateral for a margin loan is not a sale because the ownership of the stock hasn't permanently transferred to the lender."},
            {q: "According to the Investment Company Act of 1940, at least what percentage of a mutual fund's Board of Directors must be 'non-interested' (independent) persons?", c: ["40%", "60%", "51%", "10%"], a: 0, f: "Logic: To protect shareholders from the fund's management company, federal law requires that a minimum of 40% of the board must be completely independent outsiders."},
            {q: "Under NASAA Model Rules, if an Investment Adviser requires the prepayment of fees of more than $500, six or more months in advance, the adviser must:", c: ["Include an audited balance sheet with their Form ADV Part 2A", "Register with the SEC as a Federal Covered Adviser", "Post a $35,000 surety bond", "Maintain the funds in a separate escrow account"], a: 0, f: "Logic: Taking substantial money far in advance is a major financial liability. The state wants proof (an audited balance sheet) that the firm is solvent enough to issue refunds if they go out of business. (Note: The SEC threshold is $1,200)."},
            {q: "To comply with the Intrastate Offering Exemption (Rule 147) under the Securities Act of 1933, what percentage of the issuer's gross revenues must be derived from operations within the state?", c: ["80%", "100%", "50%", "75%"], a: 0, f: "Logic: To avoid registering with the SEC, the company must be truly local: 80% of revenue, 80% of assets, and 80% of proceeds must stay within the state, and 100% of buyers must be residents."},
            {q: "Under the USA, an individual who represents an issuer in selling securities strictly to the company's existing employees, and does NOT receive any commission for the sales, is:", c: ["Excluded from the definition of an Agent", "Required to register as an Agent of the Issuer", "Required to register as an Investment Adviser Representative", "Acting illegally without a broker-dealer affiliation"], a: 0, f: "Logic: An HR rep helping employees enroll in the company stock plan isn't a stockbroker. As long as they aren't paid a commission for the sales, they don't have to register."},
            {q: "An Investment Adviser Representative (IAR) gives a client a prospectus for a mutual fund, highlights the best-performing years with a yellow marker, and tells the client to ignore the rest. This practice is:", c: ["An unethical and prohibited practice", "Permitted since the client was provided with the full statutory prospectus", "Allowed only if the client is an accredited investor", "Required by the SEC to ensure clarity of information"], a: 0, f: "Logic: A prospectus is a legal disclosure document. You can NEVER highlight, underline, alter, or summarize a prospectus, as it draws attention away from the risk disclosures."},
            {q: "A broker-dealer executes a trade for a client out of their own inventory and charges a markup. This indicates the firm acted in a:", c: ["Principal capacity", "Agency capacity", "Fiduciary capacity", "Broker capacity"], a: 0, f: "Logic: Principal = Dealer = Inventory = Markup. Agency = Broker = Middleman = Commission."},
            {q: "Under the Uniform Securities Act, which of the following is considered an 'Exempt Security'?", c: ["A promissory note (commercial paper) maturing in 9 months or less, issued in denominations of at least $50,000", "A stock issued by a local, privately-held manufacturing company", "A variable annuity contract", "A limited partnership interest in an oil and gas venture"], a: 0, f: "Logic: Highly rated, short-term commercial paper is exempt. Stock issued by a normal, private corporation must be registered or find an exempt transaction (like a private placement)."},
            {q: "If a Federal Covered Adviser drops below $90 million in Assets Under Management (AUM), they must:", c: ["Withdraw their SEC registration and register with the applicable states within 180 days", "Immediately notify the SEC and shut down operations until AUM recovers", "Pay a penalty to the SEC to maintain their registration", "Register as a Broker-Dealer"], a: 0, f: "Logic: There is a buffer zone to prevent firms from bouncing back and forth. You must register with the SEC at $110M, but you don't get kicked out until you drop below $90M."},
            {q: "According to SEC rules, an Investment Adviser's Form ADV Part 2B (Brochure Supplement) provides clients with information regarding:", c: ["The specific individuals (supervised persons) who will be providing the investment advice", "The firm's audited financial balance sheet", "The firm's aggregate Assets Under Management (AUM)", "The specific formula used to calculate the advisory fee"], a: 0, f: "Logic: Part 2A is about the FIRM (fees, conflicts, strategies). Part 2B is the supplement about the ACTUAL PERSON (their education, background, and disciplinary history)."},
            {q: "An agent leaves Broker-Dealer A and immediately registers with Broker-Dealer B. Under the USA, who must notify the State Administrator?", c: ["The agent, Broker-Dealer A, and Broker-Dealer B", "Only the agent", "Only Broker-Dealer B", "Only Broker-Dealer A"], a: 0, f: "Logic: At the broker-dealer level, everybody talks. The old firm, the new firm, and the agent must all separately notify the Administrator of the change."},
            {q: "A Canadian broker-dealer with no office in the U.S. has a Canadian client who temporarily moves to Florida for the winter. Under the USA, the Canadian BD:", c: ["Can continue doing business with the client without registering in Florida", "Must register in Florida within 30 days of the client's arrival", "Must transfer the account to a U.S.-registered broker-dealer", "Can only execute liquidating trades for the client"], a: 0, f: "Logic: The USA provides a specific 'Snowbird' exemption. As long as the client is temporarily in the U.S. and the firm has no U.S. office, they can continue trading without registering."},
            {q: "Under the Securities Act of 1933, a 'Red Herring' is a preliminary prospectus used to:", c: ["Gather indications of interest during the cooling-off period", "Solicit binding sales before the registration becomes effective", "Guarantee the final public offering price of the stock", "Satisfy the final prospectus delivery requirements"], a: 0, f: "Logic: During the 20-day cooling-off period, an agent can send a red herring to see if clients *might* want the stock, but it cannot be used to make actual sales or accept any money."},
            {q: "An individual who provides financial planning services for a fee, but only recommends broad asset allocation strategies (no specific stocks), must register as:", c: ["An Investment Adviser", "A Broker-Dealer", "An Agent of the Issuer", "A Certified Financial Planner (CFP)"], a: 0, f: "Logic: Giving advice on 'securities' includes broad asset allocation involving securities. If you do it as a business for compensation, you meet the ABC test of an IA."},
            {q: "Under NASAA Model Rules, an Investment Adviser who wishes to maintain custody of client funds must:", c: ["Notify the Administrator in writing, unless state law prohibits custody entirely", "Maintain a minimum net capital of $250,000", "Register as a broker-dealer", "Post a $1,000,000 surety bond"], a: 0, f: "Logic: You cannot just take custody quietly. You must formally notify the State Administrator on your Form ADV, and the state has the power to prohibit it entirely."},
            {q: "The primary purpose of the Securities Act of 1933 is to:", c: ["Require full and fair disclosure of material facts in the issuance of new securities", "Regulate the secondary market trading of securities", "Establish the Securities and Exchange Commission (SEC)", "Protect investors from the bankruptcy of a broker-dealer"], a: 0, f: "Logic: The 1933 Act (The Paper Act) regulates the Primary Market (IPOs) by forcing companies to issue a prospectus. The 1934 Act (The People Act) regulates the Secondary Market and broker-dealers."},
            {q: "An agent inadvertently overhears a corporate officer discussing an unannounced dividend cut. The agent immediately calls their best client to warn them. The client sells the stock. Who violated insider trading laws?", c: ["Both the agent and the client", "Only the client", "Only the agent", "Neither, because the agent did not trade"], a: 0, f: "Logic: Passing the information makes the agent the 'Tipper', and executing the trade makes the client the 'Tippee'. Both are legally liable for insider trading."},
            {q: "Under the USA, an unsolicited order from a retail client to purchase an unregistered, non-exempt security is:", c: ["An exempt transaction", "An illegal transaction", "An offer and a sale requiring immediate registration", "A violation of fiduciary duty"], a: 0, f: "Logic: Even if the security is normally illegal to sell in that state, if the client calls the agent out of the blue and demands it (unsolicited), the trade qualifies as an exempt transaction."},
            {q: "An Investment Adviser Representative (IAR) strongly recommends a specific tech stock to a client, while secretly liquidating their own massive personal position in that same stock. This is an unethical practice known as:", c: ["Scalping", "Churning", "Matched orders", "Wash selling"], a: 0, f: "Logic: Scalping is hyping up a stock to clients to drive the price up (or artificially support it) while you secretly sell your own shares into the demand."},
            {q: "If a state Administrator issues a summary order suspending an agent's registration, the agent has the right to request a hearing. Once requested, the hearing must be held within:", c: ["15 days", "30 days", "45 days", "60 days"], a: 0, f: "Logic: An Administrator can suspend you immediately without warning. However, if you fight it, they must grant you a formal hearing within 15 days of your written request."},
            {q: "Which of the following is NOT required to be included on an order ticket under USA recordkeeping rules?", c: ["The name of the client's attorney", "The time of order execution", "The account number", "The identity of the agent who accepted the order"], a: 0, f: "Logic: Order tickets must include the account number, the agent, the time entered, the time executed, and the terms. It does not include personal client data like their attorney's name."},
            {q: "Under SEC Release IA-1092, which of the following professionals would most likely be classified as an Investment Adviser?", c: ["A sports and entertainment agent who negotiates contracts and manages the athletes' investment portfolios for a single comprehensive fee", "A high school economics teacher who discusses the stock market in class", "A corporate accountant who prepares tax returns for the firm's executives", "A real estate broker selling commercial properties"], a: 0, f: "Logic: IA-1092 expanded the definition of an IA to include sports agents, pension consultants, and financial planners if they provide investment advice as part of their compensated services."},
            {q: "Under the Uniform Securities Act, a gift of non-assessable stock is considered:", c: ["Not a sale, and therefore not subject to the USA's jurisdiction", "A sale, requiring the stock to be registered", "An exempt transaction", "An illegal attempt to avoid taxation"], a: 0, f: "Logic: Assessable stock carries a liability, so gifting it is a 'sale'. Standard non-assessable stock carries no liability, so giving it away is a true gift and completely outside the Administrator's jurisdiction."},
            {q: "Under the Uniform Securities Act, if an Investment Adviser's net worth falls below the state's minimum requirement, the adviser must file a detailed financial report with the Administrator:", c: ["By the close of business on the day after notifying the Administrator", "Within 30 days of the deficiency", "Immediately on the day the deficiency occurs", "At the end of the current fiscal quarter"], a: 0, f: "Logic: Financial distress triggers a rapid-response protocol. You must notify the state immediately (by tomorrow), and file a full financial report the day after that."},
            {q: "Which of the following is considered an 'Exempt Transaction' under the USA?", c: ["A secondary market trade of a stock listed on the New York Stock Exchange (NYSE)", "An Initial Public Offering (IPO) of a local tech startup", "The sale of a variable annuity to a retail client", "A public sale of an unrated corporate bond"], a: 0, f: "Logic: A trade of a federal covered security (like an NYSE-listed stock) on the secondary market is an exempt transaction, meaning the trade itself does not require state registration."},
            {q: "A broker-dealer firm is acquired by a larger competitor. What happens to the registrations of the agents who work for the acquired firm?", c: ["Their registrations can be transferred to the successor firm without paying a new filing fee until the end of the year", "Their registrations are immediately terminated, and they must pass the Series 63/66 again", "They must pay a double filing fee to expedite the transfer", "They are legally barred from trading for 30 days during the transition"], a: 0, f: "Logic: To prevent massive disruptions to clients, the USA allows agents to transition to the successor firm. The new firm files the paperwork, but no new fees are due until the December 31st renewal."},
            {q: "Under the USA, a 'Person' is defined broadly. Which of the following would NOT meet the legal definition of a Person?", c: ["A minor child", "An unincorporated organization", "A municipality", "A joint-stock company"], a: 0, f: "Logic: Minors, deceased individuals, and legally incompetent adults are not 'Persons' under the USA because they cannot legally be bound by a contract."},
            {q: "An Investment Adviser Representative (IAR) forms a partnership with a certified public accountant (CPA). The CPA refers wealthy tax clients to the IAR for a flat $500 referral fee per client. Under the SEC Marketing Rule, this arrangement is:", c: ["Legal, provided the client receives written disclosure of the compensation arrangement", "Illegal under all circumstances", "Only legal if the CPA is a registered Broker-Dealer Agent", "Permitted without disclosure because CPAs are exempt professionals"], a: 0, f: "Logic: Paying for referrals (solicitor fees) is legal, but it creates a massive conflict of interest. The client MUST be informed in writing that the CPA is being paid to recommend the IAR."},
            {q: "According to the USA, an agent's registration is strictly tied to their employment. If an agent is terminated, their registration is:", c: ["Suspended until they join a new broker-dealer", "Valid for 60 days to allow them time to find a new firm", "Permanently revoked, requiring them to retake the exam", "Transferred automatically to the State Administrator's office"], a: 0, f: "Logic: You cannot be a 'freelance' agent. If you are not affiliated with a registered broker-dealer or issuer, your registration is immediately placed in suspense."},
            {q: "If an Investment Adviser takes physical custody of a client's funds, the adviser must arrange for an independent public accountant to conduct a surprise audit at least:", c: ["Annually", "Once every 3 years", "Semi-annually", "Monthly"], a: 0, f: "Logic: Custody requires strict oversight. An independent CPA must show up unannounced once a year to count the money and ensure the adviser isn't running a Ponzi scheme."},
            {q: "Under the Securities Exchange Act of 1934, the SEC has the authority to suspend all trading on a specific national exchange (like the NYSE) for up to:", c: ["90 days, with the approval of the President of the United States", "10 days, unilaterally", "30 days, with the approval of Congress", "60 days, with the approval of the Federal Reserve"], a: 0, f: "Logic: The SEC can suspend trading in a specific *stock* for 10 days unilaterally. To shut down an entire *exchange*, they need the President's approval and can do so for up to 90 days."},
            {q: "Which of the following describes the 'De Minimis' exemption for an Investment Adviser under the Uniform Securities Act?", c: ["The adviser has no physical office in the state and directs communications to 5 or fewer retail clients in the state during a 12-month period", "The adviser exclusively manages institutional accounts and has less than $25 million in AUM", "The adviser only sells federal covered securities", "The adviser has no more than 15 retail clients nationwide"], a: 0, f: "Logic: No office + 5 or fewer retail clients = De Minimis exemption from state registration for an Investment Adviser. (Remember: this exemption does NOT exist for broker-dealers)."},
            {q: "Under the USA, an Administrator may issue a subpoena for documents or testimony. If the subject of the subpoena refuses to comply, the Administrator may:", c: ["Apply to a court of competent jurisdiction to legally compel compliance (Contempt of Court)", "Issue a warrant for their immediate arrest", "Freeze all of their personal bank accounts", "Levy a criminal fine of up to $50,000"], a: 0, f: "Logic: Administrators are not police officers or judges. They cannot arrest people. If you ignore their subpoena, they must go to a real judge, who will hold you in contempt of court."},
            {q: "A client instructs their IAR to 'buy 1,000 shares of the best tech stock you can find today.' This order:", c: ["Can be executed using oral discretion for up to 10 days", "Requires written discretionary authority because the IAR is choosing the specific asset", "Is a 'Not Held' order and does not require discretion", "Must be marked as an unsolicited transaction"], a: 0, f: "Logic: Because the client left the specific *Asset* up to the IAR, it is a discretionary trade. IARs get a 10-day grace period for oral discretion (Agents do not)."},
            {q: "Under the Securities Act of 1933, a company issuing new securities must observe a 20-day 'Cooling-Off' period. During this period, agents are permitted to:", c: ["Distribute a preliminary prospectus (Red Herring) to gather indications of interest", "Accept partial deposits to reserve shares for interested clients", "Execute binding sales contracts post-dated for the effective date", "Guarantee the final offering price to institutional clients"], a: 0, f: "Logic: During the cooling-off period, you can talk about the stock and hand out a Red Herring to see who might want it, but you absolutely CANNOT take a single dime or make a binding sale."},
            {q: "An Investment Adviser is updating their Form ADV. Which part of the Form ADV serves as the primary disclosure document (the 'Brochure') handed to retail clients?", c: ["Form ADV Part 2A", "Form ADV Part 1", "Schedule 13D", "Form 8-K"], a: 0, f: "Logic: Part 1 is the dry, statistical data for the SEC/State (AUM, address, ownership). Part 2A is the narrative 'Brochure' written in plain English for the client, detailing fees and strategies."},
            {q: "According to NASAA rules, which of the following fee structures is explicitly prohibited for a state-registered Investment Adviser?", c: ["Charging a fee based on a share of the capital gains generated in the client's account", "Charging a 2% fee based on the average daily balance of the client's account", "Charging a flat annual retainer fee of $5,000", "Charging a $200 hourly consultation fee"], a: 0, f: "Logic: Performance-based fees (capital gains sharing) are banned because they encourage massive risk-taking, unless the client is a highly wealthy 'Qualified Client'."},
            {q: "Under the USA, a security is considered 'Exempt' if it is issued by a:", c: ["Canadian municipality, such as the City of Toronto", "Corporate entity listed on the Pink Sheets", "Local real estate development firm", "Hedge fund structured as a limited partnership"], a: 0, f: "Logic: The USA treats Canadian government and municipal bonds exactly like U.S. government and municipal bonds—they are exempt from registration."},
            {q: "An agent suspects a client is engaging in insider trading based on a series of highly suspicious, perfectly timed options trades. The agent should:", c: ["Execute the trades but immediately notify the firm's compliance officer or legal department", "Confront the client and refuse to execute any further trades", "Call the SEC enforcement tip line directly", "Close the client's account and return their funds immediately"], a: 0, f: "Logic: Do not tip off the client that they are under suspicion. The agent should escalate the matter directly to the firm's internal compliance/AML officer, who will decide whether to file a Suspicious Activity Report (SAR)."},
            {q: "Under the USA, if an applicant for registration as an Agent has a history of financial irresponsibility, the Administrator may:", c: ["Require the agent to post a surety bond", "Deny the registration based solely on the applicant's lack of experience", "Require the agent to pass the Series 7 exam twice", "Mandate that the agent works strictly for an Investment Adviser"], a: 0, f: "Logic: Administrators can require broker-dealers, investment advisers, and agents to post surety bonds if they have custody, discretion, or a questionable financial history. (They cannot deny registration *solely* for lack of experience)."},
            {q: "Which of the following actions by an Investment Adviser constitutes illegal 'Custody' under NASAA rules?", c: ["Holding a client's login credentials to actively manage their account within their employer's 401(k) portal", "Receiving a check made payable to the IA and returning it to the client within 3 business days", "Executing discretionary trades with written authorization", "Directly deducting advisory fees from a client's account with concurrent invoicing"], a: 0, f: "Logic: Having the client's personal username and password gives the IA the ability to completely take over the account and theoretically withdraw funds, which regulators strictly define as having custody."},
            {q: "Under SEC rules, an Investment Adviser must retain corporate formation documents (like articles of incorporation and partnership agreements) for how long?", c: ["For at least 3 years after the termination of the enterprise", "5 years after the end of the fiscal year in which they were created", "7 years from the date of incorporation", "Permanently, but they can be destroyed upon termination of the firm"], a: 0, f: "Logic: While most IA records are kept for 5 years, foundational corporate documents must be kept for the entire life of the firm, PLUS 3 years after the firm shuts down."},
            {q: "A broker-dealer places a 'Not Held' order for a client. This means the client has given the agent the authority to:", c: ["Choose the specific time and price of execution for a specific security", "Choose the specific security to purchase, provided it is suitable", "Execute trades entirely at the agent's discretion for up to 10 days", "Ignore best execution rules and route the trade for maximum commission"], a: 0, f: "Logic: A 'Not Held' order leaves the Time and Price up to the agent. Because the client specified the Asset, Action, and Amount, it is NOT a discretionary trade."},
            {q: "Under the Securities Exchange Act of 1934, 'Insiders' are defined as corporate officers, directors, and any shareholder who owns more than:", c: ["10% of the company's outstanding shares", "5% of the company's outstanding shares", "15% of the company's outstanding shares", "20% of the company's outstanding shares"], a: 0, f: "Logic: 10% ownership makes you a legal insider, subjecting you to strict SEC reporting rules and preventing you from taking short-swing profits."},
            {q: "Which of the following is considered an unethical 'Sales Practice' violation by an agent?", c: ["Highlighting the most important risk disclosures in a mutual fund prospectus", "Sharing in the profits of a customer's account with the written approval of the customer and the firm", "Executing a trade in a margin account before the agreement is signed", "Charging a higher commission for a particularly difficult, illiquid trade"], a: 0, f: "Logic: You can NEVER alter, summarize, underline, or highlight a prospectus. It is a legal document that must be delivered to the client exactly as it was printed."},
            {q: "According to the USA, an Administrator has the authority to:", c: ["Issue rules, forms, and orders necessary to carry out the provisions of the Act", "Amend or rewrite the text of the Uniform Securities Act to better suit their state", "Sentence a fraudulent agent to up to 3 years in state prison", "Override federal SEC regulations within their state borders"], a: 0, f: "Logic: The Administrator enforces the law; they don't write it. Only the state legislature can rewrite the actual statute, but the Administrator can issue specific rules to enforce it."},
            {q: "If a registered Investment Adviser files for bankruptcy, the firm must:", c: ["Promptly notify the Administrator and update their Form ADV", "Automatically liquidate all client assets and return the cash within 30 days", "Transfer all client accounts to a solvent competitor immediately", "Surrender their registration without the right to a hearing"], a: 0, f: "Logic: Financial impairment (like bankruptcy) is a massive material change. The IA must immediately update their ADV to warn current and prospective clients that the firm is going under."},
            {q: "A client gives their agent verbal instructions: 'Sell my 500 shares of XYZ stock if the price drops to $40.' This order is:", c: ["A standard Stop Order, which is perfectly legal to accept verbally", "An illegal oral discretionary order", "A 'Not Held' order requiring written authorization", "A violation of the Prudent Investor Act"], a: 0, f: "Logic: The client specified the Asset (XYZ), Action (Sell), and Amount (500), and gave a specific trigger price. This is a standard order, not discretion, so verbal authorization is fine."},
            {q: "Under the USA, an 'Offer to Sell' is made when an agent:", c: ["Attempts to dispose of a security for value, or solicits an offer to buy", "Actually exchanges the security for the client's money", "Executes a rescission offer", "Delivers a final statutory prospectus"], a: 0, f: "Logic: A 'Sale' is the actual transaction. An 'Offer' is any attempt to make the transaction happen, including hyping the stock or asking if the client wants to buy it."},
            {q: "If an Investment Adviser Representative (IAR) is heavily promoting a specific stock to clients, and the IAR's spouse owns a massive position in that exact same stock, the IAR must:", c: ["Disclose the spouse's position to clients, as it is a material conflict of interest", "Transfer the spouse's shares to a blind trust immediately", "Force the spouse to liquidate the shares before recommending the stock", "Do nothing, as spouses are treated as separate legal entities"], a: 0, f: "Logic: The financial interests of an immediate family member are treated as the IAR's own interests. Because a surge in the stock would enrich the IAR's household, it's a conflict of interest that must be disclosed."},
            {q: "According to NASAA rules, a broker-dealer is permitted to charge a client a fee for which of the following services?", c: ["Executing a trade (Commission) and storing the physical stock certificates (Safekeeping fee)", "Guaranteeing the client against a loss in a highly volatile IPO", "Preparing the client's annual federal tax returns", "Providing legal advice regarding estate planning"], a: 0, f: "Logic: Broker-dealers can charge for standard services like execution, custody, safekeeping, and appraisals. They can NEVER charge a fee to guarantee a client against a loss."},
            {q: "To register a security via 'Registration by Qualification', the registration becomes effective:", c: ["Only when the State Administrator explicitly orders it to become effective", "Simultaneously with the SEC registration", "Exactly 30 days after the filing is received", "When the issuer pays the final registration fee"], a: 0, f: "Logic: Qualification is the hardest method (used for intrastate offerings). There is no automatic timeline. The state has to physically review every document, and it only goes live when the Administrator says so."},
            {q: "Under the Uniform Securities Act, if a financial professional commits a fraudulent act while selling a security, they can be prosecuted:", c: ["Even if the security itself is legally exempt from registration", "Only if the security was required to be registered in that state", "Only if the transaction was executed on a national exchange", "Only by the SEC, not the State Administrator"], a: 0, f: "Logic: Exemption from registration is NOT an exemption from fraud. The anti-fraud rules of the USA apply to absolutely every transaction, regardless of what is being sold."},
            {q: "Which of the following professionals is definitively acting as an Investment Adviser Representative (IAR)?", c: ["A managing partner of an advisory firm who supervises the employees that give investment advice", "A clerical employee who files the firm's client trade confirmations", "A human resources director at the advisory firm", "An outside CPA who prepares the firm's tax returns"], a: 0, f: "Logic: The definition of an IAR includes anyone who gives advice, manages accounts, solicits clients, or *supervises* the people who do those things. Clerical and administrative staff are excluded."},
            {q: "Under the USA, an agent is permitted to split their commissions with another individual ONLY IF:", c: ["The other individual is also a registered agent working for the same broker-dealer (or an affiliated broker-dealer)", "The other individual is a registered Investment Adviser who referred the client", "The client provides written consent to the split", "The other individual is a licensed CPA or Attorney"], a: 0, f: "Logic: Commission splitting is heavily restricted. You can only split a commission with a fellow agent who works for your exact firm (or a firm under the exact same corporate umbrella)."},
            {q: "A prominent tech CEO knowingly lies on television about a massive new government contract, causing the stock price to skyrocket. They then sell their shares at the inflated price. This violates the anti-fraud provisions of:", c: ["Both the federal Securities Exchange Act of 1934 and the state Uniform Securities Act", "Only the Securities Exchange Act of 1934", "Only the Uniform Securities Act", "Neither, because television broadcasts are exempt from anti-fraud laws"], a: 0, f: "Logic: Fraud is illegal everywhere. Blatant market manipulation violates both the federal SEC rules (1934 Act) and the state NASAA rules (USA)."},
            {q: "If an Investment Adviser Representative wants to use a Social Media platform to communicate with clients, the firm MUST:", c: ["Treat the social media posts as advertising and retain copies for 5 years", "Ensure the IAR never discusses general financial concepts", "Forward all posts to the SEC before hitting publish", "Limit the IAR's followers to accredited investors only"], a: 0, f: "Logic: Social media is advertising. Firms must monitor it, supervise it, and keep records of all posts, tweets, and messages for 5 years just like a printed brochure."},
            {q: "Under NASAA rules, which of the following practices is considered 'Selling Away'?", c: ["An agent executing a private real estate syndication trade for a client without notifying their employing broker-dealer", "An agent selling a security that is not registered with the SEC", "An agent churning a client's discretionary account", "An agent trading on material, non-public information"], a: 0, f: "Logic: 'Selling Away' means executing a securities transaction off the books of the broker-dealer. The firm cannot supervise a trade it doesn't know about, exposing them to massive liability."},
            {q: "According to the USA, an Administrator can require an issuer to file quarterly reports to disclose the progress of an offering. These reports can be demanded no more frequently than:", c: ["Quarterly", "Monthly", "Weekly", "Annually"], a: 0, f: "Logic: The Administrator can keep tabs on how a new stock offering is going, but they are legally capped at demanding updates once a quarter."},
            {q: "Which of the following statements regarding the 'Brochure Rule' is accurate?", c: ["An IA must deliver the brochure to a client at or before the time of entering into the contract", "The brochure must contain a list of all client names and phone numbers", "The brochure is only required for clients investing more than $1,000,000", "The brochure must be filed with the IRS annually"], a: 0, f: "Logic: The brochure (ADV Part 2A) contains fees and conflicts. It must be delivered upfront so the client can make an informed decision. (Client names are highly confidential and never published)."},
            {q: "An Investment Adviser is preparing an advertisement that includes a chart showing a hypothetical portfolio that perfectly timed the 2008 market crash. The adviser MUST prominently disclose:", c: ["That the performance was simulated, created with the benefit of hindsight, and does not represent actual client results", "The specific names of the clients who would have benefited from the trade", "The exact algorithm used to generate the numbers", "That the strategy guarantees identical future results"], a: 0, f: "Logic: Hypothetical performance is incredibly dangerous because you can just backtest the perfect strategy. SEC rules require massive, prominent disclosures explaining that the numbers are basically fake."},
            {q: "If a state Administrator wishes to revoke an Investment Adviser's registration, they must provide the adviser with all of the following EXCEPT:", c: ["A trial by a jury of their peers", "Prior written notice", "An opportunity for a hearing", "Written findings of fact and conclusions of law"], a: 0, f: "Logic: Administrative hearings are regulatory, not criminal. You get written notice, the chance to defend yourself at a hearing, and written findings of fact, but you do NOT get a jury trial."},
            {q: "Under the Securities Exchange Act of 1934, 'Short-Swing Profits' are defined as profits realized by a corporate insider (officer, director, or 10% shareholder) on the sale of company stock held for less than:", c: ["6 months", "12 months", "30 days", "90 days"], a: 0, f: "Logic: The SEC strictly forbids insiders from day-trading their own company's stock. Any profit made on stock held for less than 6 months must be forfeited and returned to the corporation."},
            {q: "A broker-dealer firm is holding fully paid customer securities in 'Street Name' (the firm's name). Under NASAA rules, the firm must:", c: ["Segregate the customer's securities and ensure they are never commingled with the firm's own inventory", "Liquidate the securities at the end of the calendar year", "Charge the customer a mandatory 1% safekeeping fee", "Register the securities in the customer's actual name within 30 days"], a: 0, f: "Logic: Holding assets in 'Street Name' is common for easy trading, but the firm must strictly separate the client's assets from the firm's assets to prevent 'Commingling'."},
            {q: "Congratulations. You have completed the final calibration sequence for the Series 66 exam. The primary function of the Uniform Securities Act is to:", c: ["Protect the investing public from fraud and ensure financial professionals operate with complete integrity", "Guarantee that all registered securities will be profitable", "Ensure that broker-dealers maximize their corporate profits", "Eliminate all systematic risk from the financial markets"], a: 0, f: "Logic: MISSION ACCOMPLISHED. The regulators exist to protect the public. By mastering these questions, you have proven you are ready. ."}
        ]
    ];

    let activeSet=[], idx=0, currentPillar=0, sessionScore=0, sessionFails=0;
    let currentScores = JSON.parse(localStorage.getItem('s66CurrentScores')) || [0,0,0,0];
    let sectorsCompleted = JSON.parse(localStorage.getItem('s66SectorsCompleted')) || [false, false, false, false];
    let isPracticeMode = false;
    let baseScore = 0; 
    let frozenGlobalScore = 0; 

    function launchSequence() {
        const overlay = document.getElementById('countdown-overlay');
        const hud = document.getElementById('main-hud');
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'none';
        overlay.style.display = 'block'; overlay.style.color = '#ffaa00'; overlay.style.textShadow = '0 0 30px #ffaa00'; overlay.innerText = "3";
        hud.classList.add('continuous-shake');
        playCountdown();
        let count = 3;
        let timer = setInterval(() => {
            count--;
            if(count > 0) overlay.innerText = count;
            else if (count === 0) {
                overlay.innerText = "LIFTOFF!";
                document.getElementById('rocket').classList.add('takeoff');
                document.getElementById('fuel-fill').style.background = '#00ff41';
                document.getElementById('fuel-fill').style.boxShadow = '0 0 15px #00ff41';
                document.getElementById('total-text').innerText = "ORBIT ACHIEVED: PASSING SCORE REACHED!";
            } else {
                clearInterval(timer); overlay.style.display = 'none'; hud.classList.remove('continuous-shake');
                document.getElementById('mission-report').style.display = 'block';
                document.getElementById('report-title').innerText = "EXAM PASSED!";
                document.getElementById('stat-correct').style.display = 'none';
                document.getElementById('stat-wrong').style.display = 'none';
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                document.getElementById('rep-global').innerText = finalTotal + "/100";
                document.getElementById('rep-global').style.color = "#00ff41";
                document.getElementById('rep-msg').innerText = "YOU ARE READY FOR THE SERIES 66.";
                document.getElementById('rep-msg').style.color = "#00ff41";
            }
        }, 1000);
    }

    function crashSequence() {
        const overlay = document.getElementById('countdown-overlay');
        const hud = document.getElementById('main-hud');
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'none';
        overlay.style.display = 'block'; overlay.style.color = '#ff0000'; overlay.style.textShadow = '0 0 30px #ff0000'; overlay.innerText = "WARNING";
        hud.classList.add('critical-shake');
        playSiren();
        setTimeout(() => {
            overlay.innerText = "SYSTEM FAILURE";
            document.getElementById('rocket').innerHTML = "💥";
            document.getElementById('rocket').classList.add('explosion');
            setTimeout(() => {
                overlay.style.display = 'none'; hud.classList.remove('critical-shake');
                document.getElementById('mission-report').style.display = 'block';
                document.getElementById('mission-report').style.borderColor = '#ff0000';
                document.getElementById('report-title').innerText = "MISSION FAILED";
                document.getElementById('report-title').style.color = "#ff0000";
                document.getElementById('stat-correct').style.display = 'none';
                document.getElementById('stat-wrong').style.display = 'none';
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                document.getElementById('rep-global').innerText = finalTotal + "/100";
                document.getElementById('rep-global').style.color = "#ff0000";
                document.getElementById('rep-msg').innerText = "EXAM COMPLETED. TARGET WAS 73. YOU MUST RETRAIN.";
                document.getElementById('rep-msg').style.color = "#ff0000";
                let repBtn = document.getElementById('report-nav-btn');
                repBtn.innerText = "WIPE DATA & RESTART EXAM"; repBtn.style.background = "#ff0000"; repBtn.style.color = "#ffffff";
                repBtn.onclick = function() { localStorage.clear(); location.reload(); };
            }, 1500);
        }, 2000);
    }

    function updateMenuUI() {
        let total = currentScores.reduce((a, b) => a + b, 0);
        for(let i=0; i<4; i++) {
            let btn = document.getElementById('btn-p'+i), tag = document.getElementById('s'+i);
            document.getElementById('c'+i).innerText = `[${lib[i].length} GATES IN BANK]`;
            if(sectorsCompleted[i]) {
                tag.innerHTML = `Score: ${currentScores[i]}/25 <br><span class='practice-text'>[PRACTICE ONLY]</span>`;
                btn.style.borderColor = "#ffaa00"; 
            } else tag.innerHTML = `Status: PENDING`;
        }
        document.getElementById('fuel-fill').style.width = total + "%";
        if(sectorsCompleted.every(Boolean)) {
            if(total >= 73) {
                document.getElementById('rocket').style.display = 'none'; document.getElementById('fuel-fill').style.background = '#00ff41';
                document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total}/100 (ORBIT ACHIEVED)`;
            } else {
                document.getElementById('rocket').innerHTML = "💥"; document.getElementById('fuel-fill').style.background = '#ff0000';
                document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total}/100 (MISSION FAILED)`;
            }
        } else {
            document.getElementById('rocket').style.bottom = (10 + (total * 2.5)) + "px";
            document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total} / 100 (TARGET: 73)`;
        }
    }

    function updateLiveTelemetry() {
        if (isPracticeMode) {
            document.getElementById('fuel-fill').style.width = frozenGlobalScore + "%";
            document.getElementById('rocket').style.bottom = (10 + (frozenGlobalScore * 2.5)) + "px";
            document.getElementById('total-text').innerText = `PRACTICE MODE - GLOBAL LOCKED AT: ${frozenGlobalScore} / 100`;
        } else {
            let currentGlobal = baseScore + sessionScore;
            document.getElementById('fuel-fill').style.width = currentGlobal + "%";
            document.getElementById('rocket').style.bottom = (10 + (currentGlobal * 2.5)) + "px";
            document.getElementById('total-text').innerText = `LIVE GLOBAL SCORE: ${currentGlobal} / 100 (TARGET: 73)`;
        }
    }

    function start(i){
        currentPillar = i;
        if (sectorsCompleted[i] === true) { 
            isPracticeMode = true; 
            frozenGlobalScore = currentScores.reduce((a, b) => a + b, 0);
            document.getElementById('abort-btn').style.display = 'block';
        }
        else { 
            isPracticeMode = false; 
            baseScore = currentScores.reduce((acc, val, index) => index === i ? acc : acc + val, 0); 
            document.getElementById('abort-btn').style.display = 'none';
        }
        let rawSet = JSON.parse(JSON.stringify(lib[i]));
        let allWrongAnswers = [...new Set(rawSet.map(q => q.c).flat())];
        rawSet.forEach(q => {
            let correctString = q.c[q.a], newChoices = [...q.c], attempts = 0;
            while(newChoices.length < 4 && attempts < 100) {
                let randomAns = allWrongAnswers[Math.floor(Math.random() * allWrongAnswers.length)];
                if(!newChoices.includes(randomAns)) newChoices.push(randomAns);
                attempts++;
            }
            let shuffledChoices = newChoices.map(val => ({ val, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ val }) => val);
            q.c = shuffledChoices; q.a = shuffledChoices.indexOf(correctString);
        });
        activeSet = rawSet.sort(() => 0.5 - Math.random()).slice(0, 25);
        idx = 0; sessionScore = 0; sessionFails = 0;
        document.getElementById('menu').style.display = 'none'; document.getElementById('game').style.display = 'block';
        if (isPracticeMode) { document.getElementById('status-line').innerText = "⚠️ PRACTICE MODE: SCORE WILL NOT UPDATE GLOBAL TOTAL"; document.getElementById('status-line').style.color = "#ffaa00"; }
        else document.getElementById('status-line').style.color = "#888";
        updateLiveTelemetry(); show();
    }

    function showReport() {
        document.getElementById('game').style.display = 'none'; document.getElementById('mission-report').style.display = 'block';
        document.getElementById('report-title').innerText = "SECTOR COMPLETE"; document.getElementById('rep-correct').innerText = sessionScore; document.getElementById('rep-wrong').innerText = sessionFails;
        let finalTotal = currentScores.reduce((a, b) => a + b, 0); document.getElementById('rep-global').innerText = finalTotal + "/100";
        if (isPracticeMode) document.getElementById('rep-msg').innerText = "PRACTICE RUN COMPLETE. SCORE NOT LOGGED.";
        else document.getElementById('rep-msg').innerText = "DATA SAVED. SELECT NEXT PENDING SECTOR.";
    }

    function show(){
        if(idx >= activeSet.length){
            if (!isPracticeMode) {
                currentScores[currentPillar] = sessionScore; sectorsCompleted[currentPillar] = true;
                localStorage.setItem('s66CurrentScores', JSON.stringify(currentScores)); localStorage.setItem('s66SectorsCompleted', JSON.stringify(sectorsCompleted));
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                if (sectorsCompleted.every(Boolean)) { document.getElementById('game').style.display = 'none'; if (finalTotal >= 73) launchSequence(); else crashSequence(); return; }
                else if(finalTotal >= 73) { document.getElementById('game').style.display = 'none'; launchSequence(); return; }
            }
            showReport(); return;
        }
        if (!isPracticeMode) document.getElementById('status-line').innerText = `CALIBRATING GATE ${idx+1}/25 | CURRENT SECTOR SCORE: ${sessionScore}`;
        let s = activeSet[idx], h = `<div class="q-text">${s.q}</div>`;
        s.c.forEach((v,i) => { h += `<button class="ans-btn" onclick="check(${i})"><strong>${String.fromCharCode(65+i)}.</strong> ${v}</button>`; });
        document.getElementById('q-area').innerHTML = h; document.getElementById('feedback').style.display = 'none'; document.getElementById('next').style.display = 'none';
    }

    function check(i){
        let s = activeSet[idx]; const btns = document.getElementsByClassName('ans-btn');
        for(let b of btns) { b.disabled = true; if(Array.from(btns).indexOf(b) === s.a) { b.style.borderColor = "#00ff41"; b.style.color = "#00ff41"; } }
        if(i === s.a){ playSnd('ok'); sessionScore++; document.getElementById('feedback').innerHTML = "<span style='color:#00ff41'>[THRUST NOMINAL]</span> " + s.f; }
        else { playSnd('no'); sessionFails++; btns[i].style.borderColor = "#ff0000"; btns[i].style.color = "#ff0000"; document.getElementById('feedback').innerHTML = "<span style='color:#ff0000'>[CRITICAL FAILURE]</span> " + s.f; document.getElementById('main-hud').classList.add('shake'); setTimeout(() => document.getElementById('main-hud').classList.remove('shake'), 200); }
        updateLiveTelemetry();
        if (!isPracticeMode) {
            let currentGlobal = baseScore + sessionScore;
            if(currentGlobal >= 73) {
                document.getElementById('feedback').innerHTML += "<br><span style='color:#ffaa00; font-size:18px;'>⚠️ TARGET ACQUIRED. INITIATING LAUNCH SEQUENCE...</span>";
                currentScores[currentPillar] = sessionScore; sectorsCompleted[currentPillar] = true;
                localStorage.setItem('s66CurrentScores', JSON.stringify(currentScores)); localStorage.setItem('s66SectorsCompleted', JSON.stringify(sectorsCompleted));
                setTimeout(launchSequence, 1500); return;
            }
        }
        document.getElementById('feedback').style.display = 'block'; document.getElementById('next').style.display = 'block';
    }

    function next(){ idx++; show(); }
    function resetScores() { if(confirm("⚠️ WARNING: This will completely erase your current exam score and reset all pillars to PENDING. Proceed?")) { localStorage.clear(); location.reload(); } }
    updateMenuUI();
</script>
