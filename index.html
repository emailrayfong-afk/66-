            border-radius: 5px; 
        }

            position: absolute; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%) rotate(-45deg); 
            font-size: 40px; 
            transition: bottom 3s ease-in, opacity 2s ease-in; 
            z-index: 5;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(-50%) rotate(-45deg); }

            border: 1px solid #ccc; 
            height: 30px; 
            margin-top: 5px; 
            position: relative; 
            border-radius: 15px; 
            overflow: hidden;

            width: 0%; 
            height: 100%; 
            transition: width 0.5s; 
        }

        #total-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            color: #fff; 
            font-size: 12px; 
            line-height: 30px; 
            font-weight: bold; 
            top: 0; left: 0; z-index: 5;

        }

            background: #eee; 
            border-radius: 25px; 
            margin: 15px 0; 
            padding: 5px; 
        }

            flex: 1; 
            border: none; 
            background: none; 
            padding: 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 12px; 
            transition: all 0.3s;
        }

            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 10px; 
        }

        .p-btn { 
            background: #ffffff; 
            border: 2px solid var(--nasa-blue); 
            color: var(--nasa-blue); 
            padding: 15px; 
            cursor: pointer; 
            font-weight: bold;

// --- 2. ENGINE ---
let audioCtx;
let activeSet = [], idx = 0, currentPillar = 0, sessionScore = 0;
let mode = 'sprint'; 
let currentScores = [0, 0, 0, 0];

function setMode(m) {
    mode = m;
    document.getElementById('mode-sprint').className = m === 'sprint' ? 'mode-btn active' : 'mode-btn';
    document.getElementById('mode-sim').className = m === 'sim' ? 'mode-btn active' : 'mode-btn';
}

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function start(pillar) {
    initAudio(); 
    currentPillar = pillar;
    idx = 0; 
    sessionScore = 0;
    
    const sourceLib = (mode === 'sprint') ? sprintLib[pillar] : simLib[pillar];
    
    if (!sourceLib || sourceLib.length === 0) {
        alert("Pillar " + (pillar + 1) + " data is missing!");
        return;
    }

    const targetCount = (mode === 'sprint') ? 25 : [8, 17, 30, 45][pillar];
    const actualCount = Math.min(targetCount, sourceLib.length);
    
    let shuffled = [...sourceLib].sort(() => 0.5 - Math.random());
    activeSet = shuffled.slice(0, actualCount);
    
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    
    showQuestion();
}

function showQuestion() {
    const q = activeSet[idx];
    document.getElementById('status-line').innerText = `PILLAR 0${currentPillar + 1} | OBJECTIVE ${idx + 1} OF ${activeSet.length}`;
    
    // Randomize the choices for this specific display
    let choices = q.c.map((text, i) => ({ text: text, isCorrect: i === q.a }));
    choices.sort(() => 0.5 - Math.random());
    
    let html = `<div class="q-text">${q.q}</div>`;
    choices.forEach((choice) => {
        // We pass the boolean 'isCorrect' directly to the check function
        html += `<button class="ans-btn" onclick="check(${choice.isCorrect}, this)">${choice.text}</button>`;
    });
    
    document.getElementById('q-area').innerHTML = html;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next').style.display = 'none';
}

function check(isCorrect, btn) {
    const q = activeSet[idx];
    const btns = document.getElementsByClassName('ans-btn');
    
    if (isCorrect) {
        btn.style.background = "#e8f5e9";
        btn.style.borderColor = "#2e7d32";
        sessionScore++;
        playTone(600, 0.1);
    } else {
        btn.style.background = "#ffebee";
        btn.style.borderColor = "#c62828";
        // Find and highlight the correct button by comparing text
        for (let b of btns) {
            if (b.innerText === q.c[q.a]) {
                b.style.border = "2px solid #2e7d32";
            }
        }
        playTone(200, 0.2);
    }

    document.getElementById('feedback').innerHTML = `<strong>${isCorrect ? '✅ GO' : '❌ ERROR'}</strong>: ${q.f}`;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next').style.display = 'block';
    for (let b of btns) b.disabled = true;
}

function next() {
    idx++;
    if (idx < activeSet.length) {
        showQuestion(); 
    } else {
        endSession();
    }
}

function endSession() {
    const pct = Math.round((sessionScore / activeSet.length) * 100);
    currentScores[currentPillar] = Math.max(pct, currentScores[currentPillar]);
    
    const total = currentScores.reduce((a, b) => a + b, 0);
    const avg = Math.round(total / 4);

    const rocket = document.getElementById('rocket');
    // Launch only if total average (Flight Readiness) is 73 or higher
    if (avg >= 73) {
        rocket.classList.add('takeoff');
        setTimeout(() => { rocket.classList.remove('takeoff'); }, 3000);
    } else {
        rocket.classList.add('shake');
        setTimeout(() => { rocket.classList.remove('shake'); }, 1000);
    }

    document.getElementById('game').style.display = 'none';
    document.getElementById('menu').style.display = 'block';
    updateFuel();
}

function updateFuel() {
    const total = currentScores.reduce((a, b) => a + b, 0);
    const avg = Math.round(total / 4);
    document.getElementById('fuel-fill').style.width = avg + '%';
    document.getElementById('total-text').innerText = `FLIGHT READINESS: ${avg}%`;
    
    currentScores.forEach((s, i) => {
        const el = document.getElementById(`s${i}`);
        if (el) {
            el.innerText = s + '%';
            el.style.color = s >= 73 ? "#2e7d32" : "#666";
        }
    });
}

function playTone(freq, dur) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

window.onload = updateFuel;
