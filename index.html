const simLib = [
    [ // PILLAR 1: ECONOMICS
        {q: "An analyst identifies a stock with a very low P/B ratio and a high Dividend Yield. This stock would most likely be categorized as:", c: ["Value", "Growth", "Speculative", "High Beta"], a: 0, f: "Logic: Value investors look for 'bargains' (Low P/B) and are often rewarded with higher income (High Yield) while waiting for the price to rise."},      
        {q: "A stock is trading with a Price-to-Earnings (P/E) ratio of 45 and a Price-to-Book (P/B) ratio of 8.0. Which of the following is the most likely characteristic of this investment?", c: ["The company reinvests most of its earnings into expansion.", "The stock is considered a 'Value' investment.", "The stock provides a high dividend yield for income-seeking clients.", "The market price is very close to the company's liquidation value."], a: 0, f: "Logic: High P/E and High P/B are signatures of Growth stocks. Growth stocks reinvest earnings rather than paying dividends (High Yield)."},
        {q: "An analyst is comparing two companies in the same industry. Company A has a P/E of 25 and a P/S of 1.5. Company B has a P/E of 12 and a P/S of 4.5. Which of the following is the MOST accurate conclusion regarding Company B?", c: ["Company B has higher profit margins than Company A", "Company B is currently undervalued relative to its earnings", "Company B is a 'Growth' stock while Company A is a 'Value' stock", "Company B is generating less revenue per dollar of share price than Company A"], a: 0, f: "Logic: Application. A low P/E (12) suggests a company is 'cheap' relative to profit, but a high P/S (4.5) suggests it is 'expensive' relative to sales. The only way to have high profit relative to sales is to have high profit margins."},
        {q: "In a period of 'Stagflation,' which of the following economic conditions would an adviser expect to observe simultaneously?", c: ["Rising inflation and rising unemployment", "Rising inflation and decreasing unemployment", "Falling prices and rising GDP growth", "Increasing interest rates and decreasing CPI"], a: 0, f: "Logic: Definition Application. Stagflation is the 'worst of both worlds': Stagnant economic growth (high unemployment) combined with high Inflation."},
        {q: "A company's 'Quick Ratio' (Acid Test) has decreased over the last year, while its 'Current Ratio' has remained stable. What is the MOST likely cause of this divergence?", c: ["The company has significantly increased its inventory levels", "The company has paid off its short-term accounts payable", "The company has issued new long-term debentures", "The company's accounts receivable turnover has slowed down"], a: 0, f: "Logic: Formula Application. Current Ratio includes Inventory; Quick Ratio excludes it. If the Quick Ratio falls but the Current Ratio stays the same, the 'gap' (Inventory) must have grown."},
        {q: "Which of the following would be the MOST appropriate valuation tool for a project that has uneven cash flows over a 10-year period and requires an initial capital outlay?", c: ["Net Present Value (NPV)", "Dividend Discount Model (DDM)", "Price-to-Book Ratio", "Rule of 72"], a: 0, f: "Logic: Tool Selection. NPV is specifically designed to evaluate the present value of future uneven cash flows minus the initial cost to determine if a project is worth the investment."},
        {q: "If the U.S. Dollar strengthens significantly against the Euro, what is the most likely impact on the U.S. economy?", c: ["U.S. exports become more expensive for European consumers, potentially increasing the trade deficit", "U.S. exports become cheaper, leading to an increase in domestic manufacturing", "Foreign investment in U.S. Treasuries will decrease due to lower purchasing power", "Domestic inflation will rise as the cost of imported goods increases"], a: 0, f: "Logic: Currency Application. A 'Strong Dollar' makes our goods more expensive for foreigners to buy (bad for exports) but makes foreign goods cheaper for us to buy (good for imports/lowering inflation)."},
        {q: "According to the Discounted Cash Flow (DCF) method, which of the following changes would result in the HIGHEST increase in a security's intrinsic value?", c: ["A decrease in the discount rate and an increase in future cash flows", "An increase in the discount rate and an increase in future cash flows", "A decrease in the discount rate and a decrease in future cash flows", "The discount rate and cash flows both remaining stagnant while Beta increases"], a: 0, f: "Logic: Formula Directionality. Value goes UP when the numerator (cash flows) goes UP and the denominator (discount rate) goes DOWN."},
        {q: "An investor is reviewing a company's Annual Report and notices a 'Qualified Opinion' from the independent auditor. This should be interpreted by the IAR as:", c: ["The auditor has found specific areas of concern or departures from GAAP, though the overall report is fair", "The auditor has completely verified all financial statements as 100% accurate", "The company has been disqualified from listing on national exchanges", "The auditor was unable to complete the audit due to a lack of access to records"], a: 0, f: "Logic: Audit Nuance. An 'Unqualified' opinion is the best (clean). A 'Qualified' opinion means 'Everything is okay, EXCEPT for these specific items.'"},
        {q: "A 'Large Cap' growth company is most likely to have which of the following financial characteristics?", c: ["A high P/E ratio and a low dividend payout ratio", "A low P/E ratio and a high dividend payout ratio", "A high Price-to-Book ratio and a high dividend yield", "A low Debt-to-Equity ratio and a high Current Ratio"], a: 0, f: "Logic: Characteristics. Growth companies reinvest their earnings to expand (low/no dividend) and investors pay a premium for that future growth (high P/E)."},
        {q: "A company's P/E ratio is high compared to its industry, but its Dividend Yield is also significantly higher than average. What does this MOST likely indicate about the company?", c: ["The company is likely a mature 'Utility' or 'Value' stock with slowing growth but strong cash flows", "The company is a 'High-Growth' startup reinvesting all profits into R&D", "The stock is fundamentally undervalued and represents a 'Strong Buy' for aggressive investors", "The company is currently in a state of 'Liquidation' and returning all capital to shareholders"], a: 0, f: "Logic: Application. A high P/E usually means growth, but a high dividend yield usually means maturity. In utilities, investors pay a premium for steady dividends, leading to this 'all-plausible' conflict."},
        {q: "If the Consumer Price Index (CPI) is rising at 4% annually while the nominal return on a 10-year Treasury note is 3.5%, what is the 'Real Rate of Return' for an investor in that note?", c: ["-0.5% (Negative)", "0.5% (Positive)", "7.5% (Total)", "3.5% (Nominal)"], a: 0, f: "Logic: Calculation Application. Real Return = Nominal Return - Inflation (3.5% - 4% = -0.5%). This is the 'Purchasing Power Risk' trap."},
        {q: "A corporation decides to issue a 2-for-1 stock split. Which of the following balance sheet items will experience a CHANGE as a direct result of this action?", c: ["The par value of the common stock", "The total shareholders' equity", "The company's working capital", "The retained earnings balance"], a: 0, f: "Logic: Application. A stock split is a 'paper' change. Equity, working capital, and retained earnings stay the same; only the number of shares and the par value (cut in half) change."},
        {q: "Which of the following scenarios would lead to an 'Inverted Yield Curve'?", c: ["The Federal Reserve aggressively raises short-term rates to combat inflation while investors seek safety in long-term bonds", "The government decreases spending, causing long-term interest rates to rise faster than short-term rates", "The economy enters a period of rapid expansion with high demand for short-term commercial loans", "The U.S. Dollar weakens, causing foreign investors to dump long-term Treasuries"], a: 0, f: "Logic: Macroeconomic Application. Inversion happens when the Fed pushes the 'front end' (short-term) up, but the 'back end' (long-term) stays low due to recession fears."},
        {q: "An investor is using the 'Rule of 72' to evaluate an investment. If the investment is expected to double in 6 years, what is the required annual rate of return?", c: ["12%", "6%", "7.2%", "10%"], a: 0, f: "Logic: Math Application. 72 / 6 = 12%. This is a foundational 'math' question often found in Section 1."},
        {q: "A company's 'Total Asset Turnover' ratio has increased, while its 'Net Profit Margin' has decreased. If 'Total Assets' remained constant, what is the MOST likely conclusion?", c: ["The company is selling more products but making less profit on each sale", "The company is selling fewer products but increasing its prices", "The company has paid off all of its long-term debt", "The company's P/E ratio will automatically increase"], a: 0, f: "Logic: Interpretation. Asset Turnover = Sales / Assets. If it goes up, Sales went up. If Profit Margin is down, they are less efficient despite higher volume."},
        {q: "Which of the following would be considered a 'Leading' economic indicator by the Conference Board?", c: ["The Index of Consumer Expectations", "The Average Prime Rate charged by banks", "Commercial and industrial loans outstanding", "The Consumer Price Index for services"], a: 0, f: "Logic: Category Application. Consumer expectations are forward-looking (Leading). Prime rate and loans are Lagging."},
        {q: "An IAR is looking at a company's Cash Flow Statement. Which section would contain the information regarding the payment of cash dividends to shareholders?", c: ["Financing Activities", "Operating Activities", "Investing Activities", "Equity Activities"], a: 0, f: "Logic: Financial Statement Application. Dividends involve the 'financing' of the company (dealing with shareholders/debt holders), so they go under Financing Activities."},
        {q: "In a 'Deflationary' environment, which of the following is the MOST significant risk to a borrower with a fixed-rate loan?", c: ["The 'Real' burden of the debt increases as the value of money rises", "The interest rate on the loan will automatically reset to a higher level", "The borrower will be unable to find new lenders for future projects", "The market value of the collateral will increase faster than the debt"], a: 0, f: "Logic: Economic Risk. In deflation, money is worth more tomorrow. Paying back a fixed amount of 'expensive' money is harder for the borrower."},
        {q: "An analyst is calculating the 'Quick Ratio' for a retail company. The company has $100k in Cash, $50k in Accounts Receivable, $200k in Inventory, and $100k in Current Liabilities. What is the Quick Ratio?", c: ["1.5 to 1", "3.5 to 1", "1.0 to 1", "2.5 to 1"], a: 0, f: "Logic: Math Application. Quick Ratio = (Cash + AR) / Current Liabilities. ($100k + $50k) / $100k = 1.5. Inventory is EXCLUDED."},
        {q: "If the 'Spread' between the 2-year Treasury and the 10-year Treasury narrows from 150 basis points to 10 basis points, the yield curve is said to be:", c: ["Flattening", "Steepening", "Inverting", "Normalizing"], a: 0, f: "Logic: Curve Observation. When the gap (spread) between short and long rates gets smaller, the curve is flattening."},
        {q: "Which of the following yield curves is typically considered a 'Leading Indicator' of an impending economic expansion?", c: ["A steeply upward-sloping curve", "A flat curve", "An inverted curve", "A humped curve"], a: 0, f: "Logic: Cycle Application. A steep curve suggests investors expect higher growth and inflation in the future, signaling expansion."},
        {q: "If interest rates are expected to fall, which bond would experience the LARGEST percentage increase in price?", c: ["A 30-year Zero-Coupon Bond", "A 30-year Bond with a 10% coupon", "A 5-year Zero-Coupon Bond", "A 1-year Treasury Bill"], a: 0, f: "Logic: Duration Application. Longest maturity + Lowest coupon (Zero) = Highest Duration (Sensitivity to rates)."},
        {q: "A client is concerned about 'Reinvestment Risk.' In which interest rate environment is this risk the HIGHEST?", c: ["Falling interest rates", "Rising interest rates", "Stable interest rates", "Inverted interest rates"], a: 0, f: "Logic: Risk Application. If rates fall, the cash you get from coupons must be reinvested into new bonds that pay lower yields."},
        {q: "The 'Real' interest rate is calculated by:", c: ["Subtracting the inflation rate from the nominal interest rate", "Adding the inflation rate to the nominal interest rate", "Dividing the nominal rate by the Consumer Price Index", "Multiplying the risk-free rate by the Beta of the market"], a: 0, f: "Logic: Math Application. Real = Nominal - Inflation."},
        {q: "Which of the following would be an expected result of the Federal Reserve implementing 'Tight' monetary policy?", c: ["Short-term interest rates increase and the money supply contracts", "Short-term interest rates decrease and the money supply expands", "Long-term bond prices increase as inflation expectations rise", "The US Dollar weakens against foreign currencies"], a: 0, f: "Logic: Fed Policy Application. Tightening (Hawkish) means higher rates and less cash in the system."},
        {q: "An investor buys a bond with a 5% coupon at par. One year later, similar bonds are yielding 7%. If the investor sells the bond now, they will experience:", c: ["A capital loss", "A capital gain", "No change in principal value", "An increase in their yield-to-maturity"], a: 0, f: "Logic: Inverse Relationship. Rates went UP (5 to 7), so Bond Price went DOWN (Capital Loss)."},
        {q: "What does a 'Humped' yield curve typically indicate?", c: ["A period of transition where interest rate policy is uncertain", "A guaranteed immediate recession", "A period of high long-term inflation", "A period of rapid economic growth"], a: 0, f: "Logic: Curve Nuance. A humped curve (where mid-term rates are highest) usually happens when the market is transitioning between normal and inverted states."},
        {q: "The 'Discount Rate' charged by the Federal Reserve is the rate at which:", c: ["Member banks can borrow directly from the Federal Reserve", "Banks charge each other for overnight loans of reserves", "The US Treasury sells new debt to the public", "Investment advisers discount future cash flows for DCF"], a: 0, f: "Logic: Definition Trap. Don't confuse the Fed's 'Discount Rate' with the 'Discount Rate' used in DCF math."},
        {q: "In an environment with an Inverted Yield Curve, a bank's 'Net Interest Margin' (profitability) is most likely to:", c: ["Decrease, because banks 'borrow short and lend long'", "Increase, because short-term loan rates are higher", "Remain stable because the Fed controls bank spreads", "Increase, because depositors will seek long-term savings"], a: 0, f: "Logic: Business Application. Banks pay short-term rates to depositors and collect long-term rates from borrowers. If short-term rates are higher (Inversion), their profit disappears."},
        {q: "In a 'Normal Distribution' (Bell Curve), what percentage of data points fall within ONE standard deviation of the mean?", c: ["68%", "95%", "99%", "50%"], a: 0, f: "Logic: Stats Rule. 1 SD = 68%. 2 SD = 95%. 3 SD = 99%."},
        {q: "If a set of annual returns for a fund are 10%, 10%, 15%, 20%, and -5%, what is the 'Mode' of this data set?", c: ["10%", "15%", "25%", "20%"], a: 0, f: "Logic: Definition. Mode = Most frequent number (10% appears twice)."},
        {q: "The 'Median' return for a data set is defined as:", c: ["The middle value when all returns are ranked from lowest to highest", "The sum of all returns divided by the number of years", "The difference between the highest and lowest return", "The return that occurred most frequently"], a: 0, f: "Logic: Definition. Median = Middle."},
        {q: "Which of the following measures 'Total Risk' or the dispersion of returns around the mean?", c: ["Standard Deviation", "Beta", "Mean", "R-Squared"], a: 0, f: "Logic: Definition. Standard Deviation is the 'Risk' metric for total volatility."},
        {q: "If an investment has a Mean return of 10% and a Standard Deviation of 5%, what is the range of returns you would expect to see 95% of the time?", c: ["0% to 20%", "5% to 15%", "-5% to 25%", "10% to 15%"], a: 0, f: "Logic: Stats Application. 95% = 2 Standard Deviations. 10% +/- (2 * 5%) = 0% to 20%."},
        {q: "The 'Geometric Mean' is often preferred over the 'Arithmetic Mean' for measuring investment returns because it:", c: ["Accounts for the effects of compounding over time", "Is easier to calculate with a basic calculator", "Ignores years with negative returns", "Always results in a higher number than the arithmetic mean"], a: 0, f: "Logic: Calculation Nuance. Geometric = Time-weighted/Compounded. Arithmetic = Simple average."},
        {q: "A 'Positive Correlation' (Coefficient of +1.0) between two stocks means that:", c: ["The two stocks move in the exact same direction at the same time", "One stock moves up when the other stock moves down", "The two stocks have no statistical relationship", "Both stocks are guaranteed to provide a positive return"], a: 0, f: "Logic: Definition. +1 = Mirror movement."},
        {q: "An investor seeking 'Diversification' should look for assets with a correlation coefficient that is:", c: ["Low or Negative (closer to -1.0)", "High and Positive (closer to +1.0)", "Exactly 0.0", "Always equal to the market's Beta"], a: 0, f: "Logic: Portfolio Application. You want things that DON'T move together so when one is down, the other is up."},
        {q: "The 'Range' of a data set is calculated by:", c: ["Subtracting the lowest value from the highest value", "Averaging all data points", "Finding the most frequent data point", "Calculating the square root of the variance"], a: 0, f: "Logic: Definition. Range = High - Low."},
        {q: "Which of the following describes a 'Skewed' distribution?", c: ["A distribution where the mean, median, and mode are not equal", "A perfectly symmetrical bell curve", "A distribution where all data points are the same", "A distribution with a standard deviation of zero"], a: 0, f: "Logic: Stats Definition. If it's not a perfect bell curve, it's skewed."},
        {q: "If a stock has a 'Beta' of 0.0, this means the stock's returns are:", c: ["Uncorrelated with the overall market", "Guaranteed to be 0%", "Risk-free (like a T-Bill)", "Always moving in the opposite direction of the market"], a: 0, f: "Logic: Beta Application. 0 Beta means it doesn't care what the S&P 500 is doing."},
        {q: "R-Squared measures:", c: ["The percentage of a fund's movements that can be explained by movements in its benchmark index", "The total return of a fund minus the risk-free rate", "The probability that a company will go bankrupt within one year", "The dividend yield of a stock relative to its industry peers"], a: 0, f: "Logic: Definition. R-Squared shows how 'correlated' the fund is to the index."},
        {q: "If a fund has an R-Squared of 95%, an IAR should use which metric to evaluate its risk?", c: ["Beta", "Standard Deviation", "Alpha", "Range"], a: 0, f: "Logic: Tool Selection. High R-Squared means it follows the index, so Beta is a reliable measure of risk."},
        {q: "Which of the following is the square root of the variance?", c: ["Standard Deviation", "Mean", "Median", "Correlation Coefficient"], a: 0, f: "Logic: Definition. Variance = SD Squared. Therefore, SD = Square Root of Variance."},
        {q: "An 'Outlier' in a data set will have the LARGEST impact on which of the following?", c: ["The Mean", "The Median", "The Mode", "The Standard Deviation (relative to the Median)"], a: 0, f: "Logic: Stats Application. One huge number (like a 1,000% return) will pull the 'Average' (Mean) up significantly, even if the 'Middle' (Median) stays the same."},
        {q: "A 'Probability Distribution' shows:", c: ["All possible outcomes and the likelihood of each occurring", "The historical returns of the S&P 500 over 50 years", "The current interest rates offered by major commercial banks", "The net worth requirements for all accredited investors"], a: 0, f: "Logic: Definition. Probability = Chance of X happening."},
        {q: "If the 'Expected Return' of a portfolio is 10%, this represents:", c: ["The weighted average of the probable returns of the individual assets", "The minimum return guaranteed by the IAR", "The return achieved in the previous calendar year", "The risk-free rate plus the total standard deviation"], a: 0, f: "Logic: Definition. Expected return is a 'forecast' based on weights."},
        {q: "Which of the following is a 'Univariate' analysis?", c: ["Analyzing the returns of a single stock over time", "Analyzing the relationship between interest rates and bond prices", "Analyzing the correlation between gold and the US Dollar", "Analyzing the impact of the Fed's move on the S&P 500"], a: 0, f: "Logic: Definition. Uni = One. One variable."},
        {q: "The 'Risk-Adjusted Return' is most commonly measured by which of the following ratios?", c: ["Sharpe Ratio", "P/E Ratio", "Current Ratio", "Debt-to-Equity Ratio"], a: 0, f: "Logic: Definition. Sharpe = Return per unit of risk."},
        {q: "In a perfectly symmetrical 'Normal Distribution,' which of the following is TRUE?", c: ["The Mean, Median, and Mode are all equal", "The Standard Deviation is zero", "The Beta is exactly 1.0", "The Range is infinite"], a: 0, f: "Logic: Stats Rule. On a perfect bell curve, the average, the middle, and the most frequent are all the same point."}
    ],
    sprintLib[1], // Copies the exact same 100 questions from Pillar 2 
    sprintLib[2], // Copies the exact same 100 questions from Pillar 3
    sprintLib[3]  // Copies the exact same 100 questions from Pillar 4
];


// ========================================
// ENGINE LOGIC
// ========================================
let mode = 'sprint';
let currentPillar = 0;
let currentQ = 0;
let score = 0;
let pillarScores = [0, 0, 0, 0];
let pillarCompleted = [false, false, false, false];
let isPracticeMode = false;
let answered = false;
let missionLog = [];
let activeSet = []; 
let audioContext = null;

function initAudio() {
    if (!audioContext) {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
            console.log('Audio not supported');
        }
    }
}

function playSound(type) {
    if (!audioContext) return;
    const osc = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioContext.destination);
    switch(type) {
        case 'countdown':
            osc.frequency.value = 800;
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.1);
            break;
        case 'liftoff':
            osc.frequency.value = 200;
            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 2);
            break;
        case 'crash':
            osc.type = 'sawtooth';
            osc.frequency.value = 100;
            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.5);
            break;
    }
}

function setMode(m) {
    if (mode !== m) {
        score = 0; pillarScores = [0, 0, 0, 0]; pillarCompleted = [false, false, false, false]; missionLog = [];
        updateProgress();
        const rocket = document.getElementById('rocket');
        rocket.className = ''; rocket.style.display = 'block'; rocket.style.bottom = '10px';
        for (let i = 0; i < 4; i++) {
            document.getElementById(`s${i}`).textContent = 'PENDING'; document.getElementById(`s${i}`).style.color = '';
        }
    }
    mode = m;
    document.getElementById('mode-sprint').classList.toggle('active', m === 'sprint');
    document.getElementById('mode-sim').classList.toggle('active', m === 'sim');
}

function start(pillar) {
    currentPillar = pillar; currentQ = 0; score = 0; answered = false;
    const count = mode === 'sprint' ? SPRINT_Q_COUNT : SIM_WEIGHTS[pillar];
    const sourceLib = mode === 'sprint' ? sprintLib[pillar] : simLib[pillar];
    let shuffled = [...sourceLib].sort(() => 0.5 - Math.random());
    // Safe slicing: If there are fewer questions than the weight, it handles it gracefully
    activeSet = shuffled.slice(0, Math.min(count, shuffled.length));
    isPracticeMode = pillarCompleted[pillar];
    document.getElementById('menu').style.display = 'none'; document.getElementById('game').style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const q = activeSet[currentQ]; const total = activeSet.length;
    const modeLabel = isPracticeMode ? 'PRACTICE' : (mode === 'sprint' ? 'SPRINT' : 'SIMULATION');
    document.getElementById('status-line').textContent = `${modeLabel} MODE | GATE ${currentQ + 1} of ${total}`;
    
    let choicesToDisplay = (mode === 'sprint') ? q.c.slice(0, 2) : q.c;
    let scrambled = choicesToDisplay.map((text, i) => ({ text, originalIndex: i }));
    scrambled.sort(() => 0.5 - Math.random());
    
    let html = `<div class="q-text">${q.q}</div>`;
    scrambled.forEach(choice => {
        html += `<button class="ans-btn" onclick="checkAnswer(${choice.originalIndex}, this)">${choice.text}</button>`;
    });
    if (isPracticeMode) html += `<button class="nav-btn" style="display:block; background:#666; margin-top:15px;" onclick="abortPractice()">⚠️ ABORT PRACTICE</button>`;
    
    document.getElementById('q-area').innerHTML = html;
    document.getElementById('feedback').style.display = 'none'; document.getElementById('next').style.display = 'none';
    answered = false;
}

function checkAnswer(selected, btnElement) {
    if (answered) return; answered = true;
    const q = activeSet[currentQ]; const buttons = document.querySelectorAll('.ans-btn');
    const isCorrect = (selected === q.a);
    buttons.forEach(btn => btn.disabled = true);
    
    if (isCorrect) {
        btnElement.classList.add('correct');
        if (!isPracticeMode) score++; 
        document.getElementById('feedback').innerHTML = `✅ CORRECT!<br><br>${q.f}`;
        document.getElementById('feedback').style.background = '#e8f5e9'; document.getElementById('feedback').style.borderColor = '#2e7d32';
        playSound('countdown');
    } else {
        btnElement.classList.add('wrong');
        document.getElementById('feedback').innerHTML = `❌ INCORRECT<br><br>${q.f}`;
        document.getElementById('feedback').style.background = '#ffebee'; document.getElementById('feedback').style.borderColor = '#c62828';
        playSound('crash');
    }
    
    missionLog.push({ question: q.q, yourAnswer: q.c[selected] || "Unknown", correctAnswer: q.c[q.a], isCorrect: isCorrect, feedback: q.f, pillar: `Pillar ${currentPillar + 1}` });
    document.getElementById('feedback').style.display = 'block'; document.getElementById('next').style.display = 'block';
    if (!isPracticeMode) updateProgress();
}

function next() {
    currentQ++;
    if (currentQ < activeSet.length) showQuestion(); else endPillar();
}

function endPillar() {
    const total = activeSet.length; const percent = Math.round((score / total) * 100);
    if (!isPracticeMode) { pillarScores[currentPillar] = percent; pillarCompleted[currentPillar] = true; }
    
    const modeText = isPracticeMode ? 'PRACTICE SESSION' : (mode === 'sprint' ? 'PILLAR' : 'SIMULATION');
    let completionHTML = `<div style="text-align:center; padding:30px;"><h2 style="color: var(--nasa-blue);">${modeText} ${isPracticeMode ? '' : currentPillar + 1} COMPLETE</h2><div style="font-size:48px; margin:20px 0;">${percent}%</div><div style="font-size:18px;">Score: ${score}/${total}</div>`;
    if (isPracticeMode) completionHTML += '<p style="color:#666; font-size:14px;">Practice mode - score not recorded</p>';
    completionHTML += '</div>';
    
    document.getElementById('q-area').innerHTML = completionHTML; document.getElementById('feedback').style.display = 'none';
    document.getElementById('next').innerHTML = 'RETURN TO MENU'; document.getElementById('next').onclick = returnToMenu; document.getElementById('next').style.display = 'block';
    
    const logBtn = document.createElement('button'); logBtn.className = 'nav-btn'; logBtn.style.display = 'block'; logBtn.style.background = '#666'; logBtn.style.marginTop = '10px'; logBtn.textContent = '📋 VIEW MISSION LOG'; logBtn.onclick = showMissionLog;
    document.getElementById('next').parentNode.insertBefore(logBtn, document.getElementById('next').nextSibling);
    
    if (!isPracticeMode) { updateProgress(); checkMissionComplete(); }
}

function abortPractice() { if (confirm('Abort practice session and return to menu?')) returnToMenu(); }

function showMissionLog() {
    let logHTML = '<h2 style="color: var(--nasa-blue); text-align:center;">📋 MISSION LOG</h2><div style="max-height:400px; overflow-y:auto; padding:10px;">';
    missionLog.forEach((entry, i) => {
        const statusColor = entry.isCorrect ? '#2e7d32' : '#c62828'; const statusIcon = entry.isCorrect ? '✅' : '❌';
        logHTML += `<div style="border-left: 4px solid ${statusColor}; padding:10px; margin:10px 0; background:#f9f9f9;"><div style="font-weight:bold; color:${statusColor};">${statusIcon} Question ${i + 1} - ${entry.pillar}</div><div style="margin:5px 0; font-size:14px;">${entry.question}</div><div style="margin:5px 0; font-size:13px;"><strong>Your Answer:</strong> ${entry.yourAnswer}<br><strong>Correct Answer:</strong> ${entry.correctAnswer}</div><div style="margin:5px 0; font-size:12px; color:#666;">${entry.feedback}</div></div>`;
    });
    logHTML += '</div><button class="nav-btn" style="display:block;" onclick="closeMissionLog()">CLOSE LOG</button>';
    document.getElementById('q-area').innerHTML = logHTML; document.getElementById('next').style.display = 'none';
    const extraButtons = document.querySelectorAll('#game .nav-btn'); extraButtons.forEach((btn, i) => { if (i > 1) btn.remove(); });
}

function closeMissionLog() { endPillar(); }

function returnToMenu() {
    document.getElementById('game').style.display = 'none'; document.getElementById('menu').style.display = 'block'; document.getElementById('next').onclick = next; document.getElementById('next').innerHTML = 'NEXT GATE >';
    const extraButtons = document.querySelectorAll('#game .nav-btn'); extraButtons.forEach((btn, i) => { if (i > 0) btn.remove(); });
    pillarScores.forEach((score, i) => { if (pillarCompleted[i]) { document.getElementById(`s${i}`).textContent = `${score}% ✓`; document.getElementById(`s${i}`).style.color = '#2e7d32'; } });
}

function updateProgress() {
    const totalQuestions = mode === 'sprint' ? (SPRINT_Q_COUNT * 4) : SIM_WEIGHTS.reduce((a,b) => a+b, 0);
    const completedQuestions = pillarScores.reduce((sum, score, i) => {
        const pillarLength = mode === 'sprint' ? SPRINT_Q_COUNT : SIM_WEIGHTS[i];
        return sum + Math.round((score / 100) * pillarLength);
    }, 0);
    const percent = totalQuestions > 0 ? Math.round((completedQuestions / totalQuestions) * 100) : 0;
    document.getElementById('fuel-fill').style.width = percent + '%'; document.getElementById('total-text').textContent = `FLIGHT READINESS: ${percent}%`;
}

function checkMissionComplete() {
    if (!pillarCompleted.every(completed => completed === true)) return;
    const totalScore = pillarScores.reduce((sum, score) => sum + score, 0) / 4;
    if (totalScore >= 73) launchRocket(); else crashRocket();
}

function launchRocket() {
    const rocket = document.getElementById('rocket'); const countdownEl = document.getElementById('countdown');
    countdownEl.style.display = 'block'; rocket.classList.add('shake');
    let count = 5; countdownEl.textContent = count; playSound('countdown');
    const countdownInterval = setInterval(() => {
        count--;
        if (count > 0) { countdownEl.textContent = count; playSound('countdown'); } 
        else {
            countdownEl.textContent = 'LIFTOFF!'; playSound('liftoff');
            setTimeout(() => { rocket.classList.remove('shake'); rocket.classList.add('takeoff'); setTimeout(() => { countdownEl.style.display = 'none'; countdownEl.textContent = ''; }, 2000); }, 500);
            clearInterval(countdownInterval);
        }
    }, 1000);
}

function crashRocket() {
    const rocket = document.getElementById('rocket'); const countdownEl = document.getElementById('countdown');
    countdownEl.style.display = 'block'; countdownEl.textContent = 'MISSION FAILED'; countdownEl.style.color = '#c62828';
    playSound('crash'); rocket.classList.add('crash');
    setTimeout(() => { countdownEl.style.display = 'none'; rocket.style.display = 'none'; }, 1500);
}

window.onload = updateProgress;
</script>
