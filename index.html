], [ // 03. STRATEGY & RECOMMENDATIONS (EASY MODE: 51-75)
    {q: "Does a 'Grantor' of a Revocable Trust pay the taxes on the trust's income?", c: ["Yes", "No"], a: 0, f: "Logic: In a Revocable Trust, the grantor retains control, so the IRS treats the income as the grantor's personal income."},

    {q: "In an ERISA plan, a 'Safe Harbor' 401(k) avoids which requirement?", c: ["Annual Non-Discrimination Testing", "Fiduciary Duty"], a: 0, f: "Logic: Safe Harbor plans mandate employer contributions to ensure the plan isn't 'top-heavy' for executives, skipping the annual test."},

    {q: "Which trust type is used specifically to care for a surviving spouse and then pass assets to children?", c: ["QTIP Trust", "Simple Trust"], a: 0, f: "Logic: A Qualified Terminable Interest Property (QTIP) trust is common in second marriages to protect both the spouse and the kids."},

],[ // 04. REGULATIONS & GUIDELINES (EASY MODE: 1-50)
    {q: "Under the USA, a 'Person' includes which of the following?", c: ["A Corporation", "A Deceased Individual"], a: 0, f: "Logic: In law, a 'Person' is any entity capable of entering a contract. Dead people, minors, and those declared mentally incompetent are NOT 'persons.'"},
    {q: "A Broker-Dealer MUST register in a state if they have:", c: ["A physical office in the state", "Only 3 retail clients and no office"], a: 0, f: "Logic: For Broker-Dealers, having an office (Place of Business) triggers registration immediately. There is NO 'de minimis' for BDs with an office."},
    {q: "The 'De Minimis' exemption for Investment Advisers (IAs) allows how many retail clients before registration?", c: ["5 or fewer", "10 or fewer"], a: 0, f: "Logic: IA/IARs can have up to 5 retail clients in a state where they have NO office before they must register."},
    {q: "Does an IAR of a 'Federal Covered Adviser' register with the SEC or the State?", c: ["The State", "The SEC"], a: 0, f: "Logic: The SEC registers firms (IAs). The States register the individuals (IARs)."},
    {q: "Which document is permanent and allows the Administrator to receive legal papers for you?", c: ["Consent to Service of Process", "Registration Application"], a: 0, f: "Logic: This document is filed once and never needs renewal; it makes the Admin your attorney-in-fact for legal service."},
    {q: "When does a state registration for an Agent or IAR expire?", c: ["Every December 31st", "One year from the effective date"], a: 0, f: "Logic: All state licenses expire at year-end, regardless of when you first got licensed."},
    {q: "The Administrator can deny registration for a felony conviction that occurred within the last:", c: ["10 Years", "5 Years"], a: 0, f: "Logic: The 'Statutory Disqualification' look-back period is 10 years for any felony."},
    {q: "Is an 'Agent' representing a Broker-Dealer required to register even if they only sell exempt securities?", c: ["Yes", "No"], a: 0, f: "Logic: If you work for a BD, you must register to sell anything. The 'exempt security' loophole only applies to people representing Issuers."},
    {q: "A firm with >$110 million in AUM is defined as a:", c: ["Federal Covered Adviser", "State Registered Adviser"], a: 0, f: "Logic: Once an IA hits $110M AUM, SEC registration is mandatory."},
    {q: "What is the standard time for a registration to become 'Effective' after filing?", c: ["Noon on the 30th Day", "Noon on the 15th Day"], a: 0, f: "Logic: Unless the Admin speeds it up or stops it, it becomes active 30 days after the application is complete."},
    {q: "If an Agent leaves a Broker-Dealer, who must notify the Administrator?", c: ["Both the Agent and the BD", "Only the Agent"], a: 0, f: "Logic: For BDs, it's a dual notification. For IARs of State firms, it's the firm (unless they don't, then the IAR must)."},
    {q: "Can the Administrator issue a 'Cease and Desist' order without a prior hearing?", c: ["Yes (Summarily)", "No"], a: 0, f: "Logic: The Admin can act quickly to stop a violation, but must provide an opportunity for a hearing afterward."},
    {q: "Which of the following is NOT a security?", c: ["A Fixed Annuity", "A Variable Annuity"], a: 0, f: "Logic: Fixed insurance products carry no market risk for the owner and are not securities."},

    {q: "Under the USA, can an IAR charge performance-based fees to a retail client with a $50,000 net worth?", c: ["No", "Yes"], a: 0, f: "Logic: Performance fees are restricted to 'Qualified Clients' (high net worth/AUM) to prevent exploitation."},
    {q: "An IA is deemed to have 'Custody' if they inadvertently receive a client's check and don't return it within:", c: ["3 Business Days", "24 Hours"], a: 0, f: "Logic: You have 72 hours (3 business days) to return misdirected funds before you are legally 'holding' them."},
    {q: "Which part of Form ADV is known as the 'Brochure' and given to clients?", c: ["Part 2A", "Part 1"], a: 0, f: "Logic: Part 1 is for regulators (the 'FBI' part). Part 2 is the plain-English brochure for the public."},
    {q: "Can a Broker-Dealer Agent share in the profits of a client's account?", c: ["Yes (with permission and proportional contribution)", "No"], a: 0, f: "Logic: Unlike IARs (who are fiduciaries and can't share), Agents can share if they have written permission and put their own money in."},
    {q: "The power of the Administrator to look at records outside of their home state is called:", c: ["Subpoena Power", "Injunction Power"], a: 0, f: "Logic: The Admin can cross state lines to compel witnesses or records to appear."},

    {q: "How long must an IA maintain 'Books and Records'?", c: ["5 Years", "3 Years"], a: 0, f: "Logic: The IA rule is 5 years total (2 years in the main office). BDs are usually 3 years."},
    {q: "A 'Federal Covered Security' (like an NYSE-listed stock) is required to:", c: ["Notice File and pay a fee", "Register with the State"], a: 0, f: "Logic: States cannot 'register' federal securities, but they can demand a 'Notice Filing' and a filing fee."},
    {q: "Under the 'Prudent Investor Act', risk should be managed at the level of the:", c: ["Entire Portfolio", "Individual Investment"], a: 0, f: "Logic: You judge a fiduciary by how the whole mix behaves, not by one stock that went down."},
    {q: "Which state-registered entity must maintain a higher Net Worth: One with Custody or one with Discretion?", c: ["Custody ($35k)", "Discretion ($10k)"], a: 0, f: "Logic: If you touch the money (custody), the state requires you to have more 'skin in the game' ($35k)."},

function setMode(m) {
    if (appMode !== m) {

        currentScores = [0,0,0,0];
        sectorsDone = [false,false,false,false];
        localStorage.setItem('artemisMode', m);

function calculateGlobalPercentage() {
    return Math.min(100, currentScores.reduce((a,b) => a + b, 0));
}

function updateMenuUI() {
    let pct = calculateGlobalPercentage();

    document.getElementById('mode-sim').classList.toggle('active', appMode === 'sim');
}

        for (let cIdx = q.c.length - 1; cIdx > 0; cIdx--) {
            const k = Math.floor(Math.random() * (cIdx + 1));
            [q.c[cIdx], q.c[k]] = [q.c[k], q.c[cIdx]];
        }
        q.a = q.c.indexOf(correctText);
    });

    activeSet = pillarPool.slice(0, Math.min(count, pillarPool.length));
    idx = 0; sessionScore = 0;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('abort-btn').style.display = 'block';
    show();
}

function show(){
    if(idx >= activeSet.length){
        if (!isRetake) {
            currentScores[currentPillar] = sessionScore; 
            sectorsDone[currentPillar] = true;
            localStorage.setItem('artemisScores', JSON.stringify(currentScores));
            localStorage.setItem('artemisDone', JSON.stringify(sectorsDone));
        }
        let pct = calculateGlobalPercentage();
        let allDone = sectorsDone.every(s => s === true);
        if (allDone && appMode === 'sim' && !isRetake) {
            if(pct >= 73) launchSequence(); else explodeSequence();
        } else {
            document.getElementById('game').style.display = 'none';
            document.getElementById('report').style.display = 'block';
            document.getElementById('report-title').innerText = isRetake ? "PRACTICE COMPLETE" : "SECTOR COMPLETE";
            document.getElementById('rep-msg').innerHTML = `<h3>SCORE: ${sessionScore} / ${activeSet.length}</h3><p style="color:var(--artemis-red); font-weight:bold;">${isRetake ? "PRACTICE RUN: GLOBAL SCORE LOCKED." : "READINESS UPDATED."}</p><p>Global Readiness: ${pct}%</p>`;
        }
        return;
    }
    let s = activeSet[idx], h = `<div class="q-text">${s.q}</div>`;
    s.c.forEach((v,i) => { h += `<button class="ans-btn" onclick="check(${i})"><strong>${String.fromCharCode(65+i)}.</strong> ${v}</button>`; });
    document.getElementById('q-area').innerHTML = h;
    let modeLabel = isRetake ? `<span style="color:var(--artemis-red)">[PRACTICE]</span>` : appMode.toUpperCase();
    document.getElementById('status-line').innerHTML = `GATE ${idx+1}/${activeSet.length} | ${modeLabel} | SCORE: ${sessionScore}`;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next').style.display = 'none';
}

function check(i){
    let s = activeSet[idx]; const btns = document.getElementsByClassName('ans-btn');
    let isOk = (i === s.a);
    missionLog.push({ q: s.q, mine: s.c[i], correct: s.c[s.a], isOk: isOk, logic: s.f });
    for(let b of btns) b.disabled = true;
    if(isOk){ playSnd('ok'); sessionScore++; btns[i].classList.add('correct-ans'); }
    else { playSnd('no'); btns[i].classList.add('wrong-ans'); btns[s.a].classList.add('correct-ans'); }
    document.getElementById('feedback').innerHTML = s.f;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next').style.display = 'block';
    let modeLabel = isRetake ? `<span style="color:var(--artemis-red)">[PRACTICE]</span>` : appMode.toUpperCase();
    document.getElementById('status-line').innerHTML = `GATE ${idx+1}/${activeSet.length} | ${modeLabel} | SCORE: ${sessionScore}`;
}

function launchSequence() {
    const overlay = document.getElementById('countdown-overlay');
    const hud = document.getElementById('main-hud');
    const rocket = document.getElementById('rocket');
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game').style.display = 'none';
    document.getElementById('report').style.display = 'none';
    overlay.style.display = 'block'; 
    let count = 3;
    const timer = setInterval(() => {
        if(count > 0) { overlay.innerText = `T-MINUS ${count}...`; playSnd('beep'); count--; }
        else {
            clearInterval(timer); overlay.innerText = "IGNITION!"; playSnd('beep'); hud.classList.add('shake');
            setTimeout(() => {
                overlay.innerText = "LIFTOFF!"; playSnd('launch'); rocket.classList.add('takeoff');
                setTimeout(() => {
                    overlay.style.display = 'none'; hud.classList.remove('shake');
                    document.getElementById('report').style.display = 'block';
                    document.getElementById('report-title').innerText = "MISSION SUCCESS";
                    document.getElementById('rep-msg').innerHTML = `<p style="font-size:20px;">FLIGHT PROFILE OPTIMAL.</p><p>GLOBAL READINESS: ${calculateGlobalPercentage()}%</p>`;
                }, 3000);
            }, 1000);
        }
    }, 1000);
}

function explodeSequence() {
    const overlay = document.getElementById('countdown-overlay');
    const hud = document.getElementById('main-hud');
    const rocket = document.getElementById('rocket');
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game').style.display = 'none';
    overlay.style.display = 'block'; overlay.innerText = "CRITICAL FAILURE";
    playSnd('explode8bit'); hud.classList.add('shake');
    setTimeout(() => {
        rocket.innerText = "💥"; rocket.style.transform = "translateX(-50%) rotate(0deg) scale(2.5)";
        overlay.innerText = "MISSION ABORTED";
        setTimeout(() => {
            overlay.style.display = 'none'; hud.classList.remove('shake');
            document.getElementById('report').style.display = 'block';
            document.getElementById('report-title').innerText = "MISSION FAILED";
            document.getElementById('report-title').style.color = "var(--artemis-red)";
            document.getElementById('rep-msg').innerHTML = `<p>READINESS: ${calculateGlobalPercentage()}%</p><p>73% THRESHOLD NOT MET.</p>`;
        }, 2000);
    }, 1000);
}

function showReview() {
    let h = `<button class="nav-btn" style="display:block; margin-bottom:20px; background:var(--nasa-blue);" onclick="returnToMenu()">⬅ RETURN TO COMMAND</button>`;
    h += `<h2 style="color:var(--nasa-blue); text-align:center;">MISSION LOG</h2>`;
    missionLog.forEach((item, index) => {
        let clr = item.isOk ? "#2e7d32" : "#c62828";
        h += `<div class="review-item"><p><strong>GATE ${index+1}:</strong> ${item.q}</p><p style="color:${clr}">${item.isOk ? '✅' : '❌'} Your Answer: ${item.mine}</p>${!item.isOk ? `<p style="color:#2e7d32">✔️ Correct: ${item.correct}</p>` : ''}<div class="review-logic"><strong>Analysis:</strong> ${item.logic}</div></div>`;
    });
    h += `<button class="nav-btn" style="display:block; margin-top:20px; background:var(--nasa-blue);" onclick="returnToMenu()">⬅ RETURN TO COMMAND</button>`;
    document.getElementById('q-area').innerHTML = h;
    document.getElementById('report').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('next').style.display = 'none';
    document.getElementById('abort-btn').style.display = 'none';
    document.getElementById('status-line').innerText = "POST-FLIGHT REVIEW";
}

function next(){ idx++; show(); }
function returnToMenu() { 
    const rocket = document.getElementById('rocket');
    rocket.classList.remove('takeoff'); rocket.innerText = "🚀";
    rocket.style.transform = "translateX(-50%) rotate(-45deg)"; 
    document.getElementById('game').style.display = 'none';
    document.getElementById('report').style.display = 'none';
    document.getElementById('menu').style.display = 'block';
    updateMenuUI();
}
function resetScores() { if(confirm("WIPE ALL DATA?")) { localStorage.clear(); location.reload(); } }
updateMenuUI();
</script>
</body>
</html>
