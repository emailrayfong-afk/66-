<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSnd(t){
        if(audioCtx.state==='suspended') audioCtx.resume();
        const time = audioCtx.currentTime;
        if(t==='ok'){
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(523.25, time); o.frequency.setValueAtTime(659.25, time + 0.05); o.frequency.setValueAtTime(783.99, time + 0.1); o.frequency.setValueAtTime(1046.50, time + 0.15); 
            g.gain.setValueAtTime(0.08, time); g.gain.linearRampToValueAtTime(0.08, time + 0.2); g.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
            o.start(time); o.stop(time + 0.4);
        } else if (t==='no') {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth'; o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(300, time); o.frequency.exponentialRampToValueAtTime(80, time + 0.3);
            g.gain.setValueAtTime(0.1, time); g.gain.linearRampToValueAtTime(0.001, time + 0.3);
            o.start(time); o.stop(time + 0.3);
        }
    }

    function playCountdown(){
        if(audioCtx.state==='suspended') audioCtx.resume();
        let time = audioCtx.currentTime;
        for(let i=0; i<3; i++) {
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.setValueAtTime(440, time + i);
            g.gain.setValueAtTime(0.1, time + i); g.gain.exponentialRampToValueAtTime(0.001, time + i + 0.2);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(time + i); o.stop(time + i + 0.2);
        }
        let rumble = audioCtx.createOscillator(), rGain = audioCtx.createGain();
        rumble.type = 'sawtooth'; rumble.frequency.setValueAtTime(50, time + 3); rumble.frequency.linearRampToValueAtTime(20, time + 6);
        rGain.gain.setValueAtTime(0, time + 3); rGain.gain.linearRampToValueAtTime(0.4, time + 3.1); rGain.gain.exponentialRampToValueAtTime(0.01, time + 7);
        rumble.connect(rGain); rGain.connect(audioCtx.destination);
        rumble.start(time + 3); rumble.stop(time + 7);
    }
    
    function playSiren(){
        if(audioCtx.state==='suspended') audioCtx.resume();
        let time = audioCtx.currentTime;
        for(let i=0; i<4; i++) {
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth'; o.frequency.setValueAtTime(600, time + (i*0.5)); o.frequency.linearRampToValueAtTime(400, time + (i*0.5) + 0.4);
            g.gain.setValueAtTime(0.2, time + (i*0.5)); g.gain.linearRampToValueAtTime(0.001, time + (i*0.5) + 0.4);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(time + (i*0.5)); o.stop(time + (i*0.5) + 0.4);
        }
    }

            {q: "Growth stocks typically have:", c: ["High P/E and Low Dividend Yield", "Low P/E and High Dividend Yield"], a: 0, f: "Logic: Investors pay a premium for future earnings, not current cash flow."},

            {q: "Price-to-Book ratio is used primarily by which type of investor?", c: ["Growth investors", "Value investors"], a: 1, f: "Logic: Value investors look for stocks trading near or below their actual liquidation (book) value."},
            {q: "Which bond yield is highest for a bond purchased at a discount?", c: ["Current Yield", "Yield to Maturity (YTM)"], a: 1, f: "Logic: YTM includes the 'gain' of the discount maturing at full par value."},
            {q: "If the Fed raises the reserve requirement, the money supply will:", c: ["Expand", "Contract"], a: 1, f: "Logic: Banks must keep more cash locked in the vault, leaving less money available to lend."},
            {q: "Arithmetic mean is best used for evaluating:", c: ["Compound growth over time", "Independent, non-compounding annual returns"], a: 1, f: "Logic: Arithmetic doesn't account for the drag of compounding; Geometric does."},
            {q: "Which metric measures the 'Volatility' of a single stock compared to its own historical average?", c: ["Beta", "Standard Deviation"], a: 1, f: "Logic: Std Dev is internal volatility; Beta is relative to the market."},
            {q: "A corporation's 'Capital Structure' is found on which financial statement?", c: ["Income Statement", "Balance Sheet"], a: 1, f: "Logic: Equity + Long-term Debt = Capital Structure (found on the Balance Sheet)."},
            {q: "Total Return on a bond includes interest payments and:", c: ["Dividends", "Capital Gains/Losses"], a: 1, f: "Logic: Total return must account for any price change over the holding period."},
            {q: "If an investor is described as 'Risk Averse', they want the highest return for:", c: ["The most risk possible", "The least amount of risk"], a: 1, f: "Logic: Risk Aversion means avoiding unnecessary volatility while seeking return."},
            {q: "The 'Time Value of Money' concept means that $1 today is worth:", c: ["Less than $1 in the future", "More than $1 in the future"], a: 1, f: "Logic: Because of the ability to earn interest or invest it immediately."},
            {q: "If a proposed project has a positive NPV of $1,000, you should:", c: ["Reject it", "Accept it"], a: 1, f: "Logic: Positive NPV means the project creates value above the required hurdle rate."},
            {q: "Which index uses a price-weighted average (meaning high-priced stocks move the index more)?", c: ["S&P 500", "Dow Jones Industrial Average"], a: 1, f: "Logic: The Dow is price-weighted; the S&P 500 is market-cap weighted."},
            {q: "A Beta of 0.0 describes which of the following assets?", c: ["S&P 500 Index Fund", "Risk-free Treasury Bill"], a: 1, f: "Logic: T-Bills have absolutely no market sensitivity (Zero Beta)."},
            {q: "Which type of economic indicator confirms a new trend that has already begun?", c: ["Leading", "Lagging"], a: 1, f: "Logic: Lagging indicators confirm that a shift in the business cycle has actually taken root."},
            {q: "If inflation is 3% and your bond pays 5%, your 'Real' rate of return is:", c: ["8%", "2%"], a: 1, f: "Logic: 5% (Nominal) - 3% (Inflation) = 2% (Real)."},
            {q: "A defensive stock (Low Beta) would most likely be found in which industry?", c: ["Technology", "Utilities"], a: 1, f: "Logic: People continue to pay for electricity and water even in a severe recession."},
            {q: "Which is considered a 'Use of Cash' on the cash flow statement?", c: ["Selling a factory", "Paying down a bank loan"], a: 1, f: "Logic: Paying down debt moves cash OUT of the company's accounts."},
            {q: "Net Worth is calculated as:", c: ["Current Assets - Current Liabs", "Total Assets - Total Liabilities"], a: 1, f: "Logic: Net Worth represents the total equity remaining in the business after all debts are paid."},
            {q: "The 'Hurdle Rate' is another name for:", c: ["Alpha", "Required Rate of Return"], a: 1, f: "Logic: The minimum return needed to justify making an investment."},
            {q: "Which indicator is most likely to move FIRST before the economy changes?", c: ["GDP", "S&P 500"], a: 1, f: "Logic: The stock market is a leading indicator, looking 6-9 months into the future."},
            {q: "A cyclical stock would most likely be found in which industry?", c: ["Food/Grocery", "Automotive"], a: 1, f: "Logic: People delay large purchases like cars during bad economic times."},
            {q: "If the NPV is exactly Zero, the IRR is:", c: ["Negative", "Exactly equal to the Required Rate of Return"], a: 1, f: "Logic: The project exactly hits its target yield, creating zero excess value."},
            {q: "Which economic tool is used most frequently by the Federal Reserve to control the money supply?", c: ["Changing the Reserve Requirement", "Open Market Operations"], a: 1, f: "Logic: Buying/Selling Treasuries daily is the most frequent and precise tool used."},
            {q: "A high P/E ratio usually suggests a stock is:", c: ["Under-valued (Value stock)", "Over-valued or a Growth stock"], a: 1, f: "Logic: Investors are paying a premium for every dollar of profit, expecting future acceleration."},
            {q: "Which yield is lowest for a bond purchased at a premium?", c: ["Coupon Rate", "Yield to Maturity (YTM)"], a: 1, f: "Logic: Premium = losing money at maturity, dragging the YTM below the coupon rate."},
            {q: "The 'Efficient Frontier' is a line representing portfolios that offer:", c: ["The highest risk", "The highest possible return for a given level of risk"], a: 1, f: "Logic: Portfolios that fall exactly on the line are considered optimally diversified."},
            {q: "Which specific risk is reduced by adding non-correlated assets to a portfolio?", c: ["Market Risk", "Selection / Unsystematic Risk"], a: 1, f: "Logic: Diversification kills specific (unsystematic) risk, leaving only market risk."},
            {q: "If interest rates rise, the Present Value of future cash flows will:", c: ["Rise", "Fall"], a: 1, f: "Logic: A higher discount rate mathematically makes future money worth less today."},
            {q: "Gross Domestic Product (GDP) is typically measured in:", c: ["Current unadjusted dollars", "Constant dollars (Real GDP)"], a: 1, f: "Logic: Real GDP (adjusted for inflation) is the standard for measuring true economic growth."},
            {q: "Which measurement shows how much of a stock's return is purely due to the movement of the broader market?", c: ["Alpha", "R-Squared"], a: 1, f: "Logic: R-Squared measures the 'fit' or correlation between a stock and the index."},
            {q: "Which indicator would help predict a future rise in retail consumer inflation?", c: ["Consumer spending habits", "Rising commodity and PPI prices"], a: 1, f: "Logic: Increased costs at the wholesale/producer level eventually get passed down to the consumer."},
            {q: "The 'Risk-Free' rate is usually based on the yield of:", c: ["AAA Corporate Bonds", "91-day Treasury Bills"], a: 1, f: "Logic: T-Bills have zero default risk and virtually zero interest rate risk."},
            {q: "If an IA recommends a 'Buy and Hold' strategy, they believe in:", c: ["Tactical Allocation", "Strategic Allocation"], a: 1, f: "Logic: Strategic allocation is a long-term, passive mix that is periodically rebalanced."},
            {q: "Which is classified as a 'Current Liability'?", c: ["A 30-year Mortgage", "Accounts Payable"], a: 1, f: "Logic: Accounts Payable is a short-term bill due within one year."},
            {q: "If the Fed SELLS Treasuries in the open market, the money supply will:", c: ["Expand", "Contract"], a: 1, f: "Logic: The Fed takes cash out of the banks and replaces it with paper, tightening the supply."},
            {q: "A company's 'Net Income' (profit) is found on the:", c: ["Balance Sheet", "Income Statement"], a: 1, f: "Logic: Net Income is the 'Bottom Line' of the Profit & Loss (Income) Statement."}
        ],
[ // PILLAR 2: VEHICLES (100 GATES)
            {q: "Which of the following investment vehicles exposes the investor to the credit risk of the issuing financial institution?", c: ["Exchange-Traded Fund (ETF)", "Exchange-Traded Note (ETN)"], a: 1, f: "Logic: ETNs are unsecured debt instruments (notes) issued by a bank. If the bank defaults, the investor could lose their money, regardless of the underlying index's performance."},
            {q: "A Real Estate Investment Trust (REIT) is structurally designed to pass through:", c: ["Both income and losses", "Income only"], a: 1, f: "Logic: REITs avoid taxation at the corporate level by passing at least 90% of their income to shareholders, but unlike Direct Participation Programs (DPPs), they cannot pass through losses."},
            {q: "A Letter of Intent (LOI) allows a mutual fund investor to receive a breakpoint discount by committing to a total investment amount over a maximum period of:", c: ["13 months", "24 months"], a: 0, f: "Logic: An LOI is valid for 13 months and can typically be backdated up to 90 days to include past purchases."},
            {q: "Unlike open-end mutual funds, the market price of a closed-end fund is determined by:", c: ["Supply and demand on the exchange", "The daily calculation of Net Asset Value (NAV)"], a: 0, f: "Logic: Closed-end funds issue a fixed number of shares that trade on an exchange. Therefore, they can trade at a premium or discount to their actual NAV based on market demand."},
            {q: "During the accumulation phase of a variable annuity, the number of accumulation units owned by the investor:", c: ["Remains fixed, while the value fluctuates", "Increases with each additional premium contribution"], a: 1, f: "Logic: When you put more money into a variable annuity during the accumulation phase, you are buying more accumulation units. When you annuitize, those become a fixed number of annuity units."},
            {q: "An investor heavily concentrated in a single large-cap stock wants to protect against a near-term drop in price. The best option strategy is to:", c: ["Buy a Put", "Sell a Call"], a: 0, f: "Logic: Buying a put acts as an insurance policy (a 'protective put'), giving the investor the right to sell the stock at a set strike price if the market crashes."},
            {q: "A viatical settlement involves the sale of a life insurance policy by a policyholder who is:", c: ["Entering retirement and needs liquidity", "Terminally ill"], a: 1, f: "Logic: Viatical settlements are specifically for terminally ill policyholders (typically with less than 24 months to live) who sell their policy to a third party for an immediate lump sum."},
            {q: "The annual imputed interest on a zero-coupon corporate bond that an investor must report for tax purposes is known as:", c: ["Phantom income", "Capital gains"], a: 0, f: "Logic: Even though the investor receives no actual cash until maturity, the IRS taxes the annual accreted value of the discount as 'phantom' ordinary income each year."},
            {q: "The principal value of a Treasury Inflation-Protected Security (TIPS) is adjusted semi-annually based on the:", c: ["Consumer Price Index (CPI)", "Federal Funds Rate"], a: 0, f: "Logic: TIPS protect purchasing power by adjusting the underlying principal upward with the CPI. The fixed interest rate is then paid on that higher principal amount."},
            {q: "Mutual fund Class C shares are generally characterized by having:", c: ["A front-end sales load and low 12b-1 fees", "A level load (ongoing 12b-1 fees) and no front-end load"], a: 1, f: "Logic: Class C shares do not charge an upfront fee but have significantly higher annual expense ratios (12b-1 fees), making them better for short-term holds."},
            {q: "An options investor expects extreme volatility in a stock following an upcoming earnings announcement, but is unsure of the direction. The best strategy is a:", c: ["Covered Call", "Straddle"], a: 1, f: "Logic: A straddle involves buying both a Call and a Put at the same strike price and expiration. The investor profits if the stock makes a massive move in *either* direction."},
            {q: "Which of the following derivatives gives the holder a long-term right to purchase common stock at a fixed price?", c: ["Warrant", "Preemptive Right"], a: 0, f: "Logic: Warrants are long-term 'sweeteners' often attached to bond offerings. Rights are very short-term privileges given to existing shareholders to maintain proportionate ownership."},
            {q: "While American Depositary Receipts (ADRs) allow U.S. investors to buy foreign stocks in U.S. dollars, the investor is still subject to:", c: ["Currency Risk", "Interest Rate Risk"], a: 0, f: "Logic: The foreign company pays dividends in its native currency, which the custodian bank then converts to USD. If the foreign currency weakens against the dollar, the dividend shrinks."},
            {q: "Preferred stock behaves most similarly to which of the following securities?", c: ["Common Stock", "Corporate Bonds"], a: 1, f: "Logic: Preferred stock pays a fixed, stated dividend, meaning its market price is highly sensitive to interest rate changes, just like a fixed-income bond."},
            {q: "Convertible corporate bonds typically offer:", c: ["A lower coupon rate than non-convertible bonds", "A higher coupon rate than non-convertible bonds"], a: 0, f: "Logic: Investors accept a lower interest rate on convertible bonds because they receive the added benefit of potentially converting the debt into profitable common stock."},
            {q: "Municipal Revenue Bonds are backed by:", c: ["The full faith, credit, and taxing power of the municipality", "The user fees generated by a specific facility or project"], a: 1, f: "Logic: Revenue bonds rely on the income from the project they funded (like a toll road or hospital). General Obligation (GO) bonds rely on taxes."},
            {q: "Hedge funds are typically structured as:", c: ["Open-End Management Companies", "Limited Partnerships"], a: 1, f: "Logic: Hedge funds use the limited partnership structure to avoid registration under the Investment Company Act of 1940, limiting participation to accredited investors."},
            {q: "Unlike Whole Life insurance, Universal Life insurance provides the policyholder with:", c: ["Flexible premiums and an adjustable death benefit", "A guaranteed minimum cash value and fixed premiums"], a: 0, f: "Logic: Universal Life unbundles the insurance from the savings component, allowing the policyholder to adjust how much they pay in premiums year to year."},
            {q: "In a Variable Life insurance policy, the cash value is tied to the performance of a:", c: ["General Account", "Separate Account"], a: 1, f: "Logic: Variable products shift the investment risk to the policyholder by placing funds in a 'Separate Account' consisting of market-based subaccounts (similar to mutual funds)."},
            {q: "To avoid registration with the SEC under the Securities Act of 1933, Commercial Paper must have a maximum maturity of:", c: ["270 days", "365 days"], a: 0, f: "Logic: Commercial paper is short-term, unsecured corporate debt. If it matures in 270 days (9 months) or less, it is an exempt security."},
            {q: "Which of the following mortgage-backed securities is directly backed by the full faith and credit of the U.S. Government?", c: ["FNMA (Fannie Mae)", "GNMA (Ginnie Mae)"], a: 1, f: "Logic: Ginnie Mae is a wholly owned government corporation. Fannie Mae and Freddie Mac are publicly traded, government-sponsored enterprises (GSEs) with only an 'implied' backing."},
            {q: "The primary investment objective of a Money Market Mutual Fund is:", c: ["Capital appreciation", "Preservation of capital and high liquidity"], a: 1, f: "Logic: Money market funds invest in ultra-safe, short-term debt to maintain a stable Net Asset Value (NAV) of exactly $1.00 per share."},
            {q: "Which type of investment company issues redeemable securities but has no board of directors and an unmanaged portfolio?", c: ["Unit Investment Trust (UIT)", "Exchange-Traded Fund (ETF)"], a: 0, f: "Logic: UITs lock in a fixed portfolio of securities at inception and hold them until the trust terminates. There is no active management or trading."},
            {q: "An investor who writes a Covered Call generates income but gives up the:", c: ["Downside protection on the stock", "Upside appreciation potential of the stock above the strike price"], a: 1, f: "Logic: By selling the call, the investor collects a premium but is obligated to sell their shares at the strike price, capping their maximum possible profit if the stock skyrockets."},
            {q: "Equity-Indexed Annuities typically feature a minimum guaranteed return and potential upside tied to an index, but that upside is often limited by a:", c: ["Surrender charge", "Participation rate or cap"], a: 1, f: "Logic: If the market goes up 10%, an 80% participation rate means the annuity only credits 8%. A cap might restrict maximum gains to 5% regardless of market performance."},
            {q: "Mutual fund 12b-1 fees are legally permitted to be used for:", c: ["Portfolio manager salaries and trading commissions", "Marketing, advertising, and distribution expenses"], a: 1, f: "Logic: 12b-1 fees are effectively the fund charging existing shareholders to market the fund to new potential shareholders."},
            {q: "A corporate issuer is most likely to exercise the 'call' provision on its outstanding bonds when interest rates:", c: ["Fall", "Rise"], a: 0, f: "Logic: If interest rates drop, the company will call (retire) its old, high-interest bonds and issue new bonds at the lower current rates to save money."},
            {q: "An Equity-Linked Note (ELN) is a debt instrument whose return is tied to a stock index. Because it is issued by a financial institution, it carries:", c: ["No risk to principal", "Credit risk"], a: 1, f: "Logic: Despite the word 'equity', an ELN is a promissory note. If the issuing bank goes bankrupt, the investor is an unsecured creditor."},
            {q: "The Net Asset Value (NAV) of an open-end mutual fund is calculated:", c: ["Continuously throughout the trading day", "Once per day, typically at the close of the NYSE"], a: 1, f: "Logic: Mutual funds use 'forward pricing.' All orders placed during the day are executed at the closing NAV computed at 4:00 PM Eastern."},
            {q: "Which alternative investment is most commonly utilized as a hedge against inflation and currency devaluation?", c: ["Precious metals (Gold)", "Long-term Treasury Bonds"], a: 0, f: "Logic: Hard assets like gold tend to retain their value or appreciate when fiat currencies lose their purchasing power due to inflation."},
            {q: "To close out a short put position, an options investor must execute a:", c: ["Closing purchase", "Closing sale"], a: 0, f: "Logic: If you sold (wrote) an option to open the position, you must buy that exact same option back to close it out."},
            {q: "Which options strategy provides an investor with the maximum downside protection for a long stock position?", c: ["Selling a Covered Call", "Buying a Protective Put"], a: 1, f: "Logic: A long put gives the investor the right to sell their stock at a guaranteed strike price, locking in an absolute floor against market crashes."},
            {q: "A corporate bond is callable at 102. The 102 represents a call price of:", c: ["$102", "$1,020"], a: 1, f: "Logic: Bond pricing is quoted as a percentage of par ($1,000). 102% of $1,000 equals $1,020."},
            {q: "Treasury Bills (T-Bills) are issued at a discount to par and mature at:", c: ["Their current market value", "Par value"], a: 1, f: "Logic: T-Bills do not pay regular interest coupons. The investor's return is the difference between the discounted purchase price and the full $1,000 par value at maturity."},
            {q: "What pricing mechanism do open-end investment companies (mutual funds) utilize?", c: ["Forward pricing", "Continuous intraday pricing"], a: 0, f: "Logic: Mutual funds execute all trades based on the next calculated Net Asset Value (NAV), which is typically computed at 4:00 PM Eastern."},
            {q: "Hedge funds often charge a performance fee. The 'high-water mark' provision ensures that:", c: ["The fund always outperforms the S&P 500", "The manager is not paid a performance fee twice for recovering the same losses"], a: 1, f: "Logic: A high-water mark means the fund must exceed its previous highest historical value before the manager can take a cut of the new profits."},
            {q: "In a fixed annuity, the investment risk is strictly borne by the:", c: ["Annuitant", "Insurance company"], a: 1, f: "Logic: Because the insurance company guarantees a fixed rate of return, they take on the market risk within their own general account."},
            {q: "During the payout (annuitization) phase of a variable annuity, the amount of the monthly check:", c: ["Remains constant", "Fluctuates based on the performance of the separate account"], a: 1, f: "Logic: The annuitant owns a fixed number of annuity units, but the underlying monetary value of those units changes based on market performance."},
            {q: "An Equity REIT primarily generates its revenue from:", c: ["Property rents and capital gains from property sales", "Mortgage interest"], a: 0, f: "Logic: Equity REITs own the physical real estate. Mortgage REITs provide the financing and collect the interest."},
            {q: "Which of the following is a primary advantage of a Limited Partnership (DPP)?", c: ["High liquidity", "Limited liability for the limited partners"], a: 1, f: "Logic: Limited partners cannot lose more than their invested capital, but DPPs are notoriously illiquid and hard to sell."},
            {q: "A company announces a 2-for-1 stock split. How does this affect the total value of an investor's position immediately after the split?", c: ["It doubles the value", "It remains entirely unchanged"], a: 1, f: "Logic: The investor has twice as many shares, but each share is mathematically worth exactly half as much. The total pie remains the same size."},
            {q: "Which of the following corporate securities has a stated maturity date?", c: ["Preferred Stock", "Corporate Debenture"], a: 1, f: "Logic: A debenture is an unsecured corporate bond (debt) and has an expiration/maturity date. Equity is perpetual."},
            {q: "The intrinsic value of a Call option is calculated as:", c: ["Current Market Price - Strike Price", "Strike Price - Current Market Price"], a: 0, f: "Logic: A call is 'in the money' (has intrinsic value) if the stock price is higher than the strike price."},
            {q: "A 'Naked' (Uncovered) Call writer is exposed to:", c: ["Limited risk", "Unlimited risk"], a: 1, f: "Logic: Selling a call without actually owning the underlying stock means the investor might have to buy it in the open market at an infinitely high price to fulfill the contract."},
            {q: "A municipality issues a General Obligation (GO) bond. This debt is primarily backed by:", c: ["The revenue of a specific local project", "The taxing power of the municipality"], a: 1, f: "Logic: GO bonds are backed by the 'full faith and credit' (taxes) of the issuer. Revenue bonds are backed by project user fees."},
            {q: "Which of the following debt instruments typically carries the highest credit risk?", c: ["Investment Grade Corporate Bond", "High-Yield (Junk) Bond"], a: 1, f: "Logic: High-yield bonds (rated BB or lower) offer higher interest rates specifically to compensate investors for the elevated risk of default."},
            {q: "Which mutual fund share class typically carries a Contingent Deferred Sales Charge (back-end load)?", c: ["Class A Shares", "Class B Shares"], a: 1, f: "Logic: Class B shares charge a fee when the investor sells the fund, which gradually declines to zero the longer the fund is held."},
            {q: "A mutual fund's expense ratio is calculated by dividing the fund's operating expenses by its:", c: ["Total sales charges", "Average net assets"], a: 1, f: "Logic: The expense ratio reflects the percentage of total fund assets actively used to cover management and administrative costs each year."},
            {q: "A primary advantage of an Exchange-Traded Fund (ETF) over a traditional mutual fund is:", c: ["Guaranteed principal protection", "Intraday tradability"], a: 1, f: "Logic: ETFs trade on an exchange like a stock, allowing investors to buy or sell them continuously throughout the trading day at market prices."},
            {q: "Term life insurance builds cash value at what rate?", c: ["A fixed, guaranteed rate", "Term life does not build cash value"], a: 1, f: "Logic: Term insurance provides pure death benefit protection for a specific period of time. Permanent policies (Whole, Universal, Variable) build cash value."},
            {q: "Policy loans taken from the cash value of a permanent life insurance policy are generally:", c: ["Tax-free", "Taxable as ordinary income"], a: 0, f: "Logic: Because it is a loan (which must be repaid or will be deducted from the death benefit), the IRS does not consider the cash to be taxable income."},
            {q: "A 'Blind Pool' Direct Participation Program is characterized by the fact that:", c: ["The specific assets to be purchased are not yet identified", "The general partner is unknown"], a: 0, f: "Logic: Investors contribute capital 'blindly', trusting the sponsor to find and buy suitable properties or projects later."},
            {q: "Private equity funds generally restrict their investors to:", c: ["Retail investors only", "Accredited and institutional investors"], a: 1, f: "Logic: Due to high risk, lack of liquidity, and lack of SEC registration, PE funds require investors to meet strict wealth and income thresholds."},
            {q: "If an investor is 'Bearish' on the broader market, which options strategy makes the most mathematical sense?", c: ["Buy a Call", "Buy a Put"], a: 1, f: "Logic: A put option gives the investor the right to sell at a set price, allowing them to profit when the underlying stock drops in value."},
            {q: "Commercial paper is typically issued by:", c: ["Large, creditworthy corporations", "Small municipalities"], a: 0, f: "Logic: Commercial paper consists of short-term, unsecured promissory notes used by major corporations to finance immediate, short-term cash needs."},
            {q: "An American Depositary Receipt (ADR) represents ownership of:", c: ["A foreign security trading in U.S. markets", "A U.S. security trading in foreign markets"], a: 0, f: "Logic: ADRs are issued by U.S. custodian banks and represent shares of a foreign company, making it easy for Americans to trade them locally."},
            {q: "The primary purpose of preemptive rights is to allow existing shareholders to:", c: ["Receive guaranteed annual dividends", "Maintain their proportionate ownership in the company"], a: 1, f: "Logic: If a company issues new shares, preemptive rights give current owners the first chance to buy them, preventing their ownership stake from being diluted."},
            {q: "Which of the following is NOT legally classified as an investment company under the 1940 Act?", c: ["Real Estate Investment Trust (REIT)", "Unit Investment Trust (UIT)"], a: 0, f: "Logic: The 1940 Act explicitly defines three types of investment companies: Face-Amount Certificates, UITs, and Management Companies (Open/Closed End). REITs are excluded."},
            {q: "The standard death benefit of a variable annuity guarantees that if the annuitant dies during the accumulation phase, the beneficiary receives:", c: ["The fixed monthly payout amount", "At least the total amount invested"], a: 1, f: "Logic: The standard VA death benefit promises the beneficiary will get back the greater of the current account value or the original principal invested."},
            {q: "A corporate bond quote of 98 1/8 indicates a dollar price of:", c: ["$98.18", "$981.25"], a: 1, f: "Logic: Corporate bonds are quoted in eighths of a point. 1/8 = 0.125. Therefore, 98.125% of $1,000 par equals $981.25."},
            {q: "According to the Investment Company Act of 1940, an open-end mutual fund is strictly prohibited from:", c: ["Borrowing money from a bank", "Issuing preferred stock or bonds"], a: 1, f: "Logic: Open-end funds (mutual funds) can only issue one class of security: common stock. Closed-end funds can issue preferred stock and bonds."},
            {q: "Which of the following investment companies routinely trades at a discount or premium to its Net Asset Value (NAV)?", c: ["Closed-End Fund", "Open-End Fund"], a: 0, f: "Logic: Closed-end funds trade on the secondary market. Their price is driven by investor supply and demand, not the exact mathematical NAV."},
            {q: "To qualify as a 'Regulated Investment Company' under Subchapter M and avoid triple taxation, a mutual fund must distribute at least:", c: ["90% of its Net Investment Income", "98% of its capital gains"], a: 0, f: "Logic: The 90% pass-through rule allows the fund to avoid paying corporate taxes on the income it distributes to shareholders."},
            {q: "Mutual fund Class A shares are generally the most appropriate choice for an investor with a:", c: ["Short time horizon and small capital amount", "Long time horizon and large capital amount"], a: 1, f: "Logic: Class A shares charge an upfront load but have lower annual fees. Large investments qualify for breakpoint discounts, making them ideal for long-term holds."},
            {q: "The primary risk associated with holding Mortgage-Backed Securities (MBS) in a falling interest rate environment is:", c: ["Default Risk", "Prepayment Risk"], a: 1, f: "Logic: When rates drop, homeowners refinance their mortgages. The MBS investor gets their principal back early and must reinvest it at the new, lower interest rates."},
            {q: "Treasury STRIPS are created by separating the principal and interest payments of U.S. Treasuries. As zero-coupon securities, they are highly sensitive to:", c: ["Credit risk", "Interest rate risk"], a: 1, f: "Logic: Zero-coupon bonds have the longest duration, making their market prices extremely volatile when interest rates change."},
            {q: "The 'Time Value' portion of an option's premium is generally at its greatest when the option is:", c: ["Deep in-the-money", "At-the-money"], a: 1, f: "Logic: When an option is exactly at the strike price (at-the-money), the uncertainty of which way the stock will break is highest, maximizing the time premium."},
            {q: "An options trader notes that a call option has a 'Delta' of 0.50. This means that if the underlying stock rises by $1.00, the option's premium is expected to rise by:", c: ["$0.50", "$1.00"], a: 0, f: "Logic: Delta measures how much the option price will move for every $1 change in the underlying stock."},
            {q: "Unlike Whole Life insurance, Universal Life insurance allows the policyholder to adjust:", c: ["The underlying investment subaccounts", "Both the premium payments and the death benefit"], a: 1, f: "Logic: Universal Life is 'flexible'. Variable Life allows adjustment of the subaccounts."},
            {q: "Under securities regulations, the cash value of a Variable Life insurance policy must be calculated at least:", c: ["Daily", "Monthly"], a: 1, f: "Logic: Cash value must be calculated monthly. The separate account unit values are calculated daily, and the death benefit is calculated annually."},
            {q: "The maximum potential loss for a buyer of a put option is:", c: ["The premium paid", "Unlimited"], a: 0, f: "Logic: Option buyers (long positions) can never lose more than what they paid to purchase the contract (the premium)."},
            {q: "Which pooled vehicle typically guarantees a fixed rate of return for life but is NOT classified as a security?", c: ["Fixed Annuity", "Variable Annuity"], a: 0, f: "Logic: Fixed annuities are strictly insurance products because the insurance company bears all the investment risk."},
            {q: "A variable annuity's 'L-shares' are specifically designed for investors who desire:", c: ["The lowest possible M&E expenses", "Shorter surrender charge periods"], a: 1, f: "Logic: L-shares have short surrender periods (e.g., 3-4 years) but compensate the insurer by charging higher ongoing administrative fees."},
            {q: "An investor in the highest federal tax bracket is seeking steady income. The most appropriate fixed-income vehicle is likely a:", c: ["Corporate Bond", "Municipal Bond"], a: 1, f: "Logic: Municipal bond interest is federally tax-free, making it highly valuable for investors in top tax brackets."},
            {q: "The tax-equivalent yield of a 4% municipal bond for an investor in the 32% tax bracket is:", c: ["4.00%", "5.88%"], a: 1, f: "Logic: Tax-Equivalent Yield = Municipal Rate / (100% - Tax Bracket). 4% / (1 - 0.32) = 4% / 0.68 = 5.88%."},
            {q: "Because they are backed by taxes, General Obligation (GO) municipal bonds typically require which of the following before issuance?", c: ["A feasibility study", "Voter approval"], a: 1, f: "Logic: Since the taxpayers will be on the hook for repaying the debt, they generally have to vote to approve the bond issue."},
            {q: "A 'Special Tax Bond' is a type of municipal revenue bond backed by:", c: ["Ad valorem (property) taxes", "Excise taxes on specific items like gasoline or tobacco"], a: 1, f: "Logic: Special tax bonds target specific user taxes rather than general property taxes."},
            {q: "Under the Uniform Securities Act, Section 529 College Savings Plans are legally structured and regulated as:", c: ["Municipal fund securities", "Open-end management companies"], a: 0, f: "Logic: 529 plans are sponsored by individual states, classifying them as municipal securities under the MSRB."},
            {q: "A major benefit of a 529 Plan over a UGMA/UTMA custodial account is that in a 529 Plan:", c: ["The donor retains control over the assets and can change the beneficiary", "The assets automatically transfer to the child at age 18"], a: 0, f: "Logic: UGMA/UTMA accounts become the irrevocable property of the child at the age of majority. 529 donors keep control forever."},
            {q: "Which of the following fixed-income securities is issued at a steep discount to par and pays no semi-annual interest?", c: ["Zero-Coupon Bond", "Treasury Inflation-Protected Security (TIPS)"], a: 0, f: "Logic: Zero-coupon bonds lock in a fixed return based on the discount, eliminating reinvestment risk but maximizing price volatility."},
            {q: "The primary structural difference between an open-end mutual fund and a Unit Investment Trust (UIT) is that a UIT:", c: ["Trades on an exchange", "Has a fixed, unmanaged portfolio"], a: 1, f: "Logic: UITs buy a static basket of bonds or stocks and hold them until the trust matures. There is no active manager."},
            {q: "'Dark Pools' are private trading networks utilized primarily to:", c: ["Avoid paying taxes on capital gains", "Allow institutions to trade large blocks of stock anonymously without moving the market"], a: 1, f: "Logic: Institutions use dark pools so their massive buy/sell orders don't immediately spike or crash the public exchange prices."},
            {q: "Because of the unique way they are structured and traded, Exchange-Traded Funds (ETFs) typically experience:", c: ["Higher 12b-1 fees than mutual funds", "Fewer taxable capital gains distributions than actively managed mutual funds"], a: 1, f: "Logic: The 'in-kind' creation and redemption process of ETFs prevents them from having to sell stocks for cash to meet redemptions, minimizing forced capital gains."},
            {q: "The intrinsic value of a Put option is calculated mathematically as:", c: ["Strike Price - Current Market Price", "Current Market Price - Strike Price"], a: 0, f: "Logic: A put gives the right to sell. It has intrinsic value (is in-the-money) if the strike price you can sell at is higher than the current market price."},
            {q: "An institutional investor seeking to protect a large, diversified stock portfolio from a systemic market crash should execute which strategy?", c: ["Sell Covered Calls", "Buy S&P 500 Index Puts"], a: 1, f: "Logic: Buying broad index puts acts as a portfolio-wide insurance policy against systemic risk (market crashes)."},
            {q: "Which type of life insurance policy provides a minimum guaranteed death benefit but does NOT provide a guaranteed minimum cash value?", c: ["Variable Life", "Variable Universal Life"], a: 0, f: "Logic: Variable Life guarantees a base death benefit (from the general account) but cash value fluctuates. VUL guarantees absolutely nothing."},
            {q: "A client with a very short-term time horizon of 18 months wants to invest cash for a home down payment. The most appropriate vehicle is a:", c: ["Short-term Corporate Bond Fund", "Money Market Fund"], a: 1, f: "Logic: Any money needed within 1-2 years must prioritize capital preservation over yield. Money market funds maintain a stable $1 NAV."},
            {q: "Bankers' Acceptances (BAs) are short-term credit instruments primarily used by corporations to finance:", c: ["Domestic real estate development", "International trade (imports and exports)"], a: 1, f: "Logic: BAs act like post-dated checks guaranteed by a bank, facilitating trust in cross-border shipping transactions."},
            {q: "A 'Collateral Trust Bond' is a corporate bond secured by:", c: ["Real estate owned by the corporation", "A portfolio of stocks and bonds owned by the issuer"], a: 1, f: "Logic: Mortgage bonds use real estate. Collateral trust bonds use other financial securities held in a trust as backing."},
            {q: "A mutual fund's 'Breakpoint Schedule' is designed to:", c: ["Provide reduced sales charges for larger dollar investments", "Penalize investors for early withdrawals"], a: 0, f: "Logic: Breakpoints are quantity discounts on the front-end load (Class A shares) to incentivize larger deposits."},
            {q: "An investor owns 100 shares of XYZ stock and sells 1 XYZ Call option. This position is known as a:", c: ["Naked Call", "Covered Call"], a: 1, f: "Logic: Because the investor already owns the underlying shares, they are 'covered' and can deliver the stock if the buyer exercises the call."},
            {q: "For a bond purchased at a premium, which of the following yield calculations will mathematically result in the lowest percentage?", c: ["Yield to Maturity (YTM)", "Yield to Call (YTC)"], a: 1, f: "Logic: YTC is the worst-case scenario. It assumes the investor loses the premium over the shortest possible time period."},
            {q: "A mutual fund's Net Investment Income (NII) is calculated by taking the fund's dividends and interest and subtracting its:", c: ["Capital gains", "Operating expenses"], a: 1, f: "Logic: NII represents the actual cash flow the portfolio generates (dividends + interest) minus what it costs to run the fund (expenses)."},
            {q: "A key tax advantage of a non-qualified variable annuity compared to a standard mutual fund is that the annuity offers:", c: ["Tax-free withdrawals", "Tax-deferred growth"], a: 1, f: "Logic: Unlike mutual funds which issue taxable 1099s for dividends each year, non-qualified annuities allow all growth to compound tax-deferred until withdrawal."},
            {q: "In a Direct Participation Program (Limited Partnership), which party possesses unlimited liability for the debts of the business?", c: ["The Limited Partner", "The General Partner"], a: 1, f: "Logic: Limited partners are passive investors risking only their capital. The General Partner makes the decisions and assumes all legal and financial liability."},
            {q: "An options trader simultaneously buys a Call and sells a Call on the same underlying stock, but with different strike prices. This is known as a:", c: ["Straddle", "Spread"], a: 1, f: "Logic: A spread involves buying and selling the same type of option (two calls or two puts) to limit both maximum risk and maximum reward."},
            {q: "If a convertible bond's parity price is significantly higher than its current market price, an agile investor could profit by executing an:", c: ["Arbitrage", "Hedge"], a: 0, f: "Logic: Arbitrage is the simultaneous buying and selling of related securities to lock in a riskless profit due to a pricing inefficiency."},
            {q: "Class B mutual fund shares are most notable for having which type of fee structure?", c: ["A front-end load", "A Contingent Deferred Sales Charge (CDSC)"], a: 1, f: "Logic: Class B shares charge a back-end load that gradually decreases to zero the longer the investor holds the fund."},
            {q: "Which of the following life insurance policies provides pure death benefit protection but accumulates zero cash value?", c: ["Whole Life", "Term Life"], a: 1, f: "Logic: Term life is temporary, pure insurance. Permanent policies (Whole, Universal) contain a savings/investment component."},
            {q: "Venture capital funds are a type of private equity that primarily invests in:", c: ["Distressed, bankrupt corporations", "Start-up companies with high growth potential"], a: 1, f: "Logic: Venture capital provides seed money to new, unproven companies in exchange for an equity stake."}
        ],
[ // PILLAR 3: STRATEGY
            {q: "What's the primary justification for an employer offering an ESOP?", c: ["To retain top talent", "To avoid corporate income taxes"], a: 0, f: "Logic: Employee Stock Ownership Plans give workers 'skin in the game' to motivate and retain them."},
            {q: "Which statement about barbell bond strategies is NOT TRUE?", c: ["Gains from the short-term maturities will perfectly offset losses in the long-term maturities", "It holds short-term and long-term bonds, but no intermediate bonds"], a: 0, f: "Logic: There is no mathematical guarantee of a perfect offset. The barbell just attempts to balance interest rate risk."},
            {q: "An individual inherits a life insurance policy. What is the tax liability on the death benefit?", c: ["Zero, since the death benefit is only taxable to the deceased's estate.", "Taxed as ordinary income to the beneficiary."], a: 0, f: "Logic: Life insurance payouts to beneficiaries are generally completely income tax-free."},
            {q: "What are two examples of qualified retirement plans that provide tax benefits for both employer and employee?", c: ["Defined benefit plans and defined contribution plans", "Deferred compensation plans and payroll deduction plans"], a: 0, f: "Logic: DB and DC plans provide tax deductions for the employer and tax-deferred growth for the employee."},
            {q: "Melissa anticipates a market peak and downturn while the rest of the market is bullish. She is utilizing:", c: ["Contrarian investing", "Momentum investing"], a: 0, f: "Logic: Doing the exact opposite of the prevailing market crowd is contrarian."},
            {q: "What ERISA rule requires a qualified plan to offer at least 3 different investment options with different risk levels?", c: ["Section 404(c)", "Section 457(b)"], a: 0, f: "Logic: 404(c) provides a safe harbor protecting the employer from liability if they offer at least 3 distinct options."},
            {q: "A self-employed consultant earns $300k and wants to maximize retirement contributions. Best plan?", c: ["Individual 401(k) plan", "Traditional IRA"], a: 0, f: "Logic: Solo-401(k)s allow for the highest combined contribution limits (employee + employer profit-sharing) for a one-person business."},
            {q: "Two spouses work full time. Total household income is $60k; neither has a workplace plan. How much can they jointly put into IRAs?", c: ["$14,000 to $16,000 depending on catch-up limits", "$7,000"], a: 0, f: "Logic: Both spouses can max out their own individual IRA. Two accounts = double the standard limit."},
            {q: "Which of the following statements is TRUE about indexing?", c: ["It may result in a portfolio that does not accurately track the index.", "It mathematically guarantees perfect correlation to the market."], a: 0, f: "Logic: Due to management fees and trading costs, index funds experience 'Tracking Error' and never track perfectly."},
            {q: "Which of the following accounts allow for tax-deductible contributions?", c: ["Traditional IRAs", "Roth IRAs"], a: 0, f: "Logic: Roth contributions are never deductible. Traditional IRA contributions are deductible depending on income."},
            {q: "A manager moves from 70% stocks/30% bonds to 30% stocks/70% bonds based on economic conditions. This is a(n):", c: ["Asset allocation fund (Tactical)", "Balanced fund (Strategic)"], a: 0, f: "Logic: Actively shifting the entire asset mix based on market timing is Tactical asset allocation."},
            {q: "Which of the following accounts do NOT ease the probate process?", c: ["Joint Tenants in Common (TIC)", "Joint Tenants with Rights of Survivorship (JTWROS)"], a: 0, f: "Logic: In a TIC, your share goes to your Estate, which means it must go through the slow, public probate courts."},
            {q: "Buy and hold with systematic rebalancing is an approach based on the theory known as:", c: ["Efficient Market Hypothesis", "Technical Analysis"], a: 0, f: "Logic: EMH states you can't beat the market, so the logical move is passive: buy, hold, and rebalance."},
            {q: "An IAR wants to help reduce a client's systematic risk. The IAR should recommend:", c: ["Securities with negative correlation, such as certain debt instruments.", "High-Beta growth stocks."], a: 0, f: "Logic: Negative correlation acts as a hedge; if the stock market crashes, the negatively correlated asset stays steady or rises."},
            {q: "Which of the following is generally considered a highly inappropriate investment to place inside a tax-advantaged retirement account like an IRA?", c: ["Tax-exempt municipal bonds", "High-yield corporate bonds"], a: 0, f: "Logic: Municipal bonds offer lower yields because their interest is tax-free. Placing them inside an IRA wastes their primary benefit and subjects the eventual withdrawals to ordinary income taxes."},
            {q: "An investor who claims they 'knew all along' that a specific stock was going to crash, even though they had no evidence beforehand, is exhibiting:", c: ["Hindsight bias", "Confirmation bias"], a: 0, f: "Logic: Hindsight bias is the psychological illusion that past events were perfectly predictable after they have already occurred."},
            {q: "Under the 'Kiddie Tax' rules, unearned investment income in a UGMA/UTMA account that exceeds the annual threshold is taxed at the:", c: ["Parents' marginal tax rate", "Minor child's tax rate"], a: 0, f: "Logic: To prevent wealthy parents from shifting massive tax burdens to their kids, the IRS taxes the child's excess unearned income at the parents' much higher tax rate."},
            {q: "Which of the following distributions from a 401(k) plan is exempt from the 10% early withdrawal penalty for an employee under age 59 1/2?", c: ["A distribution made to a beneficiary following the death of the employee", "A withdrawal to pay for a child's higher education tuition"], a: 0, f: "Logic: Death and disability always waive the 10% penalty. Higher education waives the penalty for IRAs, but NOT for employer plans like a 401(k)."},
            {q: "When applying Modern Portfolio Theory (MPT), adding an asset class with a correlation of +0.10 to an existing portfolio will:", c: ["Provide a significant diversification benefit and reduce total risk", "Increase the portfolio's overall volatility"], a: 0, f: "Logic: Any correlation coefficient less than +1.0 provides diversification. At +0.10, the assets have almost no relationship, which heavily smooths out the portfolio's overall ride."},
            {q: "If a wealthy client gifts an asset to their grandchild, skipping their own living child, the transfer may be subject to a flat, maximum-rate tax known as the:", c: ["Generation-Skipping Transfer (GST) Tax", "Alternative Minimum Tax (AMT)"], a: 0, f: "Logic: The GST tax is designed to stop families from avoiding a generation of estate taxes by passing wealth directly to grandchildren."},
            {q: "A fiduciary managing a trust under the Uniform Prudent Investor Act (UPIA) must ensure that the trust's assets are:", c: ["Diversified, unless it is reasonably determined that it is in the best interest of the beneficiaries not to do so", "Exclusively invested in risk-free U.S. government securities"], a: 0, f: "Logic: The UPIA mandates diversification as a core tenet of risk management, absent a very specific and compelling reason to concentrate the assets."},
            {q: "In a 'Joint Tenants with Right of Survivorship' (JTWROS) account owned by a married couple, what happens to the cost basis of the assets when one spouse dies?", c: ["Only the deceased spouse's 50% share receives a step-up in basis", "The entire account receives a full step-up in basis"], a: 0, f: "Logic: In standard JTWROS (outside of Community Property states), only the half owned by the deceased gets stepped up to the fair market value on the date of death."},
            {q: "An investor who firmly believes in the 'Semi-Strong' Efficient Market Hypothesis would logically choose to invest their money in:", c: ["Broad-market index ETFs", "Actively managed mutual funds"], a: 0, f: "Logic: Semi-strong EMH believes fundamental analysis is useless because all public data is already priced in. Therefore, the only logical move is to passively index and keep fees low."},
            {q: "Which of the following strategies automatically forces an investor to buy more shares when prices are low and fewer shares when prices are high?", c: ["Dollar-Cost Averaging", "Tactical Asset Allocation"], a: 0, f: "Logic: By investing a fixed dollar amount on a strict schedule, the math naturally dictates that your money buys more shares during a market dip."},
            {q: "A client who holds a heavily concentrated position in a single stock and refuses to sell it because they inherited it from their late grandfather is exhibiting:", c: ["Endowment effect (Emotional bias)", "Anchoring bias"], a: 0, f: "Logic: The endowment effect occurs when people irrationally overvalue an asset simply because they own it or have an emotional attachment to it."},
            {q: "Under IRS rules, if a taxpayer has $15,000 of realized capital gains and $25,000 of realized capital losses, they can deduct a maximum of:", c: ["$3,000 against ordinary income, carrying forward $7,000", "$10,000 against ordinary income this year"], a: 0, f: "Logic: You net them first ($10k net loss). You can only deduct a maximum of $3,000 against your W-2 income each year. The remaining $7,000 rolls over to future years."},
            {q: "A 'QDRO' (Qualified Domestic Relations Order) allows for the penalty-free division of which specific type of asset?", c: ["An ERISA-qualified employer retirement plan (e.g., a 401k)", "A non-qualified variable annuity"], a: 0, f: "Logic: QDROs are court orders specifically designed to split ERISA-protected workplace pensions and 401(k)s during a divorce without triggering the 10% early withdrawal penalty."},
            {q: "Which type of trust allows the grantor to change the beneficiaries, alter the terms, or completely dissolve the trust at their discretion?", c: ["Revocable Trust", "Testamentary Trust"], a: 0, f: "Logic: A revocable trust leaves total control in the hands of the grantor. Consequently, the assets remain in the grantor's taxable estate."},
            {q: "If an investor is executing a 'Core and Satellite' strategy, the 'Satellite' portion of the portfolio is primarily designed to:", c: ["Generate 'Alpha' through active, tactical, or alternative investments", "Provide a stable, low-cost anchor using broad-market indexes"], a: 0, f: "Logic: The 'Core' provides the stable, passive anchor. The smaller 'Satellites' take on more risk to try and beat the market (generate Alpha)."},
            {q: "To legally qualify as a 'Simple Trust' for the tax year, the trust MUST:", c: ["Distribute all of its net income to the beneficiaries", "Make at least one distribution of principal"], a: 0, f: "Logic: Simple trusts are forbidden from distributing principal or making charitable contributions, and they MUST distribute all their income every single year."},
            {q: "An employee making a $5,000 contribution to their employer's 457(b) plan will see their current year taxable income:", c: ["Decrease by $5,000", "Remain unchanged, as contributions are after-tax"], a: 0, f: "Logic: 457(b) plans are deferred compensation plans for municipal workers. Like a Traditional 401(k), contributions are made pre-tax, lowering current taxable income."},
            {q: "In portfolio management, 'Systematic Rebalancing' is a mechanical process designed to force the investor to:", c: ["Sell high and buy low", "Buy high and sell low"], a: 0, f: "Logic: If stocks surge, they become a larger percentage of the portfolio. Rebalancing forces you to sell those high-priced stocks and buy the lagging bonds to restore the original target ratio."},
            {q: "A sole proprietor wants to establish a retirement plan that allows them to contribute the maximum possible percentage of their self-employment income while keeping administrative costs to an absolute minimum. The best choice is a:", c: ["Simplified Employee Pension (SEP) IRA", "Defined Benefit Pension Plan"], a: 0, f: "Logic: A SEP IRA allows the business owner to contribute up to 25% of their compensation, and it has almost zero administrative overhead compared to a complex pension plan."},
            {q: "Which of the following is considered an 'External' factor in an Investment Policy Statement (IPS)?", c: ["Tax laws and Inflation", "The client's liquidity needs"], a: 0, f: "Logic: External factors are imposed by the outside world (taxes, laws, inflation). Internal factors are specific to the client (age, goals, risk tolerance)."},
            {q: "A 'Wash Sale' occurs if an investor sells a security at a loss and repurchases a substantially identical security within:", c: ["30 days before or after the sale", "60 days after the sale"], a: 0, f: "Logic: The wash sale window is 61 days total (the day of the sale, plus 30 days prior, plus 30 days after)."},
            {q: "An S-Corporation provides the limited liability of a corporation but is taxed like a:", c: ["Partnership (flow-through)", "C-Corporation"], a: 0, f: "Logic: S-Corps avoid 'double taxation' because their profits flow directly through to the shareholders' personal tax returns."},
            {q: "What is the primary characteristic of a 'Testamentary Trust'?", c: ["It does not go into effect until the death of the grantor", "It avoids the probate process entirely"], a: 0, f: "Logic: Testamentary trusts are created by a will (a Last Will and Testament), meaning the assets must first go through probate before the trust is funded."},
            {q: "Which of the following business entities has the greatest risk of 'Double Taxation'?", c: ["C-Corporation", "Limited Liability Company (LLC)"], a: 0, f: "Logic: C-Corps pay corporate income tax on their profits, and then shareholders pay tax again on the dividends they receive."},
            {q: "If an investor gifts shares of stock to a family member while the investor is still alive, the recipient's cost basis is generally:", c: ["The donor's original cost basis (Carryover basis)", "The fair market value on the date of the gift (Stepped-up basis)"], a: 0, f: "Logic: Living gifts carry over the original tax basis. Inheritances at death receive a step-up in basis."},
            {q: "Which of the following Medicare parts covers standard physician and outpatient services?", c: ["Part B", "Part A"], a: 0, f: "Logic: Part A covers hospital stays. Part B covers biological/doctor services. Part D covers prescription drugs."},
            {q: "Which of the following defines a 'Per Stirpes' beneficiary designation?", c: ["If a beneficiary dies, their share passes down to their descendants", "If a beneficiary dies, their share is divided among the surviving primary beneficiaries"], a: 0, f: "Logic: Per Stirpes means 'by the branch'. The money flows down the family tree to the grandchildren if the parent dies."},
            {q: "A married couple sells their primary residence for a $400,000 profit. Assuming they lived there for 3 of the last 5 years, how much of the gain is taxable?", c: ["$0", "$150,000"], a: 0, f: "Logic: The IRS Section 121 exclusion allows married couples to exclude up to $500,000 of capital gains on the sale of a primary residence ($250,000 for singles)."},
            {q: "The 'Sharpe Ratio' is a formula used by analysts to evaluate:", c: ["Risk-adjusted return", "A company's short-term liquidity"], a: 0, f: "Logic: The Sharpe Ratio tells you how much excess return you are receiving for the extra volatility you endure by holding a riskier asset."},
            {q: "A 'Complex Trust' is distinguished from a 'Simple Trust' by its ability to:", c: ["Accumulate income and distribute principal", "Avoid all federal income taxes"], a: 0, f: "Logic: Complex trusts have the flexibility to hold onto income, distribute principal, and make charitable gifts."},
            {q: "Which of the following is a primary advantage of a 'Transfer on Death' (TOD) account designation?", c: ["It bypasses the probate process", "It eliminates estate taxes"], a: 0, f: "Logic: TOD accounts pass directly to the named beneficiary without going through the delays and public scrutiny of probate court. It does NOT avoid estate taxes."},
            {q: "An Irrevocable Life Insurance Trust (ILIT) is primarily utilized by high-net-worth individuals to:", c: ["Remove the life insurance death benefit from their taxable estate", "Access the cash value tax-free during their lifetime"], a: 0, f: "Logic: Because the trust (not the individual) owns the policy, the massive death benefit payout is not counted when calculating the estate tax."},
            {q: "Which of the following describes the 'Capital Needs Analysis' process?", c: ["Calculating the amount of life insurance needed to fund a family's future liabilities if the breadwinner dies", "Determining the optimal mix of stocks and bonds for retirement"], a: 0, f: "Logic: It finds the exact dollar 'gap' between what a family currently has and what they will need to survive, which is usually filled by buying term life insurance."},
            {q: "A client with a very short time horizon (e.g., 6 months) should prioritize which investment objective?", c: ["Preservation of Capital", "Maximum Capital Appreciation"], a: 0, f: "Logic: If you need the money soon, you cannot afford market risk. You must preserve the principal in safe, highly liquid assets like money market funds."},
            {q: "In a discretionary account, the Investment Adviser Representative (IAR) is legally permitted to determine the:", c: ["Asset, Action, or Amount (AAA)", "Beneficiary of the account"], a: 0, f: "Logic: Discretion gives the IAR the power to decide Which security to trade, Whether to buy or sell, and How many shares to trade without calling the client first."},
            {q: "Which of the following inflation gauges is designed to measure price changes at the wholesale/manufacturing level?", c: ["Producer Price Index (PPI)", "Consumer Price Index (CPI)"], a: 0, f: "Logic: The PPI tracks the costs producers face before the goods hit the retail market."},
            {q: "A 'Qualified' dividend is advantageous to an investor because it is taxed at:", c: ["Long-term capital gains rates", "Ordinary income tax rates"], a: 0, f: "Logic: Qualified dividends enjoy preferential tax treatment (typically 15% or 20%), which is much lower than the investor's standard income tax bracket."},
            {q: "A 'QTIP' Trust (Qualified Terminable Interest Property) is most commonly utilized to:", c: ["Provide income for a surviving spouse while ensuring the principal eventually passes to the grantor's children", "Avoid the Generation-Skipping Transfer Tax"], a: 0, f: "Logic: QTIPs are popular in second marriages. They take care of the new spouse for life, but guarantee the underlying money eventually goes to the kids from the first marriage."},
            {q: "An investor heavily concentrated in the Technology sector decides to move funds into Consumer Staples and Utilities to prepare for a recession. This is known as:", c: ["Sector Rotation", "Strategic Asset Allocation"], a: 0, f: "Logic: Sector rotation is a form of active/tactical management where the investor tries to stay ahead of the business cycle."},
            {q: "Which of the following represents an 'Unsystematic' risk?", c: ["A labor strike at a specific automotive plant", "A nationwide increase in interest rates"], a: 0, f: "Logic: Unsystematic risk is specific to a single company or industry and can be virtually eliminated through proper diversification."},
            {q: "Under the Uniform Prudent Investor Act (UPIA), an adviser's investment decisions must be evaluated based on:", c: ["The entire portfolio's performance as a whole", "The success or failure of each individual trade"], a: 0, f: "Logic: The UPIA modernized trust law. A fiduciary cannot be sued for one bad stock pick if the overall portfolio was diversified and managed prudently."},
            {q: "A 'Top-Heavy' 401(k) plan is one in which:", c: ["A disproportionate amount of the benefits go to 'key employees'", "The employer matches more than 100% of employee contributions"], a: 0, f: "Logic: If the bosses and owners hold too much of the plan's total value, it is top-heavy and violates ERISA fairness testing, requiring immediate corrective action."},
            {q: "Which of the following retirement plans is uniquely designed for employees of public schools and certain 501(c)(3) tax-exempt organizations?", c: ["403(b) Plan / Tax-Sheltered Annuity (TSA)", "457(b) Plan"], a: 0, f: "Logic: 403(b) plans are the non-profit equivalent of a corporate 401(k)."},
            {q: "Under ERISA rules, the document that formally outlines the plan's investment strategy, risk tolerance, and asset class criteria is the:", c: ["Investment Policy Statement (IPS)", "Summary Plan Description (SPD)"], a: 0, f: "Logic: The IPS is the 'Plan for the Plan.' It dictates exactly how the fiduciary must manage the money."},
            {q: "An investor realizes a $10,000 capital gain but is pushed into the Alternative Minimum Tax (AMT). Which type of income most commonly triggers the AMT?", c: ["Interest from Private Activity Municipal Bonds", "Qualified Corporate Dividends"], a: 0, f: "Logic: Private Activity bonds (like building a stadium) are a 'tax preference item' that the IRS adds back in when calculating whether a wealthy taxpayer owes the AMT."},
            {q: "A 'Family Limited Partnership' (FLP) is primarily established by wealthy parents to:", c: ["Shift wealth to children while utilizing valuation discounts to reduce gift taxes", "Shield the family's primary residence from creditors"], a: 0, f: "Logic: Because the children only receive minority, non-voting shares in the FLP, the IRS allows the parents to 'discount' the value of the gift, squeezing more money under the tax threshold."},
            {q: "The mathematical formula for calculating a company's 'Earnings Per Share' (EPS) is:", c: ["Net Income / Outstanding Common Shares", "Dividends Paid / Current Stock Price"], a: 0, f: "Logic: EPS simply divides the company's total profit by the number of slices (shares) of the pie."},
            {q: "Which of the following is considered a 'Non-Financial' consideration when drafting a client profile?", c: ["The client's risk tolerance and personal values", "The client's current marginal tax bracket"], a: 0, f: "Logic: Financial considerations are hard numbers (salary, mortgage, net worth). Non-financial considerations are emotional or intangible (attitudes toward risk, ESG preferences)."},
            {q: "A high 'Dividend Payout Ratio' typically indicates that a company is:", c: ["A mature, established company returning cash to shareholders", "A rapidly growing tech startup"], a: 0, f: "Logic: Fast-growing companies keep their cash to fund expansion (low payout ratio). Mature companies (like utilities) have fewer growth prospects and pay out their profits as dividends."},
            {q: "In an ERISA-covered retirement plan, the 'Fiduciary' is legally obligated to act:", c: ["Solely in the interest of the plan participants and beneficiaries", "To maximize the profitability of the corporate sponsor"], a: 0, f: "Logic: The Fiduciary Standard requires absolute loyalty to the employees whose money is in the plan, completely ignoring the financial interests of the employer."},
            {q: "If the Internal Rate of Return (IRR) is mathematically lower than the required Hurdle Rate, the project's Net Present Value (NPV) is:", c: ["Negative", "Positive"], a: 0, f: "Logic: The Hurdle Rate is the minimum acceptable return. If the IRR falls short of it, the project destroys value (Negative NPV)."},
            {q: "Which of the following life insurance policies features 'Permanent' coverage and a fixed, level premium for the life of the insured?", c: ["Whole Life", "Universal Life"], a: 0, f: "Logic: Whole Life is entirely fixed and guaranteed (fixed premium, fixed death benefit, guaranteed cash value). Universal Life has flexible premiums."},
            {q: "A 'Covered Call' options strategy involves:", c: ["Selling a call option on a stock that you currently own", "Selling a call option on a stock you do not own (Naked)"], a: 0, f: "Logic: Owning the underlying stock 'covers' the risk, because if the option is exercised, you already have the shares to hand over."},
            {q: "Which of the following business entities functions as a 'Pass-Through' for tax purposes, avoiding corporate-level taxation?", c: ["Partnerships and LLCs", "C-Corporations"], a: 0, f: "Logic: LLCs, Partnerships, and S-Corps pass all income directly to the owners' personal tax returns, bypassing the IRS at the business level."},
            {q: "Under the 'Section 1031' exchange rules, a taxpayer can defer capital gains taxes by exchanging one investment property for another. This rule applies to:", c: ["Investment Real Estate", "Corporate Stocks and Bonds"], a: 0, f: "Logic: 1031 'Like-Kind' exchanges are strictly limited to real estate held for business or investment purposes. You cannot use it to swap stocks."},
            {q: "Which of the following is an example of an 'Intentionally Defective Grantor Trust' (IDGT)?", c: ["A trust that removes assets from the estate but leaves the grantor responsible for the income taxes", "A trust that failed to meet IRS drafting standards and is voided"], a: 0, f: "Logic: It is 'defective' for income tax purposes (grantor pays the tax), which allows the trust assets to grow tax-free for the heirs while still escaping the estate tax at death."},
            {q: "A 529 College Savings Plan allows for 'Superfunding', which permits a donor to front-load a lump sum equal to how many years of the annual gift tax exclusion?", c: ["5 years", "3 years"], a: 0, f: "Logic: A grandparent can drop 5 years' worth of gifts into a 529 plan all at once without triggering a gift tax, provided they don't give that child another dime for 5 years."},
            {q: "An investor in the 10% tax bracket is choosing between a 4% Municipal Bond and a 5% Corporate Bond. Which should they choose?", c: ["The Corporate Bond, because the tax-free benefit is mathematically worthless at a 10% bracket", "The Municipal Bond, because it is safer"], a: 0, f: "Logic: Tax-free munis are designed for the rich. For someone in the lowest tax bracket, they are better off taking the higher yield of the corporate bond and just paying the tiny tax."},
            {q: "According to the Efficient Market Hypothesis (EMH), if a market is perfectly efficient, an investor should expect to:", c: ["Earn a return that matches the market benchmark", "Consistently beat the market using technical analysis"], a: 0, f: "Logic: If the market is perfectly efficient, all information is priced in instantly. You cannot beat it, so your best expectation is to simply match it via indexing."},
            {q: "Which of the following best describes the formula for calculating 'Book Value Per Share'?", c: ["(Total Assets - Total Liabilities - Preferred Stock) / Outstanding Common Shares", "Net Income / Outstanding Common Shares"], a: 0, f: "Logic: Book Value is the theoretical liquidation value of the company (Net Worth) divided among the common shareholders after paying off debt and preferred owners."},
            {q: "A 'Simple IRA' is a retirement plan designed specifically for small businesses that have fewer than:", c: ["100 employees", "50 employees"], a: 0, f: "Logic: A Savings Incentive Match Plan for Employees (SIMPLE) is strictly capped at 100 or fewer employees."},
            {q: "When an individual takes a withdrawal from a Traditional IRA, the distribution is generally taxed as:", c: ["Ordinary Income", "Long-term Capital Gains"], a: 0, f: "Logic: Because the money went in pre-tax, 100% of the withdrawal (both contributions and growth) is taxed as regular income at the retiree's current tax bracket."},
            {q: "A 'Growth' investor is primarily focused on a company's:", c: ["Earnings momentum and future acceleration", "High dividend yield and low P/E ratio"], a: 0, f: "Logic: Growth investors don't care about current dividends or paying a high price; they are buying the belief that the company will grow exponentially in the future."},
            {q: "Under the Capital Asset Pricing Model (CAPM), what is the accepted proxy for the 'Risk-Free Rate'?", c: ["91-day U.S. Treasury Bills", "The Prime Rate"], a: 0, f: "Logic: T-Bills are considered to have zero default risk and, because of their short duration, virtually zero interest rate risk, making them the perfect 'Risk-Free' baseline."},
            {q: "A client who firmly believes in 'Tactical Asset Allocation' would be most likely to:", c: ["Overweight their portfolio in technology stocks right before an anticipated economic boom", "Maintain a strict 60/40 mix and rebalance annually"], a: 0, f: "Logic: Tactical allocation is active market timing. The investor deliberately deviates from their base mix to exploit short-term economic trends."},
            {q: "Under standard options rules, if an investor is 'Bullish' on a particular stock, they could initiate a position by:", c: ["Buying a Call or Selling a Put", "Selling a Call or Buying a Put"], a: 0, f: "Logic: Buying a Call gives you the right to buy low as the stock shoots up. Selling a put generates premium, and you keep it as long as the stock stays up."},
            {q: "When an employer offers a 'Deferred Compensation Plan', this is considered a:", c: ["Non-qualified plan, meaning it does not have to comply with ERISA non-discrimination testing", "Qualified plan governed strictly by ERISA"], a: 0, f: "Logic: Deferred comp plans are non-qualified. Companies use them to give massive bonuses to executives without having to offer the same benefit to the rank-and-file workers."},
            {q: "To calculate the 'Real' rate of return on an investment, you must take the nominal return and subtract:", c: ["The inflation rate (CPI)", "The risk-free rate"], a: 0, f: "Logic: 'Real' always means adjusted for inflation. It measures your true increase in purchasing power."},
            {q: "The 'Rule of 72' is a mathematical shortcut used to determine:", c: ["How many years it will take an investment to double in value at a given compound interest rate", "The maximum allowable withdrawal rate for a retirement portfolio"], a: 0, f: "Logic: Divide 72 by the annual interest rate to find the exact number of years it takes to double your money."},
            {q: "A 'Defensive' stock is characterized by its ability to:", c: ["Remain stable and maintain demand during economic recessions", "Outperform the market during periods of rapid expansion"], a: 0, f: "Logic: Defensive stocks (Utilities, Food, Basic Medicine) have inelastic demand. People have to buy them regardless of how bad the economy gets."},
            {q: "Which of the following factors would cause a company's 'Working Capital' to DECREASE?", c: ["Paying a cash dividend to shareholders", "Selling long-term corporate bonds for cash"], a: 0, f: "Logic: Working Capital = Current Assets - Current Liabilities. Paying a dividend drains cash (a current asset), which mathematically shrinks the working capital."},
            {q: "In an ERISA 'Defined Benefit' plan (a traditional pension), who bears the primary investment risk?", c: ["The Employer", "The Employee"], a: 0, f: "Logic: The employer guarantees a specific monthly payout for life. If the stock market crashes, the employer is legally forced to make up the shortfall."},
            {q: "An investor executes a 'Section 1031 Exchange' on an apartment building. To completely defer capital gains taxes, the investor must identify the replacement property within:", c: ["45 days of the sale", "180 days of the sale"], a: 0, f: "Logic: IRS rules require you to identify the target property within 45 days, and close the deal within 180 days."},
            {q: "Which of the following provides the most accurate definition of the 'Gross Domestic Product' (GDP)?", c: ["The total market value of all final goods and services produced within a country's borders in a given year", "The total value of all goods produced by a country's citizens, regardless of where they live"], a: 0, f: "Logic: GDP is strictly geographic (within the borders). GNP (Gross National Product) tracks the citizens worldwide."},
            {q: "An investor with a deeply negative correlation (-0.85) between two assets in their portfolio has successfully executed a strategy to:", c: ["Maximize diversification and smooth out volatility", "Amplify their exposure to systemic market risk"], a: 0, f: "Logic: Highly negative correlation means the assets zig when the other zags, which is the ultimate goal of diversification to reduce risk."},
            {q: "If an investor is executing an 'Arbitrage' strategy, they are attempting to:", c: ["Simultaneously buy and sell the same asset in different markets to capture a riskless profit from a price discrepancy", "Hedge a long stock position against a market crash"], a: 0, f: "Logic: Arbitrage exploits momentary pricing errors, buying low on Exchange A and instantly selling high on Exchange B."},
            {q: "A 'Venture Capital' firm generally seeks to invest its capital in:", c: ["Early-stage, unproven start-ups with massive growth potential", "Mature, blue-chip corporations paying high dividends"], a: 0, f: "Logic: VC funds provide 'seed' money to brand new companies in exchange for an equity stake, accepting high risk for massive potential reward."},
            {q: "When comparing the arithmetic mean to the geometric mean of an investment's historical returns, the geometric mean will generally be:", c: ["Lower, because it accounts for the compounding drag of negative returns", "Higher, because it ignores volatility"], a: 0, f: "Logic: The geometric mean uses multiplication (compounding) to show the true, real-world return of a dollar invested, which is almost always lower than the simple arithmetic average."},
            {q: "An investor who buys a 'Straddle' (buying both a call and a put on the same stock) is anticipating:", c: ["Extreme volatility in either direction", "A long period of flat, stable prices"], a: 0, f: "Logic: The investor doesn't care if the stock rockets up or crashes down, they just need it to move violently to cover the cost of buying two premiums."},
