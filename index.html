            {q: "Under the USA, if a client is declared legally incompetent by a judge, the client's agent must:", c: ["Cancel all pending open orders and wait for instructions from a court-appointed conservator or guardian", "Continue trading the account using their best judgment"], a: 0, f: "Logic: Legal incompetence instantly freezes the account. The agent cannot take instructions from the client or trade the account until a legally appointed guardian takes over."},
            {q: "According to the USA, an Administrator may deny an applicant's registration if, within the past 10 years, the applicant was convicted of:", c: ["Any felony, or any misdemeanor involving securities, finance, or fraud", "Any misdemeanor, including a minor traffic violation"], a: 0, f: "Logic: The 'Statutory Disqualification' rule looks back 10 years. It flags ALL felonies, but only flags misdemeanors if they specifically involve money, fraud, or securities."},
            {q: "Congratulations. You have completed the final calibration sequence for the Series 66 exam. The primary function of the Uniform Securities Act is to:", c: ["Protect the investing public from fraud and ensure financial professionals operate with complete integrity", "Guarantee that all registered securities will be profitable"], a: 0, f: "Logic: MISSION ACCOMPLISHED. The regulators exist to protect the public. By mastering these questions, you have proven you are ready. Go pass the Series 66!"}
        ]
    ];

    // =====================================================================
    // GAME LOGIC
    // =====================================================================

    let activeSet=[], idx=0, currentPillar=0, sessionScore=0, sessionFails=0;
    let currentScores = JSON.parse(localStorage.getItem('s66CurrentScores')) || [0,0,0,0];
    let sectorsCompleted = JSON.parse(localStorage.getItem('s66SectorsCompleted')) || [false, false, false, false];
    let isPracticeMode = false;
    let baseScore = 0; 
    let frozenGlobalScore = 0; 

    function launchSequence() {
        const overlay = document.getElementById('countdown-overlay');
        const hud = document.getElementById('main-hud');
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'none';
        overlay.style.display = 'block'; overlay.style.color = '#ffaa00'; overlay.style.textShadow = '0 0 30px #ffaa00'; overlay.innerText = "3";
        hud.classList.add('continuous-shake');
        playCountdown();
        let count = 3;
        let timer = setInterval(() => {
            count--;
            if(count > 0) overlay.innerText = count;
            else if (count === 0) {
                overlay.innerText = "LIFTOFF!";
                document.getElementById('rocket').classList.add('takeoff');
                document.getElementById('fuel-fill').style.background = '#00ff41';
                document.getElementById('fuel-fill').style.boxShadow = '0 0 15px #00ff41';
                document.getElementById('total-text').innerText = "ORBIT ACHIEVED: PASSING SCORE REACHED!";
            } else {
                clearInterval(timer); overlay.style.display = 'none'; hud.classList.remove('continuous-shake');
                document.getElementById('mission-report').style.display = 'block';
                document.getElementById('report-title').innerText = "EXAM PASSED!";
                document.getElementById('stat-correct').style.display = 'none';
                document.getElementById('stat-wrong').style.display = 'none';
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                document.getElementById('rep-global').innerText = finalTotal + "/100";
                document.getElementById('rep-global').style.color = "#00ff41";
                document.getElementById('rep-msg').innerText = "YOU ARE READY FOR THE SERIES 66.";
                document.getElementById('rep-msg').style.color = "#00ff41";
            }
        }, 1000);
    }

    function crashSequence() {
        const overlay = document.getElementById('countdown-overlay');
        const hud = document.getElementById('main-hud');
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'none';
        overlay.style.display = 'block'; overlay.style.color = '#ff0000'; overlay.style.textShadow = '0 0 30px #ff0000'; overlay.innerText = "WARNING";
        hud.classList.add('critical-shake');
        playSiren();
        setTimeout(() => {
            overlay.innerText = "SYSTEM FAILURE";
            document.getElementById('rocket').innerHTML = "💥";
            document.getElementById('rocket').classList.add('explosion');
            setTimeout(() => {
                overlay.style.display = 'none'; hud.classList.remove('critical-shake');
                document.getElementById('mission-report').style.display = 'block';
                document.getElementById('mission-report').style.borderColor = '#ff0000';
                document.getElementById('report-title').innerText = "MISSION FAILED";
                document.getElementById('report-title').style.color = "#ff0000";
                document.getElementById('stat-correct').style.display = 'none';
                document.getElementById('stat-wrong').style.display = 'none';
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                document.getElementById('rep-global').innerText = finalTotal + "/100";
                document.getElementById('rep-global').style.color = "#ff0000";
                document.getElementById('rep-msg').innerText = "EXAM COMPLETED. TARGET WAS 73. YOU MUST RETRAIN.";
                document.getElementById('rep-msg').style.color = "#ff0000";
                let repBtn = document.getElementById('report-nav-btn');
                repBtn.innerText = "WIPE DATA & RESTART EXAM"; repBtn.style.background = "#ff0000"; repBtn.style.color = "#ffffff";
                repBtn.onclick = function() { localStorage.clear(); location.reload(); };
            }, 1500);
        }, 2000);
    }

    function updateMenuUI() {
        let total = currentScores.reduce((a, b) => a + b, 0);
        for(let i=0; i<4; i++) {
            let btn = document.getElementById('btn-p'+i), tag = document.getElementById('s'+i);
            document.getElementById('c'+i).innerText = `[${lib[i].length} GATES IN BANK]`;
            if(sectorsCompleted[i]) {
                tag.innerHTML = `Score: ${currentScores[i]}/25 <br><span class='practice-text'>[PRACTICE ONLY]</span>`;
                btn.style.borderColor = "#ffaa00"; 
            } else tag.innerHTML = `Status: PENDING`;
        }
        document.getElementById('fuel-fill').style.width = total + "%";
        if(sectorsCompleted.every(Boolean)) {
            if(total >= 73) {
                document.getElementById('rocket').style.display = 'none'; document.getElementById('fuel-fill').style.background = '#00ff41';
                document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total}/100 (ORBIT ACHIEVED)`;
            } else {
                document.getElementById('rocket').innerHTML = "💥"; document.getElementById('fuel-fill').style.background = '#ff0000';
                document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total}/100 (MISSION FAILED)`;
            }
        } else {
            document.getElementById('rocket').style.bottom = (10 + (total * 2.0)) + "px";
            document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total} / 100 (TARGET: 73)`;
        }
    }

    function updateLiveTelemetry() {
        if (isPracticeMode) {
            document.getElementById('fuel-fill').style.width = frozenGlobalScore + "%";
            document.getElementById('rocket').style.bottom = (10 + (frozenGlobalScore * 2.0)) + "px";
            document.getElementById('total-text').innerText = `PRACTICE MODE - GLOBAL LOCKED AT: ${frozenGlobalScore} / 100`;
        } else {
            let currentGlobal = baseScore + sessionScore;
            document.getElementById('fuel-fill').style.width = currentGlobal + "%";
            document.getElementById('rocket').style.bottom = (10 + (currentGlobal * 2.0)) + "px";
            document.getElementById('total-text').innerText = `LIVE GLOBAL SCORE: ${currentGlobal} / 100 (TARGET: 73)`;
        }
    }

function start(i){
        if (audioCtx.state === 'suspended') audioCtx.resume(); // <--- ADD THIS
        currentPillar = i;
        if (sectorsCompleted[i] === true) { 
            isPracticeMode = true; 
            frozenGlobalScore = currentScores.reduce((a, b) => a + b, 0);
            document.getElementById('abort-btn').style.display = 'block';
        }
        else { 
            isPracticeMode = false; 
            baseScore = currentScores.reduce((acc, val, index) => index === i ? acc : acc + val, 0); 
            document.getElementById('abort-btn').style.display = 'none';
        }
        let rawSet = JSON.parse(JSON.stringify(lib[i]));
        let allWrongAnswers = [...new Set(rawSet.map(q => q.c).flat())];
        rawSet.forEach(q => {
            let correctString = q.c[q.a], newChoices = [...q.c], attempts = 0;
            while(newChoices.length < 4 && attempts < 100) {
                let randomAns = allWrongAnswers[Math.floor(Math.random() * allWrongAnswers.length)];
                if(!newChoices.includes(randomAns)) newChoices.push(randomAns);
                attempts++;
            }
            let shuffledChoices = newChoices.map(val => ({ val, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ val }) => val);
            q.c = shuffledChoices; q.a = shuffledChoices.indexOf(correctString);
        });
        activeSet = rawSet.sort(() => 0.5 - Math.random()).slice(0, 25);
        idx = 0; sessionScore = 0; sessionFails = 0;
        document.getElementById('menu').style.display = 'none'; document.getElementById('game').style.display = 'block';
        if (isPracticeMode) { document.getElementById('status-line').innerText = "⚠️ PRACTICE MODE"; document.getElementById('status-line').style.color = "#ffaa00"; }
        else document.getElementById('status-line').style.color = "#888";
        updateLiveTelemetry(); show();
    }

    function show(){
        if(idx >= activeSet.length){
            if (!isPracticeMode) {
                currentScores[currentPillar] = sessionScore; sectorsCompleted[currentPillar] = true;
                localStorage.setItem('s66CurrentScores', JSON.stringify(currentScores)); localStorage.setItem('s66SectorsCompleted', JSON.stringify(sectorsCompleted));
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                if (sectorsCompleted.every(Boolean)) { 
                    document.getElementById('game').style.display = 'none'; 
                    if (finalTotal >= 73) launchSequence(); else crashSequence(); return; 
                }
                else if(finalTotal >= 73) { document.getElementById('game').style.display = 'none'; launchSequence(); return; }
            }
            document.getElementById('game').style.display = 'none'; document.getElementById('mission-report').style.display = 'block';
            document.getElementById('rep-correct').innerText = sessionScore; document.getElementById('rep-wrong').innerText = sessionFails;
            return;
        }
        document.getElementById('status-line').innerText = `GATE ${idx+1}/25 | SECTOR SCORE: ${sessionScore}`;
        let s = activeSet[idx], h = `<div class="q-text">${s.q}</div>`;
        s.c.forEach((v,i) => { h += `<button class="ans-btn" onclick="check(${i})"><strong>${String.fromCharCode(65+i)}.</strong> ${v}</button>`; });
        document.getElementById('q-area').innerHTML = h; document.getElementById('feedback').style.display = 'none'; document.getElementById('next').style.display = 'none';
    }

    function check(i){
        let s = activeSet[idx]; const btns = document.getElementsByClassName('ans-btn');
        for(let b of btns) { b.disabled = true; if(Array.from(btns).indexOf(b) === s.a) { b.style.borderColor = "#00ff41"; b.style.color = "#00ff41"; } }
        if(i === s.a){ playSnd('ok'); sessionScore++; document.getElementById('feedback').innerHTML = "<span style='color:#00ff41'>[THRUST NOMINAL]</span> " + s.f; }
        else { playSnd('no'); sessionFails++; btns[i].style.borderColor = "#ff0000"; btns[i].style.color = "#ff0000"; document.getElementById('feedback').innerHTML = "<span style='color:#ff0000'>[CRITICAL FAILURE]</span> " + s.f; document.getElementById('main-hud').classList.add('shake'); setTimeout(() => document.getElementById('main-hud').classList.remove('shake'), 200); }
        updateLiveTelemetry();
        document.getElementById('feedback').style.display = 'block'; document.getElementById('next').style.display = 'block';
    }

    function next(){ idx++; show(); }
    function resetScores() { if(confirm("⚠️ WIPE DATA?")) { localStorage.clear(); location.reload(); } }
    updateMenuUI();
</script>
