    {q: "In a 'Community Property' state, assets acquired by one spouse during the marriage are legally considered to be owned:", c: ["50/50 by both spouses", "By the individual who earned the income"], a: 0, f: "Logic: State law assumes joint ownership of marital property; however, assets owned *before* the marriage or received as a specific inheritance are usually separate."},
    {q: "SIMPLE IRAs are restricted to businesses with a maximum of how many employees?", c: ["100 employees", "500 employees"], a: 0, f: "Logic: SIMPLE stands for 'Savings Incentive Match for Employees' of small businesses; however, larger firms typically utilize 401(k) plans."},
    {q: "What is the mandatory age to begin Required Minimum Distributions (RMDs) under current SECURE 2.0 legislation?", c: ["Age 73", "Age 70.5"], a: 0, f: "Logic: The law pushed the age back to allow more growth; however, don't forget that Roth IRA original owners are exempt from RMDs entirely."},
    {q: "Which Medicare part covers hospital stays and is generally free to those who paid into the system?", c: ["Part A", "Part B"], a: 0, f: "Logic: A is for All-in (Hospital); however, Part B is for Body (Outpatient/Doctor) and requires a monthly premium."},
    {q: "Does a 'Step-up in Basis' apply when a client gifts stock to a charity?", c: ["No", "Yes"], a: 0, f: "Logic: Charities carry over the original cost basis; however, gifting appreciated stock to a charity is still smart because the donor gets a deduction for the Full Market Value."},
    {q: "A client who believes they can 'out-trade' the market despite high fees and taxes is exhibiting:", c: ["Overconfidence Bias", "Herding"], a: 0, f: "Logic: Overconfidence leads to excessive trading and lower net returns; however, Herding is the tendency to follow the crowd into whatever is currently 'hot'."},
    {q: "Which ratio identifies the 'break-even' percentage of a real estate project or capital investment?", c: ["Internal Rate of Return (IRR)", "Net Present Value (NPV)"], a: 0, f: "Logic: IRR is the rate that results in an NPV of zero; however, NPV itself is a dollar amount, not a percentage."},
    {q: "A 'Per Stirpes' distribution in a Will means assets go to:", c: ["The children of a deceased beneficiary", "The other surviving siblings only"], a: 0, f: "Logic: Per Stirpes keeps the money in that specific 'family branch'; however, 'Per Capita' would divide the money equally among all surviving members."},
    {q: "Standard Deviation measures the dispersion of returns around which statistical point?", c: ["The Mean (Average)", "The Beta"], a: 0, f: "Logic: SD shows how far results stray from the middle of the bell curve; however, Beta only measures movement relative to an outside market index."},
    {q: "403(b) (TSA) plans are restricted to employees of which type of organizations?", c: ["Non-profits and Schools", "Government agencies only"], a: 0, f: "Logic: 403(b) is for 501(c)(3) entities; however, 457 plans are for state and local government workers."},
    {q: "Which risk cannot be removed, no matter how many different stocks an investor owns?", c: ["Systematic (Market) Risk", "Unsystematic (Business) Risk"], a: 0, f: "Logic: Systematic risk (recessions/wars) hits the whole system; however, Unsystematic risk is specific to one company and is easily diversified away."},
    {q: "Dividends are paid out of which Balance Sheet section?", c: ["Current Assets (Cash)", "Total Liabilities"], a: 0, f: "Logic: Dividends are cash payments that reduce both Cash and Retained Earnings; however, a 'Stock Dividend' doesn't touch cash at all."},
    {q: "If an IAR uses 'Discounted Cash Flow' (DCF) to value a bond and market interest rates rise, the DCF value will:", c: ["Decrease", "Increase"], a: 0, f: "Logic: Higher rates in the denominator make the Present Value lower; however, lower rates make future cash worth more today."},
    {q: "An IAR is reviewing a client's Balance Sheet. Which of the following would be categorized specifically as a 'Liquid Asset'?", c: ["Money Market Fund", "Total Shareholders' Equity"], a: 0, f: "Logic: Liquidity is cash or anything that can be cash in 24 hours; however, Equity is a 'Net Worth' calculation, not an asset you can spend."},
    {q: "Section 529 plans allow for K-12 tuition payments up to what amount per year, per student?", c: ["$10,000", "Unlimited"], a: 0, f: "Logic: Federal law limits the private primary/secondary use to $10k; however, for higher education (College), the spending is virtually unlimited."},
    {q: "Which valuation model uses 'Risk-Free Rate', 'Beta', and 'Market Return' as its primary variables?", c: ["CAPM", "Dividend Discount Model"], a: 0, f: "Logic: CAPM calculates the 'required' return for the risk taken; however, DDM values a stock based strictly on its projected dividend checks."},
    {q: "A client has a 5-year time horizon for a house down payment. Which objective is most appropriate?", c: ["Capital Preservation / Liquidity", "Aggressive Growth"], a: 0, f: "Logic: Short horizons cannot afford market volatility; however, for a 30-year retirement goal, growth is the primary objective."},
    {q: "Under the 'Prudent Investor Act,' can an IAR invest in a high-risk startup for a trust account?", c: ["Yes (If it fits the total portfolio strategy)", "No (Startups are inherently imprudent)"], a: 0, f: "Logic: No asset is strictly forbidden if it serves a purpose (like diversification) in the whole mix; however, under the old 'Prudent Man' rules, such assets were banned."},
    {q: "Which behavior bias involves following the 'herd' because an investor is afraid of missing out on a trend?", c: ["Fictional/Social (Herding)", "Confirmation Bias"], a: 0, f: "Logic: Herding is the psychological 'safety in numbers' trap; however, Confirmation Bias is only seeking news that supports what you already believe."},
    {q: "The 'Geometric Mean' is the preferred measure for long-term returns because it accounts for:", c: ["Compounding and Volatility", "Simple mathematical averages"], a: 0, f: "Logic: Geometric mean (Time-Weighted) shows the true compound growth rate; however, Arithmetic mean overstates performance by ignoring the 'math of losses'."},
    {q: "If an investor's goal is 'Income' but they are in the highest tax bracket, which asset is most suitable?", c: ["Municipal Bonds", "High-Yield Corporate Bonds"], a: 0, f: "Logic: The tax-free nature of Munis beats higher taxable yields for wealthy clients; however, for a client in a 10% bracket, the Corporate bond is better."},
    {q: "Which metric measures the 'Total Risk' (Unsystematic + Systematic) of an investment?", c: ["Standard Deviation", "Beta"], a: 0, f: "Logic: SD looks at every bounce the stock makes; however, Beta only looks at the bounces caused by the market index."},
    {q: "A 'Strategic' asset allocator rebalances based on:", c: ["Pre-set percentage targets", "Short-term market predictions"], a: 0, f: "Logic: Strategic is passive and math-driven to maintain risk levels; however, Tactical is active and 'timing' driven to chase profits."},
    {q: "Which type of IRA has no income limits for making a contribution?", c: ["Traditional IRA", "Roth IRA"], a: 0, f: "Logic: Anyone with earned income can contribute to a Traditional IRA (though it may not be deductible); however, Roth IRAs phase out for high earners."},
    {q: "Does an 'Inter-Vivos' trust bypass probate?", c: ["Yes", "No"], a: 0, f: "Logic: 'Between the Living' trusts are active before death, so assets move instantly; however, Testamentary trusts are part of the Will and MUST go to court."},
    {q: "The Sharpe Ratio uses which figure in its denominator?", c: ["Standard Deviation", "Beta"], a: 0, f: "Logic: Sharpe measures return per unit of Total Risk; however, the Treynor Ratio uses Beta (Systematic Risk)."},
    {q: "If a company pays a cash dividend, which part of the Balance Sheet immediately decreases?", c: ["Current Assets (Cash)", "Long-term Debt"], a: 0, f: "Logic: Paying cash to owners reduces the asset side and the equity (Retained Earnings) side; however, a stock split has no effect on assets."},
    {q: "Which joint account requires equal ownership (50/50) between the owners?", c: ["JTWROS", "Tenants in Common"], a: 0, f: "Logic: JTWROS assumes all owners own the 'whole' account; however, Tenants in Common allows for uneven splits like 70/30."},
    {q: "If a manager has a 'Positive Alpha,' it means they performed:", c: ["Better than the Beta predicted", "Better than the Risk-Free rate"], a: 0, f: "Logic: Alpha is the 'skill' score—it shows they beat the market adjusted for risk; however, a positive total return doesn't guarantee a positive Alpha."},
    {q: "A client with a 'Value' objective looks for stocks with:", c: ["Low P/E and Low P/B ratios", "High Momentum and High P/E"], a: 0, f: "Logic: Value investors want 'bargains' cheap relative to assets; however, Growth investors are willing to pay a premium for future earnings."},
    {q: "Which Medicare part covers doctor visits and outpatient care and requires a premium?", c: ["Part B", "Part D"], a: 0, f: "Logic: B is for Body; however, D is for Drugs (Prescriptions)."},
    {q: "An IAR recommends a 'Tactical' shift into energy stocks. This indicates the IAR is:", c: ["Active / Timing-driven", "Passive / Buy-and-Hold"], a: 0, f: "Logic: Tactical means 'breaking the strategy' to chase a short-term win; however, Strategic means staying the course regardless of the news."},
    {q: "Does a ' Roth IRA' owner ever have to take RMDs?", c: ["No (Original owners are exempt)", "Yes (At age 73)"], a: 0, f: "Logic: Roths are the ultimate tax-shelter because the gov never forces you to take the money out; however, Traditional IRA owners MUST take RMDs."},
    {q: "A 'Capital Market Line' (CML) portfolio that is 100% in T-Bills is located at:", c: ["The vertical intercept (Risk-Free point)", "The far right of the line"], a: 0, f: "Logic: Zero risk = the starting point of the graph; however, more risk moves the portfolio up and to the right."},
    {q: "If an investor is 'Long' a call option, their time horizon is usually:", c: ["Short-term (months)", "Long-term (decades)"], a: 0, f: "Logic: Options are wasting assets that expire quickly; however, for a 20-year goal, you buy the underlying stock."},
    {q: "Which ratio identifies the percentage of a company's earnings being kept to fuel future growth?", c: ["Retention Ratio", "Dividend Payout Ratio"], a: 0, f: "Logic: Retention is what stays inside the company; however, the Payout ratio is what leaves the company to go to shareholders."},
    {q: "If an IAR is found to have violated their 'Duty of Loyalty,' it usually involves:", c: ["A Conflict of Interest that was not disclosed", "Giving bad investment advice"], a: 0, f: "Logic: Loyalty means putting the client first; however, 'Duty of Care' is the requirement to actually be good at your job and do research."},
    {q: "A 'Qualified' withdrawal from a 529 plan is 100% tax-free at which level?", c: ["Federal and usually State", "Federal only"], a: 0, f: "Logic: Most states follow the federal lead on 529s to encourage education; however, if you take a non-qualified withdrawal, you pay taxes plus a 10% penalty."},
    {q: "In a 'Non-Qualified' variable annuity, only the 'earnings' are taxed upon withdrawal. What is the tax rate?", c: ["Ordinary Income", "Capital Gains"], a: 0, f: "Logic: The gov views annuities as retirement income; however, if you sold a stock in a brokerage account, you would pay the lower Capital Gains rate."},
    {q: "The 'Efficient Market Hypothesis' (EMH) is the foundation of which investment style?", c: ["Passive Indexing", "Active Stock Picking"], a: 0, f: "Logic: If you believe the market is efficient, you don't try to beat it—you just join it; however, active managers believe the market is full of mistakes to exploit."},
    {q: "Under the Uniform Prudent Investor Act, a trustee may delegate investment functions to an IAR. Is the trustee still liable for the trades?", c: ["No (If they used due diligence in selecting the IAR)", "Yes (Liability is never delegable)"], a: 0, f: "Logic: UPIA allowed delegation for the first time; however, the trustee must still supervise the IAR's performance."},
    {q: "An investor with a 100% bond portfolio is most exposed to which risk?", c: ["Interest Rate Risk", "Market Risk (Beta)"], a: 0, f: "Logic: Bond prices crash when rates rise; however, Market risk refers to the volatility of the stock market."},
    {q: "Which behavior bias involves an investor only reading news that supports a stock they already own?", c: ["Confirmation Bias", "Anchoring"], a: 0, f: "Logic: Confirmation bias creates an 'echo chamber'; however, Anchoring is being stuck on an old price point."},
    {q: "The 'Total Capitalization' of a company is the sum of:", c: ["Long-term Debt + Shareholders' Equity", "Current Assets + Liabilities"], a: 0, f: "Logic: Capitalization is the 'permanent' funding of the company; however, 'Working Capital' is the short-term cash flow."},
    {q: "A 'Growth' investor prioritizes which of the following?", c: ["Future Earnings Potential", "Current Dividend Yield"], a: 0, f: "Logic: Growth chasers want the stock price to double; however, Income chasers want a 5% check every quarter."},
    {q: "If an investor has a negative 'Risk Premium,' it means:", c: ["They are earning less than a risk-free T-Bill", "They are losing principal"], a: 0, f: "Logic: Risk premium is the 'extra' you get for taking risk; however, if the market crashes, that premium becomes negative."},
    {q: "Which business entity allows for 'Flow-through' of losses and has NO limit on the number of partners?", c: ["LLC or Limited Partnership", "S-Corporation"], a: 0, f: "Logic: Partnerships and LLCs are the most flexible for tax-advantaged investing; however, S-Corps are capped at 100 people."},
    {q: "A client wants to invest in 'Emerging Markets.' This recommendation is most suitable for which portion of their portfolio?", c: ["The aggressive growth 'Satellite'", "The conservative 'Core'"], a: 0, f: "Logic: Foreign emerging stocks are highly volatile; however, the core of a portfolio should be stable blue-chip assets."},
    {q: "If the Sharpe Ratio of Fund A is 0.8 and Fund B is 1.2, which fund is more efficient?", c: ["Fund B", "Fund A"], a: 0, f: "Logic: Higher Sharpe = more return per unit of risk; however, Fund A might have a higher 'total' return while being much riskier."},
    {q: "An IAR recommends a 'Laddered' CD strategy for a retiree. This helps mitigate:", c: ["Reinvestment Risk", "Market Risk"], a: 0, f: "Logic: Staggering maturities ensures you always have cash coming due to catch higher rates; however, CDs have zero market risk to begin with."},
    {q: "Which financial statement is used to calculate the 'Debt-to-Equity' ratio?", c: ["Balance Sheet", "Income Statement"], a: 0, f: "Logic: Both debt and equity are 'Snapshot' items of net worth; however, the Income Statement tells you if the company can *afford* the interest on that debt."},
    {q: "A 'Defined Benefit' plan is most suitable for which type of employee?", c: ["Older, long-tenured employees", "Young, mobile professionals"], a: 0, f: "Logic: Pensions reward staying at one company for 30 years; however, 401(k)s (Defined Contribution) are 'portable' and better for those who change jobs."},
    {q: "In a 'Tenants in Common' (TIC) account, if one owner dies, their share goes to:", c: ["Their Estate / Heirs", "The Surviving Owner"], a: 0, f: "Logic: TIC allows for specific legacy planning; however, JTWROS automatically gives the money to the survivor."},
    {q: "If an investor is subject to the Alternative Minimum Tax (AMT), which Muni bond is LEAST suitable?", c: ["Private Activity Bond (Industrial Development)", "Public School GO Bond"], a: 0, f: "Logic: Private activity interest is a 'Tax Preference Item' and is taxable for AMT; however, Public Purpose bonds stay tax-free for everyone."},
    {q: "Which investment style relies on the 'Intrinsic Value' being higher than the current market price?", c: ["Value Investing", "Growth Investing"], a: 0, f: "Logic: Value investors are looking for 'undervalued' gems; however, Growth investors care more about speed of earnings than current price."},
    {q: "A 'Complex Trust' can do which of the following that a 'Simple Trust' cannot?", c: ["Accumulate income and make charitable donations", "Distribute dividends"], a: 0, f: "Logic: Complex trusts have more 'discretionary' power; however, simple trusts are basically just 'pass-through' pipes for income."},
    {q: "If a client is 65 years old and wants 'Inflation Protection' for their 30-year retirement, they MUST own some:", c: ["Equities (Stocks)", "Fixed Annuities"], a: 0, f: "Logic: Stocks have historically outpaced the CPI; however, fixed annuities provide a 'steady' check that loses value every year."},
    {q: "The 'Capital Asset Pricing Model' (CAPM) assumes that investors should only be rewarded for:", c: ["Systematic Risk (Beta)", "Total Risk"], a: 0, f: "Logic: CAPM argues that you can diversify away business risk for free, so the market only pays you for the risk you can't avoid; however, MPT looks at Total Risk."},
    {q: "Which bias involves an investor 'following the crowd' into a bubble?", c: ["Herding", "Anchoring"], a: 0, f: "Logic: People feel safe doing what others are doing; however, a contrarian investor does the opposite."},
    {q: "If a company has a low 'Dividend Payout Ratio' (e.g. 5%), it is likely a:", c: ["Growth Company", "Mature Utility"], a: 0, f: "Logic: They are keeping 95% of profit to reinvest; however, utilities often pay out 70% or more."},
    {q: "Under Section 404(c), a plan must allow participants to change their investments at least:", c: ["Quarterly (Every 3 months)", "Annually"], a: 0, f: "Logic: This ensures participants can react to market changes; however, many modern plans allow daily changes."},
    {q: "A 'Covered Call' strategy is considered:", c: ["Conservative (Income-generating)", "Speculative"], a: 0, f: "Logic: You are reducing risk by collecting a premium; however, a 'Naked' call is the most speculative position possible."},
    {q: "Which ratio measures a company's ability to pay its short-term debts using its most liquid assets?", c: ["Quick Ratio", "Debt-to-Equity"], a: 0, f: "Logic: The Quick Ratio is the 'Acid Test' for cash flow; however, Debt-to-Equity is a measure of long-term solvency."},
    {q: "If an investor believes in the 'Weak Form' of EMH, they would definitely avoid:", c: ["Technical Analysis (Charting)", "Fundamental Analysis"], a: 0, f: "Logic: Weak form says past patterns don't work; however, it leaves the door open for fundamental research to provide an edge."},
    {q: "Mission ready. Strategy Pillar complete. Your primary role as an IAR is to identify:", c: ["Suitability and Fiduciary Duty", "The next winning stock"], a: 0, f: "Logic: PILLAR 3 COMPLETE. Proceed to Pillar 4 to master the Regulations and secure your 73% target."}
],
[ // PILLAR 4: REGULATIONS
    {q: "An individual represents a Broker-Dealer in the sale of exempt U.S. Government bonds to retail clients. Is this person required to register as an Agent?", c: ["Yes (BD representatives are always agents)", "No (Exempt securities exclude agents)"], a: 0, f: "Logic: If you work for a Broker-Dealer, you are an Agent regardless of what you sell; however, if you work for an Issuer (like the Treasury), selling exempt securities would exclude you from registration."},
    {q: "A clerk at a Broker-Dealer describes the 'benefits of a specific mutual fund' to a caller to generate interest. Does this clerk need to register?", c: ["Yes (Solicitation requires registration)", "No (Excluded as clerical/administrative)"], a: 0, f: "Logic: Describing investment benefits is 'solicitation.' Once a clerk moves beyond administrative tasks (like taking a phone number), they lose their exclusion; however, true clerical staff do not register."},
    {q: "Under the Uniform Securities Act (USA), how long must an Investment Adviser (IA) maintain records of a business-related blog post or social media ad?", c: ["5 years total", "3 years total"], a: 0, f: "Logic: IAs follow the '5 and 2' rule (5 years total, 2 years in-office) for all advertisements, including digital posts; however, Broker-Dealers typically follow a 3-year recordkeeping rule."},
   {
    q: "An individual represents an Issuer selling its own stock to existing employees, and no commission is paid. Is this person an Agent?", 
    c: ["The individual is excluded from the definition of an agent in this specific transaction", "The individual must register as an agent because the transaction involves retail investors"], 
    a: 0, 
    f: "Logic: Representing an Issuer in a transaction with existing employees where NO commission is paid is a specific exclusion from the Agent definition; however, if a commission is paid, registration is required."
},
    {q: "A Broker-Dealer has no office in State A, but has one existing retail client who is on a 2-week vacation in State A. Does the BD need to register in State A?", c: ["No (Snowbird/Vacation Exemption)", "Yes"], a: 0, f: "Logic: The 'Snowbird' rule allows firms to deal with existing clients on vacation in a new state without registering; however, if the client moves permanently, the firm has 30 days to register."},
    {q: "An Investment Adviser (IA) is deemed to have 'Custody' if they mistakenly receive a client check and do not return it within:", c: ["3 Business Days", "24 Hours"], a: 0, f: "Logic: The 72-hour (3 business day) window is the safe harbor to avoid being 'deemed' to have custody; however, checks made out to third parties must be forwarded within the same 3-day window."},
    {q: "Which law created the SEC and regulates the secondary market (Exchanges and People)?", c: ["Securities Exchange Act of 1934", "Securities Act of 1933"], a: 0, f: "Logic: The 1934 Act polices the 'People and Places' (Exchanges/Dealers); however, the 1933 Act is the 'Paper Act' that regulates new issues (Prospectuses)."},
    {q: "Can the State Administrator issue a 'Permanent Bar' from the securities industry for an IAR who committed fraud?", c: ["Yes (After a hearing)", "No (Only a court can bar an individual)"], a: 0, f: "Logic: The Administrator has the statutory power to revoke licenses and issue bars; however, the Administrator cannot put a violator in jail—only a court can seek criminal prison time."},
    {q: "An IAR sends a 'mass text' to 30 retail people in State B recommending a stock. This communication is categorized as:", c: ["Retail Communication", "Correspondence"], a: 0, f: "Logic: Reaching more than 25 retail people in a 30-day period triggers 'Retail Communication' rules (requiring pre-approval); however, reaching 25 or fewer is simply 'Correspondence'."},
    {q: "Does a 'Consent to Service of Process' need to be filed with the State Administrator every year during renewal?", c: ["No (Permanent/One-time filing)", "Yes"], a: 0, f: "Logic: This document appoints the Administrator as the person's attorney for legal papers; it is filed once and never expires; however, the 'Registration' itself and fees must be renewed annually."},
    {q: "Is a 'Variable Annuity' considered a 'Security' under the Uniform Securities Act?", c: ["Yes (Investor assumes market risk)", "No"], a: 0, f: "Logic: Because the value fluctuates based on a separate account of stocks, it is a security; however, a 'Fixed Annuity' is considered an insurance product, not a security."},
    {q: "The State Administrator may summarily suspend a registration. A hearing must be held within how many days of the written request?", c: ["15 days", "30 days"], a: 0, f: "Logic: This is the 'Stop now, talk in 15' rule; however, an appeal to a court regarding an Administrator's final order must be filed within 60 days."},
    {q: "A Canadian Broker-Dealer has no office in the U.S. and only trades with an existing Canadian client who is temporarily in California. Is the firm exempt?", c: ["Yes (Canadian Snowbird rule)", "No"], a: 0, f: "Logic: Canadian firms have a specific exemption for existing clients on vacation in the U.S.; however, they cannot solicit NEW clients in the state without registering."},
    {q: "Which part of Form ADV is the 'Brochure Supplement' that contains information about specific IARs (the people)?", c: ["Part 2B", "Part 2A"], a: 0, f: "Logic: 2B is for the 'Body' (the individual person); however, 2A is for the 'Adviser' (the firm's disclosure brochure)."},
    {q: "An IAR is convicted of a non-securities-related MISDEMEANOR (e.g., DUI) 3 years ago. Can the Administrator deny their registration based on this?", c: ["No", "Yes"], a: 0, f: "Logic: Only FELONIES (within 10 years) or securities/money-related misdemeanors are grounds for denial; however, a conviction for any felony must be disclosed on Form U4."},
    {q: "If an IA manages $150 Million in assets, they are considered 'Federal Covered' and must register with:", c: ["The SEC", "The State"], a: 0, f: "Logic: Once assets cross the $110M threshold, SEC registration is mandatory; however, firms with less than $100M AUM are generally state-registered."},
    {q: "An Agent 'Sells Away' by executing a trade for a client outside the scope of their Broker-Dealer. This is:", c: ["A Private Securities Transaction violation", "Churning"], a: 0, f: "Logic: Agents must have BD permission and supervision for all trades; however, Churning refers to excessive trading in a client's account specifically to generate commissions."},
    {q: "A 'Qualified Client' must have a Net Worth of $2.2M (excluding primary home) to pay which type of fee?", c: ["Performance-based (Gains sharing)", "Assets Under Management (AUM)"], a: 0, f: "Logic: Performance fees are restricted to wealthy 'Qualified' clients to protect smaller investors; however, anyone can be charged a standard AUM fee."},
    {q: "When an IAR joins a 'Federal Covered' IA, who is responsible for notifying the State Administrator?", c: ["The IAR only", "Both the Firm and the IAR"], a: 0, f: "Logic: Since the Federal IA isn't registered with the state, the state only 'knows' the IAR; however, for State-Registered IAs, the Firm is the primary notifier."},
    {q: "Can an Investment Adviser borrow money from a retail client who is NOT a bank or lending institution?", c: ["No (Strictly Prohibited)", "Yes (With disclosure)"], a: 0, f: "Logic: IAs and IARs are held to a fiduciary standard and cannot borrow from clients unless the client is a professional lender (like a bank); however, Agents of BDs have slightly different rules but generally follow the same ban."},
    {q: "If an IA's 'Net Worth' falls below the state minimum, when must they notify the Administrator?", c: ["By the close of business the next business day", "Within 15 days"], a: 0, f: "Logic: This is a fiscal emergency requiring 'next day' notice; however, a written report explaining the numbers must be filed the day following that notice."},
    {q: "An IAR utilizes 'Client Testimonials' in an ad on LinkedIn. They must disclose if the person was paid. Is this permitted?", c: ["Yes (With proper disclosure)", "No (Testimonials are always banned)"], a: 0, f: "Logic: SEC rules now allow testimonials if compensation and conflicts are disclosed; however, the old rules used to ban them entirely for IAs."},
    {q: "The Administrator has 'Subpoena Power.' This means they can:", c: ["Compel witnesses and records inside or outside the state", "Arrest suspects"], a: 0, f: "Logic: Administrative power is civil/investigative and reaches across state lines; however, only a judge/court has the power to issue an arrest warrant."},
    {q: "Is a 'Gift' of assessable stock considered both an offer and a sale under the USA?", c: ["Yes", "No"], a: 0, f: "Logic: Because 'assessable' stock carries a future liability (potential debt), giving it away is legally a sale; however, a gift of standard non-assessable stock is NOT a sale."},
    {q: "The statute of limitations for a CIVIL suit seeking damages under the USA is:", c: ["3 years from event / 2 years from discovery", "5 years from event"], a: 0, f: "Logic: Civil suits follow the 3/2 rule (whichever comes first); however, criminal suits under the USA have a 5-year statute of limitations."},
    {q: "Under the USA, an 'Offer to Sell' is made in a state if it is directed to that state and:", c: ["Received in that state", "Forwarded to another state"], a: 0, f: "Logic: Jurisdiction is based on where the offer originated or where it was received; however, if a client's mail is simply forwarded to them while they are out of state, the Administrator of the temporary state has no jurisdiction."},
    {q: "A Broker-Dealer acting as a 'Broker' (Agency capacity) charges which of the following?", c: ["Commission", "Markup / Markdown"], a: 0, f: "Logic: Brokers act as middlemen (Agents) and charge a commission; however, Dealers act as Principals (trading from their own inventory) and charge markups."},
    {q: "How many retail clients trigger IA registration in a state where the firm has NO office (De Minimis)?", c: ["More than 5 (The 6th client triggers)", "More than 1"], a: 0, f: "Logic: The De Minimis rule is '5 or fewer' retail clients are exempt; however, Broker-Dealers have NO de minimis for retail clients (1 triggers registration)."},
    {q: "The Investment Adviser 'Brochure' (Part 2A) must be delivered to a client at least how many hours before the contract is signed?", c: ["48 hours (if withdrawal is allowed within 5 days)", "24 hours"], a: 0, f: "Logic: State-registered IAs must follow the 48-hour rule or allow a 5-day penalty-free withdrawal; however, Federal IAs only need to provide it 'at or before' the contract signing."},
    {q: "A person paid to refer clients to an Investment Adviser (a Solicitor) is generally required to register as:", c: ["An IAR", "An Agent"], a: 0, f: "Logic: Most states define 'soliciting' as an advisory function; however, a person referring clients to a Broker-Dealer would need to register as an Agent."},
    {q: "What is the '3-5-0' rule for CRIMINAL violations of the Uniform Securities Act?", c: ["3 years prison, $5,000 fine, 0 jail if no knowledge", "5 years prison, $3,000 fine"], a: 0, f: "Logic: The criminal penalty is 3 years/$5k, but you can't go to jail if you prove you didn't know the specific rule you broke; however, you still pay the fine."},
    {
    q: "Is a 'Bank' defined as a Broker-Dealer under the Uniform Securities Act?", 
    c: ["Banks, savings institutions, and trust companies are specifically excluded from the definition", "Banks must register as broker-dealers if they offer interest-bearing accounts to the public"], 
    a: 0, 
    f: "Logic: Banks, Savings Institutions, and Trust Companies are not BDs by statute; however, their 'wholly owned subsidiaries' (like a separate brokerage arm) MUST register."
},
    {q: "If an IAR suspects an elderly client is being financially exploited, they should:", c: ["Place a temporary hold on disbursements", "Liquidate the account for safety"], a: 0, f: "Logic: Regulations allow for a 'hold' to investigate exploitation; however, an IAR can never liquidate an account without specific client instructions or a POA."},
    {q: "Under Reg S-P (Privacy), a 'Consumer' must receive a privacy notice:", c: ["Before the firm shares their info with outsiders", "Every single year"], a: 0, f: "Logic: Consumers only get a notice if you plan to disclose their data; however, 'Customers' (ongoing relationships) must get an initial notice and an annual notice regardless of sharing."},
    {q: "An Agent fails to mention a 'Material Fact' (like a major risk) when selling a stock. This is:", c: ["Omission (Fraud)", "Churning"], a: 0, f: "Logic: Leaving out an important risk is just as illegal as lying about a gain; however, Churning is specifically about the frequency of trades."},
   {
    q: "Can the Administrator deny registration simply because an applicant was suspended by a foreign securities regulator?", 
    c: ["The Administrator may consider foreign disciplinary actions that occurred within the last 10 years", "The Administrator is limited to reviewing domestic violations of state and federal securities laws"], 
    a: 0, 
    f: "Logic: Foreign disciplinary actions carry the same weight as domestic ones for statutory disqualification; however, the action must have happened within the last 10 years."
},
    {q: "A Broker-Dealer executes a trade between its own accounts to give the appearance of high volume. This is:", c: ["Painting the Tape / Wash Trading", "Front-running"], a: 0, f: "Logic: Faking volume is market manipulation; however, Front-running is placing your own trade before a client's large block order."},
    {q: "What happens to a Power of Attorney (POA) if the client dies?", c: ["It is cancelled immediately", "It survives for 3 business days"], a: 0, f: "Logic: All POAs (including Durable) expire at the moment of death; however, a 'Durable' POA is unique because it survives the client's mental incapacity (dementia/coma)."},
    {q: "An IAR works for a Federal Covered IA and has a place of business in State A, but only serves institutional clients (banks). Do they register in State A?", c: ["Yes (Place of Business rule)", "No (Institutional exemption)"], a: 0, f: "Logic: For Federal IARs, a physical 'Place of Business' overrides everything; they must register in that state; however, if they had NO office and only institutional clients, they would be exempt."},
    {q: "An IA inadvertently receives a check made out to the client. How long do they have to return it?", c: ["3 business days", "24 hours"], a: 0, f: "Logic: The 72-hour rule applies to mis-delivered funds; however, any securities received must also be returned or forwarded within 3 days."},
    {q: "If an IA firm changes its home office address, when must they notify the Administrator?", c: ["Promptly (via an amended Form ADV)", "At the end of the year"], a: 0, f: "Logic: Material changes to a firm's registration must be updated 'promptly'; however, non-material changes can often wait for the annual amendment."},
    {q: "Is an IPO of a local bank considered an 'Exempt Security' under the USA?", c: ["Yes", "No"], a: 0, f: "Logic: Bank securities are exempt because they are already highly regulated by bank commissions; however, IPOs of standard corporations are non-exempt and must register."},
    {q: "How many days does an individual have to appeal an Administrator's final order in a court of law?", c: ["60 days", "30 days"], a: 0, f: "Logic: The legal appeal window is 60 days; however, don't confuse this with the 15-day window for a hearing after a summary suspension."},
    {q: "An Agent split commissions with another registered person. This is only permitted if:", c: ["The other person is registered at the same firm (or affiliated)", "The client provides verbal consent"], a: 0, f: "Logic: Commissions can only be shared with colleagues at the same firm; however, IARs are generally forbidden from sharing 'advisory' fees with anyone outside the IA firm."},
    {q: "Which type of registration is used for 'Federal Covered' securities like stocks listed on the NYSE?", c: ["Notice Filing", "Coordination"], a: 0, f: "Logic: Federal securities don't 'register' with the state, they simply 'Notice File' copies of their SEC docs; however, 'Coordination' is used for IPOs registering with the SEC and State at the same time."},
    {q: "Can a client 'waive' their right to sue an IAR for fraud in a signed contract?", c: ["No (Non-waiver clauses are void)", "Yes"], a: 0, f: "Logic: You cannot sign away your rights under the USA; any clause that tries to do so is illegal; however, a client CAN choose to go to arbitration instead of a court if the contract allows."},
    {q: "A Broker-Dealer runs a radio ad in State A, but the station is physically located in State B. Does this count as an offer in State A?", c: ["No (State of Origin rule)", "Yes"], a: 0, f: "Logic: Radio and TV ads are only considered offers in the state where the broadcast originates; however, a direct mailer sent to State A is an offer in State A."},
    {q: "An IA with 'Discretionary Authority' (but no custody) is typically required to have a Net Worth of:", c: ["$10,000", "$35,000"], a: 0, f: "Logic: Discretion is lower-risk than custody, so the requirement is lower; however, 'Custody' requires a $35k net worth or a surety bond."},
    {q: "An IAR uses a pseudonym or 'handle' on X/Twitter to solicit business. This is allowed:", c: ["Only if the handle is registered and supervised by the firm", "Always"], a: 0, f: "Logic: Firms must supervise all business-related digital communications regardless of the name used; however, personal non-business posts are generally not subject to IA recordkeeping."},
    {q: "Which official is the 'primary cop' responsible for enforcing the Uniform Securities Act?", c: ["The Administrator", "The Attorney General"], a: 0, f: "Logic: The Administrator (or Commissioner) is the specific regulator for the USA; however, the Attorney General usually handles the actual criminal prosecution in a courtroom."},
    {q: "If an Agent's Broker-Dealer has its registration revoked by the state, what is the status of the Agent's license?", c: ["It is suspended (Inactive)", "It remains active if the Agent is innocent"], a: 0, f: "Logic: An Agent's license is only effective while they are associated with a registered firm; however, the Agent can reactivate their license by associating with a new BD within 30 days."},
    {
    q: "Is an Investment Adviser (IA) required to register in a state if they only advise 'Institutional' clients like insurance companies and banks?", 
    c: ["The IA is exempt from registration provided they have no physical place of business in the state", "The IA must register if the total number of institutional clients in the state exceeds five"], 
    a: 0, 
    f: "Logic: Dealing strictly with professionals (institutions) removes the need for state registration; however, as soon as you have even ONE retail client and no De Minimis, you must register."
},,
    {q: "Which law is known as the 'Paper Act' and requires the delivery of a Prospectus for all new issues?", c: ["Securities Act of 1933", "Securities Exchange Act of 1934"], a: 0, f: "Logic: The 1933 Act focuses on the full disclosure of 'new' securities entering the market; however, the 1934 Act polices the people and places where 'old' stocks trade."},
    {q: "An IAR gives a speech at a public seminar and recommends three specific small-cap stocks. Is this considered an 'Advertisement'?", c: ["Yes (Any public recommendation is an ad)", "No (Only written material counts)"], a: 0, f: "Logic: IA advertising rules include any communication directed to more than one person that offers advisory services; however, a private one-on-one meeting is generally not an ad."},
    {q: "If an individual represents an Issuer in a transaction that is 'Exempt' (like a private placement), do they need to register as an Agent?", c: ["No (Exempt transaction exclusion)", "Yes"], a: 0, f: "Logic: Representing the Issuer in an exempt transaction excludes the person from the Agent definition; however, representing a Broker-Dealer in the same transaction ALWAYS requires registration."},
    {q: "How long is a 'Consent to Service of Process' valid?", c: ["Permanently", "1 Year"], a: 0, f: "Logic: This is a one-time, 'evergreen' filing that allows the Admin to receive legal papers on your behalf; however, registration fees must be paid every single December 31st."},
    {q: "An IA firm is registered with the SEC (Federal Covered). In which states are the firm's IARs required to register?", c: ["Only in states where the IAR has a physical office", "In every state where they have retail clients"], a: 0, f: "Logic: Federal IARs are only policed by the states where they physically 'set up shop'; however, state-registered IARs must register in any state where they exceed the De Minimis 5."},
    {q: "Which official is authorized to take over an IA firm's assets if the firm becomes 'insolvent' (bankrupt)?", c: ["A Court-appointed Receiver", "The State Administrator"], a: 0, f: "Logic: The Admin can revoke the license, but a court must appoint a receiver to liquidate assets; however, the Admin can apply to the court for an 'Injunction' to stop the firm's activity."},
    {q: "Is 'Matched Trading' (two parties buying/selling to fake volume) a criminal or civil violation?", c: ["Both (It is market manipulation)", "Civil only"], a: 0, f: "Logic: Manipulation is a fraudulent act that triggers both civil lawsuits and criminal prosecution; however, an unintentional paperwork error is usually just a civil matter."},
    {q: "An IAR is also a licensed real estate agent. When recommending a REIT, must they disclose their background to the client?", c: ["Yes (Disclosure of all capacities is required)", "No (Only securities licenses matter)"], a: 0, f: "Logic: Fiduciaries must disclose any potential conflict or 'other capacity' that could influence advice; however, if you are just a hobbyist with no pay, disclosure is less critical."},
    {q: "A newspaper has 90% of its circulation outside of State A. Does an advertisement in it count as an offer in State A?", c: ["No (The 'Two-Thirds' Rule)", "Yes"], a: 0, f: "Logic: If more than 2/3 of a paper's readers are out of state, it is NOT an offer in that state; however, a local city paper is considered an offer in the town where it's printed."},
    {q: "Which part of Form ADV must be delivered to clients annually if there are material changes?", c: ["Part 2A (The Brochure)", "Part 1A"], a: 0, f: "Logic: Part 2 is written in 'plain English' specifically for the client; however, Part 1 is the 'Check-the-box' data used primarily by regulators."},
    {q: "An IA with custody must have a surprise audit by an independent CPA. How often must this occur?", c: ["At least once per year", "Every 3 years"], a: 0, f: "Logic: Custody is a high-risk state that requires annual verification; however, Broker-Dealers are also audited annually but under different FINRA rules."},
    {q: "Under the USA, the term 'Security' specifically EXCLUDES which of the following?", c: ["Fixed Life Insurance", "Variable Life Insurance"], a: 0, f: "Logic: Fixed products are insurance because the company takes the risk; however, Variable products are securities because the investor takes the market risk."},
    {q: "Can the Administrator issue a 'Cease and Desist' order against a firm that is NOT yet registered in the state?", c: ["Yes (Jurisdiction over all securities acts)", "No (Only registered people)"], a: 0, f: "Logic: The Admin polices the 'Act,' not just the 'registered people'; however, they must still provide a hearing within 15 days of the order if requested."},
    {q: "Which law prohibits the use of 'any manipulative or deceptive device' in the trading of securities?", c: ["Securities Exchange Act of 1934 (Rule 10b-5)", "Securities Act of 1933"], a: 0, f: "Logic: Rule 10b-5 is the 'Anti-Fraud' anchor of the 1934 Act; however, the 1933 Act also has anti-fraud rules (Section 17) specifically for new issues."},
    {q: "An Agent's registration becomes effective in a new state at what time?", c: ["Noon on the 30th day after filing", "Immediately upon paying the fee"], a: 0, f: "Logic: There is a mandatory 30-day 'cooling off' period unless the Admin grants it sooner; however, an Agent cannot trade during these 30 days."},
    {q: "Is an 'Unsolicited' trade with a retail client considered an 'Exempt Transaction'?", c: ["Yes (The Client asked for it)", "No"], a: 0, f: "Logic: Unsolicited trades don't require the security to be registered (exempt transaction); however, the Agent and BD must still be registered in the state."},
    {q: "An IAR manages a client's account and the client dies. The IAR should immediately:", c: ["Cancel all open orders and mark the account 'Deceased'", "Continue trading to protect against losses"], a: 0, f: "Logic: Authority dies with the client; you must wait for the executor/heirs; however, in a joint account (JTWROS), the survivor maintains authority."},
    {q: "Under Reg S-P, how long does a client have to 'Opt-Out' of having their data shared with outsiders?", c: ["30 Days (A reasonable time)", "15 Days"], a: 0, f: "Logic: 30 days is the industry standard for 'reasonable' notice; however, firms are never allowed to share sensitive 'Authentication' data (like passwords) with anyone."},
    {q: "Which fee structure is considered a 'Conflict of Interest' that must be disclosed upfront?", c: ["Wrap Fees (Advice + Trades combined)", "Hourly Fees"], a: 0, f: "Logic: Wrap fees can incentivize 'Reverse Churning' (doing no work for a set fee); however, standard hourly or percentage fees are considered straightforward."},
    {q: "Can the Administrator demand to see an IA's records from another state without a court order?", c: ["Yes (Subpoena Power)", "No"], a: 0, f: "Logic: Admins can cross borders for investigations related to the USA; however, they cannot 'Arrest' people in another state—they must use the police/courts."},
    {q: "An Agent who 'Front-runs' a client's trade has violated which ethical standard?", c: ["Fair Dealing / Fiduciary Duty", "Registration Requirements"], a: 0, f: "Logic: Using a client's order to profit personally is a breach of trust; however, a simple registration error is an administrative violation, not a fraud."},
    {q: "Is an 'Equity-Indexed Annuity' considered a 'Security' under most state laws?", c: ["No (Insurance Product)", "Yes"], a: 0, f: "Logic: Because they have a 0% floor and are issued by insurance companies, they are technically non-securities; however, many IAs still treat them with high scrutiny due to complexity."},
    {q: "An IAR of a State-Registered IA leaves the firm. Who notifies the Admin?", c: ["The IA Firm", "The IAR"], a: 0, f: "Logic: For state firms, the employer tells the Admin; however, for Federal Covered IAs, only the individual (the IAR) needs to notify the state."},
    {q: "A Broker-Dealer charges a fee for 'clerical services' like dividend collection or proxy forwarding. Is this allowed?", c: ["Yes (If the fee is reasonable)", "No (Only commissions are allowed)"], a: 0, f: "Logic: Firms can charge for actual administrative work; however, they cannot charge extra for 'investigation' or 'compliance' related to the trade."},
    {q: "An individual is paid a 'Finder's Fee' for referring a retail client to a Broker-Dealer. This person MUST register as:", c: ["An Agent", "An Investment Adviser"], a: 0, f: "Logic: Transaction-based pay for bringing in clients is a core Agent function; however, a flat 'referral fee' to an IAR is treated as an advisory function."},
    {q: "If an IA manages exactly $100 Million, they have the choice to register with:", c: ["SEC or State", "SEC only"], a: 0, f: "Logic: The $100M to $110M range is the 'Mid-sized' buffer zone where firms can choose; however, once they hit $110M, SEC registration is mandatory."},
    {q: "Under the USA, the term 'Person' specifically EXCLUDES which of the following?", c: ["Minors and Deceased individuals", "Corporations"], a: 0, f: "Logic: 'Persons' are legal entities that can sign contracts; minors and the dead cannot; however, Corporations, Partnerships, and Trusts ARE 'Persons' under the law."},
    {q: "What is the 'statutory disqualification' period for a felony conviction?", c: ["10 Years", "5 Years"], a: 0, f: "Logic: Any felony in the last decade allows the Admin to deny registration; however, the crime must also be disclosed on the U4 even if it was 20 years ago."},
    {q: "An IA uses 'Discretion' to buy 1,000 shares of a stock for a client without a written agreement. Is this a violation?", c: ["No (If written authority is obtained within 10 days)", "Yes"], a: 0, f: "Logic: Advisory rules allow 'Verbal Discretion' for the first 10 days only; however, Broker-Dealers MUST have written authority BEFORE the first trade."},
    {q: "Which law polices 'Insider Trading' and allows for 'Treble Damages' (3x profit)?", c: ["Insider Trading Act of 1988", "USA"], a: 0, f: "Logic: This specific federal act raised the penalties for cheating; however, the 1934 Act was the original law that made insider trading illegal."},
    {
    q: "Can an IA take 'Custody' of client funds if the state has NO rule regarding it?", 
    c: ["Custody is permitted with notice to the Administrator unless a specific rule prohibits it", "Custody is strictly prohibited unless the state has a formal rule explicitly allowing it"], 
    a: 0, 
    f: "Logic: If the state is silent, custody is allowed with notice; however, if the state EXPLICITLY prohibits it, no amount of notice makes it legal."
},,
    {q: "A Broker-Dealer has a place of business in State A. They only serve institutional clients. Do they register in State A?", c: ["Yes (Office trigger)", "No"], a: 0, f: "Logic: The 'Institutional' and 'De Minimis' exemptions only apply if you have NO office in the state; however, once you open a door, you must register."},
    {q: "What is the minimum Net Worth requirement for an IA with 'Custody'?", c: ["$35,000", "$10,000"], a: 0, f: "Logic: High risk requires high collateral; however, having 'Discretion' only requires $10,000."},
    {q: "An Agent tells a client a stock is 'Guaranteed' against loss by the clearing firm. This is:", c: ["Fraud", "Allowed with a bond"], a: 0, f: "Logic: No one can guarantee market performance; however, you can guarantee the payment of interest on a 'Guaranteed Bond' (backed by a parent company)."},
    {q: "Is 'Soft Dollar' compensation allowed if it pays for a manager's travel to a research conference?", c: ["No (Only research/tools allowed)", "Yes"], a: 0, f: "Logic: Soft dollars must benefit the client (like software or reports); however, travel, rent, and furniture only benefit the IA and are prohibited."},
    {q: "How many retail clients trigger Broker-Dealer registration in a state with no office?", c: ["ONE (No De Minimis)", "Six"], a: 0, f: "Logic: BDs are 'transactional' and have zero tolerance; one retail client triggers them; however, IAs have the '5-client' buffer."},
    {q: "Is a 'Limited Partnership' interest considered a security?", c: ["Yes", "No"], a: 0, f: "Logic: If you provide money and someone else does the work, it's a security; however, a 'General Partner' who manages the business is not holding a security."},
    {q: "Which registration method is used for an IPO being sold in multiple states simultaneously?", c: ["Coordination", "Qualification"], a: 0, f: "Logic: Coordination 'syncs' the SEC and State effective dates; however, 'Qualification' is for 'Intrastate' (single state) offerings and is much harder."},
    {q: "An IAR inadvertently sees a client's password and uses it to 'help' the client trade. This is:", c: ["Custody and an Unethical Practice", "Good customer service"], a: 0, f: "Logic: Holding login credentials that allow withdrawals/trades is deemed custody; however, you should always use your own 'Discretionary' access instead."},
    {q: "Under the USA, 'Fraud' requires which of the following?", c: ["A willful attempt to deceive", "The client losing money"], a: 0, f: "Logic: Fraud is about the 'Intent' to lie or omit; however, you can be guilty of fraud even if the client actually makes money on the trade."},
    {q: "Can the Administrator deny registration based on a 'lack of experience' alone?", c: ["No (Must also lack training/knowledge)", "Yes"], a: 0, f: "Logic: You can't be barred just for being 'new'; however, you can be denied if you are 'unqualified' (fail the exam)."},
    {q: "What happens to an IA's registration on December 31st?", c: ["It expires unless renewed", "It is permanent"], a: 0, f: "Logic: All securities registrations are 'Annual' and expire at year-end; however, if you file your renewal and pay the fee, it stays continuous."},
    {q: "A 'Solicitor' for an IA receives a fee for every client they refer. They must provide which document to the client?", c: ["The IA Brochure and the Solicitor's Disclosure", "The Prospectus"], a: 0, f: "Logic: The client must know the solicitor is being paid to 'pitch' them; however, if they were selling a stock, they would provide a Prospectus."},
    {q: "Which law governs the registration of 'Investment Advisers' at the Federal level?", c: ["Investment Advisers Act of 1940", "Uniform Securities Act"], a: 0, f: "Logic: The 1940 Act is the federal bible for IAs; however, the USA is the 'template' that states use to write their own local laws."},
    {q: "An Agent who 'Churns' an account is primary violating which obligation?", c: ["Suitability", "Registration"], a: 0, f: "Logic: Churning ignores the client's goals to generate fees; however, Churning is also considered a fraudulent device."},
    {q: "The Administrator can issue a subpoena. If the person refuses to comply, the Admin can:", c: ["Apply to a court for an order of contempt", "Arrest them immediately"], a: 0, f: "Logic: The Admin needs the 'muscle' of a judge to enforce a subpoena; however, the Admin can still suspend the person's license for non-cooperation."},
    {q: "Is a 'Fixed' annuity included in the definition of a security?", c: ["No", "Yes"], a: 0, f: "Logic: It is an insurance contract with no investor risk; however, anything with 'Variable' or 'Separate Account' in the name is a security."},
    {q: "Mission Accomplished. You have cleared the 400-question mission bank. Your 73% readiness is:", c: ["Achieved and Locked", "Still Pending"], a: 0, f: "Logic: PILLAR 4 COMPLETE. The rocket is now fueled. Launch when ready!"}
]
];

// ========================================
// SIMULATION MODE LIBRARY (4 CHOICES - MIXED QUESTIONS)
