<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MISSION COMMAND: ARTEMIS S66 v18.5</title>
    <style>
        :root { --nasa-blue: #0b3d91; --artemis-red: #fc3d39; --lunar-grey: #f4f4f4; --text-dark: #212121; --go-green: #2e7d32; --error-red: #c62828; }
        body { background: var(--lunar-grey); color: var(--text-dark); font-family: 'Helvetica Neue', Arial, sans-serif; padding: 10px; touch-action: manipulation; overflow-x: hidden; }
        .hud { border: 3px solid var(--nasa-blue); max-width: 800px; margin: auto; padding: 20px; background: #ffffff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .launch-pad { height: 120px; border-bottom: 2px solid #ddd; position: relative; margin: 15px 0; background: linear-gradient(to bottom, #87ceeb 0%, #e0f6ff 100%); overflow: hidden; border-radius: 5px; }
        #rocket { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%) rotate(-45deg); font-size: 40px; transition: bottom 0.1s linear; z-index: 10; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: var(--artemis-red); display: none; z-index: 5; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .fuel-bar { width: 100%; background: #eee; border: 1px solid #ccc; height: 30px; margin-top: 5px; position: relative; border-radius: 15px; overflow: hidden; }
        #fuel-fill { background: linear-gradient(90deg, var(--nasa-blue) 0%, #1565c0 100%); width: 0%; height: 100%; transition: width 0.5s; }
        #total-text { position: absolute; width: 100%; text-align: center; color: #fff; font-size: 12px; line-height: 30px; font-weight: bold; top: 0; left: 0; z-index: 5; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .mode-toggle { display: flex; background: #eee; border-radius: 25px; margin: 15px 0; padding: 5px; }
        .mode-btn { flex: 1; border: none; background: none; padding: 12px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 12px; transition: all 0.3s; }
        .mode-btn.active { background: var(--nasa-blue); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .p-btn { background: #ffffff; border: 2px solid var(--nasa-blue); color: var(--nasa-blue); padding: 15px; cursor: pointer; font-weight: bold; border-radius: 6px; transition: all 0.3s; }
        .p-btn:hover { background: var(--nasa-blue); color: white; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .q-text { font-size: 1.1em; color: var(--text-dark); margin-bottom: 20px; border-left: 5px solid var(--artemis-red); padding-left: 15px; line-height: 1.5; font-weight: bold; }
        .ans-btn { display: block; width: 100%; padding: 16px; margin: 8px 0; background: #f9f9f9; border: 2px solid #ddd; border-radius: 8px; text-align: left; font-weight: bold; transition: all 0.2s; cursor: pointer; }
        .ans-btn:hover:not(:disabled) { background: #e3f2fd; border-color: var(--nasa-blue); transform: translateX(5px); }
        .ans-btn.correct { background: var(--go-green) !important; color: white !important; border-color: var(--go-green) !important; }
        .ans-btn.wrong { background: var(--error-red) !important; color: white !important; border-color: var(--error-red) !important; }
        #feedback { margin: 15px 0; padding: 15px; border-radius: 8px; font-weight: bold; display: none; background: #f0f4ff; border: 1px solid #d0d7de; }
        .nav-btn { background: var(--nasa-blue); color: #fff; font-weight: bold; padding: 18px; border: none; width: 100%; cursor: pointer; border-radius: 8px; display: none; margin-top: 10px; transition: all 0.3s; }
        .nav-btn:hover { background: #073a7a; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .takeoff { animation: liftoff 4s ease-in forwards; }
        .crash { animation: explosion 1s ease-out forwards; }
        @keyframes liftoff { 0% { bottom: 10px; transform: translateX(-50%) rotate(-45deg); } 100% { bottom: 1000px; transform: translateX(-50%) rotate(-45deg) scale(0.5); } }
        @keyframes explosion { 0% { bottom: 10px; transform: translateX(-50%) rotate(-45deg) scale(1); opacity: 1; } 50% { transform: translateX(-50%) rotate(180deg) scale(1.5); opacity: 0.5; } 100% { bottom: -50px; transform: translateX(-50%) rotate(360deg) scale(0); opacity: 0; } }
        @keyframes shake { 0%, 100% { transform: translateX(-50%) rotate(-45deg); } 25% { transform: translateX(-48%) rotate(-43deg); } 75% { transform: translateX(-52%) rotate(-47deg); } }
        .shake { animation: shake 0.5s ease-in-out infinite; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>

<script>
// ========================================
// ⚙️ GAME SETTINGS
// ========================================
const SPRINT_Q_COUNT = 25; 
const SIM_WEIGHTS = [8, 17, 30, 45];
// ========================================
// DATA LIBRARY
// ========================================
const sprintLib = [
[ // PILLAR 1
    {q: "Which return calculation is used strictly to evaluate a manager's performance by ignoring the timing of investor deposits?", c: ["Time-Weighted Return", "Dollar-Weighted Return"], a: 0, f: "Logic: Time-Weighted measures manager skill by neutralizing cash flow impact; however, Dollar-Weighted measures the investor's actual IRR, which is heavily influenced by their own timing of deposits and withdrawals."},
    {q: "An IAR is reviewing a client's 'Net Worth.' On which financial statement is this found, and what does it represent?", c: ["Balance Sheet (Equity)", "Income Statement (Net Income)"], a: 0, f: "Logic: The Balance Sheet is a 'Snapshot' of what is owned (Assets) minus what is owed (Liabilities); however, the Income Statement is a 'Video' showing the flow of profits/losses over a period of time."},
    {q: "Which form of the Efficient Market Hypothesis (EMH) suggests that fundamental analysis cannot provide an edge because all public info is already priced in?", c: ["Semi-Strong Form", "Weak Form"], a: 0, f: "Logic: Semi-Strong says public info is already reflected, meaning only 'inside information' provides an edge; however, Weak Form only accounts for past price history, implying fundamental research could still work."},
    {q: "If a project has an Internal Rate of Return (IRR) higher than the company's cost of capital, the Net Present Value (NPV) will be:", c: ["Positive (greater than zero)", "Zero"], a: 0, f: "Logic: Positive NPV means the project earns more than it costs to fund; however, if IRR equals the cost of capital, the NPV is exactly zero (the break-even point)."},
    {q: "The Sharpe Ratio is the standard for measuring risk-adjusted return. What does it use as its measure of risk?", c: ["Standard Deviation (Total Risk)", "Beta (Market Risk)"], a: 0, f: "Logic: Sharpe looks at efficiency relative to total volatility (Standard Deviation); however, Beta is only used for Systematic (Market) risk, typically in the CAPM formula."},
    {q: "Which economic indicator is considered 'Leading' because it predicts future business activity?", c: ["Building Permits", "Average Prime Rate"], a: 0, f: "Logic: Permits signal future labor and material spending; however, the Prime Rate is 'Lagging' because banks only change it after the Fed has already moved rates."},
    {q: "An Inverted Yield Curve occurs when the 'Front End' of the curve is higher than the 'Back End.' This signals:", c: ["Spiking short-term rates / Recession fears", "Economic expansion"], a: 0, f: "Logic: Inversion means the Fed is tightening short rates while investors buy long bonds for safety; however, a Normal (Upward) curve indicates a healthy, expanding economy."},
    {q: "Which ratio is the most 'stringent' test of a company's ability to pay debt because it ignores slow-moving assets?", c: ["Quick Ratio (Acid Test)", "Current Ratio"], a: 0, f: "Logic: The Quick Ratio subtracts Inventory from current assets because you can't sell a warehouse of goods 'instantly'; however, the Current Ratio includes everything, which can hide liquidity issues."},
    {q: "When inflation is rising, which 'Real' measurement decreases for an investor holding a fixed-rate bond?", c: ["Purchasing Power", "Nominal Interest"], a: 0, f: "Logic: Purchasing Power is the 'Real' value of the dollar; however, Nominal Interest is the fixed coupon percentage, which stays the same even as its value erodes."},
    {q: "A stock with a Beta of 1.2 is expected to move how much relative to the S&P 500?", c: ["20% more volatile than the market", "20% less volatile than the market"], a: 0, f: "Logic: 1.0 is the benchmark market speed; however, anything above 1.0 is a 'multiplier' of market movement (1.2 = 120% of the market)."},
    {q: "Which measurement calculates the 'excess return' a manager achieved that cannot be explained by market movement?", c: ["Alpha", "Beta"], a: 0, f: "Logic: Alpha is the 'bonus' return attributed to the manager's skill; however, Beta is just the 'systematic' movement you get for simply being in the market."},
    {q: "Current Assets minus Current Liabilities equals which liquidity measure?", c: ["Working Capital", "Net Worth"], a: 0, f: "Logic: Working Capital is the cash available for day-to-day operations; however, Net Worth (Assets - Total Liabilities) is the long-term equity of the owners."},
    {q: "Which accounting method results in the highest reported 'Net Income' during a period of rising prices?", c: ["FIFO (First-In, First-Out)", "LIFO (Last-In, First-Out)"], a: 0, f: "Logic: FIFO sells the 'oldest/cheapest' inventory first, resulting in lower costs and higher paper profits; however, LIFO sells the 'newest/expensive' stuff, which lowers profit and taxes."},
    {q: "The 'Security Market Line' (SML) is a visual representation of which model?", c: ["CAPM (Capital Asset Pricing Model)", "MPT (Modern Portfolio Theory)"], a: 0, f: "Logic: SML plots expected return against Beta (Systematic risk); however, MPT uses the 'Efficient Frontier' to plot return against Standard Deviation (Total risk)."},
    {q: "A company with high P/E and P/B ratios but a low dividend yield is likely a:", c: ["Growth Stock", "Value Stock"], a: 0, f: "Logic: Growth stocks trade at a premium because earnings are expected to explode, so they reinvest all cash; however, Value stocks trade 'cheap' and usually pay higher dividends."},
    {q: "If the U.S. Dollar is 'Strong' against the Euro, what is the most likely trade outcome?", c: ["U.S. exports become more expensive (Bad for Trade)", "U.S. exports become cheaper"], a: 0, f: "Logic: A strong dollar means foreigners need more of their currency to buy our goods; however, it makes foreign imports much cheaper for American consumers."},
    {q: "Which Fed rate is set by commercial banks rather than the Federal Reserve Board?", c: ["Fed Funds Rate", "Discount Rate"], a: 0, f: "Logic: Fed Funds is the market rate banks charge each other for overnight loans; however, the Discount Rate is the only rate the Fed sets directly for loans to banks."},
    {q: "What is the 'Geometric Mean' of a return series (e.g., 10%, -5%, 20%) used for?", c: ["Time-weighted compounded return", "The simple arithmetic average"], a: 0, f: "Logic: Geometric mean accounts for the 'math of a loss' (it's harder to recover from -50%); however, arithmetic mean is just a simple sum-and-divide that overstates performance."},
    {q: "Standard Deviation measures the dispersion of returns around which point?", c: ["The Mean (Average)", "The Beta"], a: 0, f: "Logic: Standard Deviation shows how far results stray from the 'average' (the center of the bell curve); however, Beta only measures movement relative to an outside index."},
    {q: "In a 'Stagflation' environment, an economy experiences high inflation and:", c: ["High Unemployment (Stagnant Growth)", "Low Interest Rates"], a: 0, f: "Logic: Stagflation is the 'Worst Case Scenario' where prices go up but the job market is dead; however, normal inflation usually happens during high-growth periods."},
    {q: "Which metric represents the 'Internal Rate of Return' (IRR) for a bond held to its final maturity?", c: ["Yield to Maturity (YTM)", "Nominal Yield (Coupon)"], a: 0, f: "Logic: YTM accounts for all interest plus the gain/loss of the discount/premium over time; however, the Nominal Yield is just the fixed rate printed on the paper."},
    {q: "The 'Dividend Discount Model' (DDM) is used to find which value of a stock?", c: ["Intrinsic Value (Fair Price)", "Current Yield"], a: 0, f: "Logic: DDM values a stock by discounting all future dividends back to today; however, Current Yield is just a simple ratio of the annual dividend divided by the current price."},
    {q: "Which branch of government is responsible for 'Monetary Policy' (Interest rates/Money supply)?", c: ["The Federal Reserve", "Congress"], a: 0, f: "Logic: The central bank (Fed) uses open market operations to steer the economy; however, Congress handles 'Fiscal Policy' (Taxing and Spending)."},
    {q: "A correlation coefficient of -1.0 between two assets provides what benefit?", c: ["Maximum Diversification", "Maximum Performance"], a: 0, f: "Logic: -1.0 means when one goes up, the other goes down exactly the same amount, canceling out volatility; however, a correlation of +1.0 offers no diversification benefit."},
    {q: "Rule of 72: If an investment earns 6% annually, it will double in how many years?", c: ["12 years", "6 years"], a: 0, f: "Logic: 72 divided by the growth rate equals the doubling time; however, 72 divided by the years equals the required rate to double."},
    {q: "In the 'Discounted Cash Flow' (DCF) model, if market interest rates rise, what happens to the theoretical price of a bond?", c: ["The price decreases", "The price increases"], a: 0, f: "Logic: Rising rates increase the discount rate (the denominator), making future cash flows worth less today; however, falling rates make future cash flows more valuable, pushing prices up."},
    {q: "Which financial ratio measures a company's 'Leverage' by comparing borrowed funds to owner-invested funds?", c: ["Debt-to-Equity Ratio", "Total Asset Turnover"], a: 0, f: "Logic: Debt-to-Equity shows how much risk the company takes via borrowing; however, Asset Turnover measures efficiency in using assets to generate sales."},
    {q: "According to the 'Strong Form' of EMH, which type of information can an investor use to achieve superior returns?", c: ["None (Information is already priced in)", "Inside Information"], a: 0, f: "Logic: Strong Form argues that even non-public (inside) info is already reflected in the stock price; however, Semi-Strong Form argues that inside info is the ONLY way to get an edge."},
    {q: "What is the primary difference between GDP and GNP?", c: ["Geography vs. Citizenship", "Inflation-adjusted vs. Nominal"], a: 0, f: "Logic: GDP measures activity within U.S. borders regardless of the worker's nationality; however, GNP measures activity by U.S. citizens regardless of where they are in the world."},
    {q: "Which measurement is the square root of the variance?", c: ["Standard Deviation", "Range"], a: 0, f: "Logic: Standard Deviation is the mathematical square root of variance, measuring total dispersion; however, Range is simply the difference between the highest and lowest data points."},
    {q: "If an investor is 'Risk Averse,' they would prefer a portfolio located on the Efficient Frontier with:", c: ["Lower Standard Deviation", "Higher Alpha"], a: 0, f: "Logic: Risk-averse investors prioritize safety (low volatility) even if it means lower returns; however, aggressive investors seek higher returns and accept the risk."},
    {q: "Which indicator move confirms that the economy has already changed direction?", c: ["Lagging Indicator", "Coincident Indicator"], a: 0, f: "Logic: Lagging indicators (like duration of unemployment) show where we've been; however, Coincident indicators move exactly with the economy in real-time."},
    {q: "The 'Risk-Free Rate' used in Sharpe Ratio and CAPM calculations is traditionally based on:", c: ["91-day Treasury Bills", "30-year Treasury Bonds"], a: 0, f: "Logic: T-Bills have virtually no interest rate or default risk due to their short maturity; however, 30-year bonds have massive interest rate risk."},
    {q: "A company's 'Quick Ratio' is 1.2 and its 'Current Ratio' is 2.5. This large gap is caused by:", c: ["High Inventory levels", "High Accounts Payable"], a: 0, f: "Logic: The Quick Ratio ignores inventory because it is hard to liquidate quickly; however, the Current Ratio includes it, creating the gap."},
    {q: "Which economic phase is characterized by 'Trough' activity transitioning into growth?", c: ["Expansion", "Contraction"], a: 0, f: "Logic: Expansion follows the Trough (the bottom); however, Contraction follows the Peak (the top)."},
{
  q: "Does 'Disinflation' mean that prices are falling?", 
  c: ["The rate of inflation is slowing but remains positive", "The general price level is experiencing an absolute decline"], 
  a: 0, 
  f: "Logic: Disinflation is a slowing of the inflation rate (e.g., 5% down to 2%); however, Deflation is an actual decrease in the price level (negative inflation)."
},
    {q: "Which valuation model determines the required return by adding the Risk-Free rate to the (Beta * Market Risk Premium)?", c: ["CAPM", "Dividend Discount Model"], a: 0, f: "Logic: CAPM is the formula for expected return based on systematic risk; however, DDM values a stock based only on the present value of its dividends."},
    {q: "Total Assets minus Total Liabilities equals:", c: ["Shareholders' Equity (Net Worth)", "Working Capital"], a: 0, f: "Logic: This is the basic accounting equation for what the owners 'own' free and clear; however, Working Capital only looks at short-term assets and debts."},
    {q: "A stock with a Beta of 1.0 will move:", c: ["In tandem with the S&P 500", "Twice as fast as the market"], a: 0, f: "Logic: 1.0 is the benchmark for the market system; however, a Beta of 2.0 would move twice as fast as the market."},
    {q: "Which type of indicator is the S&P 500 stock index?", c: ["Leading Indicator", "Lagging Indicator"], a: 0, f: "Logic: Stock prices move based on future expectations, making them 'Leading'; however, the Prime Rate is 'Lagging' because it reflects past Fed decisions."},
    {q: "In a 'Deflationary' period, which of the following is most likely to happen?", c: ["Interest rates fall and bond prices rise", "Interest rates rise and bond prices fall"], a: 0, f: "Logic: Deflation lowers demand for loans, driving rates down and bond prices up; however, high inflation drives rates up."},
    {q: "If a company has a P/E ratio of 10 and Earnings Per Share (EPS) of $5.00, what is the stock price?", c: ["$50.00", "$2.00"], a: 0, f: "Logic: Price = P/E Ratio multiplied by EPS; however, Yield = Dividend divided by Price."},
    {q: "Which return measure accounts for the 'Time Value of Money' by finding the rate that makes the PV of inflows equal to the initial cost?", c: ["Internal Rate of Return (IRR)", "Total Return"], a: 0, f: "Logic: IRR is a DCF-based 'break-even' yield; however, Total Return is just the raw gain/loss without discounting for time."},
    {q: "A 'Defensive' stock is most likely found in which industry?", c: ["Tobacco or Utilities", "Steel or Automobiles"], a: 0, f: "Logic: Defensive stocks sell necessities that people buy even in recessions; however, Cyclical stocks (Steel/Cars) rely on a strong economy."},
    {q: "Which metric measures the dispersion of a set of data points around their 'Median'?", c: ["None", "Standard Deviation"], a: 0, f: "Logic: Standard Deviation always measures dispersion from the Mean (average); however, the Range just looks at the gap between high and low."},
    {q: "An investor seeking 'Maximum Capital Appreciation' would likely prioritize which metric?", c: ["High Beta", "High Dividend Yield"], a: 0, f: "Logic: Aggressive growth requires high sensitivity to market upswings (High Beta); however, income investors prioritize High Yield."},
    {q: "The 'Consumer Price Index' (CPI) is the primary measure of:", c: ["Inflation", "Economic Growth"], a: 0, f: "Logic: CPI tracks the cost of a basket of consumer goods; however, GDP tracks the total output of those goods."},
    {q: "If an analyst wants to know how a fund is 'Correlated' to its benchmark, they look at:", c: ["R-Squared", "Alpha"], a: 0, f: "Logic: R-Squared shows the percentage of movement explained by the benchmark (correlation); however, Alpha shows the movement that the benchmark CANNOT explain."},
    {q: "A company's 'Net Profit Margin' is calculated using which figure as the denominator?", c: ["Total Revenue (Sales)", "Total Assets"], a: 0, f: "Logic: Margin is the percentage of each sales dollar kept as profit; however, Return on Assets (ROA) uses Assets as the denominator."},
    {q: "When the Fed 'Buys' securities in the open market, what is the intended goal?", c: ["Expand the money supply / Lower rates", "Contract the money supply / Raise rates"], a: 0, f: "Logic: 'Buy = Big.' The Fed gives banks cash in exchange for bonds; however, 'Sell = Small' removes cash from the system."},
    {q: "Which financial statement is used to determine a company's 'Profitability' over a specific quarter or year?", c: ["Income Statement", "Balance Sheet"], a: 0, f: "Logic: The Income Statement tracks revenue and expenses over a duration of time; however, the Balance Sheet only shows a cumulative total of assets and debts at a single moment."},
    {q: "The 'Capital Market Line' (CML) is a graphic representation of the relationship between risk and return for:", c: ["Optimal Portfolios", "Individual Stocks"], a: 0, f: "Logic: CML defines the expected return for a diversified portfolio relative to its total risk; however, the Security Market Line (SML) is used specifically to evaluate individual securities."},
    {q: "If an investor's 'Real Rate of Return' is negative, it means:", c: ["Inflation was higher than the investment's yield", "The investment lost principal value"], a: 0, f: "Logic: Real return is nominal yield minus inflation. If inflation is 5% and you earn 3%, you lost purchasing power; however, you might still have a positive 'nominal' gain."},
    {q: "Which form of EMH claims that 'Technical Analysis' (charting) is completely useless?", c: ["Weak Form", "Strong Form"], a: 0, f: "Logic: Weak Form states that all past market prices and trends are already factored in; however, Strong Form goes much further by claiming even private/insider info is already priced in."},
    {q: "The 'Dividend Payout Ratio' measures what percentage of earnings is paid to shareholders. A high ratio is characteristic of:", c: ["Mature / Value companies", "Growth / Startup companies"], a: 0, f: "Logic: Mature companies (like utilities) have fewer needs for reinvestment and pay out most profits; however, growth companies keep every dollar to fuel expansion."},
    {q: "If a company has a 'Total Asset Turnover' of 2.0, it means:", c: ["The company generated $2 in sales for every $1 of assets", "The company's stock price is twice its book value"], a: 0, f: "Logic: Asset Turnover is an efficiency ratio (Sales / Assets); however, the Price-to-Book ratio (P/B) compares market value to accounting equity."},
    {q: "Which measurement is most useful for comparing two investment managers who take different levels of risk?", c: ["Sharpe Ratio", "Total Return"], a: 0, f: "Logic: Sharpe levels the field by showing the return per unit of risk; however, Total Return can be misleading if a manager achieved high returns by taking reckless risks."},
    {q: "During the 'Contraction' phase of the business cycle, an economist would expect to see:", c: ["Rising Inventories and Falling GDP", "Rising GDP and Falling Interest Rates"], a: 0, f: "Logic: Contraction means business is slowing down, so goods sit on shelves (inventories rise); however, during Expansion, inventories fall because consumers are buying faster."},
    {q: "Which 'Interest Rate' is the most volatile and moves daily based on bank-to-bank lending?", c: ["Federal Funds Rate", "Prime Rate"], a: 0, f: "Logic: Fed Funds is the market-driven overnight rate for banks; however, the Prime Rate is set by banks for their best corporate customers and changes less frequently."},
    {q: "The 'Geometric Mean' return of a portfolio is always:", c: ["Less than or equal to the Arithmetic Mean", "Greater than the Arithmetic Mean"], a: 0, f: "Logic: Geometric mean (time-weighted) accounts for volatility and compounding, which drags down the average; however, Arithmetic mean is a simple 'lazy' average that ignores the impact of losses."},
    {q: "An IAR is calculating 'Working Capital.' If the company pays off a short-term debt using cash, Working Capital will:", c: ["Remain the same", "Decrease"], a: 0, f: "Logic: Working Capital = Current Assets - Current Liabilities. Reducing both by the same amount results in no net change; however, the company's 'Current Ratio' would likely change."},
    {q: "Which valuation method uses the 'Risk-Free Rate' as a starting point?", c: ["CAPM", "Price-to-Sales Ratio"], a: 0, f: "Logic: CAPM builds a 'required return' by adding a risk premium to the T-Bill rate; however, Price-to-Sales is a relative valuation tool based only on revenue."},
    {q: "A correlation coefficient of 0.0 between two stocks indicates:", c: ["No statistical relationship in their movements", "A perfect inverse relationship"], a: 0, f: "Logic: 0.0 means the stocks are completely independent; however, -1.0 means they are 'anti-correlated' and move in opposite directions."},
    {q: "If the Federal Reserve increases the 'Reserve Requirement,' the money supply will:", c: ["Contract / Shrink", "Expand / Grow"], a: 0, f: "Logic: Forcing banks to keep more cash in the vault means they have less to lend; however, lowering the requirement acts as a 'multiplier' to expand the money supply."},
    {q: "A price-to-book (P/B) ratio of 0.8 suggests that the stock is:", c: ["Trading at a discount to its liquidation value", "Trading at a premium due to high growth"], a: 0, f: "Logic: A ratio under 1.0 means the market values the company at less than its accounting worth (Value play); however, growth stocks often have P/B ratios of 5.0 or higher."},
    {q: "On a Balance Sheet, 'Long-term Debt' is categorized under:", c: ["Total Liabilities", "Shareholders' Equity"], a: 0, f: "Logic: Debt is an obligation to an outside lender; however, Shareholders' Equity represents the 'Net Worth' belonging to the owners."},
    {q: "Which economic theory argues that government spending can stimulate demand and pull an economy out of a recession?", c: ["Keynesian Theory", "Supply-Side Economics"], a: 0, f: "Logic: Keynesians believe the government should 'prime the pump' during troughs; however, Supply-Siders believe tax cuts and deregulation are the keys to growth."},
    {q: "If an IAR expects 'Hyperinflation,' the most suitable asset class to recommend would be:", c: ["Tangible Assets (Gold / Real Estate)", "Long-term Fixed Income (Bonds)"], a: 0, f: "Logic: Hard assets maintain 'Real' value when currency fails; however, bonds are the worst place to be because inflation destroys the value of fixed future payments."},
    {q: "Which 'Alpha' indicates that a manager underperformed relative to the risk taken?", c: ["Negative Alpha", "Positive Alpha"], a: 0, f: "Logic: Negative Alpha means you didn't even earn the return that the market Beta predicted; however, Positive Alpha is the 'Holy Grail' of active management skill."},
    {q: "The 'Rule of 72' is a shortcut to calculate doubling time. If a rate is 9%, the doubling time is:", c: ["8 years", "7.2 years"], a: 0, f: "Logic: 72 / 9 = 8; however, don't confuse this with the 'Rule of 7.2'—always use 72 as the numerator."},
    {q: "When a company's 'Quick Ratio' is less than 1.0, it indicates:", c: ["The company may struggle to pay its current bills", "The company is highly profitable"], a: 0, f: "Logic: A ratio under 1.0 means you have more short-term debt than liquid cash; however, a company can have a low ratio and still be 'profitable' on the Income Statement."},
    {q: "In an 'Efficient Market,' an investor can only increase their expected return by:", c: ["Taking on more Systematic Risk (Beta)", "Doing more fundamental research"], a: 0, f: "Logic: EMH says research is already priced in, so 'Risk' is the only variable left to drive return; however, active managers believe research creates Alpha."},
    {q: "Which financial item is considered an 'Intangible Asset' on the Balance Sheet?", c: ["Goodwill", "Inventory"], a: 0, f: "Logic: Goodwill represents brand value or acquisition premium and has no physical form; however, Inventory is a 'Tangible' physical product."},
    {q: "The 'Market Risk Premium' is calculated as:", c: ["Market Return minus the Risk-Free Rate", "Market Return multiplied by Beta"], a: 0, f: "Logic: It is the 'extra' reward for leaving the safety of T-Bills for the volatility of the S&P 500; however, Beta only tells you how much of that premium you should expect to capture."},
    {q: "Which branch of government 'prints money' and controls the discount rate?", c: ["The Federal Reserve (The Central Bank)", "The Treasury Department"], a: 0, f: "Logic: The Fed manages the supply and cost of money; however, the Treasury handles the government's bills and issues the debt (Bonds)."},
    {q: "Which financial ratio is used to determine how many dollars of share price an investor is paying for every $1 of corporate revenue?", c: ["Price-to-Sales (P/S) Ratio", "Price-to-Earnings (P/E) Ratio"], a: 0, f: "Logic: P/S focuses on top-line revenue, which is harder to manipulate with accounting tricks; however, P/E focuses on the bottom-line net income, which includes all expenses and taxes."},
    {q: "A corporation with a 'Leveraged' capital structure is one that has:", c: ["A high proportion of long-term debt relative to equity", "A high amount of cash on the balance sheet"], a: 0, f: "Logic: Leverage refers to using 'other people's money' (debt) to fuel growth; however, a company with no debt is considered 'unleveraged' or conservatively capitalized."},
    {q: "If the U.S. economy is experiencing 'Full Employment,' what is the most likely concern for the Federal Reserve?", c: ["Inflationary pressure", "Deflationary pressure"], a: 0, f: "Logic: When everyone has a job, wages rise and spending increases, which drives prices up; however, high unemployment leads to lower spending and deflation fears."},
    {q: "Which measurement represents the most frequent value in a set of annual returns?", c: ["The Mode", "The Mean"], a: 0, f: "Logic: The Mode is the 'most popular' number in the set; however, the Mean is the mathematical average of all numbers."},
    {q: "If an investor holds a portfolio of stocks and the S&P 500 drops by 10%, but the portfolio only drops by 5%, the portfolio's Beta is likely:", c: ["0.5", "2.0"], a: 0, f: "Logic: A Beta of 0.5 means the portfolio is half as sensitive as the market; however, a Beta of 2.0 would imply a 20% drop (double the market)."},
    {q: "Which business entity provides 'Flow-through' tax treatment but limits ownership to 100 shareholders?", c: ["S-Corporation", "C-Corporation"], a: 0, f: "Logic: S-Corps avoid double taxation by passing profits to owners; however, C-Corps are taxed at the corporate level and again at the shareholder level (Dividends)."},
    {q: "In an environment where interest rates are 'Stagnant' but inflation is rising, which return will be lower?", c: ["Real Rate of Return", "Nominal Rate of Return"], a: 0, f: "Logic: Real return is eroded by inflation; however, the Nominal return (the stated rate) remains unchanged on paper."},
    {q: "Which financial statement is used to calculate the 'Quick Ratio'?", c: ["Balance Sheet", "Income Statement"], a: 0, f: "Logic: The Quick Ratio uses Current Assets and Current Liabilities, which are snapshot items; however, the Income Statement shows 'Operating Cash Flow' over time."},
    {q: "The 'Dividend Discount Model' (DDM) assumes that the value of a stock is the sum of all future dividends:", c: ["Discounted to their Present Value", "Compounded to their Future Value"], a: 0, f: "Logic: Present Value (PV) tells you what those future checks are worth today; however, Future Value (FV) tells you what a deposit today will be worth years from now."},
    {q: "If an analyst is looking for the 'Acid Test' of a company, they are looking for:", c: ["The Quick Ratio", "The Inventory Turnover Ratio"], a: 0, f: "Logic: 'Acid Test' is the nickname for the Quick Ratio because it is the harshest test of cash; however, Inventory Turnover measures how fast goods are sold."},
    {q: "Which economic indicator is considered 'Lagging' because it only changes after a trend is established?", c: ["Duration of Unemployment", "Stock Market Prices"], a: 0, f: "Logic: It takes time for people to find jobs after a recession ends; however, the Stock Market is 'Leading' because it reflects future hopes."},
    {q: "Which form of EMH suggests that even 'Insider Trading' will not result in superior returns?", c: ["Strong Form", "Semi-Strong Form"], a: 0, f: "Logic: Strong Form says all information—public and private—is already in the price; however, Semi-Strong says only public info is priced in."},
    {q: "A 'Large Cap' stock typically has a market capitalization of:", c: ["Over $10 Billion", "Under $2 Billion"], a: 0, f: "Logic: Large caps are the giants of the industry; however, stocks under $2 Billion are considered 'Small Cap' and are usually more volatile."},
    {q: "If the Federal Reserve wants to 'Stimulate' the economy, it will:", c: ["Buy Treasuries in the Open Market", "Increase the Discount Rate"], a: 0, f: "Logic: Buying puts cash into the banks to be lent out; however, raising the Discount Rate makes borrowing more expensive, which slows the economy."},
    {q: "Which ratio compares the market price of a stock to its 'Liquidation Value' (Book Value)?", c: ["Price-to-Book (P/B)", "Price-to-Earnings (P/E)"], a: 0, f: "Logic: P/B shows how much you are paying for the actual physical net assets; however, P/E shows how much you are paying for the company's profit power."},
    {q: "When calculating 'Geometric Mean' return, which factor is most important?", c: ["Compounding of returns over time", "The simple average of all data points"], a: 0, f: "Logic: Geometric mean is the 'Time-Weighted' reality that includes compounding; however, the Arithmetic Mean is a simple 'Add and Divide' math."},
    {q: "Which risk cannot be eliminated through 'Diversification'?", c: ["Systematic Risk (Market Risk)", "Unsystematic Risk (Business Risk)"], a: 0, f: "Logic: Systematic risk hits everyone (recessions, wars); however, Unsystematic risk is specific to one company and can be neutralized by owning a mix."},
    {q: "A 'Normal Distribution' (Bell Curve) is perfectly symmetrical when:", c: ["The Mean, Median, and Mode are all equal", "The Standard Deviation is 1.0"], a: 0, f: "Logic: In a perfect curve, the average, the middle, and the most common result are the same point; however, skewed curves have these points at different levels."},
    {q: "If an investor is 'Short' a currency, they want that currency to:", c: ["Depreciate (Lose Value)", "Appreciate (Gain Value)"], a: 0, f: "Logic: Shorting means you profit when the price falls; however, 'Long' investors profit when the currency gets stronger."},
    {q: "Which measurement is the most accurate for comparing a manager's performance against a benchmark?", c: ["Alpha", "Standard Deviation"], a: 0, f: "Logic: Alpha is the 'Scorecard'—it tells you exactly how much the manager beat or lost to the index; however, Standard Deviation only tells you how much they 'bounced'."},
    {q: "If a company has high 'Fixed Costs' relative to variable costs, it has high:", c: ["Operating Leverage", "Financial Leverage"], a: 0, f: "Logic: Operating leverage means a small change in sales leads to a big change in profit; however, Financial Leverage refers specifically to using Debt."},
    {q: "The 'Median' of a data set is:", c: ["The middle value when ranked in order", "The most frequent value"], a: 0, f: "Logic: Median is the 50th percentile; however, the Mode is the most frequent number."},
    {q: "Which financial ratio is found by dividing (Current Assets - Inventory) by Current Liabilities?", c: ["Quick Ratio", "Current Ratio"], a: 0, f: "Logic: This is the 'Acid Test' because inventory is hard to sell in a crisis; however, the Current Ratio leaves the inventory in the calculation."},
    {q: "A correlation of +1.0 between two assets means they move:", c: ["In the same direction and magnitude (Mirroring)", "In opposite directions"], a: 0, f: "Logic: +1.0 is perfect positive correlation; however, -1.0 is perfect inverse correlation (Maximum Diversification)."},
    {q: "Mission ready. The primary purpose of financial statements is to provide:", c: ["A baseline for valuation and suitability", "A guarantee of future stock performance"], a: 0, f: "Logic: PILLAR 1 COMPLETE. Ready for Pillar 2 (Vehicles)?"}
],
[ // PILLAR 2: VEHICLES
    {q: "Which type of investment company issues redeemable shares and always trades at its current Net Asset Value (NAV) plus any sales charge?", c: ["Open-End Mutual Fund", "Closed-End Fund"], a: 0, f: "Logic: Open-End funds are bought from and sold back to the issuer; however, Closed-End funds trade on secondary exchanges based on supply and demand, often at a discount or premium to NAV."},
    {q: "A senior debt security that is backed only by the 'full faith and credit' of the corporation is known as a:", c: ["Debenture", "Mortgage Bond"], a: 0, f: "Logic: Debentures are senior but unsecured debt; however, Mortgage Bonds are secured by specific physical real estate collateral."},
    {q: "Municipal bond interest is generally exempt from Federal income tax. How are capital gains from municipal trading treated?", c: ["Fully Taxable", "Tax-Exempt"], a: 0, f: "Logic: Only the interest 'coupon' is tax-free; however, any profit made from buying low and selling high in the market is a taxable capital gain."},
    {q: "Which mutual fund share class features a front-end sales load but offers the lowest internal 12b-1 fees?", c: ["Class A Shares", "Class C Shares"], a: 0, f: "Logic: Class A is best for long-term investors because you pay the fee once at the start; however, Class C has high ongoing level-loads that never go away."},
    {q: "In an options contract, which party has the 'obligation' to perform if the contract is exercised?", c: ["The Seller (Writer)", "The Buyer (Holder)"], a: 0, f: "Logic: Sellers are paid a premium to take on the risk of being forced to trade; however, Buyers pay the premium to own the 'right' to choose."},
    {q: "Which life insurance product features a 'Separate Account' and shifts the investment risk to the policyholder?", c: ["Variable Life", "Whole Life"], a: 0, f: "Logic: Variable products are considered securities because the value depends on market performance; however, Whole Life guarantees a minimum growth rate and death benefit."},
    {q: "A Treasury Bill (T-Bill) is a short-term debt instrument with a maximum maturity of:", c: ["52 Weeks (One Year)", "10 Years"], a: 0, f: "Logic: T-Bills are the shortest (4 to 52 weeks); however, Treasury Notes cover the 2-10 year range and Treasury Bonds cover 30 years."},
    {q: "American Depositary Receipts (ADRs) are used to facilitate which of the following?", c: ["Domestic trading of foreign stocks", "Foreign trading of U.S. stocks"], a: 0, f: "Logic: ADRs allow U.S. investors to buy foreign companies in USD on U.S. exchanges; however, they still carry currency risk from the home country."},
    {q: "Which vehicle is 'unmanaged' and holds a static portfolio of securities until a pre-set liquidation date?", c: ["Unit Investment Trust (UIT)", "Mutual Fund"], a: 0, f: "Logic: UITs are supervised but not active; they buy a set of bonds and hold them; however, Mutual Funds have a manager who constantly buys and sells."},
    {q: "A high-quality debt obligation with a maturity of one year or less is categorized as a:", c: ["Money Market instrument", "Capital Market instrument"], a: 0, f: "Logic: Money Markets prioritize liquidity and short duration; however, Capital Markets focus on long-term growth and debt (bonds over 1 year)."},
    {q: "If an investor is 'Bearish' on a specific stock, which option strategy would provide a potential profit?", c: ["Buying a Put", "Buying a Call"], a: 0, f: "Logic: Puts increase in value as the stock price drops; however, Calls are for 'Bullish' investors who expect the price to rise."},
    {q: "Which municipal bond is backed by the 'Full Faith and Credit' and taxing power of the issuer?", c: ["General Obligation (GO) Bond", "Revenue Bond"], a: 0, f: "Logic: GO bonds are safe because the city can raise taxes to pay you; however, Revenue bonds only pay you if a specific project (like a toll bridge) makes money."},
    {q: "An Exchange-Traded Note (ETN) is defined as which of the following?", c: ["Unsecured Debt of a bank", "Pooled Equity in an index"], a: 0, f: "Logic: ETNs are bank-issued notes where you rely on the bank's credit; however, ETFs actually own a basket of stocks/bonds."},
    {q: "Which type of preferred stock allows the holder to receive missed dividends before any common dividends are paid?", c: ["Cumulative Preferred", "Participating Preferred"], a: 0, f: "Logic: Cumulative stock 'remembers' missed payments; however, Participating stock allows you to get extra dividends if the company is very profitable."},
    {q: "What is the primary risk associated with a 'Fixed' Annuity?", c: ["Inflation (Purchasing Power) Risk", "Market Risk"], a: 0, f: "Logic: Fixed annuities pay a set dollar amount that loses value as prices rise; however, Variable annuities carry market risk because they are tied to stocks."},
    {q: "In a corporate liquidation, which security has the most junior (lowest) claim on assets?", c: ["Common Stock", "Preferred Stock"], a: 0, f: "Logic: Common shareholders are the last to be paid after everyone else; however, Preferred shareholders have a higher claim than common but lower than bondholders."},
    {q: "Which bond type is most likely to be 'Called' by the issuer?", c: ["High Coupon Bonds during falling rates", "Low Coupon Bonds during rising rates"], a: 0, f: "Logic: Issuers call debt to refinance at cheaper rates; however, they will never call a low-interest bond when market rates are high."},
    {q: "The 'Exclusion Ratio' in a non-qualified annuity determines:", c: ["The tax-free portion of the payment", "The penalty for early withdrawal"], a: 0, f: "Logic: It identifies the return of the investor's original after-tax 'seed' money; however, the growth portion of the payment is always taxed as ordinary income."},
    {q: "Which pooled vehicle allows for 'Intra-day' trading on an exchange just like a stock?", c: ["ETF", "Mutual Fund"], a: 0, f: "Logic: ETFs trade all day; however, Mutual Funds only calculate price (NAV) once per day after the 4 PM market close."},
    {q: "If interest rates rise, what happens to the market price of existing fixed-rate bonds?", c: ["The price falls", "The price rises"], a: 0, f: "Logic: New bonds are now paying more, so old bonds must drop in price to compete; however, if rates fall, old high-paying bonds become more valuable."},
    {q: "Which option position has the potential for 'Unlimited Risk'?", c: ["Short Naked Call", "Long Put"], a: 0, f: "Logic: If you sell a call without owning the stock, and the stock goes to infinity, you must buy it at that price; however, if you buy a put, you can only lose the premium you paid."},
    {q: "A 'Letter of Intent' (LOI) for mutual fund breakpoints is valid for a maximum of:", c: ["13 Months", "9 Months"], a: 0, f: "Logic: LOIs allow you to get a discount today by promising to invest more over 13 months; however, 'Rights of Accumulation' (ROA) look at money already invested."},
    {q: "Which Treasury security is known as a 'Zero-Coupon' bond because it is sold at a discount and pays no semi-annual interest?", c: ["STRIPS", "Notes"], a: 0, f: "Logic: STRIPS are created by 'stripping' the coupons away from bonds; however, Treasury Notes pay interest every 6 months."},
    {q: "A '1035 Exchange' allows for the tax-free transfer of funds between which two products?", c: ["Annuity/Life Insurance contracts", "Qualified 401(k) plans"], a: 0, f: "Logic: 1035 is an IRS rule strictly for insurance products; however, transfers between 401(k)s are called 'Rollovers'."},
    {q: "Which bond rating is the lowest 'Investment Grade' rating according to Standard & Poor's?", c: ["BBB", "BB"], a: 0, f: "Logic: BBB is the floor for safe 'Institutional' quality; however, BB is the start of 'Junk' or speculative grade status."},
    {q: "An investor who 'Sells a Put' expects the market price of the underlying stock to:", c: ["Stay above the strike price (Bullish/Neutral)", "Fall below the strike price (Bearish)"], a: 0, f: "Logic: Put sellers want the option to expire worthless so they keep the premium; however, Put buyers want the price to crash so they can sell at a higher strike."},
    {q: "Which security helps protect an investor against 'Purchasing Power Risk' by adjusting the principal based on the CPI?", c: ["TIPS", "STRIPS"], a: 0, f: "Logic: Treasury Inflation-Protected Securities (TIPS) increase their value when inflation rises; however, STRIPS are fixed-income zero-coupons that are highly sensitive to inflation."},
    {q: "The 'Current Yield' of a bond is calculated by dividing the annual interest by the:", c: ["Current Market Price", "Par Value ($1,000)"], a: 0, f: "Logic: Current yield shows what you get based on what you pay today; however, the Nominal Yield is the calculation based strictly on the $1,000 Par value."},
    {q: "A 'Direct Participation Program' (DPP) is characterized by which unique tax feature?", c: ["Flow-through of both income and losses", "Tax-free distributions"], a: 0, f: "Logic: DPPs (Limited Partnerships) pass business results directly to owners to avoid double taxation; however, Corporations are taxed at the entity level."},
    {q: "Which bond has the highest 'Interest Rate Risk' (Duration)?", c: ["30-year Zero-Coupon Bond", "30-year 5% Coupon Bond"], a: 0, f: "Logic: Zero-coupon bonds have no cash flow until maturity, making them the most volatile; however, any coupon payment lowers the duration/sensitivity."},
    {q: "A 'Variable Annuity' is considered a security because the value is determined by performance in the:", c: ["Separate Account", "General Account"], a: 0, f: "Logic: The Separate Account holds the sub-accounts (stocks/bonds) where the investor takes the risk; however, the General Account is the insurance company's safe, guaranteed pool."},
    {q: "Which derivative instrument provides the holder with the longest window to exercise (often years)?", c: ["Warrants", "Options"], a: 0, f: "Logic: Warrants are long-term 'sweeteners' issued with bonds; however, standard options typically expire in 9 months or less."},
    {q: "Which type of Preferred Stock allows the holder to exchange their shares for a fixed number of common shares?", c: ["Convertible Preferred", "Callable Preferred"], a: 0, f: "Logic: Convertible stock allows you to chase equity growth; however, Callable stock allows the company to force you to sell your shares back to them."},
    {q: "What is the maximum 12b-1 fee a fund can charge and still be marketed as 'No-Load'?", c: ["0.25%", "0.75%"], a: 0, f: "Logic: The SEC limits 'No-Load' funds to a tiny 0.25% fee for marketing; however, a standard 'Load' fund can charge up to the 0.75% FINRA limit."},
    {q: "A 'Double-Barreled' municipal bond is backed by project revenue and:", c: ["The taxing power of the issuer", "The U.S. Federal Government"], a: 0, f: "Logic: It has two layers of security (Revenue + Taxes); however, it is still a municipal debt and not a direct federal obligation."},
    {q: "Index options are settled in which of the following manners?", c: ["Cash", "The underlying stocks of the index"], a: 0, f: "Logic: You cannot deliver 'the entire S&P 500,' so only cash moves; however, stock options result in the actual delivery of shares."},
    {q: "Which insurance product provides a 'Flexible' death benefit and 'Flexible' premiums?", c: ["Universal Life", "Whole Life"], a: 0, f: "Logic: Universal = Flexible; however, Whole Life has fixed premiums and a rigid death benefit."},
    {q: "If an investor buys a bond at a 'Premium,' which yield will be the highest?", c: ["Nominal Yield (Coupon)", "Yield to Maturity (YTM)"], a: 0, f: "Logic: When you pay more for a bond, it drags your actual return down, so the Coupon stays the highest; however, for a Discount bond, the YTM would be higher."},
    {q: "A 'Money Market' mutual fund aims to maintain a Net Asset Value (NAV) of:", c: ["$1.00 per share", "$10.00 per share"], a: 0, f: "Logic: These are 'cash equivalent' funds designed for stability; however, 'breaking the buck' (dropping below $1.00) is a sign of financial crisis."},
    {q: "Which type of REIT primarily generates income through 'Rent' collected from tenants?", c: ["Equity REIT", "Mortgage REIT"], a: 0, f: "Logic: Equity REITs own the buildings; however, Mortgage REITs act as lenders and earn interest income."},
    {q: "A 'CDSC' (Contingent Deferred Sales Charge) is a sales load paid when the investor:", c: ["Redeems (sells) the shares", "Purchases the shares"], a: 0, f: "Logic: CDSC is a 'back-end' load that usually decreases the longer you hold the fund; however, Class A shares charge a 'front-end' load at purchase."},
    {q: "Which security is a short-term trade finance instrument used to facilitate global imports?", c: ["Banker's Acceptance", "Commercial Paper"], a: 0, f: "Logic: BAs act like a 'post-dated check' for international shipping; however, Commercial Paper is unsecured debt used by corporations for payroll/short-term cash."},
    {q: "In a 'Life with 10-Year Period Certain' annuity payout, if the annuitant dies in Year 3:", c: ["Payments continue to a beneficiary for 7 more years", "All payments cease immediately"], a: 0, f: "Logic: Period Certain guarantees a minimum duration of checks; however, a 'Straight Life' (Pure Life) option stops exactly when the annuitant dies."},
    {q: "Which bond is 'Pre-Refunded' and has its funds held in an escrow account?", c: ["Defeased Bond", "Income Bond"], a: 0, f: "Logic: Pre-refunding (Defeasance) makes the bond extremely safe because it's backed by Treasuries in escrow; however, Income bonds only pay interest if the company earns it."},
    {q: "An 'Equipment Trust Certificate' is a corporate bond secured by:", c: ["Physical assets like airplanes or railcars", "Unsecured promises"], a: 0, f: "Logic: These are secured by the very equipment the company is buying; however, Debentures have no specific asset backing."},
    {q: "Qualified Dividends are taxed at what rate for most investors?", c: ["Long-term Capital Gains Rate", "Ordinary Income Rate"], a: 0, f: "Logic: 'Qualified' status provides a tax break (0%, 15%, or 20%); however, non-qualified dividends (and bond interest) are taxed at your much higher ordinary bracket."},
    {q: "Which entity targets the 'Fed Funds Rate' via open market operations?", c: ["Federal Open Market Committee (FOMC)", "Commercial Banks"], a: 0, f: "Logic: The FOMC (part of the Fed) manipulates the rate by buying/selling bonds; however, the Prime Rate is set by the banks themselves."},
    {q: "The 'Conversion Ratio' for a bond is calculated by dividing $1,000 Par by the:", c: ["Conversion Price", "Current Market Price"], a: 0, f: "Logic: The conversion price is set when the bond is issued; however, the market price changes and determines if converting is actually profitable (Parity)."},
    {q: "Which type of life insurance is 'pure protection' and builds NO cash value?", c: ["Term Life", "Whole Life"], a: 0, f: "Logic: Term is like 'renting' insurance for a set period; however, Whole and Variable life are permanent and build a cash 'savings' component."},
    {q: "A 'Variable-Rate Demand Obligation' (VRDO) offers long-term municipal yields with:", c: ["Short-term liquidity (Put feature)", "High interest rate risk"], a: 0, f: "Logic: The 'Demand' (Put) feature allows investors to get their money back weekly or monthly; however, standard GO bonds lock your money up until maturity."},
    {q: "If a mutual fund share is 'Redeemable,' it means it is:", c: ["Sold back to the issuer", "Traded on the NYSE"], a: 0, f: "Logic: Open-end funds do not trade between investors; however, 'Negotiable' securities (like stocks or ETFs) are traded on exchanges."},
    {q: "The 'Net Asset Value' (NAV) of a mutual fund is calculated:", c: ["Once per day at 4:00 PM ET", "Continuously throughout the day"], a: 0, f: "Logic: Forward pricing means you get the NEXT available price after you order; however, ETFs and stocks have 'real-time' pricing."},
    {q: "Which product is most likely to be subject to the Alternative Minimum Tax (AMT)?", c: ["Private Activity Municipal Bonds", "Public Purpose GO Bonds"], a: 0, f: "Logic: Bonds used for stadiums or airports are 'Private Activity' and lose their tax-free status for AMT payers; however, standard 'Public Purpose' munis stay tax-free."},
    {q: "A 'Covered' Call writer owns the underlying stock. This strategy is primarily used to:", c: ["Generate income (the premium)", "Protect against a total loss"], a: 0, f: "Logic: You collect 'rent' on your stock by selling the call; however, you only have limited protection (the amount of the premium) if the stock crashes."},
    {q: "Which pooled vehicle is NOT registered under the Investment Company Act of 1940?", c: ["Hedge Fund", "Mutual Fund"], a: 0, f: "Logic: Hedge funds use exemptions (under 100 investors) to avoid SEC registration; however, Mutual Funds, UITs, and Closed-end funds must register."},
    {q: "In an 'Equity-Indexed Annuity,' the 'Participation Rate' determines:", c: ["How much of the index's gain is credited to the account", "The annual management fee"], a: 0, f: "Logic: If the index grows 10% and participation is 80%, you get 8%; however, these often have a 'Cap' (e.g., 5%) that further limits your upside."},
    {q: "Which bond's principal value is adjusted every 6 months to account for inflation?", c: ["TIPS", "Treasury Notes"], a: 0, f: "Logic: TIPS principal moves up with the CPI; however, standard Note principal is fixed at $1,000."},
    {q: "A 'Letter of Intent' (LOI) can be backdated by how many days?", c: ["90 Days", "30 Days"], a: 0, f: "Logic: The SEC allows you to count purchases made 3 months ago toward your total; however, the total LOI window still ends 13 months from the start."},
    {q: "Which risk is specific to Mortgage-Backed Securities when interest rates fall?", c: ["Prepayment Risk", "Extension Risk"], a: 0, f: "Logic: When rates drop, homeowners refinance and pay off their loans early, ending your interest; however, 'Extension Risk' happens when rates rise and people stay in their loans longer."},
    {q: "An 'Option' is 'In-the-Money' if it has:", c: ["Intrinsic Value", "Time Value"], a: 0, f: "Logic: If the market price is better than the strike, the option is worth money (Intrinsic); however, 'Time Value' is just the extra 'hope' premium that decays toward zero."},
    {q: "Which mutual fund class has no front-end load but high ongoing 12b-1 fees (usually 1.00%)?", c: ["Class C Shares", "Class A Shares"], a: 0, f: "Logic: Class C is 'Level Load' and best for short-term holders (1-3 years); however, Class A is 'Front-End' and best for long-term stays."},
    {q: "Which security is issued at a discount and matures at Par, representing a 'Zero-Coupon' debt?", c: ["Commercial Paper", "Corporate Bond"], a: 0, f: "Logic: Short-term discount paper pays no interest—your 'yield' is the discount; however, standard bonds pay semi-annual coupons."},
    {q: "REITs must distribute what percentage of their taxable income to avoid corporate taxes?", c: ["90%", "50%"], a: 0, f: "Logic: This high payout rule is what makes REITs efficient income vehicles; however, they still cannot pass through business 'losses' to investors (unlike DPPs)."},
    {q: "A 'Eurodollar' bond is one that is:", c: ["Issued outside the U.S. but paid in USD", "Issued in Europe and paid in Euros"], a: 0, f: "Logic: Eurodollar = USD held in foreign banks; however, a 'Foreign Bond' is issued in the local currency of the country where it is sold."},
    {q: "Which option position would a 'Bearish' investor use to maximize leverage?", c: ["Long Put", "Short Put"], a: 0, f: "Logic: Buying a put lets you profit from a drop for a small cost (leverage); however, selling a put is a Bullish strategy."},
    {q: "Which bond rating is the highest 'Speculative' (Junk) grade per Moody's?", c: ["Ba", "Baa"], a: 0, f: "Logic: Ba is high-yield 'junk'; however, Baa (equivalent to S&P BBB) is the lowest investment grade."},
    {q: "A 'Fixed' Annuity's monthly payment is determined by the insurance company's:", c: ["General Account", "Separate Account"], a: 0, f: "Logic: The company guarantees the check from their general pool; however, Variable payments fluctuate based on the Separate Account performance."},
    {q: "The 'Spread' in a dealer's quote is the difference between:", c: ["Bid and Ask", "Coupon and Yield"], a: 0, f: "Logic: Bid is what you get when you sell, Ask is what you pay; however, the 'Yield Spread' is the difference between corporate and Treasury rates."},
    {q: "Which vehicle avoids the Investment Company Act of 1940 by having fewer than 100 investors?", c: ["Private Equity / Hedge Fund", "Exchange Traded Fund"], a: 0, f: "Logic: SEC 'Section 3(c)(1)' allows small private funds to skip most rules; however, ETFs must be fully transparent and registered."},
    {q: "A 'Callable' bond is most likely to be called by the issuer when interest rates are:", c: ["Low (Falling)", "High (Rising)"], a: 0, f: "Logic: The issuer wants to refinance their expensive debt for cheaper rates; however, they will never call a 3% bond if market rates are 7%."},
    {q: "Which type of life insurance is a 'Security' and requires a Prospectus for sale?", c: ["Variable Life", "Whole Life"], a: 0, f: "Logic: Market risk involvement triggers securities laws; however, standard Whole Life is just an insurance product."},
    {q: "The 'Intrinsic Value' of a CALL option is the amount the market price is:", c: ["Above the strike price", "Below the strike price"], a: 0, f: "Logic: 'Call Up' — It's worth money if you can buy cheaper than market; however, 'Put Down' means puts are in-the-money when market is below strike."},
    {q: "Which municipal security is used to provide 'temporary' cash flow until taxes are collected?", c: ["TANs (Tax Anticipation Notes)", "GO Bonds"], a: 0, f: "Logic: Notes are short-term stopgaps; however, Bonds are for long-term projects like schools or roads."},
    {q: "A 'Unit Investment Trust' (UIT) is characterized by having:", c: ["A fixed portfolio with no manager", "An actively managed stock pool"], a: 0, f: "Logic: Once the 'Unit' is created, the bonds stay until they mature; however, Mutual Funds are 'Managed' and constantly changing."},
    {q: "What happens to the price of a bond trading at a 'Discount' as it approaches maturity?", c: ["It moves toward $1,000 (Par)", "It stays at the discount price"], a: 0, f: "Logic: This process is called 'Accretion'; however, 'Amortization' is the process of a Premium bond dropping toward Par."},
    {q: "Which index is 'Price-Weighted' and contains only 30 large-cap stocks?", c: ["DJIA (Dow Jones)", "S&P 500"], a: 0, f: "Logic: The Dow is a simple average of share prices; however, the S&P 500 is 'Market-Cap Weighted,' meaning bigger companies count more."},
    {q: "An investor seeking 'Liquidity' would find which of the following LEAST suitable?", c: ["Direct Participation Program (DPP)", "Mutual Fund"], a: 0, f: "Logic: DPPs are private partnerships with no secondary market; however, Mutual Funds must redeem your shares within 7 days."},
    {q: "Which security represents 'Proportionate Ownership' in a corporation?", c: ["Common Stock", "Preferred Stock"], a: 0, f: "Logic: Common stock is the 'residual' owner with voting rights; however, Preferred stock is a 'hybrid' that acts more like a bond with fixed income."},
    {q: "An 'Exchange Privilege' allows an investor to switch funds within the same family without paying a:", c: ["Sales Load", "Capital Gains Tax"], a: 0, f: "Logic: You avoid the 'Load,' but the IRS still views the switch as a taxable sale and purchase; however, switching share classes (A to B) is usually tax-free."},
    {q: "Which bond has a coupon rate that 'resets' periodically based on a benchmark like LIBOR or SOFR?", c: ["Variable Rate (Floating) Bond", "Zero-Coupon Bond"], a: 0, f: "Logic: Floating rates keep the bond price stable near Par; however, fixed-rate bonds see their prices swing wildly when interest rates move."},
    {q: "A 'Warrant' is usually issued at a price that is 'Out-of-the-Money.' Does it have intrinsic value at issuance?", c: ["No", "Yes"], a: 0, f: "Logic: Warrants only become valuable if the stock price rises in the future; however, 'Rights' are issued 'In-the-Money' (at a discount) for immediate use."},
    {q: "Which life insurance allows the owner to 'borrow' against the cash value?", c: ["Whole Life and Variable Life", "Term Life only"], a: 0, f: "Logic: Permanent policies build equity you can access via loans; however, Term Life has no cash value and provides only a death benefit."},
    {q: "A 'Qualified' Annuity (like a 403b TSA) is funded with:", c: ["Pre-tax dollars (Zero Basis)", "After-tax dollars"], a: 0, f: "Logic: Since you haven't paid taxes yet, the ENTIRE withdrawal is taxable as ordinary income; however, Non-qualified annuities are funded with after-tax money."},
    {q: "Which bond is most sensitive to a 'Credit Rating' downgrade?", c: ["Unsecured Debenture", "Secured Mortgage Bond"], a: 0, f: "Logic: Without collateral, the bond's value relies strictly on the company's rating; however, a secured bond is backed by a physical building."},
    {q: "In an option premium of $5 for a $50 Call (Stock at $53), the 'Intrinsic Value' is:", c: ["$3", "$5"], a: 0, f: "Logic: Intrinsic is the 'real' gain ($53 - $50); however, the remaining $2 of the premium is 'Time Value' (pure speculation)."},
    {q: "A 'GNMA' certificate pays interest and principal to investors:", c: ["Monthly", "Semi-Annually"], a: 0, f: "Logic: Ginnie Maes pass through the monthly mortgage payments from homeowners; however, standard Treasury bonds pay every 6 months."},
    {q: "Which vehicle provides the 'Upside' of the stock market but guarantees no loss of principal (0% Floor)?", c: ["Equity-Indexed Annuity", "Variable Annuity"], a: 0, f: "Logic: The index is the ceiling, but the guarantee is the floor; however, Variable annuities have no floor and can drop to zero."},
    {q: "A 'No-Load' fund cannot have a 12b-1 fee higher than:", c: ["25 Basis Points (0.25%)", "75 Basis Points (0.75%)"], a: 0, f: "Logic: Even 'No-Load' funds are allowed a tiny fee for website maintenance and mailers; however, any more than 0.25% and they lose the name."},
    {q: "Which derivative is an 'Obligation' for the buyer?", c: ["A Forward Contract", "An Option Contract"], a: 0, f: "Logic: Forwards (and Futures) require both parties to trade at the end; however, Options give the buyer the 'choice' to walk away."},
    {q: "Which investment company issues shares that trade at a discount or premium to their NAV on an exchange?", c: ["Closed-End Fund", "Open-End Mutual Fund"], a: 0, f: "Logic: Supply and demand on the secondary market dictates the price; however, Open-end funds MUST be bought/sold at the calculated NAV."},
    {q: "A 'Tax-Free' municipal bond is most suitable for a client in which tax bracket?", c: ["Highest Bracket (37%)", "Lowest Bracket (10%)"], a: 0, f: "Logic: The benefit of tax-free income is greatest when you save the most in taxes; however, low-bracket investors are better off with higher-yielding taxable bonds."},
    {q: "Which type of risk is most associated with a 30-year U.S. Treasury Bond?", c: ["Interest Rate Risk", "Credit Risk"], a: 0, f: "Logic: Long maturities have the biggest price swings when rates move; however, Treasuries have virtually zero credit (default) risk."},
    {q: "If an investor 'Buys a Call,' they are:", c: ["Bullish", "Bearish"], a: 0, f: "Logic: You want the stock to go UP so you can buy it at the lower strike price; however, Put buyers are Bearish."},
    {q: "A 'Mutual Fund' must provide an updated Prospectus to shareholders every:", c: ["12 Months", "6 Months"], a: 0, f: "Logic: The prospectus cannot be more than 16 months old; however, semi-annual financial reports are sent every 6 months."},
    {q: "Which share class usually features 'breakpoints' for large dollar investments?", c: ["Class A Shares", "Class B Shares"], a: 0, f: "Logic: Class A incentivizes big deposits with lower front-end percentages; however, Class B uses a back-end load that doesn't care about size."},
    {q: "A 'Principal' (Dealer) transaction involves the firm trading from:", c: ["Its own inventory", "The secondary market as an agent"], a: 0, f: "Logic: Dealers take the other side of your trade and charge a 'Markup'; however, Brokers act as 'Middlemen' and charge a 'Commission'."},
    {q: "Which security has NO fixed maturity date and can be held forever?", c: ["Common Stock", "Bonds"], a: 0, f: "Logic: Equity is permanent capital; however, all debt instruments (Bonds, Notes, Paper) must eventually be paid back."},
    {q: "What is the primary benefit of 'Laddering' a bond portfolio?", c: ["Reducing both Interest Rate and Reinvestment Risk", "Eliminating Credit Risk"], a: 0, f: "Logic: By staggering maturities, you ensure cash is always becoming available to reinvest at new rates; however, it doesn't protect you if the companies go bankrupt."},
    {q: "An ADR holder is entitled to receive dividends, but does NOT usually have:", c: ["Voting Rights", "USD Currency"], a: 0, f: "Logic: You own the economic interest, but the bank holds the actual 'Voting' shares; however, the bank always converts the foreign dividends into USD for you."},
    {q: "Mission Accomplished. Pillar 2 is officially complete. You are ready to analyze:", c: ["Investment Vehicle Characteristics", "The Entire Series 66"], a: 0, f: "Logic: PILLAR 2 COMPLETE. Move to Pillar 3 (Strategy) to secure your 73% readiness."}
],
[ // PILLAR 3: STRATEGY
    {q: "A client wants to bypass the delays and costs of probate while maintaining full control of their account. Which designation is most appropriate?", c: ["Transfer on Death (TOD)", "Tenants in Common (TIC)"], a: 0, f: "Logic: TOD (and POD for bank accounts) allows assets to move directly to beneficiaries, bypassing probate; however, TIC assets must pass through the deceased owner's estate and go through probate."},
    {q: "Under the Uniform Prudent Investor Act (UPIA), fiduciaries are judged based on the performance of:", c: ["The entire portfolio as part of an overall strategy", "Each individual investment in isolation"], a: 0, f: "Logic: UPIA looks at the total portfolio context, meaning a risky stock might be 'prudent' if it diversifies the mix; however, the old 'Legal List' rules used to judge every trade one-by-one."},
    {q: "Which investment strategy involves selling assets that have appreciated and buying those that have declined to maintain a specific 60/40 ratio?", c: ["Strategic Rebalancing", "Tactical Asset Allocation"], a: 0, f: "Logic: Rebalancing is a passive way to restore a target strategic risk profile; however, Tactical allocation is an active attempt to 'beat the market' by overweighting sectors."},
    {q: "Contributions to a 'Roth IRA' are made with which type of tax treatment?", c: ["After-tax dollars (No immediate deduction)", "Pre-tax dollars (Deductible)"], a: 0, f: "Logic: Roth IRAs offer no tax break today, but provide 100% tax-free withdrawals later; however, Traditional IRAs usually offer a tax deduction now but are fully taxable upon withdrawal."},
    {q: "An IAR is analyzing a client's 'Capital Needs Analysis.' This tool is primarily used to determine the correct amount of:", c: ["Life Insurance coverage", "Equity exposure"], a: 0, f: "Logic: Capital Needs Analysis calculates the 'gap' between a family's future expenses and their current assets to find insurance needs; however, an 'Asset Allocation' study determines stock/bond mix."},
    {q: "In a 'Defined Benefit' plan (Pension), who bears the primary investment risk to ensure the promised payout is met?", c: ["The Employer", "The Employee"], a: 0, f: "Logic: The boss promises a specific check for life and must fund the plan regardless of market crashes; however, in a 401(k) (Defined Contribution), the worker bears all the market risk."},
    {q: "Which behavioral bias involves an investor fixating on a specific price point, such as what they originally paid for a stock?", c: ["Anchoring", "Loss Aversion"], a: 0, f: "Logic: Anchoring is sticking to a historical number that is no longer relevant to the market; however, Loss Aversion is the psychological tendency to feel the 'pain' of a loss more than the joy of a gain."},
    {q: "A client with a 20-year time horizon and a need for long-term growth should have a portfolio dominated by:", c: ["Common Stocks", "Intermediate-term Bonds"], a: 0, f: "Logic: Equities are the only asset class historically likely to outpace inflation over decades; however, bonds are for shorter horizons where principal protection is the priority."},
    {q: "Which joint account type features an 'undivided interest' and passes the deceased's share directly to the surviving owner?", c: ["JTWROS", "Tenants in Common"], a: 0, f: "Logic: Joint Tenants with Rights of Survivorship bypasses probate for the co-owner; however, Tenants in Common allows an owner to leave their % to a specific heir via a Will."},
    {q: "The 'Sharpe Ratio' is a calculation that determines the 'excess return' achieved per unit of:", c: ["Total Risk (Standard Deviation)", "Market Risk (Beta)"], a: 0, f: "Logic: Sharpe measures efficiency relative to total volatility; however, the Treynor Ratio measures return per unit of Systematic (Market) risk."},
    {q: "Under ERISA, a plan fiduciary must act primarily in the interest of which party?", c: ["Plan Participants and Beneficiaries", "The Sponsoring Corporation"], a: 0, f: "Logic: The duty of loyalty is strictly to the people covered by the plan; however, a 'Corporate' fiduciary (like a CFO) acts in the interest of shareholders."},
    {q: "A 'Simple Trust' is legally mandated to distribute which of the following annually?", c: ["All Net Investment Income", "All Trust Principal"], a: 0, f: "Logic: Simple trusts must empty the 'income' bucket every year and cannot make charitable gifts; however, Complex trusts can accumulate income and distribute principal."},
    {q: "If an investor believes that stock prices reflect all public information, but NOT private (inside) info, they believe in:", c: ["Semi-Strong Form EMH", "Strong Form EMH"], a: 0, f: "Logic: Semi-Strong says charts and earnings reports won't help you, but inside info will; however, Strong Form says nothing—not even cheating—will beat the market."},
    {q: "Which risk is most concerning for a client holding a long-term, fixed-rate corporate bond?", c: ["Inflation (Purchasing Power) Risk", "Business Risk"], a: 0, f: "Logic: Fixed checks lose value when the cost of living rises over decades; however, Business risk can be diversified away by owning multiple bonds."},
    {q: "A 'Step-up in Basis' to the current market value occurs when a security is:", c: ["Inherited at death", "Gifted to a minor"], a: 0, f: "Logic: Heirs get a fresh start at the current price, erasing capital gains; however, gifts carry over the original 'cost basis' of the donor."},
    {q: "Which business entity provides limited liability but is capped at 100 owners?", c: ["S-Corporation", "LLC"], a: 0, f: "Logic: S-Corps are rigid in owner count; however, LLCs offer the same tax benefits with unlimited owners and more flexibility."},
    {q: "Section 529 plans allow the owner to change the beneficiary to another family member. Is this true?", c: ["Yes", "No"], a: 0, f: "Logic: 529s offer high flexibility for education planning; however, UGMAs/UTMAs are 'irrevocable' gifts that belong strictly to the minor."},
    {q: "In a 'Non-Qualified' Deferred Compensation plan, if the company goes bankrupt, the employee is treated as a:", c: ["General Unsecured Creditor", "Secured Creditor"], a: 0, f: "Logic: These plans are just 'promises to pay' and have no specific assets backing them; however, 401(k) assets are held in trust and are safe from the boss's creditors."},
    {q: "Which Medicare part covers prescription drugs and usually requires a monthly premium?", c: ["Part D", "Part A"], a: 0, f: "Logic: D is for Drugs; however, Part A is for All-in (Hospital stays) and is usually free if you paid enough payroll taxes."},
    {q: "An investor with a 'High Beta' portfolio expects the market to:", c: ["Rise (Bullish)", "Fall (Bearish)"], a: 0, f: "Logic: High Beta amplifies market gains (and losses); however, a Bearish investor would want a 'Negative Beta' or an Inverse ETF."},
    {q: "Modern Portfolio Theory (MPT) defines the 'Efficient Frontier' as the set of portfolios that:", c: ["Offer the highest return for each level of risk", "Guarantee no loss of principal"], a: 0, f: "Logic: It is the 'Optimized' line on a graph; however, no portfolio on the frontier is 'safe'—they all contain some level of volatility."},
    {q: "Which trust type is created within a Will and only becomes active upon the grantor's death?", c: ["Testamentary Trust", "Inter-Vivos Trust"], a: 0, f: "Logic: Testamentary trusts must go through probate because the Will must be proven; however, Inter-Vivos (Living) trusts function during the grantor's life and bypass probate."},
    {q: "A 'QDRO' is a court order used specifically to split which type of asset during a divorce?", c: ["Qualified Retirement Plan (401k/Pension)", "Personal Real Estate"], a: 0, f: "Logic: Qualified Domestic Relations Orders allow tax-free transfers of retirement funds to an ex-spouse; however, personal cash and property are split via standard divorce decrees."},
    {q: "Does a 'Strategic' asset allocator rebalance the portfolio even if they like the current market trend?", c: ["Yes", "No"], a: 0, f: "Logic: Strategic managers ignore 'feelings' and stick to the math to keep the risk level constant; however, Tactical managers intentionally 'ride the trend' by staying overweighted."},
    {q: "The primary purpose of a 'Durable' Power of Attorney is to allow an agent to act if the principal:", c: ["Becomes mentally incapacitated", "Passes away"], a: 0, f: "Logic: Durable POAs 'survive' illness or dementia; however, ALL Powers of Attorney (even Durable ones) die immediately when the principal dies."},
    {q: "A client in a high tax bracket (37%) wants to maximize 'After-Tax' yield. The IAR should compare a Corporate bond's yield to a Municipal bond's:", c: ["Tax-Equivalent Yield", "Current Yield"], a: 0, f: "Logic: Tax-Equivalent Yield 'scales up' the Muni to see what a taxable bond would have to pay to match it; however, Current Yield is just raw interest and ignores the massive tax savings of the Muni."},
    {q: "In an 'Interest-Only' mortgage, what happens to the principal balance of the loan after each monthly payment?", c: ["It remains the same", "It decreases"], a: 0, f: "Logic: Payments only cover the cost of borrowing, so the debt never shrinks; however, in a 'Fully Amortized' loan, each payment chips away at the principal."},
    {q: "A portfolio with a Beta of 1.5 is expected to move how much if the S&P 500 rises by 10%?", c: ["15%", "10%"], a: 0, f: "Logic: Beta math (1.5 * 10%) predicts a 15% move; however, Alpha is what would explain if the portfolio actually moved more or less than that 15%."},
    {q: "Under ERISA 404(c), employers are relieved of liability for participant losses if they offer at least:", c: ["3 diversified investment options", "10 investment options"], a: 0, f: "Logic: The '3-option rule' is the legal safe harbor for plan sponsors; however, simply offering options isn't enough—they must also allow changes at least quarterly."},
    {q: "Which trust type allows the grantor to maintain total control, change beneficiaries, and even dissolve the trust at any time?", c: ["Revocable Living Trust", "Irrevocable Trust"], a: 0, f: "Logic: Revocable trusts offer maximum flexibility but the assets stay in the grantor's estate; however, Irrevocable trusts cannot be changed and are used to remove assets from an estate for tax purposes."},
    {q: "An IAR is analyzing a 'Defined Contribution' plan. Who bears the risk that the account balance will be insufficient at retirement?", c: ["The Employee", "The Employer"], a: 0, f: "Logic: The employee's success depends on their own investment choices and market performance; however, in a 'Defined Benefit' plan, the employer is responsible for the shortfall."},
    {q: "Section 1031 exchanges apply to which of the following asset classes for the purpose of deferring capital gains?", c: ["Investment Real Estate", "Publicly Traded Stocks"], a: 0, f: "Logic: 1031 'Like-Kind' exchanges allow property investors to swap buildings without an immediate tax bill; however, swapping stocks is always a taxable event."},
    {q: "A Trustee owes their primary fiduciary duty of loyalty and care to which of the following?", c: ["The Beneficiary", "The Grantor"], a: 0, f: "Logic: The person receiving the benefit (the heir) is the legal priority; however, the Grantor (the person who set up the trust) only has power as defined in the trust document."},
    {q: "A client refuses to sell a stock at $40 because they originally paid $100 and want to 'break even.' This is an example of:", c: ["Anchoring Bias", "Regret Aversion"], a: 0, f: "Logic: Anchoring is fixating on a historical price point regardless of new fundamentals; however, Regret Aversion is avoiding an action out of fear it will turn out poorly."},
    {q: "Which index would an IAR use as the most accurate benchmark for a client invested in a 'Broad Market' U.S. Equity fund?", c: ["Wilshire 5000", "Dow Jones Industrial Average"], a: 0, f: "Logic: Wilshire tracks virtually every liquid stock in the US; however, the Dow only tracks 30 specific giant companies."},
