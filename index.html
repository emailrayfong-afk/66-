<style>
        :root { 
            --nasa-blue: #0b3d91; 
            --artemis-red: #fc3d39; 
            --lunar-grey: #f4f4f4; 
            --text-dark: #212121; 
            --sky-blue: #87CEEB;
            --horizon-white: #e1f5fe;
        }

        body { 
            background: var(--lunar-grey); 
            color: var(--text-dark); 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            padding: 10px; 
            touch-action: manipulation; 
        }

        .hud { 
            border: 3px solid var(--nasa-blue); 
            max-width: 800px; 
            margin: auto; 
            padding: 20px; 
            background: #ffffff; 
            border-radius: 8px; 
        }

        /* Blue Sky Background */
        .launch-pad { 
            height: 120px; 
            border-bottom: 2px solid #ddd; 
            position: relative; 
            margin: 15px 0; 
            background: linear-gradient(to bottom, var(--sky-blue) 0%, var(--horizon-white) 100%); 
            overflow: hidden; 
            border-radius: 5px; 
        }

        #rocket { 
            position: absolute; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%) rotate(-45deg); 
            font-size: 40px; 
            transition: bottom 3s ease-in, opacity 2s ease-in; 
        }

        /* Takeoff Animation Logic */
        .takeoff { 
            bottom: 1000px !important; 
            opacity: 0; 
        }

        .fuel-bar { 
            width: 100%; 
            background: #eee; 
            border: 1px solid #ccc; 
            height: 30px; 
            margin-top: 5px; 
            position: relative; 
            border-radius: 15px; 
            overflow: hidden; 
        }

        #fuel-fill { 
            background: var(--nasa-blue); 
            width: 0%; 
            height: 100%; 
            transition: width 0.5s; 
        }

        #total-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            color: #fff; 
            font-size: 12px; 
            line-height: 30px; 
            font-weight: bold; 
            top: 0; 
            left: 0; 
            z-index: 5; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); 
        }

        .mode-toggle { 
            display: flex; 
            background: #eee; 
            border-radius: 25px; 
            margin: 15px 0; 
            padding: 5px; 
        }

        .mode-btn { 
            flex: 1; 
            border: none; 
            background: none; 
            padding: 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 12px; 
        }

        .mode-btn.active { 
            background: var(--nasa-blue); 
            color: white; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 10px; 
        }

        .p-btn { 
            background: #ffffff; 
            border: 2px solid var(--nasa-blue); 
            color: var(--nasa-blue); 
            padding: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 6px; 
        }

        .q-text { 
            font-size: 1.1em; 
            color: var(--text-dark); 
            margin-bottom: 20px; 
            border-left: 5px solid var(--artemis-red); 
            padding-left: 15px; 
            line-height: 1.5; 
            font-weight: bold; 
        }

        .ans-btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin: 8px 0; 
            background: #f9f9f9; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            text-align: left; 
        }

        #feedback { 
            margin: 15px 0; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            display: none; 
            background: #f0f4ff; 
        }

        .nav-btn { 
            background: var(--nasa-blue); 
            color: #fff; 
            font-weight: bold; 
            padding: 18px; 
            border: none; 
            width: 100%; 
            cursor: pointer; 
            border-radius: 8px; 
            display: none; 
            margin-top: 10px; 
        }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr; } 
        }
    </style>
