            {q: "A client who holds a heavily concentrated position in a single stock and refuses to sell it because they inherited it from their late grandfather is exhibiting:", c: ["Endowment effect (Emotional bias)", "Anchoring bias", "Framing effect", "Overconfidence bias"], a: 0, f: "Logic: The endowment effect occurs when people irrationally overvalue an asset simply because they own it or have an emotional attachment to it."},
            {q: "Under IRS rules, if a taxpayer has $15,000 of realized capital gains and $25,000 of realized capital losses, they can deduct a maximum of:", c: ["$3,000 against ordinary income, carrying forward $7,000", "$10,000 against ordinary income this year", "$3,000 against ordinary income, losing the rest permanently", "$25,000 against ordinary income this year"], a: 0, f: "Logic: You net them first ($10k net loss). You can only deduct a maximum of $3,000 against your W-2 income each year. The remaining $7,000 rolls over to future years."},
            {q: "A 'QDRO' (Qualified Domestic Relations Order) allows for the penalty-free division of which specific type of asset?", c: ["An ERISA-qualified employer retirement plan (e.g., a 401k)", "A non-qualified variable annuity", "A standard taxable brokerage account", "A 529 College Savings Plan"], a: 0, f: "Logic: QDROs are court orders specifically designed to split ERISA-protected workplace pensions and 401(k)s during a divorce without triggering the 10% early withdrawal penalty."},
            {q: "Which type of trust allows the grantor to change the beneficiaries, alter the terms, or completely dissolve the trust at their discretion?", c: ["Revocable Trust", "Testamentary Trust", "Irrevocable Life Insurance Trust (ILIT)", "Charitable Remainder Trust"], a: 0, f: "Logic: A revocable trust leaves total control in the hands of the grantor. Consequently, the assets remain in the grantor's taxable estate."},
            {q: "If an investor is executing a 'Core and Satellite' strategy, the 'Satellite' portion of the portfolio is primarily designed to:", c: ["Generate 'Alpha' through active, tactical, or alternative investments", "Provide a stable, low-cost anchor using broad-market indexes", "Eliminate unsystematic risk", "Guarantee a fixed stream of income"], a: 0, f: "Logic: The 'Core' provides the stable, passive anchor. The smaller 'Satellites' take on more risk to try and beat the market (generate Alpha)."},
            {q: "To legally qualify as a 'Simple Trust' for the tax year, the trust MUST:", c: ["Distribute all of its net income to the beneficiaries", "Make at least one distribution of principal", "Donate a portion of its assets to a registered charity", "Accumulate income to protect it from taxation"], a: 0, f: "Logic: Simple trusts are forbidden from distributing principal or making charitable contributions, and they MUST distribute all their income every single year."},
            {q: "An employee making a $5,000 contribution to their employer's 457(b) plan will see their current year taxable income:", c: ["Decrease by $5,000", "Remain unchanged, as contributions are after-tax", "Increase due to the imputed value of the benefit", "Decrease by $2,500 due to the 50% match rule"], a: 0, f: "Logic: 457(b) plans are deferred compensation plans for municipal workers. Like a Traditional 401(k), contributions are made pre-tax, lowering current taxable income."},
            {q: "In portfolio management, 'Systematic Rebalancing' is a mechanical process designed to force the investor to:", c: ["Sell high and buy low", "Buy high and sell low", "Eliminate all equity exposure during a recession", "Concentrate assets in the best performing sector"], a: 0, f: "Logic: If stocks surge, they become a larger percentage of the portfolio. Rebalancing forces you to sell those high-priced stocks and buy the lagging bonds to restore the original target ratio."},
            {q: "A sole proprietor wants to establish a retirement plan that allows them to contribute the maximum possible percentage of their self-employment income while keeping administrative costs to an absolute minimum. The best choice is a:", c: ["Simplified Employee Pension (SEP) IRA", "Defined Benefit Pension Plan", "Traditional IRA", "403(b) Plan"], a: 0, f: "Logic: A SEP IRA allows the business owner to contribute up to 25% of their compensation, and it has almost zero administrative overhead compared to a complex pension plan."},
            {q: "Which of the following is considered an 'External' factor in an Investment Policy Statement (IPS)?", c: ["Tax laws and Inflation", "The client's liquidity needs", "The client's specific time horizon", "The client's risk tolerance"], a: 0, f: "Logic: External factors are imposed by the outside world (taxes, laws, inflation). Internal factors are specific to the client (age, goals, risk tolerance)."},
            {q: "A 'Wash Sale' occurs if an investor sells a security at a loss and repurchases a substantially identical security within:", c: ["30 days before or after the sale", "60 days after the sale", "90 days before the sale", "By the end of the calendar tax year"], a: 0, f: "Logic: The wash sale window is 61 days total (the day of the sale, plus 30 days prior, plus 30 days after)."},
            {q: "An S-Corporation provides the limited liability of a corporation but is taxed like a:", c: ["Partnership (flow-through)", "C-Corporation", "Sole Proprietorship", "Non-Profit Organization"], a: 0, f: "Logic: S-Corps avoid 'double taxation' because their profits flow directly through to the shareholders' personal tax returns."},
            {q: "What is the primary characteristic of a 'Testamentary Trust'?", c: ["It does not go into effect until the death of the grantor", "It avoids the probate process entirely", "It allows the grantor to maintain full control while alive", "It is exclusively used to bypass the Generation-Skipping tax"], a: 0, f: "Logic: Testamentary trusts are created by a will (a Last Will and Testament), meaning the assets must first go through probate before the trust is funded."},
            {q: "Which of the following business entities has the greatest risk of 'Double Taxation'?", c: ["C-Corporation", "Limited Liability Company (LLC)", "S-Corporation", "General Partnership"], a: 0, f: "Logic: C-Corps pay corporate income tax on their profits, and then shareholders pay tax again on the dividends they receive."},
            {q: "If an investor gifts shares of stock to a family member while the investor is still alive, the recipient's cost basis is generally:", c: ["The donor's original cost basis (Carryover basis)", "The fair market value on the date of the gift (Stepped-up basis)", "Stepped down to zero", "Calculated as the average price over the last 12 months"], a: 0, f: "Logic: Living gifts carry over the original tax basis. Inheritances at death receive a step-up in basis."},
            {q: "Which of the following Medicare parts covers standard physician and outpatient services?", c: ["Part B", "Part A", "Part D", "Part C"], a: 0, f: "Logic: Part A covers hospital stays. Part B covers biological/doctor services. Part D covers prescription drugs."},
            {q: "Which of the following defines a 'Per Stirpes' beneficiary designation?", c: ["If a beneficiary dies, their share passes down to their descendants", "If a beneficiary dies, their share is divided among the surviving primary beneficiaries", "All assets are donated to charity upon death", "Assets are frozen until all beneficiaries reach age 21"], a: 0, f: "Logic: Per Stirpes means 'by the branch'. The money flows down the family tree to the grandchildren if the parent dies."},
            {q: "A married couple sells their primary residence for a $400,000 profit. Assuming they lived there for 3 of the last 5 years, how much of the gain is taxable?", c: ["$0", "$150,000", "$250,000", "$400,000"], a: 0, f: "Logic: The IRS Section 121 exclusion allows married couples to exclude up to $500,000 of capital gains on the sale of a primary residence ($250,000 for singles)."},
            {q: "The 'Sharpe Ratio' is a formula used by analysts to evaluate:", c: ["Risk-adjusted return", "A company's short-term liquidity", "The correlation between two stocks", "The intrinsic value of a bond"], a: 0, f: "Logic: The Sharpe Ratio tells you how much excess return you are receiving for the extra volatility you endure by holding a riskier asset."},
            {q: "A 'Complex Trust' is distinguished from a 'Simple Trust' by its ability to:", c: ["Accumulate income and distribute principal", "Avoid all federal income taxes", "Bypass the probate process", "Shield assets entirely from creditors"], a: 0, f: "Logic: Complex trusts have the flexibility to hold onto income, distribute principal, and make charitable gifts."},
            {q: "Which of the following is a primary advantage of a 'Transfer on Death' (TOD) account designation?", c: ["It bypasses the probate process", "It eliminates estate taxes", "It avoids capital gains taxes", "It prevents the beneficiary from selling the assets"], a: 0, f: "Logic: TOD accounts pass directly to the named beneficiary without going through the delays and public scrutiny of probate court. It does NOT avoid estate taxes."},
            {q: "An Irrevocable Life Insurance Trust (ILIT) is primarily utilized by high-net-worth individuals to:", c: ["Remove the life insurance death benefit from their taxable estate", "Access the cash value tax-free during their lifetime", "Change the beneficiaries without legal penalty", "Guarantee a return on the cash value"], a: 0, f: "Logic: Because the trust (not the individual) owns the policy, the massive death benefit payout is not counted when calculating the estate tax."},
            {q: "Which of the following describes the 'Capital Needs Analysis' process?", c: ["Calculating the amount of life insurance needed to fund a family's future liabilities if the breadwinner dies", "Determining the optimal mix of stocks and bonds for retirement", "Evaluating a corporation's ability to issue new debt", "Assessing the liquidity of a real estate portfolio"], a: 0, f: "Logic: It finds the exact dollar 'gap' between what a family currently has and what they will need to survive, which is usually filled by buying term life insurance."},
            {q: "A client with a very short time horizon (e.g., 6 months) should prioritize which investment objective?", c: ["Preservation of Capital", "Maximum Capital Appreciation", "Aggressive Growth", "Tax Deferral"], a: 0, f: "Logic: If you need the money soon, you cannot afford market risk. You must preserve the principal in safe, highly liquid assets like money market funds."},
            {q: "In a discretionary account, the Investment Adviser Representative (IAR) is legally permitted to determine the:", c: ["Asset, Action, or Amount (AAA)", "Beneficiary of the account", "Time horizon of the client's retirement", "Tax bracket of the client"], a: 0, f: "Logic: Discretion gives the IAR the power to decide Which security to trade, Whether to buy or sell, and How many shares to trade without calling the client first."},
            {q: "Which of the following inflation gauges is designed to measure price changes at the wholesale/manufacturing level?", c: ["Producer Price Index (PPI)", "Consumer Price Index (CPI)", "Gross Domestic Product (GDP)", "Federal Funds Rate"], a: 0, f: "Logic: The PPI tracks the costs producers face before the goods hit the retail market."},
            {q: "A 'Qualified' dividend is advantageous to an investor because it is taxed at:", c: ["Long-term capital gains rates", "Ordinary income tax rates", "Short-term capital gains rates", "The corporate tax rate"], a: 0, f: "Logic: Qualified dividends enjoy preferential tax treatment (typically 15% or 20%), which is much lower than the investor's standard income tax bracket."},
            {q: "A 'QTIP' Trust (Qualified Terminable Interest Property) is most commonly utilized to:", c: ["Provide income for a surviving spouse while ensuring the principal eventually passes to the grantor's children", "Avoid the Generation-Skipping Transfer Tax", "Shield assets from Medicaid recovery", "Eliminate all estate taxes completely"], a: 0, f: "Logic: QTIPs are popular in second marriages. They take care of the new spouse for life, but guarantee the underlying money eventually goes to the kids from the first marriage."},
            {q: "An investor heavily concentrated in the Technology sector decides to move funds into Consumer Staples and Utilities to prepare for a recession. This is known as:", c: ["Sector Rotation", "Strategic Asset Allocation", "Dollar-Cost Averaging", "Value Investing"], a: 0, f: "Logic: Sector rotation is a form of active/tactical management where the investor tries to stay ahead of the business cycle."},
            {q: "Which of the following represents an 'Unsystematic' risk?", c: ["A labor strike at a specific automotive plant", "A nationwide increase in interest rates", "A global pandemic", "A sudden spike in inflation"], a: 0, f: "Logic: Unsystematic risk is specific to a single company or industry and can be virtually eliminated through proper diversification."},
            {q: "Under the Uniform Prudent Investor Act (UPIA), an adviser's investment decisions must be evaluated based on:", c: ["The entire portfolio's performance as a whole", "The success or failure of each individual trade", "The absolute return generated over a 12-month period", "The amount of risk-free assets held"], a: 0, f: "Logic: The UPIA modernized trust law. A fiduciary cannot be sued for one bad stock pick if the overall portfolio was diversified and managed prudently."},
            {q: "A 'Top-Heavy' 401(k) plan is one in which:", c: ["A disproportionate amount of the benefits go to 'key employees'", "The employer matches more than 100% of employee contributions", "The plan holds too much company stock", "All employees contribute the maximum legal limit"], a: 0, f: "Logic: If the bosses and owners hold too much of the plan's total value, it is top-heavy and violates ERISA fairness testing, requiring immediate corrective action."},
            {q: "Which of the following retirement plans is uniquely designed for employees of public schools and certain 501(c)(3) tax-exempt organizations?", c: ["403(b) Plan / Tax-Sheltered Annuity (TSA)", "457(b) Plan", "Keogh Plan", "SIMPLE IRA"], a: 0, f: "Logic: 403(b) plans are the non-profit equivalent of a corporate 401(k)."},
            {q: "Under ERISA rules, the document that formally outlines the plan's investment strategy, risk tolerance, and asset class criteria is the:", c: ["Investment Policy Statement (IPS)", "Summary Plan Description (SPD)", "Form 5500", "Corporate Charter"], a: 0, f: "Logic: The IPS is the 'Plan for the Plan.' It dictates exactly how the fiduciary must manage the money."},
            {q: "An investor realizes a $10,000 capital gain but is pushed into the Alternative Minimum Tax (AMT). Which type of income most commonly triggers the AMT?", c: ["Interest from Private Activity Municipal Bonds", "Qualified Corporate Dividends", "Interest from U.S. Treasury Bills", "Long-term capital gains"], a: 0, f: "Logic: Private Activity bonds (like building a stadium) are a 'tax preference item' that the IRS adds back in when calculating whether a wealthy taxpayer owes the AMT."},
            {q: "A 'Family Limited Partnership' (FLP) is primarily established by wealthy parents to:", c: ["Shift wealth to children while utilizing valuation discounts to reduce gift taxes", "Shield the family's primary residence from creditors", "Avoid all federal income taxes", "Bypass the probate process entirely"], a: 0, f: "Logic: Because the children only receive minority, non-voting shares in the FLP, the IRS allows the parents to 'discount' the value of the gift, squeezing more money under the tax threshold."},
            {q: "The mathematical formula for calculating a company's 'Earnings Per Share' (EPS) is:", c: ["Net Income / Outstanding Common Shares", "Dividends Paid / Current Stock Price", "Total Assets / Total Liabilities", "Net Worth / Outstanding Common Shares"], a: 0, f: "Logic: EPS simply divides the company's total profit by the number of slices (shares) of the pie."},
            {q: "Which of the following is considered a 'Non-Financial' consideration when drafting a client profile?", c: ["The client's risk tolerance and personal values", "The client's current marginal tax bracket", "The value of the client's primary residence", "The client's annual salary"], a: 0, f: "Logic: Financial considerations are hard numbers (salary, mortgage, net worth). Non-financial considerations are emotional or intangible (attitudes toward risk, ESG preferences)."},
            {q: "A high 'Dividend Payout Ratio' typically indicates that a company is:", c: ["A mature, established company returning cash to shareholders", "A rapidly growing tech startup", "Nearing bankruptcy and liquidating assets", "Retaining earnings to fund massive expansion"], a: 0, f: "Logic: Fast-growing companies keep their cash to fund expansion (low payout ratio). Mature companies (like utilities) have fewer growth prospects and pay out their profits as dividends."},
            {q: "In an ERISA-covered retirement plan, the 'Fiduciary' is legally obligated to act:", c: ["Solely in the interest of the plan participants and beneficiaries", "To maximize the profitability of the corporate sponsor", "In accordance with the instructions of the CEO", "To guarantee a positive return on all investments"], a: 0, f: "Logic: The Fiduciary Standard requires absolute loyalty to the employees whose money is in the plan, completely ignoring the financial interests of the employer."},
            {q: "If the Internal Rate of Return (IRR) is mathematically lower than the required Hurdle Rate, the project's Net Present Value (NPV) is:", c: ["Negative", "Positive", "Exactly Zero", "Equal to the Hurdle Rate"], a: 0, f: "Logic: The Hurdle Rate is the minimum acceptable return. If the IRR falls short of it, the project destroys value (Negative NPV)."},
            {q: "Which of the following life insurance policies features 'Permanent' coverage and a fixed, level premium for the life of the insured?", c: ["Whole Life", "Universal Life", "Variable Universal Life", "Term Life"], a: 0, f: "Logic: Whole Life is entirely fixed and guaranteed (fixed premium, fixed death benefit, guaranteed cash value). Universal Life has flexible premiums."},
            {q: "A 'Covered Call' options strategy involves:", c: ["Selling a call option on a stock that you currently own", "Selling a call option on a stock you do not own (Naked)", "Buying a call option on a stock you currently own", "Selling a put option to acquire a stock below market value"], a: 0, f: "Logic: Owning the underlying stock 'covers' the risk, because if the option is exercised, you already have the shares to hand over."},
            {q: "Which of the following business entities functions as a 'Pass-Through' for tax purposes, avoiding corporate-level taxation?", c: ["Partnerships and LLCs", "C-Corporations", "Publicly Traded Corporations", "Non-Profit Organizations"], a: 0, f: "Logic: LLCs, Partnerships, and S-Corps pass all income directly to the owners' personal tax returns, bypassing the IRS at the business level."},
            {q: "Under the 'Section 1031' exchange rules, a taxpayer can defer capital gains taxes by exchanging one investment property for another. This rule applies to:", c: ["Investment Real Estate", "Corporate Stocks and Bonds", "Primary Residences", "Collectibles and Fine Art"], a: 0, f: "Logic: 1031 'Like-Kind' exchanges are strictly limited to real estate held for business or investment purposes. You cannot use it to swap stocks."},
            {q: "Which of the following is an example of an 'Intentionally Defective Grantor Trust' (IDGT)?", c: ["A trust that removes assets from the estate but leaves the grantor responsible for the income taxes", "A trust that failed to meet IRS drafting standards and is voided", "A trust designed solely to bypass the probate process", "A trust that forces the beneficiary to pay all associated taxes"], a: 0, f: "Logic: It is 'defective' for income tax purposes (grantor pays the tax), which allows the trust assets to grow tax-free for the heirs while still escaping the estate tax at death."},
            {q: "A 529 College Savings Plan allows for 'Superfunding', which permits a donor to front-load a lump sum equal to how many years of the annual gift tax exclusion?", c: ["5 years", "3 years", "10 years", "2 years"], a: 0, f: "Logic: A grandparent can drop 5 years' worth of gifts into a 529 plan all at once without triggering a gift tax, provided they don't give that child another dime for 5 years."},
            {q: "An investor in the 10% tax bracket is choosing between a 4% Municipal Bond and a 5% Corporate Bond. Which should they choose?", c: ["The Corporate Bond, because the tax-free benefit is mathematically worthless at a 10% bracket", "The Municipal Bond, because it is safer", "The Municipal Bond, because the tax-equivalent yield is higher", "Neither, they should hold cash"], a: 0, f: "Logic: Tax-free munis are designed for the rich. For someone in the lowest tax bracket, they are better off taking the higher yield of the corporate bond and just paying the tiny tax."},
            {q: "According to the Efficient Market Hypothesis (EMH), if a market is perfectly efficient, an investor should expect to:", c: ["Earn a return that matches the market benchmark", "Consistently beat the market using technical analysis", "Outperform the market through fundamental analysis", "Eliminate all systematic risk"], a: 0, f: "Logic: If the market is perfectly efficient, all information is priced in instantly. You cannot beat it, so your best expectation is to simply match it via indexing."},
            {q: "Which of the following best describes the formula for calculating 'Book Value Per Share'?", c: ["(Total Assets - Total Liabilities - Preferred Stock) / Outstanding Common Shares", "Net Income / Outstanding Common Shares", "Current Assets / Current Liabilities", "Total Assets / Outstanding Common Shares"], a: 0, f: "Logic: Book Value is the theoretical liquidation value of the company (Net Worth) divided among the common shareholders after paying off debt and preferred owners."},
            {q: "A 'Simple IRA' is a retirement plan designed specifically for small businesses that have fewer than:", c: ["100 employees", "50 employees", "25 employees", "500 employees"], a: 0, f: "Logic: A Savings Incentive Match Plan for Employees (SIMPLE) is strictly capped at 100 or fewer employees."},
            {q: "When an individual takes a withdrawal from a Traditional IRA, the distribution is generally taxed as:", c: ["Ordinary Income", "Long-term Capital Gains", "Short-term Capital Gains", "Tax-free return of principal"], a: 0, f: "Logic: Because the money went in pre-tax, 100% of the withdrawal (both contributions and growth) is taxed as regular income at the retiree's current tax bracket."},
            {q: "A 'Growth' investor is primarily focused on a company's:", c: ["Earnings momentum and future acceleration", "High dividend yield and low P/E ratio", "Liquidation value", "Historical dividend payout ratio"], a: 0, f: "Logic: Growth investors don't care about current dividends or paying a high price; they are buying the belief that the company will grow exponentially in the future."},
            {q: "Under the Capital Asset Pricing Model (CAPM), what is the accepted proxy for the 'Risk-Free Rate'?", c: ["91-day U.S. Treasury Bills", "The Prime Rate", "AAA Corporate Bonds", "The S&P 500 Index"], a: 0, f: "Logic: T-Bills are considered to have zero default risk and, because of their short duration, virtually zero interest rate risk, making them the perfect 'Risk-Free' baseline."},
            {q: "A client who firmly believes in 'Tactical Asset Allocation' would be most likely to:", c: ["Overweight their portfolio in technology stocks right before an anticipated economic boom", "Maintain a strict 60/40 mix and rebalance annually", "Invest exclusively in broad-market index funds", "Hold only U.S. Treasury bonds until retirement"], a: 0, f: "Logic: Tactical allocation is active market timing. The investor deliberately deviates from their base mix to exploit short-term economic trends."},
            {q: "Under standard options rules, if an investor is 'Bullish' on a particular stock, they could initiate a position by:", c: ["Buying a Call or Selling a Put", "Selling a Call or Buying a Put", "Buying a Put or Selling a Put", "Selling a Call or Selling a Put"], a: 0, f: "Logic: Buying a Call gives you the right to buy low as the stock shoots up. Selling a put generates premium, and you keep it as long as the stock stays up."},
            {q: "When an employer offers a 'Deferred Compensation Plan', this is considered a:", c: ["Non-qualified plan, meaning it does not have to comply with ERISA non-discrimination testing", "Qualified plan governed strictly by ERISA", "Tax-free vehicle for all employees", "Mandatory benefit for all full-time staff"], a: 0, f: "Logic: Deferred comp plans are non-qualified. Companies use them to give massive bonuses to executives without having to offer the same benefit to the rank-and-file workers."},
            {q: "To calculate the 'Real' rate of return on an investment, you must take the nominal return and subtract:", c: ["The inflation rate (CPI)", "The risk-free rate", "The corporate tax rate", "The Beta of the portfolio"], a: 0, f: "Logic: 'Real' always means adjusted for inflation. It measures your true increase in purchasing power."},
            {q: "The 'Rule of 72' is a mathematical shortcut used to determine:", c: ["How many years it will take an investment to double in value at a given compound interest rate", "The maximum allowable withdrawal rate for a retirement portfolio", "The expected return of a stock based on its Beta", "The optimal asset allocation for a retiree"], a: 0, f: "Logic: Divide 72 by the annual interest rate to find the exact number of years it takes to double your money."},
            {q: "A 'Defensive' stock is characterized by its ability to:", c: ["Remain stable and maintain demand during economic recessions", "Outperform the market during periods of rapid expansion", "Provide massive capital gains during a bull market", "Move with a Beta significantly higher than 1.0"], a: 0, f: "Logic: Defensive stocks (Utilities, Food, Basic Medicine) have inelastic demand. People have to buy them regardless of how bad the economy gets."},
            {q: "Which of the following factors would cause a company's 'Working Capital' to DECREASE?", c: ["Paying a cash dividend to shareholders", "Selling long-term corporate bonds for cash", "Refinancing short-term debt into long-term debt", "Selling inventory at a substantial profit"], a: 0, f: "Logic: Working Capital = Current Assets - Current Liabilities. Paying a dividend drains cash (a current asset), which mathematically shrinks the working capital."},
            {q: "In an ERISA 'Defined Benefit' plan (a traditional pension), who bears the primary investment risk?", c: ["The Employer", "The Employee", "The Plan Administrator", "The federal government"], a: 0, f: "Logic: The employer guarantees a specific monthly payout for life. If the stock market crashes, the employer is legally forced to make up the shortfall."},
            {q: "An investor executes a 'Section 1031 Exchange' on an apartment building. To completely defer capital gains taxes, the investor must identify the replacement property within:", c: ["45 days of the sale", "180 days of the sale", "30 days of the sale", "90 days of the sale"], a: 0, f: "Logic: IRS rules require you to identify the target property within 45 days, and close the deal within 180 days."},
            {q: "Which of the following provides the most accurate definition of the 'Gross Domestic Product' (GDP)?", c: ["The total market value of all final goods and services produced within a country's borders in a given year", "The total value of all goods produced by a country's citizens, regardless of where they live", "The net value of all exports minus all imports", "The total sum of all retail sales in the domestic economy"], a: 0, f: "Logic: GDP is strictly geographic (within the borders). GNP (Gross National Product) tracks the citizens worldwide."},
            {q: "An investor with a deeply negative correlation (-0.85) between two assets in their portfolio has successfully executed a strategy to:", c: ["Maximize diversification and smooth out volatility", "Amplify their exposure to systemic market risk", "Guarantee a return higher than the risk-free rate", "Eliminate all taxation on capital gains"], a: 0, f: "Logic: Highly negative correlation means the assets zig when the other zags, which is the ultimate goal of diversification to reduce risk."},
            {q: "If an investor is executing an 'Arbitrage' strategy, they are attempting to:", c: ["Simultaneously buy and sell the same asset in different markets to capture a riskless profit from a price discrepancy", "Hedge a long stock position against a market crash", "Actively time the market by shifting between sectors", "Buy undervalued companies and hold them for long-term gains"], a: 0, f: "Logic: Arbitrage exploits momentary pricing errors, buying low on Exchange A and instantly selling high on Exchange B."},
            {q: "A 'Venture Capital' firm generally seeks to invest its capital in:", c: ["Early-stage, unproven start-ups with massive growth potential", "Mature, blue-chip corporations paying high dividends", "Municipal infrastructure projects", "Distressed, bankrupt corporations facing liquidation"], a: 0, f: "Logic: VC funds provide 'seed' money to brand new companies in exchange for an equity stake, accepting high risk for massive potential reward."},
            {q: "When comparing the arithmetic mean to the geometric mean of an investment's historical returns, the geometric mean will generally be:", c: ["Lower, because it accounts for the compounding drag of negative returns", "Higher, because it ignores volatility", "Identical, assuming the investment paid no dividends", "Higher, because it adjusts for the inflation rate"], a: 0, f: "Logic: The geometric mean uses multiplication (compounding) to show the true, real-world return of a dollar invested, which is almost always lower than the simple arithmetic average."},
            {q: "An investor who buys a 'Straddle' (buying both a call and a put on the same stock) is anticipating:", c: ["Extreme volatility in either direction", "A long period of flat, stable prices", "A massive, sustained bull market", "A slow, gradual decline in interest rates"], a: 0, f: "Logic: The investor doesn't care if the stock rockets up or crashes down, they just need it to move violently to cover the cost of buying two premiums."},
            {q: "Under the USA, a 'Solicitor' who receives cash compensation for referring clients to an Investment Adviser must generally:", c: ["Have a written agreement with the IA", "Register as a Broker-Dealer Agent", "Waive their right to act as a fiduciary", "Be an accredited investor"], a: 0, f: "Logic: There must be a clear paper trail and written disclosure to the client acknowledging the referral fee arrangement."},
            {q: "Which of the following is considered an 'Unsystematic' risk factor?", c: ["A massive accounting scandal at a specific corporation", "A sudden spike in the Federal Funds Rate", "A nationwide recession", "A declaration of war"], a: 0, f: "Logic: Unsystematic risk is localized to a single entity and can be diversified away. Systemic risk (interest rates, war, inflation) hits everything."},
            {q: "A mutual fund's 'Net Asset Value' (NAV) is mathematically calculated by taking the Total Assets, subtracting the Liabilities, and dividing by:", c: ["The number of outstanding shares", "The daily trading volume", "The number of shareholders", "The average price of the underlying portfolio"], a: 0, f: "Logic: NAV is the literal 'per share' liquidation value of the fund's portfolio at the close of the trading day."},
            {q: "Which of the following retirement accounts legally FORBIDS the owner from making any further contributions once they reach age 73?", c: ["Contributions are never forbidden based on age as long as there is earned income", "Traditional IRAs", "Roth IRAs", "SEP IRAs"], a: 0, f: "Logic: The SECURE Act eliminated the age cap. As long as you have 'earned income' (W-2 wages), you can contribute to an IRA at any age."},
            {q: "In an 'S-Corporation', the maximum number of allowable shareholders is strictly capped at:", c: ["100 shareholders", "Unlimited shareholders", "50 shareholders", "250 shareholders"], a: 0, f: "Logic: S-Corps are designed for small/family businesses. They cap owners at 100 and require them to be U.S. citizens or residents."},
            {q: "Which of the following trusts is explicitly designed to keep the death benefit payout of a life insurance policy out of the deceased's taxable estate?", c: ["Irrevocable Life Insurance Trust (ILIT)", "Testamentary Trust", "Revocable Living Trust", "Charitable Remainder Trust"], a: 0, f: "Logic: Because the ILIT owns the policy and cannot be altered by the insured, the insured has no 'incidents of ownership', shielding the payout from estate taxes."},
            {q: "An investor in the 37% tax bracket is holding a high-yield corporate bond in a taxable brokerage account. To improve tax efficiency, the adviser should recommend swapping it for:", c: ["A Municipal Bond", "A Treasury Bill", "A preferred stock", "A real estate investment trust (REIT)"], a: 0, f: "Logic: Municipal bonds are federally tax-free, which provides massive mathematical value to investors trapped in the highest tax brackets."},
            {q: "Which of the following corporate bonds would exhibit the highest 'Duration' (price volatility) when interest rates shift?", c: ["A 30-year Zero-Coupon Bond", "A 30-year 6% Coupon Bond", "A 10-year Zero-Coupon Bond", "A 10-year 6% Coupon Bond"], a: 0, f: "Logic: Duration measures how long it takes to get your money back. A zero-coupon bond pays nothing until the very end, meaning its duration is exactly equal to its maturity (highest volatility)."}
        ],
[ // PILLAR 4: REGULATIONS (HARDCODED DISTRACTORS)
            {q: "Under the Uniform Securities Act (USA), which of the following is specifically excluded from the definition of a Broker-Dealer?", c: ["A bank, savings institution, or trust company", "A firm with an office in the state that exclusively trades with retail clients", "An Investment Adviser Representative", "An agent executing exempt transactions"], a: 0, f: "Logic: Banks, trust companies, and savings institutions are explicitly excluded from the definition of a BD because they are already heavily regulated by banking authorities."},
            {q: "An individual represents an issuer in the sale of a security. Under the USA, this individual is NOT considered an 'Agent' if the security being sold is a:", c: ["U.S. Treasury Bond", "Share of a local tech startup", "Stock listed on the OTC Bulletin Board", "Registered mutual fund"], a: 0, f: "Logic: Individuals representing issuers are exempt from registering as agents if they are selling certain highly safe 'exempt securities,' such as U.S. government or municipal bonds."},
            {q: "Under the USA, a professional whose investment advice is strictly 'incidental' to their practice is excluded from the definition of an Investment Adviser. Which of the following professionals falls under this L.A.T.E. exclusion?", c: ["Lawyers and Accountants", "Insurance Agents and Real Estate Brokers", "Geologists and Appraisers", "Economists and Analysts"], a: 0, f: "Logic: The L.A.T.E. exclusion applies strictly to Lawyers, Accountants, Teachers, and Engineers who do not charge a separate fee for the advice."},
            {q: "To register as a 'Federal Covered Adviser' with the SEC, an investment adviser must generally possess a minimum Assets Under Management (AUM) of:", c: ["$110 million (mandatory)", "$100 million (mandatory)", "$50 million (mandatory)", "$25 million (mandatory)"], a: 0, f: "Logic: Advisers with $100M may choose to register with the SEC, but once they hit $110M, SEC registration becomes legally mandatory."},
            {q: "Under the USA, every application for registration as a Broker-Dealer or Investment Adviser must include a Consent to Service of Process. This document is:", c: ["Permanent and irrevocable", "Renewed annually on December 31st", "Valid for a period of three years", "Required only for out-of-state applicants"], a: 0, f: "Logic: The Consent to Service of Process allows the Administrator to receive legal papers on behalf of the registrant. It is submitted once and remains permanently in effect."},
            {q: "Unless the Administrator orders an earlier date, a state registration for a financial professional automatically becomes effective at noon on the:", c: ["30th day after filing the application", "45th day after filing the application", "15th day after filing the application", "60th day after filing the application"], a: 0, f: "Logic: If there are no issues or disciplinary actions pending, the USA dictates that registration automatically activates at noon on the 30th day."},
            {q: "When does the registration of an Agent, Broker-Dealer, Investment Adviser, or Investment Adviser Representative expire under the Uniform Securities Act?", c: ["Every year on December 31st", "Exactly one year from the date their registration became effective", "Every two years on the agent's birthday", "On the fiscal year-end of the employing firm"], a: 0, f: "Logic: State registrations do not run on anniversaries. Everyone's registration expires simultaneously at the end of the calendar year (Dec 31st) unless renewed."},
            {q: "Under the USA, the State Administrator can require a Broker-Dealer to maintain a minimum net capital. However, this state requirement cannot exceed the minimum capital requirements set by:", c: ["The Securities and Exchange Commission (SEC)", "The Federal Reserve Board", "The North American Securities Administrators Association (NASAA)", "The Financial Industry Regulatory Authority (FINRA)"], a: 0, f: "Logic: Federal law always trumps state law. A state Administrator cannot force a BD to hold more capital than the SEC requires under the Securities Exchange Act of 1934."},
            {q: "A state Administrator may require a 'Surety Bond' to be posted by an Investment Adviser if the adviser:", c: ["Exercises discretionary authority or maintains custody of client funds", "Manages more than $50 million in assets", "Executes trades on margin for retail clients", "Advises private funds or hedge funds"], a: 0, f: "Logic: Surety bonds act as insurance against fraud or theft. They are only required if the adviser has access to the client's money (custody) or the power to trade it without asking (discretion)."},
            {q: "Under the USA, an Investment Adviser that maintains custody of client assets must typically maintain a minimum net worth of:", c: ["$35,000", "$10,000", "$50,000", "$25,000"], a: 0, f: "Logic: The USA generally requires a $10,000 minimum net worth for discretion, and a higher $35,000 minimum net worth for custody."},
            {q: "How long must an Investment Adviser retain their books and records, including client communications and advertising, under federal and state rules?", c: ["5 years, with the first 2 years in the principal office", "3 years, with the first 2 years easily accessible", "7 years, with the first 3 years in the principal office", "10 years entirely in a secure off-site facility"], a: 0, f: "Logic: IAs must keep records for 5 years. (Broker-Dealers are only required to keep records for 3 years)."},
            {q: "According to the Supreme Court's 'Howey Test', which of the following is NOT a required element to legally classify an investment as a 'Security'?", c: ["A guaranteed rate of return", "An investment of money", "A common enterprise", "An expectation of profit derived from the efforts of others"], a: 0, f: "Logic: The Howey Test requires: 1) Investment of money, 2) Common enterprise, 3) Expectation of profit, 4) Derived solely from the efforts of others. Guarantees are not part of the test."},
            {q: "Which of the following is explicitly defined as NOT being a security under the Uniform Securities Act?", c: ["A fixed traditional life insurance policy", "A variable annuity contract", "A stock option contract", "A certificate of interest in a mining lease"], a: 0, f: "Logic: Any product with the word 'fixed' is strictly an insurance product. If the word 'variable' is used, the client assumes market risk, making it a security."},
            {q: "An 'Exempt Security' under the USA means the security is legally exempt from:", c: ["State registration and advertising filing requirements", "The anti-fraud provisions of the USA", "SEC registration and oversight", "FINRA reporting requirements"], a: 0, f: "Logic: Exempt securities (like municipal bonds) don't have to be registered with the state, but absolutely NOTHING is exempt from the anti-fraud rules."},
            {q: "Under the USA, which of the following is considered an Exempt Transaction?", c: ["An 'Isolated Non-Issuer Transaction'", "An Initial Public Offering (IPO) sold to retail clients", "A public sale of a corporate bond by the issuer", "The sale of a variable annuity by an agent"], a: 0, f: "Logic: An isolated non-issuer transaction is basically two private individuals trading a stock (like selling a car on Craigslist). Because the issuer doesn't benefit, the state doesn't force registration for the trade."},
            {q: "To qualify for the 'Private Placement' transaction exemption under the USA, an offer can be directed to no more than how many non-institutional (retail) persons during a 12-month period?", c: ["10 persons", "35 persons", "50 persons", "15 persons"], a: 0, f: "Logic: The USA limits private placements to 10 retail offerees in a 12-month period. (Do not confuse this with Federal Reg D, which allows 35 unaccredited investors)."},
            {q: "A new company is issuing stock across multiple states and registering with the SEC. To register in a specific state simultaneously, the issuer should use:", c: ["Registration by Coordination", "Registration by Qualification", "Registration by Notification", "Notice Filing"], a: 0, f: "Logic: Registration by Coordination is used when a security is registering with the SEC and the State at the exact same time, allowing both to become effective simultaneously."},
            {q: "If a local company is issuing stock ONLY within the borders of one single state (an intrastate offering), the mandatory method of state registration is:", c: ["Registration by Qualification", "Registration by Coordination", "Registration by Filing", "Notice Filing"], a: 0, f: "Logic: Qualification is the most difficult method and is used for intrastate offerings because the SEC is not involved to help vet the paperwork."},
            {q: "Under the USA, a State Administrator has the power to deny, suspend, or revoke a registration. However, they can only do so if it is in the public interest AND:", c: ["They have a specific 'Statutory Basis' (e.g., a felony conviction or rule violation)", "They have obtained a court order from a state judge", "They receive written approval from the SEC", "The registrant formally requests a hearing"], a: 0, f: "Logic: The Administrator cannot act arbitrarily. 'Public interest' alone is not enough; there must be a specific legal violation (statutory basis) backing the decision."},
            {q: "A State Administrator wishes to investigate a Broker-Dealer. The Administrator's subpoena power:", c: ["Can cross state lines to gather evidence and compel testimony", "Is limited strictly to the borders of their own state", "Requires a federal judge's approval to cross state lines", "Cannot compel written testimony"], a: 0, f: "Logic: Administrators have massive investigatory powers that are not restricted by state lines, allowing them to pursue fraud anywhere."},
            {q: "Under the USA, the maximum criminal penalty for a person who willfully violates the Act is:", c: ["A $5,000 fine and up to 3 years in prison", "A $10,000 fine and up to 5 years in prison", "A $1,000 fine and up to 1 year in prison", "A $50,000 fine and up to 10 years in prison"], a: 0, f: "Logic: State criminal penalties (USA) max out at $5k and 3 years. Federal criminal penalties (SEC/1940 Act) max out at $10k and 5 years."},
            {q: "If an agent accidentally sells an unregistered security to a client, the broker-dealer can avoid a civil lawsuit by offering to buy the security back. This offer is known as a:", c: ["Letter of Rescission", "Consent to Service of Process", "Cease and Desist Order", "Defeasance Letter"], a: 0, f: "Logic: The Right of Rescission allows the firm to buy back the illegal trade at the original price plus interest. The client has 30 days to accept or reject the offer."},
            {q: "What is the Statute of Limitations for a client to file a civil lawsuit against an adviser under the Uniform Securities Act?", c: ["3 years from the date of the violation, or 2 years from discovery, whichever comes first", "5 years from the date of the violation, or 3 years from discovery", "2 years from the date of the violation, or 1 year from discovery", "10 years from the date of the violation"], a: 0, f: "Logic: Under state law, clients must sue quickly. They have 2 years from the moment they realize they were defrauded, but no more than 3 years from the actual date the trade occurred."},
            {q: "Under the Investment Advisers Act of 1940, performance-based fees (taking a percentage of capital gains) are generally prohibited, EXCEPT when charging:", c: ["A 'Qualified Client' with at least $1.1M under management or a $2.2M net worth", "Any client who signs a written waiver", "Accredited investors with an annual income of $200,000", "Institutional clients only"], a: 0, f: "Logic: Performance fees encourage high-risk gambling with the client's money. Therefore, the SEC only allows them for incredibly wealthy 'Qualified Clients' who can afford to lose."},
            {q: "An Investment Adviser is considered to have 'Custody' of client assets if they:", c: ["Have the authority to withdraw funds directly from the client's account to pay their advisory fees", "Have discretionary trading authority over the account", "Hold stock certificates temporarily for 24 hours before returning them", "Execute an agency cross transaction"], a: 0, f: "Logic: Discretion just means you can trade the stocks. Custody means you can actually touch or move the physical money (including automatically deducting your own fees)."},
            {q: "If an Investment Adviser has custody of client funds, they are legally required to provide the client with an itemized account statement at least:", c: ["Quarterly", "Annually", "Monthly", "Semi-annually"], a: 0, f: "Logic: If you hold the client's money, you must prove it's still there by sending them a statement at least once every three months (quarterly)."},
            {q: "When an Investment Adviser executes an 'Agency Cross Transaction', they act as the broker for both the buyer and the seller. This is legally permitted ONLY IF:", c: ["The adviser does not recommend the trade to both parties, and gets written consent beforehand", "The adviser waives all commissions on the trade", "The trade is executed exclusively for institutional clients", "The SEC explicitly approves the transaction in writing"], a: 0, f: "Logic: You cannot advise two clients to trade with each other to double-dip on commissions. One side must have initiated the trade unprompted, and written consent is required."},
            {q: "An Investment Adviser wishes to use a testimonial in an advertisement. Under current SEC rules, this is:", c: ["Permitted, provided the adviser discloses if the person was compensated and if they are a current client", "Strictly prohibited under all circumstances", "Allowed only if the testimonial is from an institutional client", "Permitted without any disclosures if the client was not paid"], a: 0, f: "Logic: The SEC modernized its marketing rules. Testimonials are now allowed, but they require massive disclosures to ensure the public knows if the review was paid for."},
            {q: "A broker-dealer heavily promotes a specific stock to their clients, knowing that the firm itself holds a massive amount of that stock in its own inventory. This is a potential violation unless the firm discloses it is acting in a:", c: ["Principal capacity", "Fiduciary capacity", "Agency capacity", "Market Maker capacity"], a: 0, f: "Logic: If the firm is selling you a stock from its own shelves to make a profit (acting as a Principal), they must disclose that massive conflict of interest on your trade confirmation."},
            {q: "According to NASAA rules, which of the following is considered an unethical business practice for an Agent?", c: ["Guaranteeing a client against a loss using the agent's personal funds", "Executing a trade in a margin account before receiving the signed margin agreement", "Executing an unsolicited order for an unregistered security", "Charging a reasonable markup on a principal trade"], a: 0, f: "Logic: Margin agreements can legally be signed promptly *after* the first trade. However, guaranteeing a client against a market loss is explicitly and universally illegal in all circumstances."},
            {q: "According to NASAA Model Rules, under which of the following circumstances may an Investment Adviser Representative (IAR) borrow money from a client?", c: ["Only if the client is a bank, broker-dealer, or an affiliate of the investment adviser", "Only if the client is a close family member and signs a written promissory note", "If the client is an accredited investor", "Under no circumstances whatsoever"], a: 0, f: "Logic: You can never borrow from a retail client, not even your own mother. You may only borrow from a client if they are in the business of lending money (a bank) or are affiliated with your firm."},
            {q: "An agent of a broker-dealer wishes to share in the profits and losses of a customer's account. This is legally permitted ONLY IF:", c: ["The agent has written authorization from both the customer and the employing broker-dealer, and shares strictly in proportion to their own financial contribution", "The agent is an Investment Adviser Representative acting in a fiduciary capacity", "The client verbally agrees and the agent assumes all the losses", "The agent shares disproportionately to protect the client"], a: 0, f: "Logic: Agents can share in accounts if they have permission and put their own money in. Investment Advisers and IARs are NEVER allowed to share in a client's account under any circumstances."},
            {q: "If an agent executes a securities transaction for a client outside the normal jurisdiction and books of their employing broker-dealer without prior written authorization, they have committed an illegal practice known as:", c: ["Selling away", "Front running", "Churning", "Shadowing"], a: 0, f: "Logic: 'Selling away' (or conducting private securities transactions) is strictly prohibited. All trades must be run through the employing firm so they can be properly supervised."},
            {q: "A broker-dealer holds a massive block of XYZ stock in its own inventory. The firm issues a highly favorable research report on XYZ, causing the stock price to surge, and then immediately sells its inventory at a massive profit. This unethical practice is known as:", c: ["Scalping (or Front Running)", "Painting the tape", "Wash selling", "Matching orders"], a: 0, f: "Logic: Scalping (or front running) involves a firm or adviser taking a position in a security, hyping it up to the public, and then selling it immediately after the public buying drives the price up."},
            {q: "Which market manipulation tactic involves two conspirators rapidly buying and selling the same stock back and forth to each other to create the false illusion of massive trading volume?", c: ["Matched orders (Painting the tape)", "Front running", "Arbitrage", "Straddling"], a: 0, f: "Logic: Matched orders create fake activity on the ticker tape to trick other investors into thinking the stock is 'hot', driving up the price."},
            {q: "Under the Section 28(e) Safe Harbor provisions, an investment adviser may legally use client brokerage commissions ('soft dollars') to pay for which of the following?", c: ["Financial research reports and analytical software", "Office rent, travel expenses, and computer hardware", "Salaries of the firm's administrative staff", "Marketing and advertising campaigns"], a: 0, f: "Logic: Soft dollars can only be used to purchase things that directly benefit the *client's* investment decision-making process (like research). They cannot be used for the firm's overhead expenses."},
            {q: "Under the Bank Secrecy Act (BSA), a financial institution must file a Currency Transaction Report (CTR) for a cash transaction that exceeds:", c: ["$10,000", "$5,000", "$25,000", "$50,000"], a: 0, f: "Logic: CTRs are filed for physical cash transactions exceeding $10,000 in a single day. Suspicious Activity Reports (SARs) are filed for suspicious transactions of $5,000 or more."},
            {q: "Money laundering generally occurs in three distinct phases. The phase where the launderer executes complex financial transactions to obscure the source of the funds is called:", c: ["Layering", "Placement", "Integration", "Structuring"], a: 0, f: "Logic: 1) Placement (getting cash into the bank), 2) Layering (moving it around to hide the trail), 3) Integration (buying legit assets like real estate with the clean money)."},
            {q: "If an individual is found guilty of civil insider trading under the Securities Exchange Act of 1934, the maximum civil penalty the SEC can impose is:", c: ["Treble damages (up to 3 times the profit gained or loss avoided)", "A flat fine of $1,000,000", "Return of the exact profits only", "A fine of $5,000,000"], a: 0, f: "Logic: Civil penalties for insider trading allow the SEC to sue for 'treble damages'—three times the amount of money the person illegally made (or saved)."},
            {q: "The maximum CRIMINAL penalty for an individual who willfully violates the insider trading laws of the Securities Exchange Act of 1934 is:", c: ["$5,000,000 and 20 years in prison", "$10,000 and 5 years in prison", "$1,000,000 and 10 years in prison", "$5,000 and 3 years in prison"], a: 0, f: "Logic: Do not confuse state and federal penalties. Federal criminal penalties for individuals under the 1934 Act are massive: up to $5M and 20 years behind bars."},
            {q: "Under SEC Regulation S-P, a financial institution must provide customers with a reasonable means to 'opt out' of having their non-public personal information shared with non-affiliated third parties. Which of the following is NOT a 'reasonable means'?", c: ["Requiring the customer to write a formal letter and send it via certified mail", "Providing a toll-free phone number", "Including a check-off box on a response form", "Providing an electronic link to an opt-out page"], a: 0, f: "Logic: The opt-out method must be incredibly easy for the client. Forcing them to write a physical letter is considered unreasonable and non-compliant."},
            {q: "Under the SEC Pay-to-Play rule, if an Investment Adviser makes a political contribution to a candidate who can influence the hiring of the adviser, the adviser is banned from receiving compensation from that government entity for:", c: ["2 years", "1 year", "5 years", "3 years"], a: 0, f: "Logic: The timeout period for violating the pay-to-play rule is 2 years (24 months) where the adviser must work for free if they manage that municipality's money."},
            {q: "The 'De Minimis' exception to the SEC Pay-to-Play rule allows an adviser to contribute how much per election to a candidate they are legally entitled to vote for?", c: ["$350", "$150", "$250", "$500"], a: 0, f: "Logic: You can give $350 if you can vote for the candidate (e.g., your local mayor). You can only give $150 if you cannot vote for them (e.g., the mayor of a different city)."},
            {q: "An Investment Adviser inadvertently receives a check from a client made payable directly to the IA. To avoid being legally deemed to have 'custody' of those funds, the IA must return the check to the client within:", c: ["3 business days", "7 business days", "24 hours", "5 business days"], a: 0, f: "Logic: Inadvertent receipt of client funds must be returned within 3 business days, or the IA must immediately comply with all the strict rules of maintaining legal custody."},
            {q: "Under NASAA rules, an Investment Adviser may execute discretionary trades based on a client's ORAL permission for a maximum of:", c: ["10 business days after the first discretionary trade", "Never; written permission is required before the first trade", "30 days after opening the account", "5 business days after the first discretionary trade"], a: 0, f: "Logic: Investment Advisers get a 10-day grace period for oral discretion. Broker-Dealer Agents DO NOT; agents must have written authorization before executing the very first discretionary trade."},
            {q: "According to the Investment Advisers Act of 1940, the 'Brochure Rule' requires an adviser to deliver their Form ADV Part 2A (or equivalent brochure) to a new client:", c: ["At least 48 hours prior to signing the contract, or at the time of signing if the client has a 5-day penalty-free window to cancel", "Within 30 days of the end of the calendar year", "Prior to the execution of the very first trade", "Within 72 hours of the client signing the agreement"], a: 0, f: "Logic: The rule ensures the client has time to read about the adviser's fees and conflicts before being permanently locked into a contract."},
            {q: "If a client enrolls in a 'Wrap Fee Program' (where trading and advisory fees are bundled into one flat rate), the adviser must provide the client with a specific disclosure document known as:", c: ["Schedule H (or the Form ADV Part 2A Appendix 1)", "Schedule 13D", "Form 8-K", "Form ADV-E"], a: 0, f: "Logic: Wrap fee programs require a specialized brochure that explicitly explains that the client might actually pay more in a wrap program if they trade very infrequently."},
            {q: "Under the modernized SEC Marketing Rule, an Investment Adviser using 'Hypothetical Performance' in an advertisement must:", c: ["Ensure the hypothetical performance is relevant to the likely financial situation of the intended audience", "Never use hypothetical performance under any circumstances", "Send the advertisement to the general public via social media", "Guarantee the hypothetical returns mathematically"], a: 0, f: "Logic: You can use hypothetical numbers, but you cannot blast them to the general public. They must be targeted to an audience that has the financial knowledge to understand they are fake numbers."},
            {q: "A broker-dealer executes an excessive number of trades in a client's discretionary account strictly to generate massive commission revenue for the firm. This illegal practice is called:", c: ["Churning", "Commingling", "Freeriding", "Selling away"], a: 0, f: "Logic: Churning is the unethical practice of over-trading an account solely to line the broker's pockets, disregarding the client's actual investment objectives."},
            {q: "Under NASAA rules, which of the following is considered 'Commingling'?", c: ["A broker-dealer storing client securities in the exact same physical vault as the firm's own corporate securities", "A broker-dealer combining the cash of multiple different retail clients into a single omnibus account", "An agent combining multiple unsolicited orders into one block trade", "An adviser executing an agency cross transaction"], a: 0, f: "Logic: Commingling is the illegal mixing of CLIENT securities with the FIRM'S securities. Firms can mix client cash together, but they can never mix their own assets with client assets."},
            {q: "If an Investment Adviser Representative (IAR) also holds a license as a real estate agent and plans to sell property to their advisory clients, they must:", c: ["Disclose this massive conflict of interest to the client in writing", "Surrender their real estate license immediately", "Execute the real estate transactions entirely for free", "Register as a Broker-Dealer Agent"], a: 0, f: "Logic: Acting in dual capacities (selling advice and then selling the product) creates a massive conflict of interest. Fiduciaries aren't banned from doing it, but they must fully disclose it."},
            {q: "An Investment Adviser decides to direct all of its client trades to a specific broker-dealer because that broker-dealer provides the IA with free office space. This arrangement is:", c: ["A blatant conflict of interest and a violation of fiduciary duty", "Permitted under the Section 28(e) Safe Harbor", "Legal, provided the client receives a discount on commissions", "Standard industry practice and fully compliant"], a: 0, f: "Logic: Soft dollars can only be used for research that helps the client. Using client commissions to get free office rent only benefits the IA, making it highly illegal."},
            {q: "Under state and federal law, a financial professional's legal obligation to act with undivided loyalty and put the client's interests entirely above their own is known as:", c: ["Fiduciary Duty", "The Suitability Standard", "The Prudent Man Rule", "Best Execution"], a: 0, f: "Logic: Agents follow the lower 'Suitability Standard' (the product must just be okay for the client). Investment Advisers must follow the strict 'Fiduciary Duty' (it must be the absolute best thing for the client)."},
            {q: "An agent receives a tip from an insider that a local pharmaceutical company's new drug just failed its FDA trial. The news will not be public until tomorrow. The agent immediately shorts the stock. This is a violation of:", c: ["The Insider Trading and Securities Fraud Enforcement Act of 1988", "The Securities Act of 1933", "The Investment Company Act of 1940", "The Uniform Prudent Investor Act"], a: 0, f: "Logic: Trading on Material, Non-Public Information (MNPI) is the textbook definition of insider trading under the 1988 Act and the 1934 Act."},
            {q: "A broker-dealer receives a written complaint from a furious client regarding a specific agent's behavior. Under NASAA rules, the broker-dealer must:", c: ["Keep a record of the complaint for 3 years", "Forward the complaint to the SEC within 10 days", "Fire the agent immediately", "Suspend the agent's registration until a hearing is held"], a: 0, f: "Logic: Written complaints must be recorded and kept on file by the broker-dealer for a minimum of 3 years (the first 2 years in a readily accessible location)."},
            {q: "If a client calls their agent and demands they execute a trade that the agent knows is completely unsuitable and extremely risky for the client's profile, the agent should:", c: ["Inform the client of the risks, and if the client insists, execute the trade and document it as 'unsolicited'", "Refuse to execute the trade under any circumstances", "Require the client to sign a full waiver of liability before trading", "Contact the State Administrator for permission to trade"], a: 0, f: "Logic: Agents cannot refuse a direct order just because it is a bad idea. They must warn the client, execute the trade, and mark the ticket 'unsolicited' to protect the firm from liability."},
            {q: "Under the Uniform Securities Act, an Administrator may require a registered broker-dealer to file financial reports:", c: ["As frequently as the Administrator strictly dictates, usually quarterly or annually", "Daily", "Weekly", "Only when requested by the SEC"], a: 0, f: "Logic: The Administrator has the authority to dictate the frequency of financial reporting to ensure the firm maintains its required net capital."},
            {q: "An Investment Adviser charges a client a 2% management fee, but the IA also receives a 12b-1 fee from the mutual funds they place the client in. This practice is:", c: ["Legal, provided the IA fully discloses this dual-compensation conflict of interest in writing", "Illegal under the Investment Company Act of 1940", "Permitted without disclosure because mutual funds are exempt securities", "Only allowed for SEC-registered Federal Covered Advisers"], a: 0, f: "Logic: 'Double dipping' is not inherently illegal, but because it heavily incentivizes the IA to pick funds that pay them kickbacks, it must be completely disclosed in the Form ADV."},
            {q: "Which of the following is NOT considered 'Material, Non-Public Information' (MNPI)?", c: ["A rumor heard on a financial television network about an upcoming merger", "The unreleased quarterly earnings report of a Fortune 500 company", "Confidential FDA trial results provided by a corporate insider", "Notice of an impending, unannounced CEO resignation"], a: 0, f: "Logic: Rumors on TV are public information. To be MNPI, it must be factual, financially significant, and completely unavailable to the general public."},
            {q: "An agent receives a check from a client made payable directly to the broker-dealer. The agent should:", c: ["Promptly forward the check to the broker-dealer's cashiering or processing department", "Immediately deposit it into the agent's personal account and electronically transfer it to the firm", "Hold the check in a secure lockbox until the trade settles", "Return the check to the client and demand a wire transfer"], a: 0, f: "Logic: Agents can never touch the money or mix it with their own funds. Checks made out to the firm must be immediately turned over to the firm for processing."},
            {q: "Under the Uniform Securities Act (USA), a financial publication is excluded from the definition of an Investment Adviser if it:", c: ["Is published on a regular, routine schedule and offers general advice", "Is published sporadically in response to specific market events", "Offers customized portfolios to its premium subscribers", "Provides market-timing text message alerts"], a: 0, f: "Logic: To qualify for the publisher's exclusion, the publication must be general in nature (not tailored to specific clients) and published on a regular, routine schedule, regardless of market news."},
            {q: "If a registered Broker-Dealer is bought out and a successor firm takes over, the successor firm must file a new application. What is the fee requirement for the successor firm?", c: ["The filing fee is waived until the next annual renewal date (December 31st)", "They must pay a full registration fee immediately", "They must pay a prorated fee based on the remaining months in the year", "They are permanently exempt from filing fees"], a: 0, f: "Logic: The USA encourages smooth transitions. The successor firm must file the paperwork so the state knows who is in charge, but they do not have to pay the fee again until the end of the year."},
            {q: "An Investment Adviser Representative (IAR) resigns from a Federal Covered Adviser. Who is legally responsible for notifying the State Administrator?", c: ["Only the IAR", "Both the IAR and the Federal Covered Adviser", "Only the Federal Covered Adviser", "The SEC automatically notifies the state"], a: 0, f: "Logic: Because the Federal Covered firm reports strictly to the SEC, they don't talk to the state. Therefore, it is solely the IAR's responsibility to notify the state that they quit."},
            {q: "An Investment Adviser Representative (IAR) resigns from a State-Registered Adviser and goes to work for a different State-Registered Adviser. Who notifies the State Administrator?", c: ["The IAR, the old firm, and the new firm", "Only the old firm", "Only the new firm", "Only the IAR"], a: 0, f: "Logic: At the state level, everybody talks. The old firm says you left, the new firm says you arrived, and you confirm both. All three must notify the Administrator."},
            {q: "Under the USA, a gift of 'Assessable Stock' is legally defined as an:", c: ["Offer and a Sale", "Exempt Transaction", "Excluded Transaction", "Unsolicited Order"], a: 0, f: "Logic: Assessable stock allows the issuing company to demand more money from the shareholder later. Because gifting it essentially gives the recipient a potential financial liability, the regulators classify the 'gift' as a formal sale."},
            {q: "Which of the following transactions is explicitly EXEMPT from state registration under the USA?", c: ["A transaction executed by a bona fide pledgee, executor, or sheriff", "An Initial Public Offering (IPO) of a micro-cap company", "A private placement sold to 50 retail investors", "A sale of a corporate bond by the issuer to the public"], a: 0, f: "Logic: Fiduciary transactions (like a sheriff's sale, bankruptcy trustee, or executor of an estate liquidating assets) are exempt because they are court-mandated or legally necessary, not standard capital-raising events."},
            {q: "A State Administrator has the power to issue a 'Cease and Desist' order against a registered agent. The Administrator may issue this order:", c: ["With or without a prior hearing", "Only after a formal hearing has taken place", "Only with the approval of a federal judge", "After providing 30 days written notice"], a: 0, f: "Logic: Administrators can issue cease and desist orders summarily (immediately) without a hearing if they believe the public is in imminent danger. A hearing must be granted *afterward* if requested."},
            {q: "Under the USA, an Investment Advisory contract MUST:", c: ["Be in writing", "Allow for the assignment of the contract without client consent", "Guarantee a minimum rate of return", "Include a performance-based fee structure"], a: 0, f: "Logic: While the federal Investment Advisers Act of 1940 technically allows oral contracts, the state-level USA strictly requires all advisory contracts to be in writing."},
            {q: "An Investment Adviser includes an 'Exculpatory Clause' (a hedge clause) in their client contract, which forces the client to waive their right to sue the adviser for USA violations. This clause is:", c: ["Null, void, and completely unenforceable", "Permitted if the client is highly accredited", "Legal, provided the client signs it voluntarily", "Enforceable only in binding arbitration"], a: 0, f: "Logic: You cannot force a client to sign away their legal rights. Any clause that attempts to absolve the adviser of their fiduciary or legal liability is void."},
            {q: "An Investment Adviser must offer to deliver a free, updated copy of their Form ADV Part 2A (Brochure) to all clients:", c: ["Within 120 days of the end of the adviser's fiscal year", "Within 90 days of the end of the calendar year", "Within 30 days of the end of the adviser's fiscal year", "Within 60 days of the end of the calendar year"], a: 0, f: "Logic: Advisers must officially update their ADV within 90 days of their fiscal year-end, and they have an additional 30 days (120 days total) to deliver it or offer it to their clients."},
            {q: "When a broker-dealer agent sells a security to a client, which of the following details must be disclosed on the trade confirmation?", c: ["Whether the firm acted in an agency or principal capacity", "The exact time the trade was executed down to the millisecond", "The client's total net worth and tax bracket", "The agent's home address and personal phone number"], a: 0, f: "Logic: The client must know if the firm acted as a middleman (Agency) and charged a commission, or if they sold the stock out of their own inventory (Principal) and charged a markup."},
            {q: "Under the Section 28(e) Safe Harbor, an Investment Adviser may legally use client 'Soft Dollars' to pay a broker-dealer for:", c: ["Access to a Bloomberg terminal and financial modeling software", "Travel and hotel expenses to attend a financial research seminar", "The purchase of new office furniture", "Bonuses for the firm's administrative assistants"], a: 0, f: "Logic: Soft dollars can only be used for research and software that directly aids in making investment decisions. Tangible overhead like rent, travel, computers, and salaries are strictly prohibited."},
            {q: "An individual representing an issuer is trying to sell short-term corporate promissory notes (commercial paper). To qualify as an exempt security under the USA, the paper must have a maximum maturity of 270 days and be issued in minimum denominations of:", c: ["$50,000", "$100,000", "$10,000", "$25,000"], a: 0, f: "Logic: Commercial paper is exempt from state registration if it matures in 9 months (270 days) or less, is rated in the top three categories, and is issued in minimum blocks of $50,000."},
            {q: "If an Investment Adviser discovers their net worth has fallen below the minimum required by the State Administrator, they must notify the Administrator by:", c: ["The close of business on the next business day", "Within 5 business days", "Within 30 days of the deficiency", "Immediately on the same business day"], a: 0, f: "Logic: Financial distress must be reported immediately. The IA must notify the state by the close of business tomorrow, and file a detailed financial report the day after that."},
            {q: "An Investment Adviser is advertising a proprietary technical charting system. The advertisement MUST disclose:", c: ["The limitations and difficulties of actually using the system", "The exact underlying algorithms used in the system", "A guarantee of the minimum expected profits", "The personal financial statements of the system's creator"], a: 0, f: "Logic: You can advertise charting systems, but you cannot claim they are foolproof. You must prominently disclose that no system can guarantee profits and they are difficult to use."},
            {q: "If an Investment Adviser receives a check from a client that is made payable to a third party (like a clearing firm or custodian), the adviser must forward that check within:", c: ["3 business days", "24 hours", "7 business days", "10 business days"], a: 0, f: "Logic: If the check is written to a third party, the IA doesn't technically have custody, BUT they must forward it to that third party within 3 business days to avoid triggering custody rules."},
            {q: "An offer to sell a security is made via a television broadcast originating in State A, and the broadcast is seen by a resident in State B. Under the USA, which State Administrator has jurisdiction over the offer?", c: ["Only State A", "Both State A and State B", "Only State B", "The Federal Communications Commission (FCC)"], a: 0, f: "Logic: A radio or television broadcast is only considered an offer in the state where the broadcast camera/microphone is located (State A). It is not an offer in any state where it is merely received/viewed."},
            {q: "An agent sends an email from their office in State A to a client in State B. The client accepts the offer while on vacation in State C. Which Administrators have jurisdiction over this transaction?", c: ["States A, B, and C", "Only State A and State C", "Only State B", "Only State A"], a: 0, f: "Logic: Jurisdiction applies to the state where the offer originated (A), the state it was directed to (B), and the state where it was ultimately accepted (C). All three Administrators have authority."},
            {q: "A broker-dealer heavily recommends the exact same proprietary mutual fund to every single client, regardless of their age, income, or risk tolerance. This is an unethical practice known as a:", c: ["Blanket recommendation", "Selling dividends", "Matched order", "Wash sale"], a: 0, f: "Logic: Blanket recommendations blatantly violate the suitability standard. An agent must evaluate the specific financial situation of each client before making a recommendation."},
            {q: "Which of the following is considered an unethical practice for a broker-dealer agent but is perfectly legal for an Investment Adviser?", c: ["Exercising discretionary trading power based purely on oral authorization for up to 10 days", "Charging a performance-based fee to a retail client", "Executing an agency cross transaction without disclosure", "Borrowing money from a retail client"], a: 0, f: "Logic: IAs get a 10-day grace period to use oral discretion before getting the written paperwork. Agents of broker-dealers MUST have the written paperwork in hand before the very first trade."},
            {q: "Under the USA, the term 'Issuer' refers to any person who issues or proposes to issue a security. However, in the case of Certificates of Deposit (CDs) or voting trust certificates, the issuer is the:", c: ["The person performing the acts and assuming the duties of the depositor or manager", "The broker-dealer selling the certificates", "The State Administrator", "The underlying corporate bondholders"], a: 0, f: "Logic: For trusts and equipment trust certificates where there is no board of directors, the 'issuer' is legally defined as the manager or depositor controlling the assets."},
            {q: "In a 'Non-Issuer Transaction', the primary benefit and proceeds of the sale go to:", c: ["The selling shareholder", "The company that originally issued the shares", "The executing broker-dealer", "The State Administrator"], a: 0, f: "Logic: A non-issuer transaction is just a secondary market trade. If you sell your Apple stock on the NYSE, the money goes to you (the shareholder), not to Apple."},
            {q: "A client opens a margin account. The agent executes the first trade on margin before the client has physically signed the margin agreement. Under NASAA rules, this action is:", c: ["Permitted, provided the margin agreement is signed and returned promptly after the initial transaction", "Strictly prohibited", "Allowed only if the client is an accredited investor", "Permitted only for Federal Covered Advisers"], a: 0, f: "Logic: Unlike discretionary authority which requires a signature *before* the trade, margin agreements can legally be signed promptly *after* the first margin trade is executed."},
            {q: "Under the USA, a 'Security' does NOT include:", c: ["A fixed, whole life insurance policy", "An uncollateralized promissory note", "A variable annuity contract", "A stock option"], a: 0, f: "Logic: Fixed insurance products (whole life, fixed annuities) are not securities. Promissory notes (debt) absolutely are securities."},
