            {q: "Under the USA, if an applicant for registration as an Agent has a history of financial irresponsibility, the Administrator may:", c: ["Require the agent to post a surety bond", "Deny the registration based solely on the applicant's lack of experience"], a: 0, f: "Logic: Administrators can require broker-dealers, investment advisers, and agents to post surety bonds if they have custody, discretion, or a questionable financial history. (They cannot deny registration *solely* for lack of experience)."},
            {q: "Which of the following actions by an Investment Adviser constitutes illegal 'Custody' under NASAA rules?", c: ["Receiving a check made payable to the IA and returning it to the client within 3 business days", "Holding a client's login credentials to actively manage their account within their employer's 401(k) portal"], a: 1, f: "Logic: Having the client's personal username and password gives the IA the ability to completely take over the account and theoretically withdraw funds, which regulators strictly define as having custody."},
            {q: "Under SEC rules, an Investment Adviser must retain corporate formation documents (like articles of incorporation and partnership agreements) for how long?", c: ["5 years after the end of the fiscal year in which they were created", "For at least 3 years after the termination of the enterprise"], a: 1, f: "Logic: While most IA records are kept for 5 years, foundational corporate documents must be kept for the entire life of the firm, PLUS 3 years after the firm shuts down."},
            {q: "A broker-dealer places a 'Not Held' order for a client. This means the client has given the agent the authority to:", c: ["Choose the specific security to purchase, provided it is suitable", "Choose the specific time and price of execution for a specific security"], a: 1, f: "Logic: A 'Not Held' order leaves the Time and Price up to the agent. Because the client specified the Asset, Action, and Amount, it is NOT a discretionary trade."},
            {q: "Under the Securities Exchange Act of 1934, 'Insiders' are defined as corporate officers, directors, and any shareholder who owns more than:", c: ["5% of the company's outstanding shares", "10% of the company's outstanding shares"], a: 1, f: "Logic: 10% ownership makes you a legal insider, subjecting you to strict SEC reporting rules and preventing you from taking short-swing profits."},
            {q: "Which of the following is considered an unethical 'Sales Practice' violation by an agent?", c: ["Highlighting the most important risk disclosures in a mutual fund prospectus", "Sharing in the profits of a customer's account with the written approval of the customer and the firm"], a: 0, f: "Logic: You can NEVER alter, summarize, underline, or highlight a prospectus. It is a legal document that must be delivered to the client exactly as it was printed."},
            {q: "According to the USA, an Administrator has the authority to:", c: ["Amend or rewrite the text of the Uniform Securities Act to better suit their state", "Issue rules, forms, and orders necessary to carry out the provisions of the Act"], a: 1, f: "Logic: The Administrator enforces the law; they don't write it. Only the state legislature can rewrite the actual statute, but the Administrator can issue specific rules to enforce it."},
            {q: "If a registered Investment Adviser files for bankruptcy, the firm must:", c: ["Promptly notify the Administrator and update their Form ADV", "Automatically liquidate all client assets and return the cash within 30 days"], a: 0, f: "Logic: Financial impairment (like bankruptcy) is a massive material change. The IA must immediately update their ADV to warn current and prospective clients that the firm is going under."},
            {q: "A client gives their agent verbal instructions: 'Sell my 500 shares of XYZ stock if the price drops to $40.' This order is:", c: ["A standard Stop Order, which is perfectly legal to accept verbally", "An illegal oral discretionary order"], a: 0, f: "Logic: The client specified the Asset (XYZ), Action (Sell), and Amount (500), and gave a specific trigger price. This is a standard order, not discretion, so verbal authorization is fine."},
            {q: "Under the USA, an 'Offer to Sell' is made when an agent:", c: ["Actually exchanges the security for the client's money", "Attempts to dispose of a security for value, or solicits an offer to buy"], a: 1, f: "Logic: A 'Sale' is the actual transaction. An 'Offer' is any attempt to make the transaction happen, including hyping the stock or asking if the client wants to buy it."},
            {q: "If an Investment Adviser Representative (IAR) is heavily promoting a specific stock to clients, and the IAR's spouse owns a massive position in that exact same stock, the IAR must:", c: ["Disclose the spouse's position to clients, as it is a material conflict of interest", "Transfer the spouse's shares to a blind trust immediately"], a: 0, f: "Logic: The financial interests of an immediate family member are treated as the IAR's own interests. Because a surge in the stock would enrich the IAR's household, it's a conflict of interest that must be disclosed."},
            {q: "According to NASAA rules, a broker-dealer is permitted to charge a client a fee for which of the following services?", c: ["Executing a trade (Commission) and storing the physical stock certificates (Safekeeping fee)", "Guaranteeing the client against a loss in a highly volatile IPO"], a: 0, f: "Logic: Broker-dealers can charge for standard services like execution, custody, safekeeping, and appraisals. They can NEVER charge a fee to guarantee a client against a loss."},
            {q: "To register a security via 'Registration by Qualification', the registration becomes effective:", c: ["Simultaneously with the SEC registration", "Only when the State Administrator explicitly orders it to become effective"], a: 1, f: "Logic: Qualification is the hardest method (used for intrastate offerings). There is no automatic timeline. The state has to physically review every document, and it only goes live when the Administrator says so."},
            {q: "Under the Uniform Securities Act, if a financial professional commits a fraudulent act while selling a security, they can be prosecuted:", c: ["Even if the security itself is legally exempt from registration", "Only if the security was required to be registered in that state"], a: 0, f: "Logic: Exemption from registration is NOT an exemption from fraud. The anti-fraud rules of the USA apply to absolutely every transaction, regardless of what is being sold."},
            {q: "Which of the following professionals is definitively acting as an Investment Adviser Representative (IAR)?", c: ["A managing partner of an advisory firm who supervises the employees that give investment advice", "A clerical employee who files the firm's client trade confirmations"], a: 0, f: "Logic: The definition of an IAR includes anyone who gives advice, manages accounts, solicits clients, or *supervises* the people who do those things. Clerical and administrative staff are excluded."},
            {q: "Under the USA, an agent is permitted to split their commissions with another individual ONLY IF:", c: ["The other individual is also a registered agent working for the same broker-dealer (or an affiliated broker-dealer)", "The other individual is a registered Investment Adviser who referred the client"], a: 0, f: "Logic: Commission splitting is heavily restricted. You can only split a commission with a fellow agent who works for your exact firm (or a firm under the exact same corporate umbrella)."},
            {q: "A prominent tech CEO knowingly lies on television about a massive new government contract, causing the stock price to skyrocket. They then sell their shares at the inflated price. This violates the anti-fraud provisions of:", c: ["Only the Securities Exchange Act of 1934", "Both the federal Securities Exchange Act of 1934 and the state Uniform Securities Act"], a: 1, f: "Logic: Fraud is illegal everywhere. Blatant market manipulation violates both the federal SEC rules (1934 Act) and the state NASAA rules (USA)."},
            {q: "If an Investment Adviser Representative wants to use a Social Media platform to communicate with clients, the firm MUST:", c: ["Ensure the IAR never discusses general financial concepts", "Treat the social media posts as advertising and retain copies for 5 years"], a: 1, f: "Logic: Social media is advertising. Firms must monitor it, supervise it, and keep records of all posts, tweets, and messages for 5 years just like a printed brochure."},
            {q: "Under NASAA rules, which of the following practices is considered 'Selling Away'?", c: ["An agent executing a private real estate syndication trade for a client without notifying their employing broker-dealer", "An agent selling a security that is not registered with the SEC"], a: 0, f: "Logic: 'Selling Away' means executing a securities transaction off the books of the broker-dealer. The firm cannot supervise a trade it doesn't know about, exposing them to massive liability."},
            {q: "According to the USA, an Administrator can require an issuer to file quarterly reports to disclose the progress of an offering. These reports can be demanded no more frequently than:", c: ["Monthly", "Quarterly"], a: 1, f: "Logic: The Administrator can keep tabs on how a new stock offering is going, but they are legally capped at demanding updates once a quarter."},
            {q: "Which of the following statements regarding the 'Brochure Rule' is accurate?", c: ["An IA must deliver the brochure to a client at or before the time of entering into the contract", "The brochure must contain a list of all client names and phone numbers"], a: 0, f: "Logic: The brochure (ADV Part 2A) contains fees and conflicts. It must be delivered upfront so the client can make an informed decision. (Client names are highly confidential and never published)."},
            {q: "An Investment Adviser is preparing an advertisement that includes a chart showing a hypothetical portfolio that perfectly timed the 2008 market crash. The adviser MUST prominently disclose:", c: ["That the performance was simulated, created with the benefit of hindsight, and does not represent actual client results", "The specific names of the clients who would have benefited from the trade"], a: 0, f: "Logic: Hypothetical performance is incredibly dangerous because you can just backtest the perfect strategy. SEC rules require massive, prominent disclosures explaining that the numbers are basically fake."},
            {q: "If a state Administrator wishes to revoke an Investment Adviser's registration, they must provide the adviser with all of the following EXCEPT:", c: ["Prior written notice and an opportunity for a hearing", "A trial by a jury of their peers"], a: 1, f: "Logic: Administrative hearings are regulatory, not criminal. You get written notice, the chance to defend yourself at a hearing, and written findings of fact, but you do NOT get a jury trial."},
            {q: "Under the Securities Exchange Act of 1934, 'Short-Swing Profits' are defined as profits realized by a corporate insider (officer, director, or 10% shareholder) on the sale of company stock held for less than:", c: ["6 months", "12 months"], a: 0, f: "Logic: The SEC strictly forbids insiders from day-trading their own company's stock. Any profit made on stock held for less than 6 months must be forfeited and returned to the corporation."},
            {q: "A broker-dealer firm is holding fully paid customer securities in 'Street Name' (the firm's name). Under NASAA rules, the firm must:", c: ["Segregate the customer's securities and ensure they are never commingled with the firm's own inventory", "Liquidate the securities at the end of the calendar year"], a: 0, f: "Logic: Holding assets in 'Street Name' is common for easy trading, but the firm must strictly separate the client's assets from the firm's assets to prevent 'Commingling'."},
            {q: "Which of the following is NOT required to be detailed in a written Investment Advisory Contract under the USA?", c: ["The specific formula used to compute the advisory fee", "A guarantee that the client's principal will not decrease in value"], a: 1, f: "Logic: Contracts must show the fee formula, confirm there are no performance fees, and state that the contract won't be assigned. They can NEVER contain a guarantee against loss."},
            {q: "An agent executing a trade for a client believes the stock is about to surge. The agent purchases 100 shares for their own personal account at 10:00 AM, and then executes the client's 10,000-share buy order at 10:05 AM. This violates the prohibition against:", c: ["Front running", "Matched orders"], a: 0, f: "Logic: The agent knew the massive client order would drive the price up. Buying personal shares immediately beforehand to capture that guaranteed profit is textbook front running."},
            {q: "If a Broker-Dealer wishes to charge a client a 'markup' instead of a 'commission', the Broker-Dealer must execute the trade:", c: ["Out of its own inventory, acting as a Principal", "By routing the trade to a third-party exchange, acting as an Agent"], a: 0, f: "Logic: Markups and Markdowns are the profit margin when a firm acts as a Dealer/Principal (buying and selling from their own shelves). Commissions are charged when acting as a Broker/Agent."},
            {q: "Under the Uniform Securities Act, an individual who represents an issuer in the sale of a security is an 'Agent' EXCEPT when selling:", c: ["Exempt securities, executing exempt transactions, or selling to existing employees without commission", "Mutual funds to retail clients"], a: 0, f: "Logic: Representing a company to sell its own safe (exempt) bonds, executing private (exempt) trades, or giving stock options to employees for free doesn't make you a stockbroker."},
            {q: "A financial planner charges a flat fee of $2,500 to create a comprehensive financial plan that includes specific mutual fund recommendations. Under the USA, this planner:", c: ["Must register as an Investment Adviser because they provide advice on securities for compensation", "Is exempt from registration if they do not execute the actual trades"], a: 0, f: "Logic: The ABC test: Advice, Business, Compensation. If you charge a fee for a plan that tells someone which securities to buy, you are an Investment Adviser, regardless of who executes the trade."},
            {q: "Which of the following actions by an Investment Adviser Representative (IAR) constitutes an illegal 'Breach of Fiduciary Duty'?", c: ["Recommending an affiliated broker-dealer to execute trades without disclosing the conflict of interest", "Refusing to accept a client who requests an aggressive day-trading strategy"], a: 0, f: "Logic: Fiduciaries must have undivided loyalty. Steering clients to a sister company where the firm makes double the money without telling the client is a massive breach of trust."},
            {q: "Under the USA, if a client is declared legally incompetent by a judge, the client's agent must:", c: ["Cancel all pending open orders and wait for instructions from a court-appointed conservator or guardian", "Continue trading the account using their best judgment"], a: 0, f: "Logic: Legal incompetence instantly freezes the account. The agent cannot take instructions from the client or trade the account until a legally appointed guardian takes over."},
            {q: "According to the USA, an Administrator may deny an applicant's registration if, within the past 10 years, the applicant was convicted of:", c: ["Any felony, or any misdemeanor involving securities, finance, or fraud", "Any misdemeanor, including a minor traffic violation"], a: 0, f: "Logic: The 'Statutory Disqualification' rule looks back 10 years. It flags ALL felonies, but only flags misdemeanors if they specifically involve money, fraud, or securities."},
            {q: "Congratulations. You have completed the final calibration sequence for the Series 66 exam. The primary function of the Uniform Securities Act is to:", c: ["Protect the investing public from fraud and ensure financial professionals operate with complete integrity", "Guarantee that all registered securities will be profitable"], a: 0, f: "Logic: MISSION ACCOMPLISHED. The regulators exist to protect the public. By mastering these questions, you have proven you are ready. Go pass the Series 66 on April 19th."}
        ]
    ];

    let activeSet=[], idx=0, currentPillar=0, sessionScore=0, sessionFails=0;
    let currentScores = JSON.parse(localStorage.getItem('s66CurrentScores')) || [0,0,0,0];
    let sectorsCompleted = JSON.parse(localStorage.getItem('s66SectorsCompleted')) || [false, false, false, false];
    let isPracticeMode = false;
    let baseScore = 0; 
    let frozenGlobalScore = 0; 

    function launchSequence() {
        const overlay = document.getElementById('countdown-overlay');
        const hud = document.getElementById('main-hud');
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'none';
        overlay.style.display = 'block'; overlay.style.color = '#ffaa00'; overlay.style.textShadow = '0 0 30px #ffaa00'; overlay.innerText = "3";
        hud.classList.add('continuous-shake');
        playCountdown();
        let count = 3;
        let timer = setInterval(() => {
            count--;
            if(count > 0) overlay.innerText = count;
            else if (count === 0) {
                overlay.innerText = "LIFTOFF!";
                document.getElementById('rocket').classList.add('takeoff');
                document.getElementById('fuel-fill').style.background = '#00ff41';
                document.getElementById('fuel-fill').style.boxShadow = '0 0 15px #00ff41';
                document.getElementById('total-text').innerText = "ORBIT ACHIEVED: PASSING SCORE REACHED!";
            } else {
                clearInterval(timer); overlay.style.display = 'none'; hud.classList.remove('continuous-shake');
                document.getElementById('mission-report').style.display = 'block';
                document.getElementById('report-title').innerText = "EXAM PASSED!";
                document.getElementById('stat-correct').style.display = 'none';
                document.getElementById('stat-wrong').style.display = 'none';
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                document.getElementById('rep-global').innerText = finalTotal + "/100";
                document.getElementById('rep-global').style.color = "#00ff41";
                document.getElementById('rep-msg').innerText = "YOU ARE READY FOR THE SERIES 66.";
                document.getElementById('rep-msg').style.color = "#00ff41";
            }
        }, 1000);
    }

    function crashSequence() {
        const overlay = document.getElementById('countdown-overlay');
        const hud = document.getElementById('main-hud');
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'none';
        overlay.style.display = 'block'; overlay.style.color = '#ff0000'; overlay.style.textShadow = '0 0 30px #ff0000'; overlay.innerText = "WARNING";
        hud.classList.add('critical-shake');
        playSiren();
        setTimeout(() => {
            overlay.innerText = "SYSTEM FAILURE";
            document.getElementById('rocket').innerHTML = "💥";
            document.getElementById('rocket').classList.add('explosion');
            setTimeout(() => {
                overlay.style.display = 'none'; hud.classList.remove('critical-shake');
                document.getElementById('mission-report').style.display = 'block';
                document.getElementById('mission-report').style.borderColor = '#ff0000';
                document.getElementById('report-title').innerText = "MISSION FAILED";
                document.getElementById('report-title').style.color = "#ff0000";
                document.getElementById('stat-correct').style.display = 'none';
                document.getElementById('stat-wrong').style.display = 'none';
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                document.getElementById('rep-global').innerText = finalTotal + "/100";
                document.getElementById('rep-global').style.color = "#ff0000";
                document.getElementById('rep-msg').innerText = "EXAM COMPLETED. TARGET WAS 73. YOU MUST RETRAIN.";
                document.getElementById('rep-msg').style.color = "#ff0000";
                let repBtn = document.getElementById('report-nav-btn');
                repBtn.innerText = "WIPE DATA & RESTART EXAM"; repBtn.style.background = "#ff0000"; repBtn.style.color = "#ffffff";
                repBtn.onclick = function() { localStorage.clear(); location.reload(); };
            }, 1500);
        }, 2000);
    }

    function updateMenuUI() {
        let total = currentScores.reduce((a, b) => a + b, 0);
        for(let i=0; i<4; i++) {
            let btn = document.getElementById('btn-p'+i), tag = document.getElementById('s'+i);
            document.getElementById('c'+i).innerText = `[${lib[i].length} GATES IN BANK]`;
            if(sectorsCompleted[i]) {
                tag.innerHTML = `Score: ${currentScores[i]}/25 <br><span class='practice-text'>[PRACTICE ONLY]</span>`;
                btn.style.borderColor = "#ffaa00"; 
            } else tag.innerHTML = `Status: PENDING`;
        }
        document.getElementById('fuel-fill').style.width = total + "%";
        if(sectorsCompleted.every(Boolean)) {
            if(total >= 73) {
                document.getElementById('rocket').style.display = 'none'; document.getElementById('fuel-fill').style.background = '#00ff41';
                document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total}/100 (ORBIT ACHIEVED)`;
            } else {
                document.getElementById('rocket').innerHTML = "💥"; document.getElementById('fuel-fill').style.background = '#ff0000';
                document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total}/100 (MISSION FAILED)`;
            }
        } else {
            document.getElementById('rocket').style.bottom = (10 + (total * 2.5)) + "px";
            document.getElementById('total-text').innerText = `GLOBAL SCORE: ${total} / 100 (TARGET: 73)`;
        }
    }

    function updateLiveTelemetry() {
        if (isPracticeMode) {
            document.getElementById('fuel-fill').style.width = frozenGlobalScore + "%";
            document.getElementById('rocket').style.bottom = (10 + (frozenGlobalScore * 2.5)) + "px";
            document.getElementById('total-text').innerText = `PRACTICE MODE - GLOBAL LOCKED AT: ${frozenGlobalScore} / 100`;
        } else {
            let currentGlobal = baseScore + sessionScore;
            document.getElementById('fuel-fill').style.width = currentGlobal + "%";
            document.getElementById('rocket').style.bottom = (10 + (currentGlobal * 2.5)) + "px";
            document.getElementById('total-text').innerText = `LIVE GLOBAL SCORE: ${currentGlobal} / 100 (TARGET: 73)`;
        }
    }

    function start(i){
        currentPillar = i;
        if (sectorsCompleted[i] === true) { 
            isPracticeMode = true; 
            frozenGlobalScore = currentScores.reduce((a, b) => a + b, 0);
            document.getElementById('abort-btn').style.display = 'block';
        }
        else { 
            isPracticeMode = false; 
            baseScore = currentScores.reduce((acc, val, index) => index === i ? acc : acc + val, 0); 
            document.getElementById('abort-btn').style.display = 'none';
        }
        let rawSet = JSON.parse(JSON.stringify(lib[i]));
        let allWrongAnswers = [...new Set(rawSet.map(q => q.c).flat())];
        rawSet.forEach(q => {
            let correctString = q.c[q.a], newChoices = [...q.c], attempts = 0;
            while(newChoices.length < 4 && attempts < 100) {
                let randomAns = allWrongAnswers[Math.floor(Math.random() * allWrongAnswers.length)];
                if(!newChoices.includes(randomAns)) newChoices.push(randomAns);
                attempts++;
            }
            let shuffledChoices = newChoices.map(val => ({ val, sort: Math.random() })).sort((a, b) => a.sort - b.sort).map(({ val }) => val);
            q.c = shuffledChoices; q.a = shuffledChoices.indexOf(correctString);
        });
        activeSet = rawSet.sort(() => 0.5 - Math.random()).slice(0, 25);
        idx = 0; sessionScore = 0; sessionFails = 0;
        document.getElementById('menu').style.display = 'none'; document.getElementById('game').style.display = 'block';
        if (isPracticeMode) { document.getElementById('status-line').innerText = "⚠️ PRACTICE MODE: SCORE WILL NOT UPDATE GLOBAL TOTAL"; document.getElementById('status-line').style.color = "#ffaa00"; }
        else document.getElementById('status-line').style.color = "#888";
        updateLiveTelemetry(); show();
    }

    function showReport() {
        document.getElementById('game').style.display = 'none'; document.getElementById('mission-report').style.display = 'block';
        document.getElementById('report-title').innerText = "SECTOR COMPLETE"; document.getElementById('rep-correct').innerText = sessionScore; document.getElementById('rep-wrong').innerText = sessionFails;
        let finalTotal = currentScores.reduce((a, b) => a + b, 0); document.getElementById('rep-global').innerText = finalTotal + "/100";
        if (isPracticeMode) document.getElementById('rep-msg').innerText = "PRACTICE RUN COMPLETE. SCORE NOT LOGGED.";
        else document.getElementById('rep-msg').innerText = "DATA SAVED. SELECT NEXT PENDING SECTOR.";
    }

    function show(){
        if(idx >= activeSet.length){
            if (!isPracticeMode) {
                currentScores[currentPillar] = sessionScore; sectorsCompleted[currentPillar] = true;
                localStorage.setItem('s66CurrentScores', JSON.stringify(currentScores)); localStorage.setItem('s66SectorsCompleted', JSON.stringify(sectorsCompleted));
                let finalTotal = currentScores.reduce((a, b) => a + b, 0);
                if (sectorsCompleted.every(Boolean)) { document.getElementById('game').style.display = 'none'; if (finalTotal >= 73) launchSequence(); else crashSequence(); return; }
                else if(finalTotal >= 73) { document.getElementById('game').style.display = 'none'; launchSequence(); return; }
            }
            showReport(); return;
        }
        if (!isPracticeMode) document.getElementById('status-line').innerText = `CALIBRATING GATE ${idx+1}/25 | CURRENT SECTOR SCORE: ${sessionScore}`;
        let s = activeSet[idx], h = `<div class="q-text">${s.q}</div>`;
        s.c.forEach((v,i) => { h += `<button class="ans-btn" onclick="check(${i})"><strong>${String.fromCharCode(65+i)}.</strong> ${v}</button>`; });
        document.getElementById('q-area').innerHTML = h; document.getElementById('feedback').style.display = 'none'; document.getElementById('next').style.display = 'none';
    }

    function check(i){
        let s = activeSet[idx]; const btns = document.getElementsByClassName('ans-btn');
        for(let b of btns) { b.disabled = true; if(Array.from(btns).indexOf(b) === s.a) { b.style.borderColor = "#00ff41"; b.style.color = "#00ff41"; } }
        if(i === s.a){ playSnd('ok'); sessionScore++; document.getElementById('feedback').innerHTML = "<span style='color:#00ff41'>[THRUST NOMINAL]</span> " + s.f; }
        else { playSnd('no'); sessionFails++; btns[i].style.borderColor = "#ff0000"; btns[i].style.color = "#ff0000"; document.getElementById('feedback').innerHTML = "<span style='color:#ff0000'>[CRITICAL FAILURE]</span> " + s.f; document.getElementById('main-hud').classList.add('shake'); setTimeout(() => document.getElementById('main-hud').classList.remove('shake'), 200); }
        updateLiveTelemetry();
        if (!isPracticeMode) {
            let currentGlobal = baseScore + sessionScore;
            if(currentGlobal >= 73) {
                document.getElementById('feedback').innerHTML += "<br><span style='color:#ffaa00; font-size:18px;'>⚠️ TARGET ACQUIRED. INITIATING LAUNCH SEQUENCE...</span>";
                currentScores[currentPillar] = sessionScore; sectorsCompleted[currentPillar] = true;
                localStorage.setItem('s66CurrentScores', JSON.stringify(currentScores)); localStorage.setItem('s66SectorsCompleted', JSON.stringify(sectorsCompleted));
                setTimeout(launchSequence, 1500); return;
            }
        }
        document.getElementById('feedback').style.display = 'block'; document.getElementById('next').style.display = 'block';
    }

    function next(){ idx++; show(); }
    function resetScores() { if(confirm("⚠️ WARNING: This will completely erase your current exam score and reset all pillars to PENDING. Proceed?")) { localStorage.clear(); location.reload(); } }
    updateMenuUI();
</script>
