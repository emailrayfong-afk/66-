<head>

<style>
        :root { 
            --nasa-blue: #0b3d91; 
            --artemis-red: #fc3d39; 
            --lunar-grey: #f4f4f4; 
            --text-dark: #212121; 
            --sky-blue: #87CEEB;
            --horizon-white: #e1f5fe;
            --go-green: #2e7d32;
            --error-red: #c62828;
        }

        body { 
            background: var(--lunar-grey); 
            color: var(--text-dark); 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            padding: 10px; 
            touch-action: manipulation; 
            overflow-x: hidden;
        }

        .hud { 
            border: 3px solid var(--nasa-blue); 
            max-width: 800px; 
            margin: auto; 
            padding: 20px; 
            background: #ffffff; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        /* --- Launch Pad & Rocket Styles --- */
        .launch-pad { 
            height: 120px; 
            border-bottom: 2px solid #ddd; 
            position: relative; 
            margin: 15px 0; 
            background: linear-gradient(to bottom, var(--sky-blue) 0%, var(--horizon-white) 100%); 
            overflow: hidden; 
            border-radius: 5px; 
        }

        #rocket { 
            position: absolute; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%) rotate(-45deg); 
            font-size: 40px; 
            transition: bottom 3s ease-in, opacity 2s ease-in; 
            z-index: 5;
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            color: var(--artemis-red);
            z-index: 10;
            display: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* --- Animation Classes --- */
        .takeoff { bottom: 1000px !important; opacity: 0; }
        
        .shake { animation: shake 0.5s ease-in-out infinite; }
        @keyframes shake {
            0%, 100% { transform: translateX(-50%) rotate(-45deg); }
            25% { transform: translateX(-48%) rotate(-43deg); }
            75% { transform: translateX(-52%) rotate(-47deg); }
        }

        .screen-shake { animation: screenShake 0.4s ease-in-out infinite; }
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-8px, 4px); }
            50% { transform: translate(8px, -4px); }
            75% { transform: translate(-8px, -4px); }
        }

        .crash { animation: explosion 1s ease-out forwards; }
        @keyframes explosion {
            0% { bottom: 10px; transform: translateX(-50%) rotate(-45deg) scale(1); opacity: 1; }
            50% { transform: translateX(-50%) rotate(180deg) scale(1.5); opacity: 0.5; }
            100% { bottom: -50px; transform: translateX(-50%) rotate(360deg) scale(0); opacity: 0; }
        }

        .flash-red { animation: flashRed 0.5s ease-out 3; }
        @keyframes flashRed {
            0% { border-color: var(--nasa-blue); }
            50% { border-color: var(--error-red); box-shadow: 0 0 30px var(--error-red); }
            100% { border-color: var(--nasa-blue); }
        }

        /* --- UI Elements --- */
        .fuel-bar { 
            width: 100%; 
            background: #eee; 
            border: 1px solid #ccc; 
            height: 30px; 
            margin-top: 5px; 
            position: relative; 
            border-radius: 15px; 
            overflow: hidden; 
        }

        #fuel-fill { 
            background: var(--nasa-blue); 
            width: 0%; 
            height: 100%; 
            transition: width 0.5s; 
        }

        #total-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            color: #fff; 
            font-size: 12px; 
            line-height: 30px; 
            font-weight: bold; 
            top: 0; left: 0; z-index: 5; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); 
        }

        .mode-toggle { 
            display: flex; 
            background: #eee; 
            border-radius: 25px; 
            margin: 15px 0; 
            padding: 5px; 
        }

        .mode-btn { 
            flex: 1; 
            border: none; 
            background: none; 
            padding: 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 12px; 
            transition: all 0.3s;
        }

        .mode-btn.active { background: var(--nasa-blue); color: white; }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 10px; 
        }

        .p-btn { 
            background: #ffffff; 
            border: 2px solid var(--nasa-blue); 
            color: var(--nasa-blue); 
            padding: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 6px; 
            transition: all 0.3s;
        }

        .p-btn:hover { background: var(--nasa-blue); color: white; }

        .q-text { 
            font-size: 1.1em; 
            color: var(--text-dark); 
            margin-bottom: 20px; 
            border-left: 5px solid var(--artemis-red); 
            padding-left: 15px; 
            line-height: 1.5; 
            font-weight: bold; 
        }

        .ans-btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin: 8px 0; 
            background: #f9f9f9; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            text-align: left; 
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .ans-btn:active { transform: scale(0.98); }

        .ans-btn.correct { background: var(--go-green) !important; color: white !important; border-color: var(--go-green); }
        .ans-btn.wrong { background: var(--error-red) !important; color: white !important; border-color: var(--error-red); }

        #feedback { 
            margin: 15px 0; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            display: none; 
            background: #f0f4ff; 
        }

        .nav-btn { 
            background: var(--nasa-blue); 
            color: #fff; 
            font-weight: bold; 
            padding: 18px; 
            border: none; 
            width: 100%; 
            cursor: pointer; 
            border-radius: 8px; 
            display: none; 
            margin-top: 10px; 
        }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>

// ========================================
// 🚀 ENGINE LOGIC
// ========================================
let mode = 'sprint';
let currentPillar = 0;
let currentQ = 0;
let score = 0;
let pillarScores = [0, 0, 0, 0];
let pillarCompleted = [false, false, false, false];
let answered = false;
let missionLog = [];
let activeSet = []; 
let audioContext = null;

function initAudio() {
    if (!audioContext) {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
            console.log('Audio not supported');
        }
    }
}

function playSound(type) {
    if (!audioContext) return;
    const osc = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    switch(type) {
        case 'countdown':
            osc.frequency.value = 800;
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.1);
            break;
        case 'liftoff':
            osc.frequency.value = 200;
            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 2);
            break;
        case 'crash':
            osc.type = 'sawtooth';
            osc.frequency.value = 100;
            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.5);
            break;
    }
}

function setMode(m) {
    mode = m; 
    score = 0;
    pillarScores = [0, 0, 0, 0];
    pillarCompleted = [false, false, false, false];
    missionLog = [];
    currentPillar = 0;
    currentQ = 0;
    answered = false;
    activeSet = [];
    
    updateProgress();
    
    for (let i = 0; i < 4; i++) {
        let statusSpan = document.getElementById(`s${i}`);
        if (statusSpan) {
            statusSpan.textContent = 'PENDING';
            statusSpan.style.color = '';
        }
    }
    
    let btnSprint = document.getElementById('mode-sprint');
    let btnSim = document.getElementById('mode-sim');
    if(btnSprint) btnSprint.classList.toggle('active', m === 'sprint');
    if(btnSim) btnSim.classList.toggle('active', m === 'sim');
    
    const rocket = document.getElementById('rocket');
    if (rocket) {
        rocket.className = '';
        rocket.style.display = 'block';
        rocket.style.bottom = '10px';
    }
    
    const countdownEl = document.getElementById('countdown');
    if (countdownEl) {
        countdownEl.style.display = 'none';
        countdownEl.textContent = '';
    }
}

function start(pillar) {
    initAudio(); 
    currentPillar = pillar;
    currentQ = 0;
    score = 0; 
    answered = false;
    missionLog = []; 
    
    // Direct traffic to the correct Q-Bank based on mode
    const checkLib = mode === 'sprint' ? sprintLib : simLib;
    
    if (!checkLib[pillar] || checkLib[pillar].length === 0) {
        alert("Pillar " + (pillar + 1) + " data is missing! Check your arrays.");
        return;
    }

    if (pillarCompleted[pillar]) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        document.getElementById('status-line').textContent = `PILLAR ${pillar + 1} ACCOMPLISHED`;
        
        let html = `<div class="q-text" style="text-align:center;">You have already secured this sector.</div>`;
        html += `<button class="nav-btn" style="display:block; margin-top:15px; background:#666;" onclick="returnToMenu()">BACK TO MENU</button>`;
        
        document.getElementById('q-area').innerHTML = html;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next').style.display = 'none';
        document.getElementById('mission-log-btn').style.display = 'none';
        return;
    }
    
    const count = mode === 'sprint' ? 25 : [8, 17, 30, 45][pillar];
    const sourceLib = checkLib[pillar];
    
    // True shuffle
    let shuffled = [...sourceLib].sort(() => 0.5 - Math.random());
    activeSet = shuffled.slice(0, Math.min(count, shuffled.length));
    
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('mission-log-btn').style.display = 'none';
    
    showQuestion();
}

function showQuestion() {
    const q = activeSet[currentQ];
    const total = activeSet.length;
    
    const modeLabel = mode === 'sprint' ? 'SPRINT' : 'SIMULATION';
    document.getElementById('status-line').textContent = `${modeLabel} MODE | GATE ${currentQ + 1} of ${total}`;
    
    // Simple map works for both 2-choice (Sprint) and 4-choice (Sim)
    let choicesToDisplay = q.c.map((text, i) => ({ text, originalIndex: i }));
    choicesToDisplay.sort(() => 0.5 - Math.random());
    
    let html = `<div class="q-text">${q.q}</div>`;
    choicesToDisplay.forEach(choice => {
        html += `<button class="ans-btn" data-index="${choice.originalIndex}" onclick="checkAnswer(${choice.originalIndex}, this)">${choice.text}</button>`;
    });
    
    document.getElementById('q-area').innerHTML = html;
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next').style.display = 'none';
    answered = false;
}

function checkAnswer(selected, btnElement) {
    if (answered) return;
    answered = true;
    
    const q = activeSet[currentQ];
    const buttons = document.querySelectorAll('.ans-btn');
    const isCorrect = (selected === q.a);
    
    buttons.forEach(btn => btn.disabled = true);
    
    if (isCorrect) {
        btnElement.classList.add('correct');
        score++; 
        document.getElementById('feedback').innerHTML = `✅ CORRECT!<br><br>${q.f}`;
        document.getElementById('feedback').style.background = '#e8f5e9';
        document.getElementById('feedback').style.borderColor = '#2e7d32';
        playSound('countdown');
    } else {
        btnElement.classList.add('wrong');
        
        buttons.forEach(btn => {
            if (parseInt(btn.getAttribute('data-index')) === q.a) {
                btn.classList.add('correct');
                btn.style.opacity = '0.8';
                btn.style.border = '2px solid #2e7d32';
            }
        });

        document.getElementById('feedback').innerHTML = `❌ INCORRECT<br><br>${q.f}`;
        document.getElementById('feedback').style.background = '#ffebee';
        document.getElementById('feedback').style.borderColor = '#c62828';
        playSound('crash');

        // ADAPTIVE LEARNING: Push missed question to back of the queue
        if (mode === 'sprint') {
            activeSet.push(q);
        }
    } 
    
    missionLog.push({
        question: q.q,
        yourAnswer: q.c[selected] || "Unknown",
        correctAnswer: q.c[q.a],
        isCorrect: isCorrect,
        feedback: q.f,
        pillar: `Pillar ${currentPillar + 1}`
    });
    
    document.getElementById('feedback').style.display = 'block';
    
    let nextBtn = document.getElementById('next');
    nextBtn.style.display = 'block';
    nextBtn.innerHTML = 'NEXT GATE >';
    nextBtn.onclick = next;
}

function next() {
    currentQ++;
    if (currentQ < activeSet.length) {
        showQuestion();
    } else {
        endPillar();
    }
}

function endPillar() {
    const total = activeSet.length;
    const percent = Math.round((score / total) * 100);
    
    pillarScores[currentPillar] = percent;
    pillarCompleted[currentPillar] = true;
    
    const modeText = mode === 'sprint' ? 'PILLAR' : 'SIMULATION';
    
    let completionHTML = '<div style="text-align:center; padding:30px;">';
    completionHTML += '<h2 style="color: var(--nasa-blue);">' + modeText + ' ' + (currentPillar + 1) + ' COMPLETE</h2>';
    completionHTML += '<div style="font-size:48px; margin:20px 0;">' + percent + '%</div>';
    completionHTML += '<div style="font-size:18px;">Score: ' + score + '/' + total + '</div>';
    completionHTML += '</div>';
    
    document.getElementById('q-area').innerHTML = completionHTML;
    document.getElementById('feedback').style.display = 'none';
    
    let nextBtn = document.getElementById('next');
    nextBtn.innerHTML = 'RETURN TO MENU';
    nextBtn.onclick = returnToMenu;
    nextBtn.style.display = 'block';
    
    document.getElementById('mission-log-btn').style.display = 'block';
    
    updateProgress(); 
    checkMissionComplete();
}

function showMissionLog() {
    let logHTML = '<h2 style="color: var(--nasa-blue); text-align:center;">📋 MISSION LOG</h2>';
    logHTML += '<div style="max-height:400px; overflow-y:auto; padding:10px;">';
    
    missionLog.forEach((entry, i) => {
        const statusColor = entry.isCorrect ? '#2e7d32' : '#c62828';
        const statusIcon = entry.isCorrect ? '✅' : '❌';
        
        logHTML += `
            <div style="border-left: 4px solid ${statusColor}; padding:10px; margin:10px 0; background:#f9f9f9;">
                <div style="font-weight:bold; color:${statusColor};">${statusIcon} Question ${i + 1} - ${entry.pillar}</div>
                <div style="margin:5px 0; font-size:14px;">${entry.question}</div>
                <div style="margin:5px 0; font-size:13px;">
                    <strong>Your Answer:</strong> ${entry.yourAnswer}<br>
                    <strong>Correct Answer:</strong> ${entry.correctAnswer}
                </div>
                <div style="margin:5px 0; font-size:12px; color:#666;">${entry.feedback}</div>
            </div>
        `;
    });
    
    logHTML += '</div>';
    
    document.getElementById('q-area').innerHTML = logHTML;
    document.getElementById('mission-log-btn').style.display = 'none';
    
    let nextBtn = document.getElementById('next');
    nextBtn.style.display = 'block';
    nextBtn.innerHTML = 'RETURN TO MENU';
    nextBtn.onclick = returnToMenu;
}

function returnToMenu() {
    document.getElementById('game').style.display = 'none';
    document.getElementById('menu').style.display = 'block';
    
    let nextBtn = document.getElementById('next');
    nextBtn.onclick = next; 
    nextBtn.style.display = 'none'; 
    nextBtn.innerHTML = 'NEXT GATE >';
    
    document.getElementById('mission-log-btn').style.display = 'none';
    
    pillarScores.forEach((score, i) => {
        if (pillarCompleted[i]) {
            let sEl = document.getElementById(`s${i}`);
            if(sEl) {
                sEl.textContent = `${score}% ✓`;
                sEl.style.color = '#2e7d32';
            }
        }
    });
}

function updateProgress() {
    const SIM_WEIGHTS = [8, 17, 30, 45];
    const totalQuestions = mode === 'sprint' 
        ? (25 * 4) 
        : SIM_WEIGHTS.reduce((a,b) => a+b, 0);
    
    const completedQuestions = pillarScores.reduce((sum, score, i) => {
        const pillarLength = mode === 'sprint' ? 25 : SIM_WEIGHTS[i];
        return sum + Math.round((score / 100) * pillarLength);
    }, 0);
    
    const percent = totalQuestions > 0 ? Math.round((completedQuestions / totalQuestions) * 100) : 0;
    
    let fuelFill = document.getElementById('fuel-fill');
    let totalText = document.getElementById('total-text');
    if (fuelFill) fuelFill.style.width = percent + '%';
    if (totalText) totalText.textContent = `FLIGHT READINESS: ${percent}%`;
}

function checkMissionComplete() {
    const allComplete = pillarCompleted.every(completed => completed === true);
    if (!allComplete) return;
    
    const totalScore = pillarScores.reduce((sum, score) => sum + score, 0) / 4;
    const passingScore = 73;
    
    if (totalScore >= passingScore) {
        launchRocket();
    } else {
        crashRocket();
    }
}

function launchRocket() {
    const rocket = document.getElementById('rocket');
    const countdownEl = document.getElementById('countdown');
    const hud = document.querySelector('.hud');
    
    let nextBtn = document.getElementById('next');
    let logBtn = document.getElementById('mission-log-btn');
    if(nextBtn) nextBtn.style.display = 'none';
    if(logBtn) logBtn.style.display = 'none';
    
    countdownEl.style.display = 'block';
    hud.classList.add('screen-shake');
    rocket.classList.add('shake');
    
    let count = 5;
    countdownEl.textContent = count;
    playSound('countdown');
    
    const countdownInterval = setInterval(() => {
        count--;
        if (count > 0) {
            countdownEl.textContent = count;
            playSound('countdown');
        } else {
            countdownEl.textContent = 'LIFTOFF!';
            playSound('liftoff');
            hud.classList.remove('screen-shake');
            
            setTimeout(() => {
                rocket.classList.remove('shake');
                rocket.classList.add('takeoff');
                setTimeout(() => {
                    countdownEl.style.display = 'none';
                    countdownEl.textContent = '';
                    if(nextBtn) nextBtn.style.display = 'block';
                    if(logBtn) logBtn.style.display = 'block';
                }, 2000);
            }, 500);
            clearInterval(countdownInterval);
        }
    }, 1000);
}

function crashRocket() {
    const rocket = document.getElementById('rocket');
    const countdownEl = document.getElementById('countdown');
    const hud = document.querySelector('.hud');
    
    let nextBtn = document.getElementById('next');
    let logBtn = document.getElementById('mission-log-btn');
    if(nextBtn) nextBtn.style.display = 'none';
    if(logBtn) logBtn.style.display = 'none';

    countdownEl.style.display = 'block';
    countdownEl.textContent = 'MISSION FAILED';
    countdownEl.style.color = '#c62828';
    
    playSound('crash');
    rocket.classList.add('crash');
    hud.classList.add('screen-shake');
    hud.classList.add('flash-red');
    
    setTimeout(() => {
        hud.classList.remove('screen-shake');
        hud.classList.remove('flash-red');
        countdownEl.style.display = 'none';
        rocket.style.display = 'none';
        rocket.classList.remove('crash');
        if(nextBtn) nextBtn.style.display = 'block';
        if(logBtn) logBtn.style.display = 'block';
    }, 1500);
}

window.onload = updateProgress;
