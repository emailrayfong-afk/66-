            {q: "Under the USA, a 'Solicitor' who receives cash compensation for referring clients to an Investment Adviser must generally:", c: ["Have a written agreement with the IA", "Register as a Broker-Dealer Agent"], a: 0, f: "Logic: There must be a clear paper trail and written disclosure to the client acknowledging the referral fee arrangement."},
            {q: "Which of the following is considered an 'Unsystematic' risk factor?", c: ["A massive accounting scandal at a specific corporation", "A sudden spike in the Federal Funds Rate"], a: 0, f: "Logic: Unsystematic risk is localized to a single entity and can be diversified away. Systemic risk (interest rates, war, inflation) hits everything."},
            {q: "A mutual fund's 'Net Asset Value' (NAV) is mathematically calculated by taking the Total Assets, subtracting the Liabilities, and dividing by:", c: ["The number of outstanding shares", "The daily trading volume"], a: 0, f: "Logic: NAV is the literal 'per share' liquidation value of the fund's portfolio at the close of the trading day."},
            {q: "Which of the following retirement accounts legally FORBIDS the owner from making any further contributions once they reach age 73?", c: ["Contributions are never forbidden based on age as long as there is earned income", "Traditional IRAs"], a: 0, f: "Logic: The SECURE Act eliminated the age cap. As long as you have 'earned income' (W-2 wages), you can contribute to an IRA at any age."},
            {q: "In an 'S-Corporation', the maximum number of allowable shareholders is strictly capped at:", c: ["100 shareholders", "Unlimited shareholders"], a: 0, f: "Logic: S-Corps are designed for small/family businesses. They cap owners at 100 and require them to be U.S. citizens or residents."},
            {q: "Which of the following trusts is explicitly designed to keep the death benefit payout of a life insurance policy out of the deceased's taxable estate?", c: ["Irrevocable Life Insurance Trust (ILIT)", "Testamentary Trust"], a: 0, f: "Logic: Because the ILIT owns the policy and cannot be altered by the insured, the insured has no 'incidents of ownership', shielding the payout from estate taxes."},
            {q: "An investor in the 37% tax bracket is holding a high-yield corporate bond in a taxable brokerage account. To improve tax efficiency, the adviser should recommend swapping it for:", c: ["A Municipal Bond", "A Treasury Bill"], a: 0, f: "Logic: Municipal bonds are federally tax-free, which provides massive mathematical value to investors trapped in the highest tax brackets."},
            {q: "Which of the following corporate bonds would exhibit the highest 'Duration' (price volatility) when interest rates shift?", c: ["A 30-year Zero-Coupon Bond", "A 30-year 6% Coupon Bond"], a: 0, f: "Logic: Duration measures how long it takes to get your money back. A zero-coupon bond pays nothing until the very end, meaning its duration is exactly equal to its maturity (highest volatility)."}
        ],
[ // PILLAR 4: REGULATIONS
            {q: "Under the Uniform Securities Act (USA), which of the following is specifically excluded from the definition of a Broker-Dealer?", c: ["A bank, savings institution, or trust company", "A firm with an office in the state that exclusively trades with retail clients"], a: 0, f: "Logic: Banks, trust companies, and savings institutions are explicitly excluded from the definition of a BD because they are already heavily regulated by banking authorities."},
            {q: "An individual represents an issuer in the sale of a security. Under the USA, this individual is NOT considered an 'Agent' if the security being sold is a:", c: ["Shares of a local tech startup", "U.S. Treasury Bond"], a: 1, f: "Logic: Individuals representing issuers are exempt from registering as agents if they are selling certain highly safe 'exempt securities,' such as U.S. government or municipal bonds."},
            {q: "Under the USA, a professional whose investment advice is strictly 'incidental' to their practice is excluded from the definition of an Investment Adviser. Which of the following professionals falls under this L.A.T.E. exclusion?", c: ["Lawyers and Accountants", "Insurance Agents and Real Estate Brokers"], a: 0, f: "Logic: The L.A.T.E. exclusion applies strictly to Lawyers, Accountants, Teachers, and Engineers who do not charge a separate fee for the advice."},
            {q: "To register as a 'Federal Covered Adviser' with the SEC, an investment adviser must generally possess a minimum Assets Under Management (AUM) of:", c: ["$100 million (optional) or $110 million (mandatory)", "$25 million (mandatory)"], a: 0, f: "Logic: Advisers with $100M may choose to register with the SEC, but once they hit $110M, SEC registration becomes legally mandatory."},
            {q: "Under the USA, every application for registration as a Broker-Dealer or Investment Adviser must include a Consent to Service of Process. This document is:", c: ["Permanent and irrevocable", "Renewed annually on December 31st"], a: 0, f: "Logic: The Consent to Service of Process allows the Administrator to receive legal papers on behalf of the registrant. It is submitted once and remains permanently in effect."},
            {q: "Unless the Administrator orders an earlier date, a state registration for a financial professional automatically becomes effective at noon on the:", c: ["30th day after filing the application", "45th day after filing the application"], a: 0, f: "Logic: If there are no issues or disciplinary actions pending, the USA dictates that registration automatically activates at noon on the 30th day."},
            {q: "When does the registration of an Agent, Broker-Dealer, Investment Adviser, or Investment Adviser Representative expire under the Uniform Securities Act?", c: ["Every year on December 31st", "Exactly one year from the date their registration became effective"], a: 0, f: "Logic: State registrations do not run on anniversaries. Everyone's registration expires simultaneously at the end of the calendar year (Dec 31st) unless renewed."},
            {q: "Under the USA, the State Administrator can require a Broker-Dealer to maintain a minimum net capital. However, this state requirement cannot exceed the minimum capital requirements set by:", c: ["The Federal Reserve", "The Securities and Exchange Commission (SEC)"], a: 1, f: "Logic: Federal law always trumps state law. A state Administrator cannot force a BD to hold more capital than the SEC requires under the Securities Exchange Act of 1934."},
            {q: "A state Administrator may require a 'Surety Bond' to be posted by an Investment Adviser if the adviser:", c: ["Exercises discretionary authority or maintains custody of client funds", "Manages more than $50 million in assets"], a: 0, f: "Logic: Surety bonds act as insurance against fraud or theft. They are only required if the adviser has access to the client's money (custody) or the power to trade it without asking (discretion)."},
            {q: "Under the USA, an Investment Adviser that maintains custody of client assets must typically maintain a minimum net worth of:", c: ["$10,000", "$35,000"], a: 1, f: "Logic: The USA generally requires a $10,000 minimum net worth for discretion, and a higher $35,000 minimum net worth for custody."},
            {q: "How long must an Investment Adviser retain their books and records, including client communications and advertising, under federal and state rules?", c: ["3 years, with the first 2 years easily accessible", "5 years, with the first 2 years in the principal office"], a: 1, f: "Logic: IAs must keep records for 5 years. (Broker-Dealers are only required to keep records for 3 years)."},
            {q: "According to the Supreme Court's 'Howey Test', which of the following is NOT a required element to legally classify an investment as a 'Security'?", c: ["An investment of money in a common enterprise", "A guaranteed rate of return"], a: 1, f: "Logic: The Howey Test requires: 1) Investment of money, 2) Common enterprise, 3) Expectation of profit, 4) Derived solely from the efforts of others. Guarantees are not part of the test."},
            {q: "Which of the following is explicitly defined as NOT being a security under the Uniform Securities Act?", c: ["A fixed traditional life insurance policy", "A variable annuity contract"], a: 0, f: "Logic: Any product with the word 'fixed' is strictly an insurance product. If the word 'variable' is used, the client assumes market risk, making it a security."},
            {q: "An 'Exempt Security' under the USA means the security is exempt from:", c: ["State registration and advertising filing requirements", "The anti-fraud provisions of the USA"], a: 0, f: "Logic: Exempt securities (like municipal bonds) don't have to be registered with the state, but absolutely NOTHING is exempt from the anti-fraud rules."},
            {q: "Under the USA, which of the following is considered an Exempt Transaction?", c: ["An 'Isolated Non-Issuer Transaction'", "An Initial Public Offering (IPO) sold to retail clients"], a: 0, f: "Logic: An isolated non-issuer transaction is basically two private individuals trading a stock (like selling a car on Craigslist). Because the issuer doesn't benefit, the state doesn't force registration for the trade."},
            {q: "To qualify for the 'Private Placement' transaction exemption under the USA, an offer can be directed to no more than how many non-institutional (retail) persons during a 12-month period?", c: ["10 persons", "35 persons"], a: 0, f: "Logic: The USA limits private placements to 10 retail offerees in a 12-month period. (Do not confuse this with Federal Reg D, which allows 35 unaccredited investors)."},
            {q: "A new company is issuing stock across multiple states and registering with the SEC. To register in a specific state simultaneously, the issuer should use:", c: ["Registration by Coordination", "Registration by Qualification"], a: 0, f: "Logic: Registration by Coordination is used when a security is registering with the SEC and the State at the exact same time, allowing both to become effective simultaneously."},
            {q: "If a local company is issuing stock ONLY within the borders of one single state (an intrastate offering), the mandatory method of state registration is:", c: ["Registration by Filing", "Registration by Qualification"], a: 1, f: "Logic: Qualification is the most difficult method and is used for intrastate offerings because the SEC is not involved to help vet the paperwork."},
            {q: "Under the USA, a State Administrator has the power to deny, suspend, or revoke a registration. However, they can only do so if it is in the public interest AND:", c: ["They have obtained a court order from a state judge", "They have a specific 'Statutory Basis' (e.g., a felony conviction or rule violation)"], a: 1, f: "Logic: The Administrator cannot act arbitrarily. 'Public interest' alone is not enough; there must be a specific legal violation (statutory basis) backing the decision."},
            {q: "A State Administrator wishes to investigate a Broker-Dealer. The Administrator's subpoena power:", c: ["Is limited strictly to the borders of their own state", "Can cross state lines to gather evidence and compel testimony"], a: 1, f: "Logic: Administrators have massive investigatory powers that are not restricted by state lines, allowing them to pursue fraud anywhere."},
            {q: "Under the USA, the maximum criminal penalty for a person who willfully violates the Act is:", c: ["A $5,000 fine and up to 3 years in prison", "A $10,000 fine and up to 5 years in prison"], a: 0, f: "Logic: State criminal penalties (USA) max out at $5k and 3 years. Federal criminal penalties (SEC/1940 Act) max out at $10k and 5 years."},
            {q: "If an agent accidentally sells an unregistered security to a client, the broker-dealer can avoid a civil lawsuit by offering to buy the security back. This offer is known as a:", c: ["Letter of Rescission", "Consent to Service of Process"], a: 0, f: "Logic: The Right of Rescission allows the firm to buy back the illegal trade at the original price plus interest. The client has 30 days to accept or reject the offer."},
            {q: "What is the Statute of Limitations for a client to file a civil lawsuit against an adviser under the Uniform Securities Act?", c: ["3 years from the date of the violation, or 2 years from discovery, whichever comes first", "5 years from the date of the violation, or 3 years from discovery"], a: 0, f: "Logic: Under state law, clients must sue quickly. They have 2 years from the moment they realize they were defrauded, but no more than 3 years from the actual date the trade occurred."},
            {q: "Under the Investment Advisers Act of 1940, performance-based fees (taking a percentage of capital gains) are generally prohibited, EXCEPT when charging:", c: ["A 'Qualified Client' with at least $1.1M under management or a $2.2M net worth", "Any client who signs a written waiver"], a: 0, f: "Logic: Performance fees encourage high-risk gambling with the client's money. Therefore, the SEC only allows them for incredibly wealthy 'Qualified Clients' who can afford to lose."},
            {q: "An Investment Adviser is considered to have 'Custody' of client assets if they:", c: ["Have the authority to withdraw funds directly from the client's account to pay their advisory fees", "Have discretionary trading authority over the account"], a: 0, f: "Logic: Discretion just means you can trade the stocks. Custody means you can actually touch or move the physical money (including automatically deducting your own fees)."},
            {q: "If an Investment Adviser has custody of client funds, they are legally required to provide the client with an itemized account statement at least:", c: ["Quarterly", "Annually"], a: 0, f: "Logic: If you hold the client's money, you must prove it's still there by sending them a statement at least once every three months (quarterly)."},
            {q: "When an Investment Adviser executes an 'Agency Cross Transaction', they act as the broker for both the buyer and the seller. This is legally permitted ONLY IF:", c: ["The adviser does not recommend the trade to both parties, and gets written consent beforehand", "The adviser waives all commissions on the trade"], a: 0, f: "Logic: You cannot advise two clients to trade with each other to double-dip on commissions. One side must have initiated the trade unprompted, and written consent is required."},
            {q: "An Investment Adviser wishes to use a testimonial in an advertisement. Under current SEC rules, this is:", c: ["Strictly prohibited under all circumstances", "Permitted, provided the adviser discloses if the person was compensated and if they are a current client"], a: 1, f: "Logic: The SEC modernized its marketing rules. Testimonials are now allowed, but they require massive disclosures to ensure the public knows if the review was paid for."},
            {q: "A broker-dealer heavily promotes a specific stock to their clients, knowing that the firm itself holds a massive amount of that stock in its own inventory. This is a potential violation unless the firm discloses it is acting in a:", c: ["Fiduciary capacity", "Principal capacity"], a: 1, f: "Logic: If the firm is selling you a stock from its own shelves to make a profit (acting as a Principal), they must disclose that massive conflict of interest on your trade confirmation."},
            {q: "According to NASAA rules, which of the following is considered an unethical business practice for an Agent?", c: ["Executing a trade in a margin account before receiving the signed margin agreement", "Guaranteeing a client against a loss using the agent's personal funds"], a: 1, f: "Logic: Margin agreements can legally be signed promptly *after* the first trade. However, guaranteeing a client against a market loss is explicitly and universally illegal in all circumstances."},
            {q: "According to NASAA Model Rules, under which of the following circumstances may an Investment Adviser Representative (IAR) borrow money from a client?", c: ["Only if the client is a bank, broker-dealer, or an affiliate of the investment adviser", "Only if the client is a close family member and signs a written promissory note"], a: 0, f: "Logic: You can never borrow from a retail client, not even your own mother. You may only borrow from a client if they are in the business of lending money (a bank) or are affiliated with your firm."},
            {q: "An agent of a broker-dealer wishes to share in the profits and losses of a customer's account. This is legally permitted ONLY IF:", c: ["The agent is an Investment Adviser Representative acting in a fiduciary capacity", "The agent has written authorization from both the customer and the employing broker-dealer, and shares strictly in proportion to their own financial contribution"], a: 1, f: "Logic: Agents can share in accounts if they have permission and put their own money in. Investment Advisers and IARs are NEVER allowed to share in a client's account under any circumstances."},
            {q: "If an agent executes a securities transaction for a client outside the normal jurisdiction and books of their employing broker-dealer without prior written authorization, they have committed an illegal practice known as:", c: ["Front running", "Selling away"], a: 1, f: "Logic: 'Selling away' (or conducting private securities transactions) is strictly prohibited. All trades must be run through the employing firm so they can be properly supervised."},
            {q: "A broker-dealer holds a massive block of XYZ stock in its own inventory. The firm issues a highly favorable research report on XYZ, causing the stock price to surge, and then immediately sells its inventory at a massive profit. This unethical practice is known as:", c: ["Scalping (or Front Running)", "Painting the tape"], a: 0, f: "Logic: Scalping (or front running) involves a firm or adviser taking a position in a security, hyping it up to the public, and then selling it immediately after the public buying drives the price up."},
            {q: "Which market manipulation tactic involves two conspirators rapidly buying and selling the same stock back and forth to each other to create the false illusion of massive trading volume?", c: ["Matched orders (Painting the tape)", "Arbitrage"], a: 0, f: "Logic: Matched orders create fake activity on the ticker tape to trick other investors into thinking the stock is 'hot', driving up the price."},
            {q: "Under the Section 28(e) Safe Harbor provisions, an investment adviser may legally use client brokerage commissions ('soft dollars') to pay for which of the following?", c: ["Office rent, travel expenses, and computer hardware", "Financial research reports and analytical software"], a: 1, f: "Logic: Soft dollars can only be used to purchase things that directly benefit the *client's* investment decision-making process (like research). They cannot be used for the firm's overhead expenses."},
            {q: "Under the Bank Secrecy Act (BSA), a financial institution must file a Currency Transaction Report (CTR) for a cash transaction that exceeds:", c: ["$5,000", "$10,000"], a: 1, f: "Logic: CTRs are filed for physical cash transactions exceeding $10,000 in a single day. Suspicious Activity Reports (SARs) are filed for suspicious transactions of $5,000 or more."},
            {q: "Money laundering generally occurs in three distinct phases. The phase where the launderer executes complex financial transactions to obscure the source of the funds is called:", c: ["Placement", "Layering"], a: 1, f: "Logic: 1) Placement (getting cash into the bank), 2) Layering (moving it around to hide the trail), 3) Integration (buying legit assets like real estate with the clean money)."},
            {q: "If an individual is found guilty of civil insider trading under the Securities Exchange Act of 1934, the maximum civil penalty the SEC can impose is:", c: ["Treble damages (up to 3 times the profit gained or loss avoided)", "A flat fine of $1,000,000"], a: 0, f: "Logic: Civil penalties for insider trading allow the SEC to sue for 'treble damages'—three times the amount of money the person illegally made (or saved)."},
            {q: "The maximum CRIMINAL penalty for an individual who willfully violates the insider trading laws of the Securities Exchange Act of 1934 is:", c: ["$10,000 and 5 years in prison", "$5,000,000 and 20 years in prison"], a: 1, f: "Logic: Do not confuse state and federal penalties. Federal criminal penalties for individuals under the 1934 Act are massive: up to $5M and 20 years behind bars."},
            {q: "Under SEC Regulation S-P, a financial institution must provide customers with a reasonable means to 'opt out' of having their non-public personal information shared with non-affiliated third parties. Which of the following is NOT a 'reasonable means'?", c: ["Providing a toll-free phone number", "Requiring the customer to write a formal letter and send it via certified mail"], a: 1, f: "Logic: The opt-out method must be incredibly easy for the client (a checkbox, a website, a toll-free number). Forcing them to write a physical letter is considered unreasonable."},
            {q: "Under the SEC Pay-to-Play rule, if an Investment Adviser makes a political contribution to a candidate who can influence the hiring of the adviser, the adviser is banned from receiving compensation from that government entity for:", c: ["2 years", "5 years"], a: 0, f: "Logic: The timeout period for violating the pay-to-play rule is 2 years (24 months) where the adviser must work for free if they manage that municipality's money."},
            {q: "The 'De Minimis' exception to the SEC Pay-to-Play rule allows an adviser to contribute how much per election to a candidate they are legally entitled to vote for?", c: ["$150", "$350"], a: 1, f: "Logic: You can give $350 if you can vote for the candidate (e.g., your local mayor). You can only give $150 if you cannot vote for them (e.g., the mayor of a different city)."},
            {q: "An Investment Adviser inadvertently receives a check from a client made payable directly to the IA. To avoid being legally deemed to have 'custody' of those funds, the IA must return the check to the client within:", c: ["3 business days", "7 business days"], a: 0, f: "Logic: Inadvertent receipt of client funds must be returned within 3 business days, or the IA must immediately comply with all the strict rules of maintaining legal custody."},
            {q: "Under NASAA rules, an Investment Adviser may execute discretionary trades based on a client's ORAL permission for a maximum of:", c: ["10 business days after the first discretionary trade", "Never; written permission is required before the first trade"], a: 0, f: "Logic: Investment Advisers get a 10-day grace period for oral discretion. Broker-Dealer Agents DO NOT; agents must have written authorization before executing the very first discretionary trade."},
            {q: "According to the Investment Advisers Act of 1940, the 'Brochure Rule' requires an adviser to deliver their Form ADV Part 2A (or equivalent brochure) to a new client:", c: ["At least 48 hours prior to signing the contract, or at the time of signing if the client has a 5-day penalty-free window to cancel", "Within 30 days of the end of the calendar year"], a: 0, f: "Logic: The rule ensures the client has time to read about the adviser's fees and conflicts before being permanently locked into a contract."},
            {q: "If a client enrolls in a 'Wrap Fee Program' (where trading and advisory fees are bundled into one flat rate), the adviser must provide the client with a specific disclosure document known as:", c: ["Schedule 13D", "Schedule H (or the Form ADV Part 2A Appendix 1)"], a: 1, f: "Logic: Wrap fee programs require a specialized brochure that explicitly explains that the client might actually pay more in a wrap program if they trade very infrequently."},
            {q: "Under the modernized SEC Marketing Rule, an Investment Adviser using 'Hypothetical Performance' in an advertisement must:", c: ["Ensure the hypothetical performance is relevant to the likely financial situation of the intended audience", "Never use hypothetical performance under any circumstances"], a: 0, f: "Logic: You can use hypothetical numbers, but you cannot blast them to the general public. They must be targeted to an audience that has the financial knowledge to understand they are fake numbers."},
            {q: "A broker-dealer executes an excessive number of trades in a client's discretionary account strictly to generate massive commission revenue for the firm. This illegal practice is called:", c: ["Commingling", "Churning"], a: 1, f: "Logic: Churning is the unethical practice of over-trading an account solely to line the broker's pockets, disregarding the client's actual investment objectives."},
            {q: "Under NASAA rules, which of the following is considered 'Commingling'?", c: ["A broker-dealer storing client securities in the exact same physical vault as the firm's own corporate securities", "A broker-dealer combining the cash of multiple different retail clients into a single omnibus account"], a: 0, f: "Logic: Commingling is the illegal mixing of CLIENT securities with the FIRM'S securities. Firms can mix client cash together, but they can never mix their own assets with client assets."},
            {q: "If an Investment Adviser Representative (IAR) also holds a license as a real estate agent and plans to sell property to their advisory clients, they must:", c: ["Disclose this massive conflict of interest to the client in writing", "Surrender their real estate license immediately"], a: 0, f: "Logic: Acting in dual capacities (selling advice and then selling the product) creates a massive conflict of interest. Fiduciaries aren't banned from doing it, but they must fully disclose it."},
            {q: "An Investment Adviser decides to direct all of its client trades to a specific broker-dealer because that broker-dealer provides the IA with free office space. This arrangement is:", c: ["Permitted under the Section 28(e) Safe Harbor", "A blatant conflict of interest and a violation of fiduciary duty"], a: 1, f: "Logic: Soft dollars can only be used for research that helps the client. Using client commissions to get free office rent only benefits the IA, making it highly illegal."},
            {q: "Under state and federal law, a financial professional's legal obligation to act with undivided loyalty and put the client's interests entirely above their own is known as:", c: ["The Suitability Standard", "Fiduciary Duty"], a: 1, f: "Logic: Agents follow the lower 'Suitability Standard' (the product must just be okay for the client). Investment Advisers must follow the strict 'Fiduciary Duty' (it must be the absolute best thing for the client)."},
            {q: "An agent receives a tip from an insider that a local pharmaceutical company's new drug just failed its FDA trial. The news will not be public until tomorrow. The agent immediately shorts the stock. This is a violation of:", c: ["The Insider Trading and Securities Fraud Enforcement Act of 1988", "The Securities Act of 1933"], a: 0, f: "Logic: Trading on Material, Non-Public Information (MNPI) is the textbook definition of insider trading under the 1988 Act and the 1934 Act."},
            {q: "A broker-dealer receives a written complaint from a furious client regarding a specific agent's behavior. Under NASAA rules, the broker-dealer must:", c: ["Keep a record of the complaint for 3 years", "Forward the complaint to the SEC within 10 days"], a: 0, f: "Logic: Written complaints must be recorded and kept on file by the broker-dealer for a minimum of 3 years (the first 2 years in a readily accessible location)."},
            {q: "If a client calls their agent and demands they execute a trade that the agent knows is completely unsuitable and extremely risky for the client's profile, the agent should:", c: ["Refuse to execute the trade under any circumstances", "Inform the client of the risks, and if the client insists, execute the trade and document it as 'unsolicited'"], a: 1, f: "Logic: Agents cannot refuse a direct order just because it is a bad idea. They must warn the client, execute the trade, and mark the ticket 'unsolicited' to protect the firm from liability."},
            {q: "Under the Uniform Securities Act, an Administrator may require a registered broker-dealer to file financial reports:", c: ["Daily", "As frequently as the Administrator strictly dictates, usually quarterly or annually"], a: 1, f: "Logic: The Administrator has the authority to dictate the frequency of financial reporting to ensure the firm maintains its required net capital."},
            {q: "An Investment Adviser charges a client a 2% management fee, but the IA also receives a 12b-1 fee from the mutual funds they place the client in. This practice is:", c: ["Illegal under the Investment Company Act of 1940", "Legal, provided the IA fully discloses this dual-compensation conflict of interest in writing"], a: 1, f: "Logic: 'Double dipping' is not inherently illegal, but because it heavily incentivizes the IA to pick funds that pay them kickbacks, it must be completely disclosed in the Form ADV."},
            {q: "Which of the following is NOT considered 'Material, Non-Public Information' (MNPI)?", c: ["A rumor heard on a financial television network about an upcoming merger", "The unreleased quarterly earnings report of a Fortune 500 company"], a: 0, f: "Logic: Rumors on TV are public information. To be MNPI, it must be factual, financially significant, and completely unavailable to the general public."},
            {q: "An agent receives a check from a client made payable directly to the broker-dealer. The agent should:", c: ["Immediately deposit it into the agent's personal account and electronically transfer it to the firm", "Promptly forward the check to the broker-dealer's cashiering or processing department"], a: 1, f: "Logic: Agents can never touch the money or mix it with their own funds. Checks made out to the firm must be immediately turned over to the firm for processing."},
            {q: "Under the Uniform Securities Act (USA), a financial publication is excluded from the definition of an Investment Adviser if it:", c: ["Is published on a regular, routine schedule and offers general advice", "Is published sporadically in response to specific market events"], a: 0, f: "Logic: To qualify for the publisher's exclusion, the publication must be general in nature (not tailored to specific clients) and published on a regular, routine schedule, regardless of market news."},
            {q: "If a registered Broker-Dealer is bought out and a successor firm takes over, the successor firm must file a new application. What is the fee requirement for the successor firm?", c: ["They must pay a full registration fee immediately", "The filing fee is waived until the next annual renewal date (December 31st)"], a: 1, f: "Logic: The USA encourages smooth transitions. The successor firm must file the paperwork so the state knows who is in charge, but they do not have to pay the fee again until the end of the year."},
            {q: "An Investment Adviser Representative (IAR) resigns from a Federal Covered Adviser. Who is legally responsible for notifying the State Administrator?", c: ["Only the IAR", "Both the IAR and the Federal Covered Adviser"], a: 0, f: "Logic: Because the Federal Covered firm reports strictly to the SEC, they don't talk to the state. Therefore, it is solely the IAR's responsibility to notify the state that they quit."},
            {q: "An Investment Adviser Representative (IAR) resigns from a State-Registered Adviser and goes to work for a different State-Registered Adviser. Who notifies the State Administrator?", c: ["Only the old firm", "The IAR, the old firm, and the new firm"], a: 1, f: "Logic: At the state level, everybody talks. The old firm says you left, the new firm says you arrived, and you confirm both. All three must notify the Administrator."},
            {q: "Under the USA, a gift of 'Assessable Stock' is legally defined as an:", c: ["Offer and a Sale", "Exempt Transaction"], a: 0, f: "Logic: Assessable stock allows the issuing company to demand more money from the shareholder later. Because gifting it essentially gives the recipient a potential financial liability, the regulators classify the 'gift' as a formal sale."},
            {q: "Which of the following transactions is explicitly EXEMPT from state registration under the USA?", c: ["A transaction executed by a bona fide pledgee, executor, or sheriff", "An Initial Public Offering (IPO) of a micro-cap company"], a: 0, f: "Logic: Fiduciary transactions (like a sheriff's sale, bankruptcy trustee, or executor of an estate liquidating assets) are exempt because they are court-mandated or legally necessary, not standard capital-raising events."},
            {q: "A State Administrator has the power to issue a 'Cease and Desist' order against a registered agent. The Administrator may issue this order:", c: ["With or without a prior hearing", "Only after a formal hearing has taken place"], a: 0, f: "Logic: Administrators can issue cease and desist orders summarily (immediately) without a hearing if they believe the public is in imminent danger. A hearing must be granted *afterward* if requested."},
            {q: "Under the USA, an Investment Advisory contract MUST:", c: ["Be in writing", "Allow for the assignment of the contract without client consent"], a: 0, f: "Logic: While the federal Investment Advisers Act of 1940 technically allows oral contracts, the state-level USA strictly requires all advisory contracts to be in writing."},
            {q: "An Investment Adviser includes an 'Exculpatory Clause' (a hedge clause) in their client contract, which forces the client to waive their right to sue the adviser for USA violations. This clause is:", c: ["Permitted if the client is highly accredited", "Null, void, and completely unenforceable"], a: 1, f: "Logic: You cannot force a client to sign away their legal rights. Any clause that attempts to absolve the adviser of their fiduciary or legal liability is void."},
            {q: "An Investment Adviser must offer to deliver a free, updated copy of their Form ADV Part 2A (Brochure) to all clients:", c: ["Within 120 days of the end of the adviser's fiscal year", "Within 90 days of the end of the calendar year"], a: 0, f: "Logic: Advisers must officially update their ADV within 90 days of their fiscal year-end, and they have an additional 30 days (120 days total) to deliver it or offer it to their clients."},
            {q: "When a broker-dealer agent sells a security to a client, which of the following details must be disclosed on the trade confirmation?", c: ["Whether the firm acted in an agency or principal capacity", "The exact time the trade was executed down to the millisecond"], a: 0, f: "Logic: The client must know if the firm acted as a middleman (Agency) and charged a commission, or if they sold the stock out of their own inventory (Principal) and charged a markup."},
            {q: "Under the Section 28(e) Safe Harbor, an Investment Adviser may legally use client 'Soft Dollars' to pay a broker-dealer for:", c: ["Travel and hotel expenses to attend a financial research seminar", "Access to a Bloomberg terminal and financial modeling software"], a: 1, f: "Logic: Soft dollars can only be used for research and software that directly aids in making investment decisions. Tangible overhead like rent, travel, computers, and salaries are strictly prohibited."},
            {q: "An individual representing an issuer is trying to sell short-term corporate promissory notes (commercial paper). To qualify as an exempt security under the USA, the paper must have a maximum maturity of 270 days and be issued in minimum denominations of:", c: ["$50,000", "$100,000"], a: 0, f: "Logic: Commercial paper is exempt from state registration if it matures in 9 months (270 days) or less, is rated in the top three categories, and is issued in minimum blocks of $50,000."},
            {q: "If an Investment Adviser discovers their net worth has fallen below the minimum required by the State Administrator, they must notify the Administrator by:", c: ["The close of business on the next business day", "Within 5 business days"], a: 0, f: "Logic: Financial distress must be reported immediately. The IA must notify the state by the close of business tomorrow, and file a detailed financial report the day after that."},
            {q: "An Investment Adviser is advertising a proprietary technical charting system. The advertisement MUST disclose:", c: ["The exact underlying algorithms used in the system", "The limitations and difficulties of actually using the system"], a: 1, f: "Logic: You can advertise charting systems, but you cannot claim they are foolproof. You must prominently disclose that no system can guarantee profits and they are difficult to use."},
            {q: "If an Investment Adviser receives a check from a client that is made payable to a third party (like a clearing firm or custodian), the adviser must forward that check within:", c: ["3 business days", "24 hours"], a: 0, f: "Logic: If the check is written to a third party, the IA doesn't technically have custody, BUT they must forward it to that third party within 3 business days to avoid triggering custody rules."},
            {q: "An offer to sell a security is made via a television broadcast originating in State A, and the broadcast is seen by a resident in State B. Under the USA, which State Administrator has jurisdiction over the offer?", c: ["Only State A", "Both State A and State B"], a: 0, f: "Logic: A radio or television broadcast is only considered an offer in the state where the broadcast camera/microphone is located (State A). It is not an offer in any state where it is merely received/viewed."},
            {q: "An agent sends an email from their office in State A to a client in State B. The client accepts the offer while on vacation in State C. Which Administrators have jurisdiction over this transaction?", c: ["States A, B, and C", "Only State A and State C"], a: 0, f: "Logic: Jurisdiction applies to the state where the offer originated (A), the state it was directed to (B), and the state where it was ultimately accepted (C). All three Administrators have authority."},
            {q: "A broker-dealer heavily recommends the exact same proprietary mutual fund to every single client, regardless of their age, income, or risk tolerance. This is an unethical practice known as a:", c: ["Blanket recommendation", "Selling dividends"], a: 0, f: "Logic: Blanket recommendations blatantly violate the suitability standard. An agent must evaluate the specific financial situation of each client before making a recommendation."},
            {q: "Which of the following is considered an unethical practice for a broker-dealer agent but is perfectly legal for an Investment Adviser?", c: ["Exercising discretionary trading power based purely on oral authorization for up to 10 days", "Charging a performance-based fee to a retail client"], a: 0, f: "Logic: IAs get a 10-day grace period to use oral discretion before getting the written paperwork. Agents of broker-dealers MUST have the written paperwork in hand before the very first trade."},
            {q: "Under the USA, the term 'Issuer' refers to any person who issues or proposes to issue a security. However, in the case of Certificates of Deposit (CDs) or voting trust certificates, the issuer is the:", c: ["The person performing the acts and assuming the duties of the depositor or manager", "The broker-dealer selling the certificates"], a: 0, f: "Logic: For trusts and equipment trust certificates where there is no board of directors, the 'issuer' is legally defined as the manager or depositor controlling the assets."},
            {q: "In a 'Non-Issuer Transaction', the primary benefit and proceeds of the sale go to:", c: ["The company that originally issued the shares", "The selling shareholder"], a: 1, f: "Logic: A non-issuer transaction is just a secondary market trade. If you sell your Apple stock on the NYSE, the money goes to you (the shareholder), not to Apple."},
            {q: "A client opens a margin account. The agent executes the first trade on margin before the client has physically signed the margin agreement. Under NASAA rules, this action is:", c: ["Strictly prohibited", "Permitted, provided the margin agreement is signed and returned promptly after the initial transaction"], a: 1, f: "Logic: Unlike discretionary authority which requires a signature *before* the trade, margin agreements can legally be signed promptly *after* the first margin trade is executed."},
            {q: "Under the USA, a 'Security' does NOT include:", c: ["A fixed, whole life insurance policy", "An uncollateralized promissory note"], a: 0, f: "Logic: Fixed insurance products (whole life, fixed annuities) are not securities. Promissory notes (debt) absolutely are securities."},
            {q: "If an agent discovers they have material inside information about a company, the agent should immediately:", c: ["Sell their personal holdings of the stock, but not the clients'", "Notify their supervisor or the firm's compliance department"], a: 1, f: "Logic: Trading on MNPI (even to save your own portfolio) is highly illegal. You must freeze and report the information to compliance so they can place the stock on the firm's restricted list."},
            {q: "According to NASAA rules regarding cybersecurity, a registered investment adviser must:", c: ["Guarantee that a cyber breach will never occur", "Establish and maintain a written Information Security Policy"], a: 1, f: "Logic: Regulators know hacks happen. They don't expect perfection, but they legally require a comprehensive, written policy outlining how the firm protects data and responds to breaches."},
            {q: "An agent intentionally delays the execution of a client's large block trade until after the agent buys shares of the same stock for their own personal account. This illegal practice is called:", c: ["Front running", "Matched orders"], a: 0, f: "Logic: Stepping in front of a client's massive trade to profit from the price movement that their trade will cause is classic front running."},
            {q: "Under the USA, what is the maximum length of time an Administrator can suspend an agent's registration summarily (without a prior hearing) while an investigation is pending?", c: ["Until the final determination of the proceeding is made", "30 days"], a: 0, f: "Logic: A summary suspension can last indefinitely while the investigation is ongoing. However, the agent has the right to request a hearing, which must be held within 15 days of the request."},
            {q: "An Investment Adviser structures their fee schedule to charge 1% for accounts up to $1M, and 0.5% for accounts over $1M. This fee structure is:", c: ["Perfectly acceptable, provided it is fully disclosed in the brochure", "An illegal performance-based fee"], a: 0, f: "Logic: Tiered or discounted fees based on total Assets Under Management (AUM) are standard industry practice and completely legal as long as they are disclosed."},
            {q: "If a registered broker-dealer is acting in the capacity of an 'Underwriter' for a new initial public offering (IPO), they are operating in the:", c: ["Primary market", "Secondary market"], a: 0, f: "Logic: The primary market is where new securities are created and sold to the public for the very first time (IPOs). The secondary market is where investors trade existing shares among themselves."},
            {q: "Under the Investment Advisers Act of 1940, 'Access Persons' (employees with access to non-public client trade info) must report their personal securities transactions to the Chief Compliance Officer:", c: ["Annually", "Quarterly"], a: 1, f: "Logic: To prevent front-running and insider trading, access persons must report their personal holdings within 10 days of being hired, and report all personal transactions quarterly."},
            {q: "An Investment Adviser Representative (IAR) works for a Federal Covered Adviser. Under the Uniform Securities Act, the IAR must register in:", c: ["Every state where they have at least one retail client", "Only the states where the IAR maintains a physical place of business"], a: 1, f: "Logic: Because their firm is regulated by the SEC, the state has very limited power over the IAR. The state can only force the IAR to register if they actually have a desk/office in that state."},
            {q: "Unlike an IAR for a Federal Covered Adviser, an Agent for a Broker-Dealer must register in:", c: ["Only the state where their primary office is located", "Every single state where they solicit or conduct business with clients"], a: 1, f: "Logic: Broker-dealer agents do not get the 'place of business' loophole. If an agent calls a client in State B, the agent MUST be registered in State B, regardless of where the agent's desk is."},
            {q: "An Investment Adviser takes custody of client funds and is subject to an annual surprise audit. Who is legally responsible for filing the Form ADV-E with the SEC?", c: ["The Chief Compliance Officer (CCO) of the IA", "The independent public accountant conducting the exam"], a: 1, f: "Logic: The 'E' stands for Exam. To prevent the adviser from forging the results, the independent CPA must submit the Form ADV-E directly to the regulators."},
            {q: "Under SEC Regulation D, Rule 506(c) differs from Rule 506(b) because Rule 506(c):", c: ["Permits general solicitation and advertising, but absolutely all purchasers must be verified accredited investors", "Prohibits general advertising but allows up to 35 unaccredited investors"], a: 0, f: "Logic: Rule 506(c) allows issuers to advertise their private placement on TV or the internet, but the trade-off is they cannot accept a single dime from non-accredited investors."},
            {q: "To qualify as an 'Accredited Investor' based on net worth under Regulation D, an individual must have a net worth exceeding $1,000,000:", c: ["Including the equity in their primary residence", "Excluding the value of their primary residence"], a: 1, f: "Logic: Congress changed the rule following the 2008 housing crash. Your house no longer counts toward your $1M net worth requirement to be deemed an accredited investor."},
            {q: "If a client wins a civil lawsuit against a broker-dealer for the illegal sale of a security under the USA, the client is entitled to recover:", c: ["Treble damages (three times the original investment)", "The original purchase price, plus interest, plus attorney fees, minus any income received"], a: 1, f: "Logic: Civil liability under the USA is designed to make the client 'whole' again, not to make them rich. Treble damages only apply to SEC insider trading cases."},
            {q: "A broker-dealer realizes they sold an unregistered security and offers the client a 'Letter of Rescission' to buy it back. If the client fails to accept or reject the offer within 30 days:", c: ["The client automatically wins a default judgment in court", "The client permanently loses their right to sue the broker-dealer for that specific trade"], a: 1, f: "Logic: The 30-day window is strict. If the client ignores the letter, the broker-dealer is legally off the hook and the client forfeits their right to file a civil lawsuit."},
            {q: "Under the Uniform Securities Act, the definition of a 'Person' includes corporations, partnerships, and trusts, but explicitly EXCLUDES:", c: ["Non-profit organizations", "Minors, deceased individuals, and the mentally incompetent"], a: 1, f: "Logic: A 'person' must be a legally competent entity capable of signing a binding contract. Minors, dead people, and legally incompetent individuals cannot."},
            {q: "A top-tier mutual fund registered under the Investment Company Act of 1940 is considered a 'Federal Covered Security'. To sell this fund in a specific state, the issuer must:", c: ["Submit a Notice Filing and pay a filing fee to the State Administrator", "Complete a full Registration by Coordination with the state"], a: 0, f: "Logic: The state cannot force a Federal Covered Security to go through a rigorous registration review, but they absolutely demand a 'Notice Filing' to collect their state filing fees."},
            {q: "Under the Bank Secrecy Act, if a financial institution detects suspicious activity related to money laundering or terrorism financing, they must file a Suspicious Activity Report (SAR) within:", c: ["15 days of the discovery", "30 days of the discovery"], a: 1, f: "Logic: SARs must be filed with FinCEN within 30 days. (Currency Transaction Reports for $10k+ cash deposits must be filed within 15 days)."},
            {q: "In an Insider Trading case, who can be held legally liable?", c: ["Only the 'Tippee' who actually executed the trade", "Both the 'Tipper' who shared the info and the 'Tippee' who traded on it"], a: 1, f: "Logic: Both parties are liable. The tipper breached their fiduciary duty to keep the information secret, and the tippee traded knowing the information was illegally obtained."},
            {q: "A registered investment company (mutual fund) charges a 'Fulcrum Fee' (a type of performance fee). By law, this fee must:", c: ["Increase and decrease symmetrically against a designated benchmark", "Be structured to only capture upside gains without penalizing the manager for downside losses"], a: 0, f: "Logic: Performance fees for mutual funds must be a two-way street. If the manager gets a bonus for beating the S&P 500, they must take a mathematically equal pay cut if they underperform it."},
            {q: "An Investment Adviser must officially update their Form ADV with the SEC or State Administrator:", c: ["Within 90 days of the end of the adviser's fiscal year", "Within 30 days of the end of the calendar year"], a: 0, f: "Logic: The mandatory annual updating amendment must be filed within 90 days of the firm's fiscal year-end to keep their registration active."},
            {q: "If an Investment Adviser makes material changes to their Form ADV Part 2A (Brochure), they must deliver the updated brochure (or a summary of material changes) to existing clients:", c: ["Within 120 days of the end of the adviser's fiscal year", "Promptly, within 5 business days"], a: 0, f: "Logic: The IA has 90 days to file the update with the regulators, and an additional 30 days (120 days total from the end of the fiscal year) to get it to the clients."},
            {q: "An Investment Adviser is deemed to have 'Custody' solely because they directly deduct their advisory fees from the client's account. Under NASAA rules, the adviser must:", c: ["Maintain a minimum net worth of $35,000", "Send an itemized invoice to the client simultaneously when sending the deduction request to the custodian"], a: 1, f: "Logic: If an IA's *only* form of custody is direct fee deduction, NASAA waives the $35k net worth and surprise audit rules, provided the IA sends concurrent invoices so the client can verify the math."},
            {q: "Which of the following individuals MUST register as an Agent under the Uniform Securities Act?", c: ["An individual representing an ISSUER selling U.S. Treasury Bonds", "An individual representing a BROKER-DEALER selling U.S. Treasury Bonds"], a: 1, f: "Logic: If you represent an ISSUER selling exempt securities (like the government or a municipality), you do NOT register. If you work for a BROKER-DEALER, you MUST register regardless of what you are selling."},
            {q: "Under the Dodd-Frank Act, the 'Private Fund Adviser Exemption' relieves an adviser from SEC registration if they solely advise private funds and have total Assets Under Management (AUM) in the U.S. of less than:", c: ["$100 million", "$150 million"], a: 1, f: "Logic: Advisers to private funds (like hedge funds) get a higher threshold before mandatory SEC registration kicks in: $150M compared to the standard $110M for regular retail advisers."},
            {q: "Under the SEC's modernized Marketing Rule, an Investment Adviser's advertisement may feature a rating from an independent third-party site (like Morningstar) ONLY IF:", c: ["The adviser ensures the rating is highly favorable", "The advertisement clearly discloses the date of the rating and if any compensation was paid to obtain or use it"], a: 1, f: "Logic: Third-party ratings are allowed, but they require strict disclosures to ensure the client knows the context of the rating and whether the IA paid to be featured."},
            {q: "Under the SEC Pay-to-Play rule, the standard 'look-back' period for a newly hired Covered Associate who solicits clients for the firm is:", c: ["6 months", "2 years"], a: 1, f: "Logic: If you hire an executive to solicit government business, the SEC looks back at their political donations for the last 2 years. If they made a large donation to the mayor 18 months ago, the firm is banned from getting that city's business today."},
            {q: "In an 'Agency Cross Transaction', an Investment Adviser acts as the broker for both the buyer and the seller. The IA is strictly prohibited from:", c: ["Charging a commission on the transaction", "Recommending the trade to both the buyer and the seller"], a: 1, f: "Logic: You cannot tell Client A to sell a stock and simultaneously tell Client B to buy it just to generate double commissions. One side of the trade must be completely unsolicited."},
            {q: "A Broker-Dealer has no office in State B. The firm is EXCLUDED from the definition of a Broker-Dealer in State B (and therefore does not need to register) if their only clients in State B are:", c: ["Fewer than 5 retail investors", "Issuers, other Broker-Dealers, and institutional investors (e.g., banks and mutual funds)"], a: 1, f: "Logic: The 'De Minimis' rule (5 or fewer retail clients) applies to Investment Advisers, NOT Broker-Dealers. A BD with even ONE retail client in a state must register. However, if a BD only deals with massive institutions, they are fully excluded."},
            {q: "To qualify for the Promissory Note (Commercial Paper) exemption under the Securities Act of 1933, the paper must mature in no more than:", c: ["270 days", "365 days"], a: 0, f: "Logic: The magic number for commercial paper exemption at both the state (USA) and federal (1933 Act) levels is a maximum maturity of 270 days (9 months)."},
            {q: "An Investment Adviser is granted 'Power of Attorney' to write checks out of a client's checkbook to pay the client's bills. Under USA rules, this adviser:", c: ["Has limited discretionary authority", "Has full legal Custody of the client's funds"], a: 1, f: "Logic: Custody is defined as the ability to possess or appropriate client funds. Having the legal authority to sign checks on the client's behalf is the ultimate form of custody."},
            {q: "An Investment Adviser creates an advertisement showcasing their past stock recommendations. To comply with SEC rules, the advertisement MUST include:", c: ["Only the recommendations that resulted in a net profit", "All recommendations made by the adviser over at least the preceding 1-year period"], a: 1, f: "Logic: You cannot 'cherry-pick' only your winning trades. If you show past recommendations, you must show ALL of them (the good, the bad, and the ugly) for at least the last year."},
            {q: "If an Investment Adviser pays a prominent financial influencer to endorse their firm on a podcast, the endorsement MUST disclose:", c: ["That it is a paid advertisement, even if the compensation was a flat fee of $100", "Compensation details only if the payment exceeded $1,000"], a: 0, f: "Logic: Any compensation (cash or non-cash) given for a testimonial or endorsement must be explicitly disclosed so the public knows the influencer was bought and paid for."},
            {q: "Under the Securities Exchange Act of 1934, Broker-Dealers are legally required to maintain most of their books and records (including trade blotters and ledgers) for a period of:", c: ["3 years", "5 years"], a: 0, f: "Logic: Broker-Dealers follow the 3-year rule. Investment Advisers follow the 5-year rule. (Note: For both, the records must be kept easily accessible for the first 2 years)."},
            {q: "A financial institution must file a Currency Transaction Report (CTR) with FinCEN when a client executes a physical cash transaction (or multiple linked cash transactions in a single day) exceeding:", c: ["$5,000", "$10,000"], a: 1, f: "Logic: The $10,000 threshold strictly applies to physical currency (cash, coins). Wire transfers and personal checks do not trigger a CTR."},
            {q: "The Securities Investor Protection Corporation (SIPC) provides coverage to investors in the event of:", c: ["A catastrophic drop in the stock market", "The financial failure and bankruptcy of a broker-dealer"], a: 1, f: "Logic: SIPC is like FDIC insurance for brokerage accounts. It does not protect against bad investments or market crashes; it solely protects your assets if the firm holding them goes out of business."},
            {q: "SIPC coverage provides protection up to a maximum of:", c: ["$500,000 total per separate capacity, of which no more than $250,000 can be for cash", "$250,000 total per separate capacity"], a: 0, f: "Logic: SIPC covers up to $500k in securities and cash, but the cash portion is strictly capped at $250k. (FDIC insurance for banks covers $250k in cash)."},
            {q: "Under the Uniform Securities Act, an Administrator may require the filing of advertising and sales literature EXCEPT when:", c: ["The security is an exempt security or the transaction is an exempt transaction", "The materials are distributed exclusively to fewer than 10 retail clients"], a: 0, f: "Logic: The Administrator cannot force you to file advertising for securities that are already exempt from state registration (like municipal bonds) or trades that are exempt (like an unsolicited order)."},
            {q: "According to NASAA rules, an Investment Adviser must deliver a brochure (Form ADV Part 2A) to a client:", c: ["At least 48 hours prior to signing the contract, or at the time of signing with a 5-day right to cancel without penalty", "Within 7 days of signing the advisory contract"], a: 0, f: "Logic: The brochure rule ensures the client has time to review the adviser's fees, background, and conflicts of interest before being legally locked into paying them."},
            {q: "Under the USA, a newspaper published in State A has 80% of its total circulation in State B. An advertisement for a security in this newspaper is considered an offer in:", c: ["Neither State A nor State B", "Both State A and State B"], a: 0, f: "Logic: If a publication has more than two-thirds (66.6%) of its circulation outside the state where it is published, the USA declares it is not an offer in ANY state, removing the jurisdiction headache."},
            {q: "The Investment Advisers Act of 1940 defines an Investment Adviser using a three-prong test. Which of the following is NOT one of the prongs?", c: ["Must have a minimum of $25 million in assets under management", "Must provide advice about securities as a regular part of their business"], a: 0, f: "Logic: The ABC Test defines an IA: Advice about securities, as a Business, for Compensation. The amount of AUM only dictates *where* they register (State vs. SEC), not *if* they are an IA."},
            {q: "Under the Securities Exchange Act of 1934, an institutional investment manager exercising discretion over $100 million or more in qualifying equity securities must file:", c: ["Form 13F", "Schedule 13D"], a: 0, f: "Logic: Form 13F is filed quarterly by massive institutional managers (like hedge funds or mutual funds) with $100M+ in assets so the SEC can track large block holdings."},
            {q: "Under the USA, a new agent's registration becomes legally effective:", c: ["30 days after filing, unless the Administrator accelerates the date", "Exactly 45 days after the applicant passes their Series 66 exam"], a: 0, f: "Logic: Assuming no disciplinary red flags or missing paperwork, state registrations automatically become effective at noon on the 30th day after filing."},
            {q: "A client instructs an agent to 'Buy 500 shares of tech stock whenever you think the price is right today.' This order:", c: ["Requires written discretionary authority on file", "Does not require written discretion because the agent is only deciding the time and price for that specific day"], a: 1, f: "Logic: If the client specifies the exact Asset (tech stock), Action (Buy), and Amount (500 shares), the agent does not need formal discretion just to pick the Time or Price."},
            {q: "Under the USA, the definition of a 'Sale' explicitly EXCLUDES:", c: ["A contract to sell a security for value", "A bona fide pledge or loan of a security"], a: 1, f: "Logic: Pledging stock as collateral for a margin loan is not a sale because the ownership of the stock hasn't permanently transferred to the lender."},
            {q: "According to the Investment Company Act of 1940, at least what percentage of a mutual fund's Board of Directors must be 'non-interested' (independent) persons?", c: ["40%", "60%"], a: 0, f: "Logic: To protect shareholders from the fund's management company, federal law requires that a minimum of 40% of the board must be completely independent outsiders."},
            {q: "Under NASAA Model Rules, if an Investment Adviser requires the prepayment of fees of more than $500, six or more months in advance, the adviser must:", c: ["Include an audited balance sheet with their Form ADV Part 2A", "Register with the SEC as a Federal Covered Adviser"], a: 0, f: "Logic: Taking substantial money far in advance is a major financial liability. The state wants proof (an audited balance sheet) that the firm is solvent enough to issue refunds if they go out of business. (Note: The SEC threshold is $1,200)."},
            {q: "To comply with the Intrastate Offering Exemption (Rule 147) under the Securities Act of 1933, what percentage of the issuer's gross revenues must be derived from operations within the state?", c: ["80%", "100%"], a: 0, f: "Logic: To avoid registering with the SEC, the company must be truly local: 80% of revenue, 80% of assets, and 80% of proceeds must stay within the state, and 100% of buyers must be residents."},
            {q: "Under the USA, an individual who represents an issuer in selling securities strictly to the company's existing employees, and does NOT receive any commission for the sales, is:", c: ["Required to register as an Agent of the Issuer", "Excluded from the definition of an Agent"], a: 1, f: "Logic: An HR rep helping employees enroll in the company stock plan isn't a stockbroker. As long as they aren't paid a commission for the sales, they don't have to register."},
            {q: "An Investment Adviser Representative (IAR) gives a client a prospectus for a mutual fund, highlights the best-performing years with a yellow marker, and tells the client to ignore the rest. This practice is:", c: ["An unethical and prohibited practice", "Permitted since the client was provided with the full statutory prospectus"], a: 0, f: "Logic: A prospectus is a legal disclosure document. You can NEVER highlight, underline, alter, or summarize a prospectus, as it draws attention away from the risk disclosures."},
            {q: "A broker-dealer executes a trade for a client out of their own inventory and charges a markup. This indicates the firm acted in a:", c: ["Principal capacity", "Agency capacity"], a: 0, f: "Logic: Principal = Dealer = Inventory = Markup. Agency = Broker = Middleman = Commission."},
            {q: "Under the Uniform Securities Act, which of the following is considered an 'Exempt Security'?", c: ["A promissory note (commercial paper) maturing in 9 months or less, issued in denominations of at least $50,000", "A stock issued by a local, privately-held manufacturing company"], a: 0, f: "Logic: Highly rated, short-term commercial paper is exempt. Stock issued by a normal, private corporation must be registered or find an exempt transaction (like a private placement)."},
            {q: "If a Federal Covered Adviser drops below $90 million in Assets Under Management (AUM), they must:", c: ["Withdraw their SEC registration and register with the applicable states within 180 days", "Immediately notify the SEC and shut down operations until AUM recovers"], a: 0, f: "Logic: There is a buffer zone to prevent firms from bouncing back and forth. You must register with the SEC at $110M, but you don't get kicked out until you drop below $90M."},
            {q: "According to SEC rules, an Investment Adviser's Form ADV Part 2B (Brochure Supplement) provides clients with information regarding:", c: ["The specific individuals (supervised persons) who will be providing the investment advice", "The firm's audited financial balance sheet"], a: 0, f: "Logic: Part 2A is about the FIRM (fees, conflicts, strategies). Part 2B is the supplement about the ACTUAL PERSON (their education, background, and disciplinary history)."},
            {q: "An agent leaves Broker-Dealer A and immediately registers with Broker-Dealer B. Under the USA, who must notify the State Administrator?", c: ["Only the agent", "The agent, Broker-Dealer A, and Broker-Dealer B"], a: 1, f: "Logic: At the broker-dealer level, everybody talks. The old firm, the new firm, and the agent must all separately notify the Administrator of the change."},
            {q: "A Canadian broker-dealer with no office in the U.S. has a Canadian client who temporarily moves to Florida for the winter. Under the USA, the Canadian BD:", c: ["Can continue doing business with the client without registering in Florida", "Must register in Florida within 30 days of the client's arrival"], a: 0, f: "Logic: The USA provides a specific 'Snowbird' exemption. As long as the client is temporarily in the U.S. and the firm has no U.S. office, they can continue trading without registering."},
            {q: "Under the Securities Act of 1933, a 'Red Herring' is a preliminary prospectus used to:", c: ["Gather indications of interest during the cooling-off period", "Solicit binding sales before the registration becomes effective"], a: 0, f: "Logic: During the 20-day cooling-off period, an agent can send a red herring to see if clients *might* want the stock, but it cannot be used to make actual sales or accept any money."},
            {q: "An individual who provides financial planning services for a fee, but only recommends broad asset allocation strategies (no specific stocks), must register as:", c: ["An Investment Adviser", "A Broker-Dealer"], a: 0, f: "Logic: Giving advice on 'securities' includes broad asset allocation involving securities. If you do it as a business for compensation, you meet the ABC test of an IA."},
            {q: "Under NASAA Model Rules, an Investment Adviser who wishes to maintain custody of client funds must:", c: ["Notify the Administrator in writing, unless state law prohibits custody entirely", "Maintain a minimum net capital of $250,000"], a: 0, f: "Logic: You cannot just take custody quietly. You must formally notify the State Administrator on your Form ADV, and the state has the power to prohibit it entirely."},
            {q: "The primary purpose of the Securities Act of 1933 is to:", c: ["Regulate the secondary market trading of securities", "Require full and fair disclosure of material facts in the issuance of new securities"], a: 1, f: "Logic: The 1933 Act (The Paper Act) regulates the Primary Market (IPOs) by forcing companies to issue a prospectus. The 1934 Act (The People Act) regulates the Secondary Market and broker-dealers."},
            {q: "An agent inadvertently overhears a corporate officer discussing an unannounced dividend cut. The agent immediately calls their best client to warn them. The client sells the stock. Who violated insider trading laws?", c: ["Only the client", "Both the agent and the client"], a: 1, f: "Logic: Passing the information makes the agent the 'Tipper', and executing the trade makes the client the 'Tippee'. Both are legally liable for insider trading."},
            {q: "Under the USA, an unsolicited order from a retail client to purchase an unregistered, non-exempt security is:", c: ["An exempt transaction", "An illegal transaction"], a: 0, f: "Logic: Even if the security is normally illegal to sell in that state, if the client calls the agent out of the blue and demands it (unsolicited), the trade qualifies as an exempt transaction."},
            {q: "An Investment Adviser Representative (IAR) strongly recommends a specific tech stock to a client, while secretly liquidating their own massive personal position in that same stock. This is an unethical practice known as:", c: ["Scalping", "Churning"], a: 0, f: "Logic: Scalping is hyping up a stock to clients to drive the price up (or artificially support it) while you secretly sell your own shares into the demand."},
            {q: "If a state Administrator issues a summary order suspending an agent's registration, the agent has the right to request a hearing. Once requested, the hearing must be held within:", c: ["15 days", "30 days"], a: 0, f: "Logic: An Administrator can suspend you immediately without warning. However, if you fight it, they must grant you a formal hearing within 15 days of your written request."},
            {q: "Which of the following is NOT required to be included on an order ticket under USA recordkeeping rules?", c: ["The name of the client's attorney", "The time of order execution"], a: 0, f: "Logic: Order tickets must include the account number, the agent, the time entered, the time executed, and the terms. It does not include personal client data like their attorney's name."},
            {q: "Under SEC Release IA-1092, which of the following professionals would most likely be classified as an Investment Adviser?", c: ["A sports and entertainment agent who negotiates contracts and manages the athletes' investment portfolios for a single comprehensive fee", "A high school economics teacher who discusses the stock market in class"], a: 0, f: "Logic: IA-1092 expanded the definition of an IA to include sports agents, pension consultants, and financial planners if they provide investment advice as part of their compensated services."},
            {q: "Under the Uniform Securities Act, a gift of non-assessable stock is considered:", c: ["Not a sale, and therefore not subject to the USA's jurisdiction", "A sale, requiring the stock to be registered"], a: 0, f: "Logic: Assessable stock carries a liability, so gifting it is a 'sale'. Standard non-assessable stock carries no liability, so giving it away is a true gift and completely outside the Administrator's jurisdiction."},
            {q: "Under the Uniform Securities Act, if an Investment Adviser's net worth falls below the state's minimum requirement, the adviser must file a detailed financial report with the Administrator:", c: ["By the close of business on the day after notifying the Administrator", "Within 30 days of the deficiency"], a: 0, f: "Logic: Financial distress triggers a rapid-response protocol. You must notify the state immediately (by tomorrow), and file a full financial report the day after that."},
            {q: "Which of the following is considered an 'Exempt Transaction' under the USA?", c: ["A secondary market trade of a stock listed on the New York Stock Exchange (NYSE)", "An Initial Public Offering (IPO) of a local tech startup"], a: 0, f: "Logic: A trade of a federal covered security (like an NYSE-listed stock) on the secondary market is an exempt transaction, meaning the trade itself does not require state registration."},
            {q: "A broker-dealer firm is acquired by a larger competitor. What happens to the registrations of the agents who work for the acquired firm?", c: ["Their registrations are immediately terminated, and they must pass the Series 63/66 again", "Their registrations can be transferred to the successor firm without paying a new filing fee until the end of the year"], a: 1, f: "Logic: To prevent massive disruptions to clients, the USA allows agents to transition to the successor firm. The new firm files the paperwork, but no new fees are due until the December 31st renewal."},
            {q: "Under the USA, a 'Person' is defined broadly. Which of the following would NOT meet the legal definition of a Person?", c: ["An unincorporated organization", "A minor child"], a: 1, f: "Logic: Minors, deceased individuals, and legally incompetent adults are not 'Persons' under the USA because they cannot legally be bound by a contract."},
            {q: "An Investment Adviser Representative (IAR) forms a partnership with a certified public accountant (CPA). The CPA refers wealthy tax clients to the IAR for a flat $500 referral fee per client. Under the SEC Marketing Rule, this arrangement is:", c: ["Illegal under all circumstances", "Legal, provided the client receives written disclosure of the compensation arrangement"], a: 1, f: "Logic: Paying for referrals (solicitor fees) is legal, but it creates a massive conflict of interest. The client MUST be informed in writing that the CPA is being paid to recommend the IAR."},
            {q: "According to the USA, an agent's registration is strictly tied to their employment. If an agent is terminated, their registration is:", c: ["Suspended until they join a new broker-dealer", "Valid for 60 days to allow them time to find a new firm"], a: 0, f: "Logic: You cannot be a 'freelance' agent. If you are not affiliated with a registered broker-dealer or issuer, your registration is immediately placed in suspense."},
            {q: "If an Investment Adviser takes physical custody of a client's funds, the adviser must arrange for an independent public accountant to conduct a surprise audit at least:", c: ["Once every 3 years", "Annually"], a: 1, f: "Logic: Custody requires strict oversight. An independent CPA must show up unannounced once a year to count the money and ensure the adviser isn't running a Ponzi scheme."},
            {q: "Under the Securities Exchange Act of 1934, the SEC has the authority to suspend all trading on a specific national exchange (like the NYSE) for up to:", c: ["90 days, with the approval of the President of the United States", "10 days, unilaterally"], a: 0, f: "Logic: The SEC can suspend trading in a specific *stock* for 10 days unilaterally. To shut down an entire *exchange*, they need the President's approval and can do so for up to 90 days."},
            {q: "Which of the following describes the 'De Minimis' exemption for an Investment Adviser under the Uniform Securities Act?", c: ["The adviser has no physical office in the state and directs communications to 5 or fewer retail clients in the state during a 12-month period", "The adviser exclusively manages institutional accounts and has less than $25 million in AUM"], a: 0, f: "Logic: No office + 5 or fewer retail clients = De Minimis exemption from state registration for an Investment Adviser. (Remember: this exemption does NOT exist for broker-dealers)."},
            {q: "Under the USA, an Administrator may issue a subpoena for documents or testimony. If the subject of the subpoena refuses to comply, the Administrator may:", c: ["Issue a warrant for their immediate arrest", "Apply to a court of competent jurisdiction to legally compel compliance (Contempt of Court)"], a: 1, f: "Logic: Administrators are not police officers or judges. They cannot arrest people. If you ignore their subpoena, they must go to a real judge, who will hold you in contempt of court."},
            {q: "A client instructs their IAR to 'buy 1,000 shares of the best tech stock you can find today.' This order:", c: ["Requires written discretionary authority because the IAR is choosing the specific asset", "Can be executed using oral discretion for up to 10 days"], a: 1, f: "Logic: Because the client left the specific *Asset* up to the IAR, it is a discretionary trade. IARs get a 10-day grace period for oral discretion (Agents do not)."},
            {q: "Under the Securities Act of 1933, a company issuing new securities must observe a 20-day 'Cooling-Off' period. During this period, agents are permitted to:", c: ["Accept partial deposits to reserve shares for interested clients", "Distribute a preliminary prospectus (Red Herring) to gather indications of interest"], a: 1, f: "Logic: During the cooling-off period, you can talk about the stock and hand out a Red Herring to see who might want it, but you absolutely CANNOT take a single dime or make a binding sale."},
            {q: "An Investment Adviser is updating their Form ADV. Which part of the Form ADV serves as the primary disclosure document (the 'Brochure') handed to retail clients?", c: ["Form ADV Part 1", "Form ADV Part 2A"], a: 1, f: "Logic: Part 1 is the dry, statistical data for the SEC/State (AUM, address, ownership). Part 2A is the narrative 'Brochure' written in plain English for the client, detailing fees and strategies."},
            {q: "According to NASAA rules, which of the following fee structures is explicitly prohibited for a state-registered Investment Adviser?", c: ["Charging a 2% fee based on the average daily balance of the client's account", "Charging a fee based on a share of the capital gains generated in the client's account"], a: 1, f: "Logic: Performance-based fees (capital gains sharing) are banned because they encourage massive risk-taking, unless the client is a highly wealthy 'Qualified Client'."},
            {q: "Under the USA, a security is considered 'Exempt' if it is issued by a:", c: ["Canadian municipality, such as the City of Toronto", "Corporate entity listed on the Pink Sheets"], a: 0, f: "Logic: The USA treats Canadian government and municipal bonds exactly like U.S. government and municipal bonds—they are exempt from registration."},
            {q: "An agent suspects a client is engaging in insider trading based on a series of highly suspicious, perfectly timed options trades. The agent should:", c: ["Confront the client and refuse to execute any further trades", "Execute the trades but immediately notify the firm's compliance officer or legal department"], a: 1, f: "Logic: Do not tip off the client that they are under suspicion. The agent should escalate the matter directly to the firm's internal compliance/AML officer, who will decide whether to file a Suspicious Activity Report (SAR)."},
